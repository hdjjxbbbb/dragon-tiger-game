<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>威威虎钱包</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0B0E1F;color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  max-width:420px;margin:0 auto;padding:24px;
}
.page{display:none}
.page.active{display:block}
.logo{text-align:center;margin:60px 0 30px}
.logo h1{font-size:32px;font-weight:800;color:#FFB81C}
.logo p{color:#999;margin-top:6px}
.btn{width:100%;padding:18px;border-radius:16px;border:none;background:#FFB81C;color:#000;font-size:16px;font-weight:600;margin:10px 0}
.btn-outline{background:transparent;color:#FFB81C;border:1px solid #FFB81C}
input{width:100%;padding:16px;border-radius:16px;background:#1A1F3A;border:none;color:#fff;margin-top:12px}
.result{background:#1A1F3A;padding:20px;border-radius:16px;margin-top:20px;white-space:pre-wrap;line-height:1.6}

/* 主页样式（和 TP 一样） */
.home-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.home-wallet{font-size:20px;font-weight:700;color:#FFB81C}
.addr{color:#999;font-size:13px}
.balance{text-align:center;margin:30px 0}
.balance .num{font-size:38px;font-weight:700}
.balance .unit{color:#999;margin-top:6px}
.action{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:30px 0}
.action .item{background:#1A1F3A;padding:16px 10px;border-radius:16px;text-align:center}
.action .text{font-size:12px;color:#ccc;margin-top:6px}
.coin-list .coin{background:#1A1F3A;padding:16px;border-radius:16px;margin-bottom:10px;display:flex;justify-content:space-between}
</style>

<body>

<!-- 欢迎页 -->
<div class="page active" id="welcome">
  <div class="logo">
    <h1>威威虎 Wallet</h1>
    <p>安全非托管 · 多链标准钱包</p>
  </div>
  <button class="btn" onclick="createWallet()">创建新钱包</button>
  <button class="btn btn-outline" onclick="showPage('import')">导入助记词</button>
</div>

<!-- 导入页 -->
<div class="page" id="import">
  <div class="logo">
    <h1>导入钱包</h1>
    <p>标准 BIP39 助记词</p>
  </div>
  <input id="mnInput" placeholder="输入 12 / 24 个助记词">
  <button class="btn" onclick="importWallet()">确认导入</button>
  <button class="btn btn-outline" onclick="showPage('welcome')">返回</button>
  <div id="importResult"></div>
</div>

<!-- 钱包主页（和 TP 一模一样） -->
<div class="page" id="home">
  <div class="home-header">
    <div>
      <div class="home-wallet">威威虎钱包</div>
      <div class="addr" id="showAddr"></div>
    </div>
  </div>

  <div class="balance">
    <div class="num">$0.00</div>
    <div class="unit">总资产 ≈ ¥0.00</div>
  </div>

  <div class="action">
    <div class="item">
      <div>💰</div>
      <div class="text">收款</div>
    </div>
    <div class="item">
      <div>📤</div>
      <div class="text">转账</div>
    </div>
    <div class="item">
      <div>⚙️</div>
      <div class="text">管理</div>
    </div>
  </div>

  <div class="coin-list">
    <div class="coin"><div>ETH</div><div>0.0000</div></div>
    <div class="coin"><div>BNB</div><div>0.0000</div></div>
    <div class="coin"><div>USDT</div><div>0.0000</div></div>
  </div>

  <button class="btn btn-outline" style="margin-top:30px" onclick="logout()">退出钱包</button>
  <div id="homeInfo" class="result" style="margin-top:20px"></div>
</div>

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function getRandomBytes(l) {
  const a = new Uint8Array(l);
  crypto.getRandomValues(a);
  return a;
}

function bytesToBin(b) {
  return Array.from(b).map(x => x.toString(2).padStart(8,'0')).join('');
}

async function sha256(bytes) {
  return new Uint8Array(await crypto.subtle.digest('SHA-256', bytes));
}

// 生成标准 BIP39 助记词
async function createWallet() {
  const entropy = getRandomBytes(16);
  const hash = await sha256(entropy);
  const checksum = (hash[0] >> 4).toString(2).padStart(4,'0');
  const bits = bytesToBin(entropy) + checksum;
  const words = [];
  for(let i=0;i<bits.length;i+=11) words.push(wordlist[parseInt(bits.slice(i,i+11),2)]);
  const mn = words.join(' ');
  const addr = "0x" + Array.from(getRandomBytes(20)).map(x => x.toString(16).padStart(2,'0')).join('');
  
  showPage('home');
  document.getElementById('showAddr').innerText = addr.slice(0,10)+'...'+addr.slice(-6);
  document.getElementById('homeInfo').innerText = `✅ 创建成功\n地址：${addr}\n助记词：\n${mn}`;
}

// 导入助记词
function importWallet() {
  const val = document.getElementById('mnInput').value.trim();
  const ws = val.split(/\s+/).filter(x=>x);
  if(ws.length!==12&&ws.length!==24) return alert('必须12或24词');
  for(const w of ws) if(!wordlist.includes(w)) return alert('无效单词：'+w);
  
  const addr = "0x" + Array.from(getRandomBytes(20)).map(x => x.toString(16).padStart(2,'0')).join('');
  showPage('home');
  document.getElementById('showAddr').innerText = addr.slice(0,10)+'...'+addr.slice(-6);
  document.getElementById('homeInfo').innerText = `✅ 导入成功\n地址：${addr}\n助记词：\n${val}`;
}

function logout() {
  showPage('welcome');
  document.getElementById('homeInfo').innerText = '';
  document.getElementById('mnInput').value = '';
}

showPage('welcome');
</script>
