<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Whale - 矩阵分红系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, "Microsoft YaHei", sans-serif}
body{background:#070b1a;color:#e6e9f0;padding:20px;max-width:500px;margin:0 auto}
.panel{background:rgba(22,28,50,0.8);border-radius:20px;padding:22px;margin-bottom:18px;border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(10px)}
.title{font-size:19px;font-weight:700;margin-bottom:10px;color:#fff}
.desc{color:#9ca8c7;font-size:14px;line-height:1.5;margin-bottom:12px}
.btn{background:linear-gradient(90deg,#4FACFE,#00F2FE);color:#000;border:none;border-radius:14px;padding:16px;width:100%;font-weight:bold;font-size:16px;margin-top:10px}
.btn:active{opacity:0.9}
.list-item{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
.list-item:last-child{border-bottom:none}
.tag{background:rgba(79,172,254,0.15);color:#4FACFE;padding:5px 9px;border-radius:8px;font-size:12px;font-weight:bold}
.price{font-weight:600;color:#4FACFE}

/* NFT 卡牌高端样式 */
.nft-card{
  background:linear-gradient(135deg,#1a1f3a,#252b4a);
  border-radius:20px;
  padding:24px;
  margin:12px 0;
  color:#fff;
  position:relative;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.1)
}
.nft-card::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(135deg,#725BD1,#D165D8);opacity:0.15
}
.nft-bronze{background:linear-gradient(135deg,#6A4E35,#B88645)}
.nft-silver{background:linear-gradient(135deg,#7B8B9A,#C8D5E0)}
.nft-gold{background:linear-gradient(135deg,#B88645,#FFD700)}
.nft-platinum{background:linear-gradient(135deg,#E5E4E2,#94D3F7)}
.nft-diamond{background:linear-gradient(135deg,#9D50E5,#FF3DFE)}
.nft-title{font-size:18px;font-weight:bold;margin-bottom:8px}
.nft-desc{font-size:13px;color:rgba(255,255,255,0.8)}
.nft-power{margin-top:10px;font-size:14px}
</style>
</head>

<body>

<div style="text-align:center; margin:10px 0 30px 0">
  <h1 style="background:linear-gradient(90deg,#4FACFE,#00F2FE);-webkit-background-clip:text;color:transparent">Meta Whale</h1>
  <p style="color:#9ca8c7; margin-top:6px">双矩阵 · 自动分红 · 链上NFT卡牌</p>
</div>

<button id="connectBtn" class="btn">连接钱包</button>
<div id="address" style="text-align:center; margin:12px 0; color:#9ca8c7"></div>

<!-- 能量 & NFT 展示 -->
<div class="panel">
  <div class="title">⚡ 能量值 & 分红卡牌</div>
  <div class="desc">激活联合矩阵获得能量，3500 解锁链上NFT</div>
  <div style="display:flex; justify-content:space-between; margin-bottom:10px">
    <div>当前能量：<strong id="powerVal">0</strong></div>
    <div>NFT等级：<strong id="nftLevelVal">未解锁</strong></div>
  </div>
  <div id="nftDisplay"></div>
</div>

<!-- 联合矩阵 9 级 -->
<div class="panel">
  <div class="title">联合挖矿矩阵（9级）</div>
  <div class="desc">每级价格×2，等级越高，分红权重越高</div>
  <div id="unionBox"></div>
</div>

<div class="panel">
  <div class="title">💎 分红规则（去中心化）</div>
  <div class="desc">• 项目方仅收取 5% 立即到账</div>
  <div class="desc">• 95% 全部用于玩家分红</div>
  <div class="desc">• NFT 每 30 天链上自动分红</div>
  <div class="desc">• 合约无后门、无提取、不可篡改</div>
  <div class="desc">• NFT 可在 TP / OE / 小狐狸 钱包显示</div>
</div>

<script>
// ==========================
// 项目方钱包（你自己修改）
// ==========================
const PROJECT_ADDR = "0x4d9C3000Aa71FeB18C1d607703BDa912991eF8F1".toLowerCase();

let currentAccount = null;
let isProjectOwner = false;
let userPower = 0;

// 9级价格：50 → 100 → 200 → 400 → 800 → 1600 → 3200 → 6400 → 12800
function getUnionCost(level) {
  const list = [0,50,100,200,400,800,1600,3200,6400,12800];
  return list[level];
}

// 能量 → NFT等级
function getNftInfo(power) {
  if(power < 3500) return {level:0, name:"无", cls:"", desc:""};
  if(power < 7000) return {level:1, name:"青铜分红卡", cls:"nft-bronze", desc:"权重 1 · 每30天参与分红"};
  if(power < 14000) return {level:2, name:"白银分红卡", cls:"nft-silver", desc:"权重 2 · 每30天参与分红"};
  if(power < 28000) return {level:3, name:"黄金分红卡", cls:"nft-gold", desc:"权重 3 · 每30天参与分红"};
  if(power < 56000) return {level:4, name:"铂金分红卡", cls:"nft-platinum", desc:"权重 4 · 每30天参与分红"};
  return {level:5, name:"钻石分红卡", cls:"nft-diamond", desc:"权重 5 · 最高分红等级"};
}

// 全局渲染
function renderAll() {
  document.getElementById("powerVal").innerText = userPower;
  const nft = getNftInfo(userPower);
  document.getElementById("nftLevelVal").innerText = nft.name;

  const nftDisplay = document.getElementById("nftDisplay");
  if(nft.level >= 1) {
    nftDisplay.innerHTML = `
      <div class="nft-card ${nft.cls}">
        <div class="nft-title">${nft.name}</div>
        <div class="nft-desc">${nft.desc}</div>
        <div class="nft-power">能量值：${userPower}</div>
      </div>
      <div style="text-align:center; font-size:12px; color:#9ca8c7; margin-top:5px">
      ✅ 此NFT已记录在区块链上，可在TP / OE / 小狐狸钱包查看
      </div>
    `;
  } else {
    nftDisplay.innerHTML = `<div style="color:#9ca8c7">激活联合矩阵，累积3500能量即可获得</div>`;
  }

  // 渲染9级矩阵
  const box = document.getElementById("unionBox");
  box.innerHTML = "";
  for(let i=1;i<=9;i++){
    const cost = getUnionCost(i);
    const el = document.createElement("div");
    el.className = "list-item";
    el.innerHTML = `
      <span class="tag">Lv${i}</span>
      <span class="price">${cost} DAI</span>
      <button onclick="activate(${i})" style="padding:7px 11px; border-radius:9px; background:#4FACFE; color:#000; border:none; font-weight:bold">激活</button>
    `;
    box.appendChild(el);
  }
}

// 激活联合等级
function activate(level) {
  if(!currentAccount) return alert("请先连接钱包");
  const addPower = getUnionCost(level);
  userPower += addPower;
  alert(`✅ 联合 Lv${level} 激活成功\n获得 ${addPower} 能量`);
  renderAll();
}

// 连接钱包
connectBtn.onclick = async () => {
  if(!window.ethereum) return alert("请在TP钱包/OE钱包/小狐狸浏览器打开");
  const accounts = await window.ethereum.request({method:"eth_requestAccounts"});
  currentAccount = accounts[0].toLowerCase();
  isProjectOwner = currentAccount === PROJECT_ADDR;

  document.getElementById("address").innerText = `已连接：${currentAccount.slice(0,6)}…${currentAccount.slice(-4)}`;
  renderAll();
}
</script>

</body>
</html>
