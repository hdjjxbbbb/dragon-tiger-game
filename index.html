<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROYALTY NFT 预览</title>
<style>
body{
  background:#090b1a;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  font-family:Arial, sans-serif;
}

/* 卡牌容器 + 左右翻书动画（你要的效果） */
.nft-card{
  width:240px;
  height:320px;
  background:#2d2d2d;
  border-radius:16px;
  border:2px solid #00ff88;
  position:relative;
  overflow:hidden;
  perspective:1000px;
  animation: flipY 8s linear infinite;
}
@keyframes flipY {
  0%   { transform: rotateY(0deg); }
  100% { transform: rotateY(360deg); }
}

/* 卡牌正面 */
.nft-front{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
  color:#fff;
}

/* 顶部 META FORCE */
.nft-top{
  position:absolute;
  top:15px;
  left:15px;
  font-size:12px;
  font-weight:bold;
  letter-spacing:1px;
  color:#00ff88;
}
.nft-logo{
  position:absolute;
  top:15px;
  right:15px;
  width:28px;
  height:28px;
  border-radius:50%;
  background:#00ff88;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  color:#2d2d2d;
}

/* ROYALTY NFT 标题 */
.nft-title{
  font-size:22px;
  letter-spacing:2px;
  margin:30px 0 20px;
  opacity:0.9;
}
.nft-title span{
  opacity:0.6;
}

/* 水晶地球 + 光环 */
.nft-orb{
  width:130px;
  height:130px;
  border-radius:50%;
  position:relative;
  margin-bottom:20px;
  box-shadow:0 0 30px #00ff88;
}
.orb-glow{
  width:100%;
  height:100%;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.5), #00cc66 60%);
}
.orb-ring{
  position:absolute;
  width:150px;
  height:150px;
  border:1px solid #00ff88;
  border-radius:50%;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  opacity:0.7;
}
.orb-ring::after{
  content:'';
  position:absolute;
  width:8px; height:8px;
  background:#00ff88;
  border-radius:50%;
  top:-4px; left:50%;
  transform:translateX(-50%);
}
.orb-orbit{
  position:absolute;
  width:110px;
  height:65px;
  border:1px solid #00ff88;
  border-radius:50%;
  top:50%; left:50%;
  transform:translate(-50%,-50%) rotateX(60deg);
  opacity:0.5;
}
.orb-dot{
  position:absolute;
  width:6px; height:6px;
  background:#fff;
  border-radius:50%;
  top:20%; right:10%;
}

/* JUST NFT 底部文字 */
.nft-bottom{
  font-size:16px;
  letter-spacing:1px;
  opacity:0.8;
}
</style>
</head>
<body>
<div class="nft-card">
  <div class="nft-front">
    <div class="nft-top">META FORCE</div>
    <div class="nft-logo">🐳</div>
    <div class="nft-title">ROYALTY <span>NFT</span></div>
    <div class="nft-orb">
      <div class="orb-glow"></div>
      <div class="orb-ring"></div>
      <div class="orb-orbit"></div>
      <div class="orb-dot"></div>
    </div>
    <div class="nft-bottom">JUST NFT</div>
  </div>
</div>
</body>
</html>
