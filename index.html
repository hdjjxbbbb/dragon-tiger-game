<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
* {margin:0;padding:0;box-sizing:border-box;}
html,body {
  background:#f5f6fa;
  overflow:hidden;
  touch-action:none;
  font-family:Arial;
}
.box{
  max-width:420px;
  margin:30px auto;
  background:#fff;
  border-radius:16px;
  padding:25px;
}
h2{
  text-align:center;
  margin-bottom:20px;
  color:#6c5ce7;
}
.status{
  padding:12px;
  background:#f0f4ff;
  border-radius:8px;
  text-align:center;
  margin-bottom:20px;
  word-break:break-all;
}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#6c5ce7;
  color:#fff;
  font-size:16px;
}
.admin{
  display:none;
  margin-top:30px;
  padding-top:20px;
  border-top:1px solid #eee;
  text-align:center;
  color:#e53e3e;
}
</style>
</head>
<body>
<div class="box">
  <h2>橘子一键发币</h2>
  <div class="status" id="stat">未连接钱包</div>
  <button id="btnConn">连接钱包</button>

  <div class="admin" id="adminBox">
    🔒 管理员后台已显示
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.91.8"></script>
<script>
const ADMIN = "FbDMLj8MTJGSBWeanFKhJWycn5qjmJ3q8WBzZb3Gbm1c";
let wallet = null;

function getWallet(){
  if(window.solana) return window.solana;
  if(window.phantom?.solana) return window.phantom.solana;
  return null;
}

document.getElementById("btnConn").onclick = async function(){
  let stat = document.getElementById("stat");
  let adminBox = document.getElementById("adminBox");

  wallet = getWallet();
  if(!wallet){
    stat.innerText = "请用TP/欧易内置浏览器打开";
    return;
  }
  try{
    if(wallet.isConnected) await wallet.disconnect();
    let res = await wallet.connect();
    let addr = res.publicKey.toString();
    stat.innerText = "已连接：" + addr;

    if(addr === ADMIN){
      adminBox.style.display = "block";
    }
  }catch(e){
    stat.innerText = "连接已取消";
  }
};
</script>
</body>
</html>
