<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOL 一键发币（硬编码RPC）</title>
  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.95.6/lib/index.iife.min.js"></script>
  <style>
    body { max-width: 420px; margin: 0 auto; padding: 20px; background: #fff; font-family: system-ui; }
    .btn { width: 100%; padding: 16px; border-radius: 16px; border: none; background: #0071e3; color: white; font-size: 16px; margin: 10px 0; cursor: pointer; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #ddd; margin: 8px 0; }
    .card { background: #f9f9f9; padding: 20px; border-radius: 20px; margin-bottom: 16px; }
    #addr { padding: 12px; background: #f1f1f1; border-radius: 10px; margin: 10px 0; }
    .logo-preview { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; margin-top: 8px; display: none; }
  </style>
</head>
<body>

<h2>SOL 一键发币（硬编码RPC）</h2>

<button class="btn" onclick="connect()">连接钱包</button>
<div id="addr"></div>

<div class="card">
  <input id="name" placeholder="代币名称" value="Test">
  <input id="symbol" placeholder="代币符号" value="DTM">
  <input id="decimals" value="9" placeholder="精度">
  <input id="supply" value="1000000000" placeholder="发行量">
  <input type="file" id="logo" accept="image/*" style="display:none" onchange="previewLogo()">
  <button class="btn" style="background:#34c759" onclick="document.getElementById('logo').click()">上传代币 Logo</button>
  <img id="logoPreview" class="logo-preview">
</div>

<button class="btn" onclick="createToken()">创建代币</button>

<script>
let provider;
let publicKey;
let address = "";
let logoFile = null;

const { Connection, Keypair, Transaction, SystemProgram, PublicKey } = solanaWeb3;
// 硬编码一个稳定的 RPC 节点
const connection = new Connection("https://api.mainnet-beta.solana.com", "confirmed");

function getWallet() {
  return window.solana || window.okxwallet || window.tpWallet;
}

async function connect() {
  try {
    const wallet = getWallet();
    if (!wallet) { alert("请在钱包浏览器打开！"); return; }
    const res = await wallet.connect();
    provider = wallet;
    publicKey = res.publicKey;
    address = publicKey.toBase58();
    document.getElementById("addr").innerText = "已连接：" + address;
  } catch (err) {
    alert("连接失败：" + err.message);
  }
}

function previewLogo() {
  const file = document.getElementById("logo").files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById("logoPreview");
    img.src = e.target.result;
    img.style.display = "block";
    logoFile = file;
  };
  reader.readAsDataURL(file);
}

// 手动创建 Mint
async function createMintManually() {
  const mintKeypair = Keypair.generate();
  const lamports = await connection.getMinimumBalanceForRentExemption(82);

  const tx = new Transaction().add(
    SystemProgram.createAccount({
      fromPubkey: publicKey,
      newAccountPubkey: mintKeypair.publicKey,
      space: 82,
      lamports,
      programId: new PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA")
    }),
    {
      keys: [
        { pubkey: mintKeypair.publicKey, isSigner: true, isWritable: true },
        { pubkey: publicKey, isSigner: false, isWritable: false },
        { pubkey: publicKey, isSigner: false, isWritable: false },
        { pubkey: SystemProgram.programId, isSigner: false, isWritable: false }
      ],
      programId: new PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA"),
      data: Buffer.from([
        0x02, // InitializeMint
        ...new Uint8Array([9]), // decimals
        ...publicKey.toBuffer(), // mintAuthority
        ...publicKey.toBuffer(), // freezeAuthority
      ])
    }
  );

  tx.feePayer = publicKey;
  tx.recentBlockhash = (await connection.getLatestBlockhash()).blockhash;
  tx.partialSign(mintKeypair);

  const signed = await provider.signTransaction(tx);
  const txId = await connection.sendRawTransaction(signed.serialize());
  await connection.confirmTransaction(txId);

  return mintKeypair.publicKey;
}

// 手动 mintTo
async function mintToManually(mint, to, amount) {
  const tx = new Transaction().add({
    keys: [
      { pubkey: mint, isSigner: false, isWritable: true },
      { pubkey: to, isSigner: false, isWritable: true },
      { pubkey: publicKey, isSigner: true, isWritable: false }
    ],
    programId: new PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA"),
    data: Buffer.concat([
      Buffer.from([0x07]), // MintTo
      Buffer.from(Uint8Array.from([...Array(8)].map((_, i) => (amount >> BigInt(8 * i)) & 0xffn)))
    ])
  });

  tx.feePayer = publicKey;
  tx.recentBlockhash = (await connection.getLatestBlockhash()).blockhash;

  const signed = await provider.signTransaction(tx);
  const txId = await connection.sendRawTransaction(signed.serialize());
  await connection.confirmTransaction(txId);
  return txId;
}

// 发币（硬编码RPC，不依赖钱包对象）
async function createToken() {
  if (!address) { alert("请先连接钱包！"); return; }

  try {
    const name = document.getElementById("name").value;
    const symbol = document.getElementById("symbol").value;
    const decimals = parseInt(document.getElementById("decimals").value);
    const supply = BigInt(document.getElementById("supply").value);
    const amount = supply * (10n ** BigInt(decimals));

    const mint = await createMintManually();
    const [ata] = await PublicKey.findProgramAddress(
      [publicKey.toBuffer(), new PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA").toBuffer(), mint.toBuffer()],
      new PublicKey("ATokenGPvbdGVxr1b2hvZbsiqW5xWH25wNF8fJ5ipq79v9")
    );
    const tx = await mintToManually(mint, ata, amount);

    alert(`✅ 发币成功！
名称：${name}
符号：${symbol}
合约：${mint.toBase58()}
交易：${tx}`);

  } catch (err) {
    alert("失败：" + err.message);
  }
}
</script>

</body>
</html>
