<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LP Mining</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Oxygen,Ubuntu,Cantarell,Open Sans,Helvetica Neue,sans-serif}
body{background:#0B121B;color:#fff;padding:20px}
.main{max-width:480px;margin:0 auto}
.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.logo{font-size:18px;font-weight:700}
.connect-btn{background:#165DFF;color:#fff;border:none;border-radius:12px;padding:10px 16px;font-size:14px;font-weight:600}
.box{background:#131A29;border-radius:16px;padding:20px;margin-bottom:12px}
.title{font-size:16px;font-weight:600;margin-bottom:12px}
.row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1F2A3F;font-size:14px}
.row:last-child{border-bottom:none}
.label{color:#9CA3AF}
.value{color:#fff;font-weight:500}
.input-group{margin-top:10px}
.input{width:100%;background:#1C2637;border:1px solid #2A3754;border-radius:12px;padding:14px 16px;color:#fff;font-size:15px;margin-top:8px}
.btn-stake{width:100%;background:#22D1F7;color:#000;font-weight:600;border:none;border-radius:12px;padding:15px;margin-top:12px;font-size:15px}
.btn-unstake{width:100%;background:#FF445F;color:#fff;font-weight:600;border:none;border-radius:12px;padding:15px;margin-top:12px;font-size:15px}
.btn-claim{width:100%;background:#10B981;color:#fff;font-weight:600;border:none;border-radius:12px;padding:15px;margin-top:12px;font-size:15px}
#walletArea{display:none}
</style>
</head>
<body>
<div class="main">

  <div class="head">
    <div class="logo">LP Staking Mining</div>
    <button id="connectWallet" class="connect-btn">Connect Wallet</button>
  </div>

  <div id="walletArea">
    <div class="box">
      <div class="title">My Info</div>
      <div class="row">
        <span class="label">My LP</span>
        <span class="value" id="lpBal">0.00</span>
      </div>
      <div class="row">
        <span class="label">Staked</span>
        <span class="value" id="staked">0.00</span>
      </div>
      <div class="row">
        <span class="label">Pending Reward</span>
        <span class="value" id="reward">0.00</span>
      </div>
    </div>

    <div class="box">
      <div class="title">Stake LP</div>
      <div class="input-group">
        <span class="label">Amount</span>
        <input class="input" id="stakeAmt" placeholder="Input stake amount" type="number">
      </div>
      <button class="btn-stake" id="stakeBtn">Stake</button>
    </div>

    <div class="box">
      <button class="btn-unstake" id="unstakeBtn">Unstake All</button>
      <button class="btn-claim" id="claimBtn">Claim Reward</button>
    </div>
  </div>

</div>

<script>
const CONFIG = {
  chainId: 56,
  staking: "0x5001fA16F04AcdD246d41784e71370Db07262981",
  lp: "【在这里填入你的LP代币地址】",
  lpDecimals: 18,
  rewardDecimals: 18
};

const ABI_STAKE = [
  {"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"stakedAmount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
  {"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"earned","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
  {"inputs":[{"internalType":"uint256","name":"amount","type":"uint256"}],"name":"stake","outputs":[],"stateMutability":"nonpayable","type":"function"},
  {"inputs":[{"internalType":"uint256","name":"amount","type":"uint256"}],"name":"withdraw","outputs":[],"stateMutability":"nonpayable","type":"function"},
  {"inputs":[],"name":"claimReward","outputs":[],"stateMutability":"nonpayable","type":"function"}
];

const ABI_ERC20 = [
  {"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"balanceOf","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
  {"inputs":[{"internalType":"address","name":"","type":"address"},{"internalType":"uint256","name":"","type":"uint256"}],"name":"approve","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"}
];

let provider, signer, stakeC, lpC;

async function switchBSC() {
  try {
    await window.ethereum.request({
      method: 'wallet_switchEthereumChain',
      params: [{ chainId: '0x38' }]
    });
  } catch (e) {}
}

async function connect() {
  await switchBSC();
  provider = new ethers.providers.Web3Provider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = provider.getSigner();
  stakeC = new ethers.Contract(CONFIG.staking, ABI_STAKE, signer);
  lpC = new ethers.Contract(CONFIG.lp, ABI_ERC20, signer);
  document.getElementById("walletArea").style.display = "block";
  refresh();
}

async function refresh() {
  const addr = await signer.getAddress();
  const lpBal = await lpC.balanceOf(addr);
  const staked = await stakeC.stakedAmount(addr);
  const reward = await stakeC.earned(addr);
  document.getElementById("lpBal").innerText = parseFloat(ethers.utils.formatUnits(lpBal, CONFIG.lpDecimals)).toFixed(4);
  document.getElementById("staked").innerText = parseFloat(ethers.utils.formatUnits(staked, CONFIG.lpDecimals)).toFixed(4);
  document.getElementById("reward").innerText = parseFloat(ethers.utils.formatUnits(reward, CONFIG.rewardDecimals)).toFixed(4);
}

document.getElementById("stakeBtn").onclick = async () => {
  const v = document.getElementById("stakeAmt").value;
  if (!v) return alert("Input amount");
  const amt = ethers.utils.parseUnits(v, CONFIG.lpDecimals);
  await lpC.approve(CONFIG.staking, amt);
  await stakeC.stake(amt);
  alert("Stake Success");
  refresh();
};

document.getElementById("unstakeBtn").onclick = async () => {
  const addr = await signer.getAddress();
  const staked = await stakeC.stakedAmount(addr);
  await stakeC.withdraw(staked);
  alert("Unstake Success");
  refresh();
};

document.getElementById("claimBtn").onclick = async () => {
  await stakeC.claimReward();
  alert("Claim Success");
  refresh();
};

document.getElementById("connectWallet").onclick = connect;
</script>
</body>
</html>
