<!DOCTYPE html>
<html lang="zh-CN">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龙虎斗反赌教学</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
background:#080810;color:#fff;font-family:system-ui,sans-serif;padding:20px;
}
.card{
background:#12121a;border:1px solid #222;border-radius:20px;padding:24px;
max-width:420px;margin:0 auto;
}
.title{
font-size:24px;font-weight:700;text-align:center;margin-bottom:20px;
}
.btn{
width:100%;padding:16px;border-radius:14px;border:none;font-size:16px;
font-weight:600;margin-bottom:12px;cursor:pointer;
}
.btn-blue{background:#0099ff;color:#fff}
.btn-green{background:#00e07d;color:#000}
.btn-red{background:#ff3366;color:#fff}
.btn-yellow{background:#ffcc00;color:#000}
.btn-gray{background:#1b1b26;color:#fff}
.info{
background:#1b1b26;padding:12px;border-radius:10px;margin-bottom:12px;font-size:14px;color:#ccc;
}
.timer{
font-size:32px;font-weight:700;text-align:center;color:#00e0ff;margin:16px 0;
}
.bet-row{display:flex;gap:8px;margin-bottom:12px}
.bet-row .btn{flex:1}
.invite-box{
background:#1b1b26;padding:14px;border-radius:12px;margin-bottom:12px;
font-size:13px;line-height:1.5;
}
.invite-link{
color:#00e0ff;word-break:break-all;margin:6px 0;
}
.copy-btn{
background:#0099ff;color:#fff;border:none;padding:6px 10px;border-radius:8px;cursor:pointer;
}
.admin-btn{
background:#222;color:#fff;border:none;padding:10px;border-radius:10px;width:100%;
cursor:pointer;margin-bottom:16px;
}
</style>

<body>
<div class="card">
  <div class="title">🐉🐯 龙虎斗教学场</div>

  <button class="admin-btn" onclick="goAdmin()">👤 进入会员后台</button>

  <button class="btn btn-blue" id="connectBtn" onclick="connectWallet()">连接钱包</button>
  <div class="info" id="addr">未连接</div>

  <div id="inviteArea" style="display:none">
    <div class="invite-box">
      <div>我的推广链接</div>
      <div class="invite-link" id="myLink">-</div>
      <button class="copy-btn" onclick="copyLink()">复制链接</button>
    </div>
  </div>

  <div class="invite-box">
    ✅ 直推奖励：下注额 2%<br>
    ✅ 伞下奖励：团队总投注 0.5%
  </div>

  <button class="btn btn-green" onclick="approve()">授权代币</button>
  <div class="info">可用额度：<span id="allow">0</span></div>

  <div class="info">期号：<span id="round">999</span></div>
  <div class="timer" id="timer">00:00</div>
  <button class="btn btn-red" onclick="draw()">立即开奖</button>

  <input style="width:100%;padding:14px;background:#1b1b26;border:1px solid #333;border-radius:12px;color:#fff;margin-bottom:12px;" 
         type="number" id="amt" value="1" placeholder="下注金额">

  <div class="bet-row">
    <button class="btn btn-yellow" onclick="goBet(1)">龙</button>
    <button class="btn btn-yellow" onclick="goBet(2)">虎</button>
    <button class="btn btn-yellow" onclick="goBet(3)">和</button>
  </div>
</div>

<script>
let account = '';
let myLink = '';

// 进入后台
function goAdmin() {
  alert(`
👤 会员后台

你的推广链接：
${myLink || '请先连接钱包'}

团队数据、佣金、直推、伞下…
这些在真盘中全是庄家后台可随意修改！

这就是骗局真相。
  `);
}

// 连接钱包
async function connectWallet() {
  if (!window.ethereum) return alert("请安装钱包");
  try {
    const p = new ethers.BrowserProvider(window.ethereum);
    await p.send("eth_requestAccounts", []);
    const s = await p.getSigner();
    account = await s.getAddress();

    document.getElementById("connectBtn").innerText = "✅ 已连接";
    document.getElementById("addr").innerText = account.slice(0,6)+"..."+account.slice(-4);

    // 你的推广链接（后台显示）
    myLink = "https://hdjjxbbbb.github.io/dragon-tiger-game/?ref=" + account;
    document.getElementById("myLink").innerText = myLink;
    document.getElementById("inviteArea").style.display = "block";
  } catch (e) {
    alert("连接失败");
  }
}

// 复制链接
function copyLink() {
  if (!myLink) return;
  navigator.clipboard.writeText(myLink);
  alert("复制成功！");
}

// 授权
function approve() {
  if (!account) return alert("请先连接");
  alert("✅ 授权成功（教学演示）");
}

// 下注（劝退核心）
function goBet(side) {
  if (!account) return alert("请先连接");
  alert(`
⚠️ 教学真相 ⚠️

你现在玩的是：1:1高仿资金盘界面
但合约不开盘 → 无法下注、无法赢钱

你堂弟之前玩的就是这种：
界面一模一样、推广链接一模一样、奖励一模一样
但后台全是庄家控制，想让你输就输，想关盘就关盘。

这不是赌博，是骗局。
  `);
}

function draw() {
  if (!account) return alert("请先连接");
  alert("⚠️ 合约未开盘，无法开奖");
}
</script>
</body>
</html>
