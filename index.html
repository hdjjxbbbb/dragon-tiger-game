<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEX Swap - Polygon</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
    body {
      background: #0F172A;
      color: #fff;
      padding: 20px;
      max-width: 420px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .logo {
      font-size: 24px;
      font-weight: bold;
    }
    .btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      background: #4F46E5;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    .btn-secondary {
      background: #2563EB;
    }
    .token-card {
      background: #1E293B;
      padding: 16px;
      border-radius: 16px;
      margin: 10px 0;
    }
    .label {
      font-size: 14px;
      color: #94A3B8;
      margin-bottom: 8px;
    }
    .input-group {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    input {
      width: 70%;
      background: transparent;
      border: none;
      color: white;
      font-size: 22px;
      outline: none;
    }
    .token-btn {
      background: #334155;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }
    .arrow {
      text-align: center;
      font-size: 24px;
      color: #94A3B8;
      margin: 10px 0;
      cursor: pointer;
    }
    .tab {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .tab button {
      flex: 1;
      background: #1E293B;
      border: none;
      color: #fff;
      border-radius: 14px;
      padding: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .tab .active {
      background: #4F46E5;
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
    }
    .token-list {
      background: #1E293B;
      width: 90%;
      max-width: 360px;
      max-height: 60vh;
      overflow-y: auto;
      border-radius: 16px;
      padding: 20px;
    }
    .search-input {
      width: 100%;
      padding: 10px;
      background: #2a2a2a;
      border: none;
      color: white;
      border-radius: 10px;
      margin-bottom: 10px;
    }
    .token-item {
      padding: 12px;
      border-bottom: 1px solid #334155;
      cursor: pointer;
    }
    .info {
      font-size: 12px;
      color: #64748B;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">DEX Swap</div>
    <button id="connectBtn" class="btn" style="width: auto; padding: 8px 16px;">连接钱包</button>
  </div>

  <div class="tab">
    <button class="active" id="tabSwap">兑换</button>
    <button id="tabLP">流动性</button>
  </div>

  <!-- 兑换页面 -->
  <div id="swapPage">
    <div class="token-card">
      <div class="label">卖出</div>
      <div class="input-group">
        <input id="fromAmount" placeholder="0.0" type="number">
        <button class="token-btn" id="fromTokenBtn">POL</button>
      </div>
    </div>

    <div class="arrow" id="reverseBtn">↓</div>

    <div class="token-card">
      <div class="label">买入</div>
      <div class="input-group">
        <input id="toAmount" placeholder="0.0" readonly>
        <button class="token-btn" id="toTokenBtn">USDT</button>
      </div>
    </div>

    <button id="swapBtn" class="btn">兑换</button>
  </div>

  <!-- 流动性页面 -->
  <div id="lpPage" style="display: none;">
    <div class="token-card">
      <div class="label">代币A</div>
      <div class="input-group">
        <input id="lp1" placeholder="0.0" type="number">
        <button class="token-btn" id="lpToken1">POL</button>
      </div>
    </div>
    <div class="token-card">
      <div class="label">代币B</div>
      <div class="input-group">
        <input id="lp2" placeholder="0.0" type="number">
        <button class="token-btn" id="lpToken2">USDT</button>
      </div>
    </div>
    <button id="addLPBtn" class="btn">添加流动性</button>
    <button id="removeLPBtn" class="btn btn-secondary" style="margin-top: 8px;">移除流动性</button>
  </div>

  <div class="info">
    手续费 0.2% 自动进入平台<br>
    Powered by QuickSwap • Uniswap V2
  </div>

  <!-- 代币选择弹窗 -->
  <div class="overlay" id="overlay">
    <div class="token-list">
      <input type="text" class="search-input" id="tokenSearch" placeholder="搜索代币名称或地址">
      <div id="tokenContainer">
        <div class="token-item" data-addr="0x0d500B1d8E8eF31E51C75a516f9Ff3091C554ba" data-symbol="POL" data-decimals="18">POL</div>
        <div class="token-item" data-addr="0xc2132D05D31c914a87CF61EC082359f942450e7b" data-symbol="USDT" data-decimals="6">USDT</div>
        <div class="token-item" data-addr="0x2791Bca1f2de4663ED7a18BAF5671a9423366102" data-symbol="USDC" data-decimals="6">USDC</div>
      </div>
    </div>
  </div>

<script>
let signer;
let provider;
let fromToken = {
  addr: "0x0d500B1d8E8eF31E51C75a516f9Ff3091C554ba",
  symbol: "POL",
  decimals: 18
};
let toToken = {
  addr: "0xc2132D05D31c914a87CF61EC082359f942450e7b",
  symbol: "USDT",
  decimals: 6
};
let isSelectingFrom = true;
let isSwapTab = true;

const YOUR_WALLET = "0xF678c17e1CDB4547fbB8343965a33dF24A6d6F18";
const FEE_PERCENT = 0.2;
const ROUTER_ADDR = "0xa5E0829CaCEd8fFDD4De3c436966571f9C36A6ff";
const FACTORY_ADDR = "0x57573702Aa8D6920332726cec151221d00C56420";

// 连接钱包
document.getElementById("connectBtn").onclick = async () => {
  try {
    if (!window.ethereum) throw new Error("请安装钱包");
    provider = new ethers.providers.Web3Provider(window.ethereum);
    await window.ethereum.request({ method: "eth_requestAccounts" });
    signer = provider.getSigner();
    alert("连接成功");
  } catch (e) {
    alert("连接失败: " + e.message);
  }
};

// 标签页切换
document.getElementById("tabSwap").onclick = () => {
  isSwapTab = true;
  document.getElementById("swapPage").style.display = "block";
  document.getElementById("lpPage").style.display = "none";
  document.getElementById("tabSwap").classList.add("active");
  document.getElementById("tabLP").classList.remove("active");
};
document.getElementById("tabLP").onclick = () => {
  isSwapTab = false;
  document.getElementById("swapPage").style.display = "none";
  document.getElementById("lpPage").style.display = "block";
  document.getElementById("tabLP").classList.add("active");
  document.getElementById("tabSwap").classList.remove("active");
};

// 代币选择器
document.getElementById("fromTokenBtn").onclick = () => {
  isSelectingFrom = true;
  document.getElementById("overlay").style.display = "flex";
};
document.getElementById("toTokenBtn").onclick = () => {
  isSelectingFrom = false;
  document.getElementById("overlay").style.display = "flex";
};
document.getElementById("lpToken1").onclick = () => {
  isSelectingFrom = true;
  document.getElementById("overlay").style.display = "flex";
};
document.getElementById("lpToken2").onclick = () => {
  isSelectingFrom = false;
  document.getElementById("overlay").style.display = "flex";
};

// 代币搜索
document.getElementById("tokenSearch").oninput = (e) => {
  const filter = e.target.value.toLowerCase();
  document.querySelectorAll(".token-item").forEach(item => {
    const text = item.textContent.toLowerCase();
    const addr = item.dataset.addr.toLowerCase();
    if (text.includes(filter) || addr.includes(filter)) {
      item.style.display = "block";
    } else {
      item.style.display = "none";
    }
  });
};

// 选择代币
document.querySelectorAll(".token-item").forEach(item => {
  item.onclick = () => {
    const addr = item.dataset.addr;
    const symbol = item.dataset.symbol;
    const decimals = parseInt(item.dataset.decimals);

    if (isSwapTab) {
      if (isSelectingFrom) {
        fromToken = { addr, symbol, decimals };
        document.getElementById("fromTokenBtn").innerText = symbol;
      } else {
        toToken = { addr, symbol, decimals };
        document.getElementById("toTokenBtn").innerText = symbol;
      }
    } else {
      if (isSelectingFrom) {
        fromToken = { addr, symbol, decimals };
        document.getElementById("lpToken1").innerText = symbol;
      } else {
        toToken = { addr, symbol, decimals };
        document.getElementById("lpToken2").innerText = symbol;
      }
    }
    document.getElementById("overlay").style.display = "none";
    updateQuote();
  };
});

// 关闭弹窗
document.getElementById("overlay").onclick = (e) => {
  if (e.target.id === "overlay") {
    document.getElementById("overlay").style.display = "none";
  }
};

// 反转代币对
document.getElementById("reverseBtn").onclick = () => {
  [fromToken, toToken] = [toToken, fromToken];
  document.getElementById("fromTokenBtn").innerText = fromToken.symbol;
  document.getElementById("toTokenBtn").innerText = toToken.symbol;
  updateQuote();
};

// 更新报价
async function updateQuote() {
  const val = document.getElementById("fromAmount").value;
  if (!val || val <= 0) return;
  const router = new ethers.Contract(ROUTER_ADDR, [
    "function getAmountsOut(uint amountIn, address[] path) view returns (uint[])"
  ], provider);
  const amounts = await router.getAmountsOut(
    ethers.utils.parseUnits(val, fromToken.decimals),
    [fromToken.addr, toToken.addr]
  );
  document.getElementById("toAmount").value = ethers.utils.formatUnits(amounts[1], toToken.decimals);
}

document.getElementById("fromAmount").oninput = updateQuote;

// 兑换
document.getElementById("swapBtn").onclick = async () => {
  try {
    const val = document.getElementById("fromAmount").value;
    if (!val || val <= 0) throw new Error("请输入金额");

    const userAddr = await signer.getAddress();
    const amountIn = ethers.utils.parseUnits(val, fromToken.decimals);
    const feeAmount = amountIn.mul(Math.round(FEE_PERCENT * 100)).div(10000);

    const token = new ethers.Contract(fromToken.addr, [
      "function approve(address spender, uint256 amount) external returns (bool)",
      "function transfer(address to, uint256 value) external returns (bool)"
    ], signer);

    await token.approve(ROUTER_ADDR, amountIn);
    if (feeAmount.gt(0) && userAddr.toLowerCase() !== YOUR_WALLET.toLowerCase()) {
      await token.transfer(YOUR_WALLET, feeAmount);
    }

    const router = new ethers.Contract(ROUTER_ADDR, [
      "function swapExactTokensForTokens(uint amountIn, uint amountOutMin, address[] path, address to, uint deadline) external returns (uint[])"
    ], signer);

    await router.swapExactTokensForTokens(
      amountIn.sub(feeAmount),
      0,
      [fromToken.addr, toToken.addr],
      userAddr,
      Math.floor(Date.now() / 1000) + 1200
    );

    alert("兑换成功！0.2% 手续费已到账");
  } catch (e) {
    alert("兑换失败: " + e.message);
  }
};

// 添加流动性
document.getElementById("addLPBtn").onclick = async () => {
  try {
    const val1 = document.getElementById("lp1").value;
    const val2 = document.getElementById("lp2").value;
    if (!val1 || !val2) throw new Error("输入金额");

    const user = await signer.getAddress();
    const amountA = ethers.utils.parseUnits(val1, fromToken.decimals);
    const amountB = ethers.utils.parseUnits(val2, toToken.decimals);

    const tokenA = new ethers.Contract(fromToken.addr, [
      "function approve(address, uint) returns (bool)"
    ], signer);
    const tokenB = new ethers.Contract(toToken.addr, [
      "function approve(address, uint) returns (bool)"
    ], signer);

    await tokenA.approve(FACTORY_ADDR, amountA);
    await tokenB.approve(FACTORY_ADDR, amountB);

    const router = new ethers.Contract(ROUTER_ADDR, [
      "function addLiquidity(address, address, uint, uint, address, uint) returns (uint, uint, uint)"
    ], signer);

    await router.addLiquidity(
      fromToken.addr,
      toToken.addr,
      amountA,
      amountB,
      user,
      Math.floor(Date.now() / 1000) + 1200
    );

    alert("添加流动性成功");
  } catch (e) {
    alert("失败: " + e.message);
  }
};

// 移除流动性
document.getElementById("removeLPBtn").onclick = async () => {
  alert("移除流动性功能已预留，可后续扩展");
};
</script>
</body>
</html>
