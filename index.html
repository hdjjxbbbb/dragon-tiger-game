<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Swap | Polygon Chain DEX</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,Roboto}
body{background:#0F172A;color:#fff;min-height:100vh;padding:20px}
.container{max-width:460px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.logo .name{font-size:28px;font-weight:800;color:#fff}
.logo .sub{font-size:13px;color:#94A3B8}
.lang button{background:#1E293B;border:1px solid #334155;color:#cbd5e1;border-radius:10px;padding:5px 9px;font-size:12px;cursor:pointer}
.tab{display:flex;gap:8px;margin-bottom:16px}
.tab button{flex:1;background:#1E293B;border:none;color:#fff;border-radius:14px;padding:14px;font-weight:600}
.tab .active{background:#4F46E5}
.card{background:#1E293B;border-radius:20px;padding:22px;margin-bottom:16px}
.label{font-size:14px;color:#94A3B8;margin-bottom:8px}
.input-box{background:#273449;border-radius:16px;padding:18px;display:flex;align-items:center;justify-content:space-between}
.input-box input{width:70%;background:transparent;border:none;color:#fff;font-size:24px;outline:none}
.token-btn{background:#334155;color:#fff;border:none;border-radius:12px;padding:10px 12px;font-weight:600}
.arrow{text-align:center;color:#94A3B8;font-size:20px;margin:6px 0}
.btn{width:100%;border:none;border-radius:16px;padding:18px;font-size:16px;font-weight:700;margin-top:10px}
.btn-primary{background:#4F46E5;color:#fff}
.btn-secondary{background:#2563EB;color:#fff}
.balance{font-size:12px;color:#64748B;margin-top:6px}
.slippage{display:flex;gap:6px;margin-bottom:10px}
.slippage button{padding:6px 10px;background:#273449;border:none;color:#fff;border-radius:8px;font-size:12px}
.slippage .active{background:#4F46E5}
.fee-info{font-size:12px;color:#94A3B8;text-align:center;margin-top:10px}
.info{font-size:12px;color:#64748B;text-align:center;line-height:1.6;margin-top:20px}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">
      <div class="name">Unit Swap</div>
      <div class="sub">Polygon Chain DEX</div>
    </div>
    <div class="lang">
      <button id="zh">中文</button>
      <button id="en">EN</button>
    </div>
  </div>

  <div class="tab">
    <button class="active" id="tabSwap">兑换</button>
    <button id="tabLP">流动性</button>
  </div>

  <button id="connect" class="btn btn-secondary">连接钱包</button>

  <div id="swapPage">
    <div class="slippage">
      <button data="0.5">0.5%</button>
      <button data="1" class="active">1%</button>
      <button data="2">2%</button>
    </div>
    <div class="card">
      <div class="label" id="fromTxt">卖出</div>
      <div class="input-box">
        <input id="fromVal" placeholder="0.0" type="number">
        <button class="token-btn" id="fromBtn">POL</button>
      </div>
      <div class="balance" id="fromBal">余额：--</div>
    </div>
    <div class="arrow">↓</div>
    <div class="card">
      <div class="label" id="toTxt">买入</div>
      <div class="input-box">
        <input id="toVal" placeholder="0.0" readonly>
        <button class="token-btn" id="toBtn">USDT</button>
      </div>
      <div class="balance" id="toBal">余额：--</div>
    </div>

    <div class="fee-info">手续费 0.2% 自动进入平台</div>
    <button id="swapBtn" class="btn btn-primary">兑换</button>
  </div>

  <div id="lpPage" style="display:none">
    <div class="card">
      <div class="label">代币A</div>
      <div class="input-box">
        <input id="lp1" placeholder="0.0" type="number">
        <button class="token-btn">POL</button>
      </div>
    </div>
    <div class="card">
      <div class="label">代币B</div>
      <div class="input-box">
        <input id="lp2" placeholder="0.0" type="number">
        <button class="token-btn">USDT</button>
      </div>
    </div>
    <button id="addLP" class="btn btn-primary">添加流动性</button>
  </div>

  <div class="info">
    Powered by QuickSwap • Uniswap V2 • 100% 链上安全<br>
    Unit Swap © Polygon Chain
  </div>
</div>

<script>
const provider = new ethers.providers.Web3Provider(window.ethereum);
const signer = provider.getSigner();

// === 你的固定配置 ===
const YOUR_WALLET = "0xF678c17e1CDB4547fbB8343965a33dF24A6d6F18";
const FEE_PERCENT = 0.2;

// === Polygon 官方地址 ===
const WMATIC = "0x0d500B1d8E8eF31E51C75a516f9Ff3091C554ba";
const USDT  = "0xc2132D05D31c914a87CF61EC082359f942450e7b";
const ROUTER = "0xa5E0829CaCEd8fFDD4De3c436966571f9C36A6ff";

let fromToken = WMATIC;
let toToken = USDT;
let isZh = true;

// 切换网络到 Polygon
async function switchToPolygon() {
  try {
    await window.ethereum.request({
      method: 'wallet_switchEthereumChain',
      params: [{ chainId: '0x89' }]
    });
  } catch (e) {
    alert(isZh ? '请手动切换到Polygon主网' : 'Switch to Polygon');
  }
}

// 连接钱包
connect.onclick = async () => {
  if (!window.ethereum) return alert('请安装钱包');
  await switchToPolygon();
  await window.ethereum.request({ method: 'eth_requestAccounts' });
  alert(isZh ? '连接成功' : 'Connected');
  loadBalances();
};

// 加载余额
async function loadBalances() {
  const addr = await signer.getAddress();
  const abi = [{"constant":true,"inputs":[{"name":"owner"}],"name":"balanceOf","outputs":[{"name":""}],"type":"function"}];
  const t1 = new ethers.Contract(fromToken, abi, provider);
  const t2 = new ethers.Contract(toToken, abi, provider);
  fromBal.innerText = `余额：${parseFloat(ethers.utils.formatEther(await t1.balanceOf(addr))).toFixed(4)}`;
  toBal.innerText = `余额：${parseFloat(ethers.utils.formatUnits(await t2.balanceOf(addr),6)).toFixed(4)}`;
}

// 计算价格
fromVal.oninput = async () => {
  if (!fromVal.value) return;
  const router = new ethers.Contract(ROUTER, [{"inputs":[{"name":"a"},{"name":"b"}],"name":"getAmountsOut","outputs":[{"name":""}],"stateMutability":"view"}], provider);
  const out = await router.getAmountsOut(ethers.utils.parseEther(fromVal.value), [fromToken, toToken]);
  toVal.value = parseFloat(ethers.utils.formatUnits(out[1],6)).toFixed(6);
};

// ============================
// 核心兑换逻辑（带授权 + 手续费）
// ============================
swapBtn.onclick = async () => {
  const amount = fromVal.value;
  if (!amount) return alert(isZh ? '输入金额' : 'Enter amount');

  const user = await signer.getAddress();
  const amountIn = ethers.utils.parseEther(amount);
  const fee = amountIn.mul(Math.round(FEE_PERCENT * 100)).div(10000);

  // 授权
  const token = new ethers.Contract(fromToken, [
    "function approve(address spender, uint256 amount) external returns (bool)",
    "function transfer(address to, uint256 value) external returns (bool)"
  ], signer);

  try {
    // 授权
    await token.approve(ROUTER, amountIn);
    // 收手续费
    if (fee.gt(0) && user.toLowerCase() !== YOUR_WALLET.toLowerCase()) {
      await token.transfer(YOUR_WALLET, fee);
    }
    // 兑换
    const router = new ethers.Contract(ROUTER, [{
      "inputs":[{"name":"amountIn"},{"name":"min"},{"name":"path"},{"name":"to"},{"name":"deadline"}],
      "name":"swapExactTokensForTokens",
      "outputs":[{"name":""}],
      "stateMutability":"nonpayable"
    }], signer);

    await router.swapExactTokensForTokens(
      amountIn.sub(fee),
      0,
      [fromToken, toToken],
      user,
      Math.floor(Date.now()/1000)+1200
    );

    alert(isZh ? '兑换成功！0.2%手续费已到平台' : 'Swap Success!');
    loadBalances();
  } catch (err) {
    alert(isZh ? '交易失败：' + err.message : 'Failed: ' + err.message);
  }
};

// 语言切换
en.onclick = ()=>{isZh=false;connect.innerText="Connect Wallet";swapBtn.innerText="Swap";fromTxt.innerText="Sell";toTxt.innerText="Buy"};
zh.onclick = ()=>{isZh=true;connect.innerText="连接钱包";swapBtn.innerText="兑换";fromTxt.innerText="卖出";toTxt.innerText="买入"};
tabSwap.onclick = ()=>{swapPage.style.display="block";lpPage.style.display="none"};
tabLP.onclick = ()=>{swapPage.style.display="none";lpPage.style.display="block"};
</script>
</body>
</html>
