<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>DQM LP 挖矿</title>

<script src="https://cdn.ethers.org/lib-ethers/6.13.0/ethers.umd.min.js"></script>

<style>

body{
background:#0b0f1a;
color:#fff;
font-family:Arial;
max-width:500px;
margin:auto;
padding:20px
}

.box{
background:#121827;
padding:25px;
border-radius:20px;
margin-top:20px
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
margin-top:10px
}

.connect{
background:#5c6cff
}

.stake{
background:#00d395
}

.unstake{
background:#ff5c5c
}

.claim{
background:#ffaa00
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-top:10px;
background:#1e2638;
color:#fff
}

.stat{
display:flex;
justify-content:space-between;
margin-top:8px
}

.refbox{
margin-top:20px;
background:#0f1628;
padding:15px;
border-radius:12px
}

</style>
</head>

<body>

<h2>DQM LP 挖矿</h2>

<button class="connect" onclick="connect()">连接钱包</button>

<div class="box">

<div class="stat">
<span>LP余额</span>
<span id="lpBal">0</span>
</div>

<div class="stat">
<span>已质押</span>
<span id="staked">0</span>
</div>

<div class="stat">
<span>待领取</span>
<span id="pending">0</span>
</div>

<div class="stat">
<span>TVL</span>
<span id="tvl">0</span>
</div>

<input id="amount" placeholder="输入LP数量">

<button onclick="max()">MAX</button>

<button class="stake" onclick="stake()">质押</button>

<button class="unstake" onclick="unstake()">解押</button>

<button class="claim" onclick="claim()">领取奖励</button>

<div class="refbox">

邀请链接

<input id="refLink" readonly>

<button onclick="copy()">复制</button>

</div>

</div>

<script>

const CONFIG = {

CHAIN_ID:56,

MINING_CONTRACT:"0x挖矿合约",

LP_TOKEN:"0xLP地址",

REWARD_TOKEN:"0x奖励代币"

};

const ABI = [

"function stake(uint256)",
"function unstake(uint256)",
"function claim()",
"function userInfo(address) view returns(uint256)",
"function pendingReward(address) view returns(uint256)"

];

const ERC20 = [

"function balanceOf(address) view returns(uint256)",
"function approve(address,uint256)",
"function allowance(address,address) view returns(uint256)"

];

let provider;
let signer;
let user;

let contract;
let lp;

async function connect(){

if(!window.ethereum){

alert("请使用TP钱包或MetaMask");

return;

}

await window.ethereum.request({method:'eth_requestAccounts'});

provider=new ethers.BrowserProvider(window.ethereum);

signer=await provider.getSigner();

user=await signer.getAddress();

contract=new ethers.Contract(CONFIG.MINING_CONTRACT,ABI,signer);

lp=new ethers.Contract(CONFIG.LP_TOKEN,ERC20,signer);

document.querySelector(".connect").innerText=user.slice(0,6)+"...";

document.getElementById("refLink").value=location.origin+"?ref="+user;

load();

}

async function load(){

const bal=await lp.balanceOf(user);

document.getElementById("lpBal").innerText=

ethers.formatUnits(bal,18);

const staked=await contract.userInfo(user);

document.getElementById("staked").innerText=

ethers.formatUnits(staked,18);

const pending=await contract.pendingReward(user);

document.getElementById("pending").innerText=

ethers.formatUnits(pending,18);

const tvl=await lp.balanceOf(CONFIG.MINING_CONTRACT);

document.getElementById("tvl").innerText=

ethers.formatUnits(tvl,18);

}

function max(){

document.getElementById("amount").value=

document.getElementById("lpBal").innerText;

}

async function stake(){

const val=document.getElementById("amount").value;

const amt=ethers.parseUnits(val,18);

const allow=await lp.allowance(user,CONFIG.MINING_CONTRACT);

if(allow<amt){

const tx=await lp.approve(CONFIG.MINING_CONTRACT,ethers.MaxUint256);

await tx.wait();

}

const tx2=await contract.stake(amt);

await tx2.wait();

alert("质押成功");

load();

}

async function unstake(){

const val=document.getElementById("amount").value;

const amt=ethers.parseUnits(val,18);

const tx=await contract.unstake(amt);

await tx.wait();

alert("解押成功");

load();

}

async function claim(){

const tx=await contract.claim();

await tx.wait();

alert("领取成功");

load();

}

function copy(){

navigator.clipboard.writeText(

document.getElementById("refLink").value

);

alert("复制成功");

}

setInterval(load,10000);

</script>

</body>
</html>
