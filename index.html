<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天祥集团结算系统</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 15px;
        }
        .box {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }
        h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #1a2b48;
            font-weight: bold;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
        }
        .btn-blue {background: #2563eb;color: #fff;}
        .btn-red {background: #ef4444;color: #fff;}
        .btn-green {background: #10b981;color: #fff;}
        .btn-gray {background: #cccccc;color: #666;cursor: not-allowed;}
        .btn-sm {width: auto;padding: 6px 12px;font-size: 14px;margin: 2px;}
        input,textarea,select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        .tip {padding: 10px;border-radius: 8px;margin: 10px 0;}
        .tip-green {background: #dcfce7;color: #16a34a;}
        .tip-red {background: #fee2e2;color: #dc2626;}
        .tab-group {display: flex;gap: 8px;margin-bottom: 15px;}
        .tab {flex: 1;text-align: center;padding: 10px;background: #eee;border-radius: 8px;cursor: pointer;}
        .tab.active {background: #2563eb;color: #fff;}
        .page {display: none;}
        .page.active {display: block;}
        table {width: 100%;border-collapse: collapse;margin-top: 10px;}
        th,td {border: 1px solid #eee;padding: 10px;text-align: center;font-size: 14px;}
        th {background: #f1f5f9;}
        .addr-text{font-size:13px;color:#666;word-break: break-all;}
        .info-line{margin:6px 0;font-size:15px;}
    </style>
</head>
<body>

<h2>天祥集团结算系统</h2>

<div class="box">
    <button class="btn btn-blue" id="connectBtn">连接币安链钱包</button>
    <p class="addr-text" style="margin-top:10px;text-align:center;" id="walletAddr">未连接钱包</p>
</div>

<div class="tab-group" id="navTab">
    <div class="tab active" onclick="switchPage(0)">员工中心</div>
    <div class="tab" id="tabManage" onclick="switchPage(1)">运营管理</div>
    <div class="tab" id="tabAudit" onclick="switchPage(2)">老板审核后台</div>
</div>

<!-- 员工中心 -->
<div class="page active" id="page0">
    <div class="box">
        <div class="info-line">员工姓名：<span id="staffNameText">-</span></div>
        <div class="info-line">绑定钱包：<span id="staffWalletText">-</span></div>
        <div class="info-line">正式入职时间：<span id="entryFullTime">-</span></div>
        <div class="info-line">累计在岗天数：<span id="workTotalDay">0</span> 天</div>
        <div class="info-line">每月基础薪资：<span id="staffSalaryText">0</span> USDT</div>
        <div class="info-line">已批准请假次数：<span id="leaveCount">0</span> 次</div>
        <div class="info-line">当月实际出勤天数：<span id="realWorkDay">30</span> 天</div>
        <div class="info-line">当前在岗状态：<span id="jobStatusText">-</span></div>

        <div class="tip" id="limitTip"></div>
        <div class="info-line">距离可正常领薪剩余：<span id="remainDay">0</span> 天</div>

        <button class="btn btn-gray" id="applyWageBtn" disabled>提交领取当月薪资</button>
        <button class="btn btn-red" onclick="applyQuitCash()">申请离职退还扣押工资</button>
    </div>

    <div class="box">
        <h4>员工在线请假申请</h4>
        <select id="leaveTypeSel">
            <option value="0">事假</option>
            <option value="1">病假</option>
        </select>
        <textarea placeholder="填写请假具体缘由" id="leaveReasonTxt" rows="3"></textarea>
        <button class="btn btn-green" onclick="submitLeave()">提交请假申请</button>
    </div>
</div>

<!-- 运营管理 仅老板可见 -->
<div class="page" id="page1">
    <div class="box">
        <h4>新增入职员工</h4>
        <input placeholder="员工钱包地址" id="addStaffAddr">
        <input placeholder="员工真实姓名" id="addStaffRealName">
        <input placeholder="每月薪资(USDT)" type="number" id="addStaffMoney">
        <button class="btn btn-blue" onclick="addNewStaffInfo()">确认录入入职</button>
    </div>
    <div class="box">
        <h4>删除已离职员工</h4>
        <input placeholder="填写离职员工钱包地址" id="delStaffAddr">
        <button class="btn btn-red" onclick="deleteLeaveStaff()">永久删除离职员工数据</button>
    </div>
</div>

<!-- 老板审核后台 -->
<div class="page" id="page2">
    <div class="box">
        <button class="btn btn-blue" onclick="batchPassAllApply()">一键批量通过全部申请</button>
        <button class="btn btn-red" onclick="bossGetAllFund()">老板一键取回合约全部资金</button>
        <h4 style="margin:15px 0 8px 0">全部待审核申请列表</h4>
        <table>
            <tr>
                <th>申请人</th>
                <th>申请类型</th>
                <th>详情</th>
                <th>审核操作</th>
            </tr>
            <tbody id="auditTableList"></tbody>
        </table>
    </div>
</div>

<script>
const BOSS_ADDR = "0xcA7f542716b7F1F2463C08e3545Ac7230b0F1Ec6".toLowerCase();
const CONTRACT_ABI = [
    {"inputs":[],"stateMutability":"nonpayable","type":"constructor"},
    {"name":"checkCanGet","inputs":[{"name":"_user","type":"address"}],"outputs":[{"type":"bool"},{"type":"string"},{"type":"uint256"}],"stateMutability":"view","type":"function"},
    {"name":"getRealWorkDay","inputs":[{"name":"_user","type":"address"}],"outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},
    {"name":"addStaff","inputs":[{"name":"_u","type":"address"},{"name":"_name","type":"string"},{"name":"_sal","type":"uint256"}],"type":"function"},
    {"name":"delStaff","inputs":[{"name":"_u","type":"address"}],"type":"function"},
    {"name":"submitSalaryApply","type":"function"},
    {"name":"submitQuitApply","type":"function"},
    {"name":"submitLeaveApply","inputs":[{"name":"_leaveType","type":"uint8"},{"name":"_reason","type":"string"}],"type":"function"},
    {"name":"auditPass","inputs":[{"name":"id","type":"uint256"}],"type":"function"},
    {"name":"auditRefuse","inputs":[{"name":"id","type":"uint256"}],"type":"function"},
    {"name":"auditAllPass","type":"function"},
    {"name":"bossWithdrawAll","type":"function"},
    {"name":"getApplyCount","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},
    {"name":"staffData","inputs":[{"name":"","type":"address"}],"outputs":[{"name":"userName","type":"string"},{"name":"isJob","type":"bool"},{"name":"monthSalary","type":"uint256"},{"name":"entryTime","type":"uint256"},{"name":"lastGetTime","type":"uint256"},{"name":"returnFreeze","type":"bool"},{"name":"approvedLeaveNum","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"name":"applyList","inputs":[{"name":"","type":"uint256"}],"outputs":[{"name":"userAddr","type":"address"},{"name":"applyType","type":"uint8"},{"name":"leaveType","type":"uint8"},{"name":"leaveReason","type":"string"},{"name":"applyAmount","type":"uint256"},{"name":"status","type":"uint8"}],"stateMutability":"view","type":"function"}
];
const CONTRACT_ADDR = "";

let web3 = null;
let nowUserAccount = "";
let mainContract = null;

function timeToDate(timestamp){
    if(!timestamp) return "暂无录入";
    let date = new Date(timestamp * 1000);
    return `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日`;
}
function getDayDiff(startTime){
    let now = Math.floor(Date.now()/1000);
    let diff = now - startTime;
    return Math.floor(diff / 86400);
}

function switchPage(idx){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.getElementById('page'+idx).classList.add('active');
    let tabs = document.querySelectorAll('.tab');
    if(tabs[idx]) tabs[idx].classList.add('active');
    if(idx === 2 && mainContract) loadAuditList();
}

document.getElementById('connectBtn').addEventListener('click',async function(){
    if(!window.ethereum){
        alert("请安装TP钱包/小狐狸钱包，切换币安智能链");
        return;
    }
    try{
        const accounts = await window.ethereum.request({method:'eth_requestAccounts'});
        web3 = new Web3(window.ethereum);
        nowUserAccount = accounts[0].toLowerCase();
        mainContract = new web3.eth.Contract(CONTRACT_ABI,CONTRACT_ADDR);
        document.getElementById('walletAddr').innerText = nowUserAccount;
        alert("钱包连接成功！");

        if(nowUserAccount !== BOSS_ADDR){
            document.getElementById('tabManage').style.display = "none";
            document.getElementById('tabAudit').style.display = "none";
        }else{
            document.getElementById('tabManage').style.display = "block";
            document.getElementById('tabAudit').style.display = "block";
        }
        loadSelfStaffData();
    }catch(e){
        alert("连接失败："+e.message);
    }
});

async function loadSelfStaffData(){
    if(!mainContract||!nowUserAccount) return;
    let info = await mainContract.methods.staffData(nowUserAccount).call();
    let realDay = await mainContract.methods.getRealWorkDay(nowUserAccount).call();
    document.getElementById('staffNameText').innerText = info.userName || "未登记员工";
    document.getElementById('staffWalletText').innerText = nowUserAccount;
    document.getElementById('entryFullTime').innerText = timeToDate(Number(info.entryTime));
    document.getElementById('workTotalDay').innerText = getDayDiff(Number(info.entryTime));
    document.getElementById('staffSalaryText').innerText = (Number(info.monthSalary)/1e18).toFixed(2);
    document.getElementById('leaveCount').innerText = info.approvedLeaveNum;
    document.getElementById('realWorkDay').innerText = realDay;
    document.getElementById('jobStatusText').innerText = info.isJob?"正常在职":"已离职";

    let [canApply,tipStr,dayNum] = await mainContract.methods.checkCanGet(nowUserAccount).call();
    document.getElementById('remainDay').innerText = dayNum;
    let tipDom = document.getElementById('limitTip');
    let btnDom = document.getElementById('applyWageBtn');
    if(canApply){
        tipDom.className = "tip tip-green";
        tipDom.innerText = tipStr;
        btnDom.className = "btn btn-blue";
        btnDom.disabled = false;
    }else{
        tipDom.className = "tip tip-red";
        tipDom.innerText = tipStr;
        btnDom.className = "btn btn-gray";
        btnDom.disabled = true;
    }
}

// 提交薪资
document.getElementById('applyWageBtn').addEventListener('click',async function(){
    await mainContract.methods.submitSalaryApply().send({from:nowUserAccount});
    alert("薪资申请提交成功，等待管理员审核放款！");
});
// 离职申请
async function applyQuitCash(){
    await mainContract.methods.submitQuitApply().send({from:nowUserAccount});
    alert("离职结算申请已提交，等待审核！");
}
// 提交请假
async function submitLeave(){
    let type = document.getElementById('leaveTypeSel').value;
    let reason = document.getElementById('leaveReasonTxt').value.trim();
    if(!reason) return alert("请填写请假缘由");
    await mainContract.methods.submitLeaveApply(type,reason).send({from:nowUserAccount});
    alert("请假申请提交成功，等待老板审批！");
    document.getElementById('leaveReasonTxt').value = "";
}

// 老板新增员工
async function addNewStaffInfo(){
    let uAddr = document.getElementById('addStaffAddr').value.trim();
    let uName = document.getElementById('addStaffRealName').value.trim();
    let uSal = document.getElementById('addStaffMoney').value.trim();
    if(!uAddr||!uName||!uSal) return alert("请填写完整入职信息");
    await mainContract.methods.addStaff(uAddr,uName,uSal).send({from:nowUserAccount});
    alert("员工入职信息录入完成！");
}
// 删除员工
async function deleteLeaveStaff(){
    let delAddr = document.getElementById('delStaffAddr').value.trim();
    if(!delAddr) return alert("请输入员工钱包地址");
    await mainContract.methods.delStaff(delAddr).send({from:nowUserAccount});
    alert("已删除该员工档案！");
}

// 加载审核列表
async function loadAuditList(){
    let count = await mainContract.methods.getApplyCount().call();
    let html = "";
    for(let i=0;i<count;i++){
        let item = await mainContract.methods.applyList(i).call();
        if(Number(item.status) !== 0) continue;
        let typeTxt = "";
        let detailTxt = "";
        if(Number(item.applyType)===0){
            typeTxt="月度薪资申请";
            detailTxt="申请发放当月薪资";
        }else if(Number(item.applyType)===1){
            typeTxt="离职结算申请";
            detailTxt="申请退还扣押薪资";
        }else{
            typeTxt="员工请假申请";
            let ltype = Number(item.leaveType)===0?"事假":"病假";
            detailTxt = ltype+"："+item.leaveReason;
        }
        html += `
        <tr>
            <td>${item.userAddr.slice(0,12)}...</td>
            <td>${typeTxt}</td>
            <td>${detailTxt}</td>
            <td>
                <button class="btn btn-green btn-sm" onclick="singlePass(${i})">通过批准</button>
                <button class="btn btn-red btn-sm" onclick="singleRefuse(${i})">拒绝驳回</button>
            </td>
        </tr>
        `;
    }
    document.getElementById('auditTableList').innerHTML = html;
}

async function singlePass(id){
    await mainContract.methods.auditPass(id).send({from:nowUserAccount});
    alert("已通过该申请！");
    loadAuditList();
}
async function singleRefuse(id){
    await mainContract.methods.auditRefuse(id).send({from:nowUserAccount});
    alert("已驳回该申请！");
    loadAuditList();
}
async function batchPassAllApply(){
    await mainContract.methods.auditAllPass().send({from:nowUserAccount});
    alert("全部申请批量通过完成！");
    loadAuditList();
}
async function bossGetAllFund(){
    await mainContract.methods.bossWithdrawAll().send({from:nowUserAccount});
    alert("全部资金已转回老板钱包！");
}

setInterval(()=>{
    let activeText = document.querySelector('.tab.active')?.innerText||"";
    if(activeText.indexOf("老板审核")!==-1 && mainContract) loadAuditList();
},5000);
</script>
</body>
</html>
