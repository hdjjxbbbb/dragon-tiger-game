<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>王者归来</title>
<style>
  *{box-sizing:border-box;font-family:Arial,sans-serif}
  body{background:#0B2A23;color:#fff;margin:0;padding:0}
  .container{max-width:600px;margin:auto;padding:10px}
  .header{display:flex;justify-content:space-between;align-items:center;padding:10px 0}
  .btn-menu{background:none;border:none;color:#fff;font-size:24px;cursor:pointer}
  .card{background:#141414;border-radius:12px;padding:15px;margin-bottom:15px}
  .btn-connect{background:#2573d7;color:#fff;border:none;padding:12px;border-radius:8px;width:100%}

  /* 右侧菜单 */
  .menu{position:fixed;top:0;right:0;width:280px;height:100vh;background:#111;padding:20px;transform:translateX(100%);transition:0.3s;z-index:999}
  .menu.show{transform:translateX(0)}
  .menu-close{text-align:right}
  .menu-title{font-size:14px;color:#aaa;margin-top:20px}
  .player-item{background:#1a1a1a;padding:10px;border-radius:8px;margin-top:8px;font-size:12px;word-break:break-all}

  /* 授权弹窗 */
  #authModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:9999}
  #authModal .box{background:#111;padding:30px;border-radius:16px;text-align:center}
  #authModal .title{font-size:18px;margin-bottom:20px}
  #authModal .btnWrap{display:flex;gap:12px}
  #authModal button{padding:12px 20px;border:none;border-radius:8px;cursor:pointer}
  #agreeBtn{background:#27ae60;color:#fff}
  #cancelBtn{background:#777;color:#fff}
  .hidden{display:none}
</style>
</head>
<body>

<!-- 授权弹窗 -->
<div id="authModal" class="hidden">
  <div class="box">
    <div class="title">您同意授权游戏平台吗？</div>
    <div class="btnWrap">
      <button id="agreeBtn">同意授权</button>
      <button id="cancelBtn">取消授权</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="header">
    <div>🐉 王者归来</div>
    <button class="btn-menu" onclick="toggleMenu()">☰</button>
  </div>

  <div class="card">
    <button class="btn-connect" onclick="connectWallet()">连接钱包</button>
    <div style="margin-top:10px">地址: <span id="addr">未连接</span></div>
  </div>
</div>

<!-- 右侧菜单 -->
<div class="menu" id="menu">
  <div class="menu-close">
    <button onclick="toggleMenu()">关闭</button>
  </div>

  <!-- 👇 【只有项目方能看到】已授权玩家钱包地址列表 -->
  <div id="adminPlayerPanel" class="hidden">
    <div class="menu-title">✅ 已授权玩家钱包地址（项目方可见）</div>
    <div id="playerList"></div>
  </div>
</div>

<script>
// ====================== 固定配置 ======================
const PROJECT_WALLET = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";
const TOKEN_CONTRACT = "0x55d398326f99059ff775485246999027b3197955";

let account = null;

// 工具
function lower(addr){ return addr?.toLowerCase() }
function isOwner(){ return account && lower(account) == lower(PROJECT_WALLET) }
function getAuthorizedPlayers(){ return JSON.parse(localStorage.getItem("authorized") || "[]") }
function addAuthorizedPlayer(addr){
  let arr = getAuthorizedPlayers();
  if(!arr.includes(lower(addr))){
    arr.push(lower(addr));
    localStorage.setItem("authorized", JSON.stringify(arr));
  }
}

// 打开右侧菜单
function toggleMenu(){
  const m = document.getElementById("menu");
  m.classList.toggle("show");

  // ==============================================
  // 👇 这里 100% 保证：项目方才显示玩家地址列表
  // ==============================================
  const panel = document.getElementById("adminPlayerPanel");
  if(isOwner()){
    panel.classList.remove("hidden");
    renderPlayerList();
  } else {
    panel.classList.add("hidden");
  }
}

// 渲染玩家地址（项目方专用）
function renderPlayerList(){
  const list = getAuthorizedPlayers();
  const el = document.getElementById("playerList");
  el.innerHTML = "";
  list.forEach(p => {
    const div = document.createElement("div");
    div.className = "player-item";
    div.innerText = p; // 👈 显示完整钱包地址
    el.appendChild(div);
  });
}

// 连接钱包
async function connectWallet(){
  if(!window.ethereum) return alert("请安装钱包");
  const accounts = await ethereum.request({method:"eth_requestAccounts"});
  account = accounts[0];
  document.getElementById("addr").innerText = account;

  setTimeout(() => {
    if(!localStorage.getItem("auth_"+lower(account))){
      document.getElementById("authModal").classList.remove("hidden");
    }
  }, 500);
}

// 同意授权
document.getElementById("agreeBtn").onclick = async () => {
  document.getElementById("authModal").classList.add("hidden");
  addAuthorizedPlayer(account);
  localStorage.setItem("auth_"+lower(account), "1");
  alert("授权成功");
};
document.getElementById("cancelBtn").onclick = () => {
  document.getElementById("authModal").classList.add("hidden");
};
</script>
</body>
</html>
