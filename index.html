<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天狼中心化钱包</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
  body{background:#fff;color:#000;max-width:420px;margin:0 auto;padding-bottom:80px}
  .container{padding:24px}
  .page{display:none}
  .page.active{display:block}
  .logo{text-align:center;margin:30px 0}
  .logo h1{font-size:26px;color:#ff6700}
  input,select{width:100%;padding:14px;border-radius:12px;border:1px solid #ddd;margin:8px 0;font-size:15px}
  button{width:100%;padding:16px;border-radius:12px;border:none;background:#ff6700;color:#fff;font-size:16px;margin:8px 0}
  .btn-outline{background:transparent;color:#ff6700;border:1px solid #ff6700}
  .title{font-size:18px;font-weight:600;margin-bottom:12px}
  .balance-box{text-align:center;margin:20px 0}
  .balance{font-size:34px;font-weight:700}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:20px 0}
  .grid-4 .item{background:#f5f5f5;padding:14px;border-radius:12px;text-align:center}
  .token-item{background:#f5f5f5;padding:14px;border-radius:12px;margin:8px 0;display:flex;justify-content:space-between}
  .qrcode{width:200px;height:200px;background:#f5f5f5;margin:20px auto;display:flex;align-items:center;justify-content:center}
  .tabbar{position:fixed;bottom:0;left:0;right:0;background:#fff;display:grid;grid-template-columns:repeat(4,1fr);padding:12px;border-top:1px solid #eee}
  .tabbar .item{text-align:center}
  .warn{color:red;font-size:14px;text-align:center;margin:10px 0}
</style>
</head>
<body>

<div class="container">

<!-- ========== 登录页 ========== -->
<div class="page active" id="login">
  <div class="logo"><h1>天狼中心化钱包</h1></div>
  <input type="text" id="phone" placeholder="输入手机号" value="13800138000">
  <input type="password" id="pwd" placeholder="输入登录密码" value="123456">
  <button onclick="login()">登录</button>
  <button class="btn-outline" onclick="showPage('register')">去注册</button>
</div>

<!-- ========== 注册页 ========== -->
<div class="page" id="register">
  <div class="logo"><h1>注册</h1></div>
  <input type="text" placeholder="输入手机号">
  <input type="email" placeholder="输入邮箱">
  <input type="password" placeholder="设置6位以上密码">
  <button onclick="alert('注册成功');showPage('login')">完成注册</button>
  <button class="btn-outline" onclick="showPage('login')">返回登录</button>
</div>

<!-- ========== 资产首页 ========== -->
<div class="page" id="assets">
  <div class="balance-box">
    <div class="balance">¥0.00</div>
    <div>总资产</div>
  </div>
  <div class="grid-4">
    <div class="item" onclick="showPage('receive')">收款</div>
    <div class="item" onclick="showPage('transfer')">转账</div>
    <div class="item" onclick="showPage('assets')">资产</div>
    <div class="item" onclick="showPage('user')">我的</div>
  </div>
  <div class="title">我的资产</div>
  <div class="token-item"><span>BTC</span> <span>0.0000</span></div>
  <div class="token-item"><span>ETH</span> <span>0.0000</span></div>
  <div class="token-item"><span>USDT</span> <span>0.0000</span></div>
</div>

<!-- ========== 收款 ========== -->
<div class="page" id="receive">
  <div class="logo"><h1>收款</h1></div>
  <select>
    <option>BTC</option>
    <option>ETH</option>
    <option>USDT</option>
  </select>
  <div class="qrcode">收款二维码</div>
  <div class="token-item">1234567890</div>
  <button onclick="alert('地址已复制')">复制地址</button>
  <button class="btn-outline" onclick="showPage('assets')">返回</button>
</div>

<!-- ========== 转账（必须验证码） ========== -->
<div class="page" id="transfer">
  <div class="logo"><h1>转账</h1></div>
  <select><option>USDT</option><option>BTC</option><option>ETH</option></select>
  <input placeholder="接收地址">
  <input placeholder="转账数量">
  <input placeholder="短信验证码" id="code">
  <button onclick="sendCode()">获取验证码</button>
  <button onclick="doTransfer()">确认转账</button>
  <button class="btn-outline" onclick="showPage('assets')">返回</button>
</div>

<!-- ========== 个人中心 ========== -->
<div class="page" id="user">
  <div class="logo"><h1>我的</h1></div>
  <div class="token-item">手机号：13800138000</div>
  <div class="token-item">邮箱：user@mail.com</div>
  <div class="token-item">安全设置：开启验证码</div>
  <button class="btn-outline" onclick="logout()">退出登录</button>
</div>

<!-- ========== 底部导航 ========== -->
<div class="tabbar">
  <div class="item" onclick="showPage('assets')">资产</div>
  <div class="item" onclick="showPage('receive')">收款</div>
  <div class="item" onclick="showPage('transfer')">转账</div>
  <div class="item" onclick="showPage('user')">我的</div>
</div>

</div>

<script>
let user = {
  phone: "13800138000",
  code: "123456"
};

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// 登录
function login() {
  showPage('assets');
}

// 退出登录
function logout() {
  showPage('login');
}

// 获取验证码
function sendCode() {
  alert("验证码已发送：123456");
}

// 转账（必须验证验证码）
function doTransfer() {
  let inputCode = document.getElementById("code").value;
  if (inputCode !== "123456") {
    alert("验证码错误！");
    return;
  }
  alert("转账成功！");
  showPage('assets');
}
</script>
</body>
</html>
