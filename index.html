<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龙虎斗</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <style>
    body{background:#121212;color:white;padding:20px;font-family:Arial}
    .box{background:#1e1e1e;padding:15px;margin:10px 0;border-radius:12px}
    button{width:100%;padding:14px;margin:5px 0;border-radius:10px;border:none;color:white;font-weight:bold}
    .btn-connect{background:#007bff}
    .btn-approve{background:#28a745}
    .btn-bet{background:#ffc107;color:#000}
    .btn-draw{background:#dc3545}
    .count{font-size:20px;color:#ffc107;text-align:center;margin:10px 0}
    input{width:100%;padding:12px;margin:5px 0;background:#222;color:white;border:1px solid #444;border-radius:10px}
  </style>
</head>
<body>

  <h2>🐉🐯 龙虎斗</h2>

  <div class="box">
    <button class="btn-connect" onclick="connectWallet()">连接钱包</button>
    <div id="address">地址：未连接</div>
  </div>

  <div class="box">
    <button class="btn-approve" onclick="approveToken()">👉 手动授权代币</button>
    <div>授权额度：<span id="allowance">0</span></div>
  </div>

  <div class="box">
    <div>期号：<span id="round">0</span></div>
    <div class="count" id="timer">00:00</div>
    <button class="btn-draw" onclick="draw()">手动开奖</button>
  </div>

  <div class="box">
    <input id="amt" type="number" placeholder="下注金额" value="1">
    <button class="btn-bet" onclick="bet(1)">龙</button>
    <button class="btn-bet" onclick="bet(2)">虎</button>
    <button class="btn-bet" onclick="bet(3)">和</button>
  </div>

  <script>
    const CONFIG = {
      CONTRACT: "0xace74c59d311c1ce20358cd9c8cb2A7958D3C96a",
      TOKEN: "0x227bbbdb9d40ccda666cfe40b419328e1ed0a480",
      CHAIN_ID: 56
    };

    const TOKEN_ABI = [
      {"inputs":[{"type":"address"},{"type":"uint256"}],"name":"approve","outputs":[{"type":"bool"}],"stateMutability":"nonpayable","type":"function"},
      {"inputs":[{"type":"address"},{"type":"address"}],"name":"allowance","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"}
    ];

    const GAME_ABI = [
      {"inputs":[],"name":"currentRound","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},
      {"inputs":[],"name":"nextDrawIn","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},
      {"inputs":[],"name":"draw","outputs":[],"stateMutability":"nonpayable","type":"function"},
      {"inputs":[{"type":"uint8"},{"type":"uint256"}],"name":"bet","outputs":[],"stateMutability":"nonpayable","type":"function"}
    ];

    let provider, signer, account, token, game;

    async function connectWallet() {
      try {
        provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = await provider.getSigner();
        account = await signer.getAddress();
        document.getElementById("address").innerText = "地址：" + account.slice(0,10)+"...";
        
        const c = ethers.getAddress(CONFIG.CONTRACT);
        const t = ethers.getAddress(CONFIG.TOKEN);
        game = new ethers.Contract(c, GAME_ABI, signer);
        token = new ethers.Contract(t, TOKEN_ABI, signer);
        
        startTimer();
        loadAllowance();
      } catch(e) { alert("连接失败："+e.message); }
    }

    async function approveToken() {
      if(!account)return alert("请先连接");
      try {
        const tx = await token.approve(CONFIG.CONTRACT, ethers.MaxUint256);
        await tx.wait();
        alert("授权成功！");
        loadAllowance();
      } catch(e) { alert("授权失败："+e.message); }
    }

    async function loadAllowance() {
      if(!account)return;
      const a = await token.allowance(account, CONFIG.CONTRACT);
      document.getElementById("allowance").innerText = ethers.formatUnits(a,18);
    }

    async function bet(side) {
      if(!account)return alert("请连接");
      const amt = document.getElementById("amt").value;
      try {
        const val = ethers.parseUnits(amt,18);
        const a = await token.allowance(account, CONFIG.CONTRACT);
        if(a < val) return alert("请先点【手动授权代币】");
        const tx = await game.bet(side, val);
        await tx.wait();
        alert("下注成功！");
      } catch(e) { alert("下注失败："+e.message); }
    }

    async function draw() {
      if(!account)return;
      try {
        const tx = await game.draw();
        await tx.wait();
        alert("开奖成功");
      } catch(e) { alert("开奖失败"); }
    }

    function startTimer() {
      setInterval(async ()=>{
        if(!game)return;
        const s = await game.nextDrawIn();
        const m = String(Math.floor(s/60)).padStart(2,'0');
        const ss = String(s%60).padStart(2,'0');
        document.getElementById("timer").innerText = m+":"+ss;
        const r = await game.currentRound();
        document.getElementById("round").innerText = r.toString();
      },1000);
    }
  </script>
</body>
</html>
