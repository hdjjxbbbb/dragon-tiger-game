<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mining - TokenTools</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    /* 完全原版风格还原 */
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
    html,body{width:100%;min-height:100vh;background:#121212;color:#fff}
    .container{max-width:480px;margin:0 auto;padding:16px}
    .top{display:flex;justify-content:space-between;align-items:center;padding:10px 0;margin-bottom:12px}
    .top h2{font-size:20px}
    .btn-connect{background:#ffc107;color:#000;border:none;border-radius:12px;padding:10px 14px;font-weight:600;font-size:14px}
    .card{background:#1a2035;border-radius:16px;padding:16px;margin-bottom:12px}
    .title{font-size:18px;color:#ffc107;margin-bottom:12px}
    .item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #2a3754;font-size:14px}
    .item span{color:#ccc}
    .item strong{color:#ffc107;font-weight:600}
    .invite-box{background:#232a45;border-radius:12px;padding:12px;display:flex;align-items:center;margin:10px 0}
    .invite-text{flex:1;color:#fff;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .copy-btn{background:#ffc107;color:#000;border:none;border-radius:8px;padding:6px 10px;font-weight:600}
    .input-area{background:#232a45;border-radius:12px;padding:16px;margin:10px 0}
    .balance{display:flex;justify-content:space-between;margin-bottom:8px}
    .input{width:100%;background:#1a2035;border:1px solid #ffc107;border-radius:8px;padding:12px;color:#fff;outline:0}
    .btn-yellow{width:100%;background:#ffc107;color:#000;border:none;border-radius:12px;padding:14px;font-weight:600;margin-top:10px}
    .reward{text-align:center;padding:20px;background:#232a45;border-radius:12px}
    .reward .num{font-size:32px;color:#ffc107;font-weight:700}
    .hidden{display:none}
  </style>
</head>
<body>
<div class="container">
  <div class="top">
    <h2>Mining</h2>
    <button id="connect" class="btn-connect">Connect Wallet</button>
  </div>

  <div id="app" class="hidden">
    <!-- 邀请 -->
    <div class="card">
      <div class="title">My Invite</div>
      <div class="item"><span>Total Staked</span><strong>0.00</strong></div>
      <div class="item"><span>Invite Reward</span><strong>0.0000 DTM</strong></div>
      <div class="invite-box">
        <div class="invite-text">https://tokentools.app/mining/xxx</div>
        <button class="copy-btn">Copy</button>
      </div>
    </div>

    <!-- 质押 -->
    <div class="card">
      <div class="title">Stake</div>
      <div class="item"><span>Lock Time</span><strong>180 Days</strong></div>
      <div class="item"><span>My Staked</span><strong>0.00</strong></div>
      <div class="item"><span>Claimed</span><strong>0 DTM</strong></div>
      <div class="input-area">
        <div class="balance"><span>LP Balance</span><span>0.00</span></div>
        <input class="input" placeholder="Amount" type="number">
        <button class="btn-yellow">Approve</button>
        <button class="btn-yellow" style="margin-top:8px">Stake</button>
      </div>
      <div class="reward">
        <div>Pending Reward</div>
        <div class="num">0.0000</div>
      </div>
    </div>

    <!-- 项目信息 -->
    <div class="card">
      <div class="title">Info</div>
      <div class="item"><span>Total Value</span><strong>$861,501.65</strong></div>
      <div class="item"><span>Total Staked</span><strong>20092.61</strong></div>
    </div>
  </div>
</div>

<script>
const CONFIG = {
  staking: "0x5001fA16F04AcdD246d41784e71370Db07262981",
  lp: "【填入你的LP地址】"
};

document.getElementById('connect').onclick = async () => {
  if(!window.ethereum) return alert('Please install wallet');
  await window.ethereum.request({method:'eth_requestAccounts'});
  document.getElementById('connect').style.display='none';
  document.getElementById('app').classList.remove('hidden');
};

document.querySelector('.copy-btn').onclick = () => {
  alert('Copied!');
};
</script>
</body>
</html>
