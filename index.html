<!DOCTYPE html>
<html lang="zh">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DQM DeFi Mining</title>

<script src="https://cdn.ethers.org/lib-ethers/6.13.0/ethers.umd.min.js"></script>

<style>

/* 全局 */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
}

body{

background:
radial-gradient(circle at 20% 20%,#2c2f6b,transparent),
radial-gradient(circle at 80% 0%,#5b2a86,transparent),
#060912;

color:#fff;

min-height:100vh;

}

/* 顶部 */

.header{

display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;

border-bottom:1px solid rgba(255,255,255,0.06);

backdrop-filter:blur(10px);

}

.logo{

font-size:22px;
font-weight:700;

background:linear-gradient(90deg,#00e0ff,#9d5fff);
-webkit-background-clip:text;
color:transparent;

}

.connect{

padding:10px 20px;

border-radius:999px;

border:none;

background:linear-gradient(90deg,#00e0ff,#9d5fff);

color:white;

cursor:pointer;

font-weight:600;

transition:0.3s;

}

.connect:hover{

transform:translateY(-2px);

}

/* 主区域 */

.wrapper{

max-width:1100px;

margin:auto;

padding:40px 20px;

}

/* 统计卡片 */

.stats{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(200px,1fr));

gap:20px;

margin-bottom:30px;

}

.stat{

background:rgba(255,255,255,0.03);

border:1px solid rgba(255,255,255,0.08);

padding:25px;

border-radius:20px;

backdrop-filter:blur(10px);

}

.stat h3{

font-size:13px;
color:#aaa;
margin-bottom:10px;

}

.stat .num{

font-size:24px;
font-weight:700;

background:linear-gradient(90deg,#00e0ff,#9d5fff);
-webkit-background-clip:text;
color:transparent;

}

/* 挖矿卡片 */

.card{

max-width:500px;

margin:auto;

background:rgba(255,255,255,0.04);

border:1px solid rgba(255,255,255,0.1);

border-radius:30px;

padding:40px;

backdrop-filter:blur(20px);

}

/* 标题 */

.title{

font-size:24px;

margin-bottom:25px;

background:linear-gradient(90deg,#00e0ff,#9d5fff);

-webkit-background-clip:text;

color:transparent;

}

/* 信息 */

.row{

display:flex;

justify-content:space-between;

padding:12px 0;

border-bottom:1px solid rgba(255,255,255,0.05);

}

/* 输入 */

input{

width:100%;

padding:16px;

border-radius:15px;

border:none;

background:#0f1628;

color:white;

margin-top:20px;

font-size:15px;

}

/* 按钮组 */

.btns{

display:flex;

gap:10px;

margin-top:20px;

}

button{

flex:1;

padding:14px;

border:none;

border-radius:15px;

font-weight:600;

cursor:pointer;

transition:0.25s;

}

.stake{

background:linear-gradient(90deg,#00ffbb,#00e0ff);
color:#000;

}

.unstake{

background:#20253a;

color:white;

}

.claim{

background:#ff9f43;

}

button:hover{

transform:translateY(-2px);

}

/* 邀请 */

.invite{

margin-top:30px;

padding:20px;

background:rgba(0,224,255,0.05);

border:1px dashed rgba(0,224,255,0.2);

border-radius:20px;

}

.invite input{

margin-top:10px;

}

.copy{

margin-top:10px;

background:#00e0ff;

color:#000;

}

.footer{

text-align:center;

margin-top:50px;

color:#777;

font-size:13px;

}

</style>

</head>

<body>

<div class="header">

<div class="logo">DQM Mining</div>

<button class="connect" id="connectBtn">连接钱包</button>

</div>

<div class="wrapper">

<div class="stats">

<div class="stat">
<h3>TVL</h3>
<div class="num" id="tvl">$0</div>
</div>

<div class="stat">
<h3>APY</h3>
<div class="num">260%</div>
</div>

<div class="stat">
<h3>矿工</h3>
<div class="num">0</div>
</div>

<div class="stat">
<h3>奖励池</h3>
<div class="num">0 DQM</div>
</div>

</div>

<div class="card">

<div class="title">WBNB + DQM 挖矿</div>

<div class="row">
<span>LP余额</span>
<span id="lpBal">0</span>
</div>

<div class="row">
<span>已质押</span>
<span id="staked">0</span>
</div>

<div class="row">
<span>待领取</span>
<span id="pending">0</span>
</div>

<input id="amount" placeholder="输入LP数量">

<div class="btns">

<button class="stake">质押</button>

<button class="unstake">解押</button>

<button class="claim">领取</button>

</div>

<div class="invite">

邀请链接

<input id="refLink" readonly>

<button class="copy">复制</button>

</div>

</div>

<div class="footer">

© 2026 DQM Ecosystem

</div>

</div>

<script>

let provider
let signer
let user

document.getElementById("connectBtn").onclick=async()=>{

if(!window.ethereum){

alert("请使用Web3钱包")

return

}

await window.ethereum.request({method:"eth_requestAccounts"})

provider=new ethers.BrowserProvider(window.ethereum)

signer=await provider.getSigner()

user=await signer.getAddress()

document.getElementById("connectBtn").innerText=user.slice(0,6)+"..."

document.getElementById("refLink").value=
location.origin+"?ref="+user

}

document.querySelector(".copy").onclick=()=>{

navigator.clipboard.writeText(
document.getElementById("refLink").value
)

alert("已复制")

}

</script>

</body>
</html>
