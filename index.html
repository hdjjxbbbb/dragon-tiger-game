<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>威威虎钱包</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:system-ui,sans-serif;background:#0B0E1F;color:#fff;max-width:420px;margin:0 auto;padding:24px}
  .card{background:#1A1F3A;border-radius:18px;padding:20px;margin:15px 0}
  .logo{text-align:center;margin:60px 0 40px}
  .logo-text{font-size:32px;font-weight:800;color:#FFB81C}
  .slogan{color:#999;margin-top:8px}
  button{width:100%;padding:18px;border-radius:16px;border:none;background:#FFB81C;color:#000;font-size:16px;font-weight:600;margin:10px 0}
  .btn-outline{background:transparent;color:#FFB81C;border:1px solid #FFB81C}
  input{width:100%;padding:16px;border-radius:16px;background:#222;border:none;color:#fff;margin-top:12px}
  #result{background:#222;padding:16px;border-radius:16px;margin-top:20px;white-space:pre-wrap;font-size:13px;line-height:1.6}
</style>
</head>

<body>

<div class="logo">
  <div class="logo-text">威威虎 Wallet</div>
  <div class="slogan">安全非托管多链钱包</div>
</div>

<button onclick="createWallet()">创建新钱包</button>
<button class="btn-outline" onclick="importMnemonic()">导入助记词</button>

<input id="mnInput" placeholder="输入助记词">
<div id="result"></div>

<script>
// 真正的随机助记词生成（本地可用，不需要网络）
function createWallet() {
  const bytes = crypto.getRandomValues(new Uint8Array(16));
  let mnemonic = Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
  mnemonic = mnemonic.match(/.{1,11}/g).join(' ').slice(0, 48);

  const addr = "0x" + Array.from(crypto.getRandomValues(new Uint8Array(20)))
    .map(b => b.toString(16).padStart(2, '0'))
    .join('');

  document.getElementById('result').innerText = `
✅ 创建成功
地址：${addr}
助记词（请备份）：
${mnemonic}
`;
}

// 导入助记词（简单验证）
function importMnemonic() {
  const val = document.getElementById('mnInput').value.trim();
  if (!val || val.split(' ').length < 10) {
    alert('助记词格式不正确');
    return;
  }
  document.getElementById('result').innerText = `
✅ 导入成功
助记词：${val}
`;
}
</script>

</body>
</html>
