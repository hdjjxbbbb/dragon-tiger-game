<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>威威虎超级钱包 - 完整版</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif}
  body{background:#0B0E1F;color:#fff;max-width:420px;margin:0 auto;padding-bottom:80px}
  .container{padding:24px}
  .page{display:none}
  .page.active{display:block}
  .logo{text-align:center;margin:30px 0}
  .logo h1{font-size:26px;color:#FFB81C;font-weight:800}
  .logo p{color:#aaa;margin-top:6px}
  input, select, textarea{
    width:100%;padding:14px 16px;border-radius:14px;background:#1A1F3A;
    border:none;color:#fff;margin:8px 0;font-size:15px
  }
  button{
    width:100%;padding:16px;border-radius:16px;border:none;background:#FFB81C;
    color:#000;font-size:16px;font-weight:600;margin:8px 0;cursor:pointer
  }
  .btn-outline{background:transparent;color:#FFB81C;border:1px solid #FFB81C}
  .title{margin-bottom:12px;font-size:18px;font-weight:600}
  .balance-box{text-align:center;margin:20px 0}
  .balance{font-size:34px;font-weight:700}
  .balance-fiat{color:#aaa;margin-top:4px}
  .chain-tag{
    display:inline-block;background:#1A1F3A;color:#FFB81C;
    padding:6px 12px;border-radius:20px;margin:10px 0;font-size:13px
  }
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:20px 0}
  .grid-4 .item{
    background:#1A1F3A;padding:14px 8px;border-radius:14px;
    text-align:center;font-size:12px
  }
  .token-item{
    background:#1A1F3A;padding:14px 16px;border-radius:12px;margin:8px 0;
    display:flex;justify-content:space-between;align-items:center
  }
  .swap-box{background:#1A1F3A;padding:20px;border-radius:16px;margin:20px 0}
  .swap-arrow{text-align:center;font-size:24px;color:#FFB81C;margin:10px 0}
  .bridge-box{background:#1A1F3A;padding:20px;border-radius:16px;margin:20px 0}
  .tabbar{
    position:fixed;bottom:0;left:0;right:0;max-width:420px;margin:auto;
    background:#111;display:grid;grid-template-columns:repeat(4,1fr);
    padding:12px 0;border-top:1px solid #222
  }
  .tabbar .item{text-align:center;font-size:12px}
  .section{margin:20px 0}
</style>
</head>
<body>

<div class="container">

<!-- ====================== 欢迎页 ====================== -->
<div class="page active" id="welcome">
  <div class="logo">
    <h1>威威虎超级钱包</h1>
    <p>全链 | 闪兑 | 跨链 | 安全</p>
  </div>

  <div class="section">
    <div class="title">选择创建链</div>
    <select id="create_chain_selector">
      <option value="eth">ETH 以太坊</option>
      <option value="bsc">BSC 币安链</option>
      <option value="polygon">Polygon</option>
      <option value="arb">Arbitrum</option>
      <option value="opt">Optimism</option>
      <option value="okc">OKC 欧科链</option>
      <option value="heco">HECO 火币链</option>
      <option value="tron">TRON 波场</option>
    </select>
  </div>

  <button onclick="showPage('create')">创建钱包</button>
  <button class="btn-outline" onclick="showPage('import_mn')">导入助记词</button>
  <button class="btn-outline" onclick="showPage('import_key')">导入私钥</button>
  <button class="btn-outline" onclick="showPage('watch_wallet')">观察钱包</button>
  <button class="btn-outline" onclick="showPage('node_list_page')">节点设置</button>
</div>

<!-- ====================== 创建钱包 ====================== -->
<div class="page" id="create">
  <div class="logo"><h1>创建钱包</h1></div>
  <div class="section">
    <input id="create_pwd1" type="password" placeholder="设置密码（至少6位）">
    <input id="create_pwd2" type="password" placeholder="确认密码">
  </div>
  <button onclick="createWalletAction()">创建并生成助记词</button>
  <button class="btn-outline" onclick="showPage('welcome')">返回</button>
</div>

<!-- ====================== 导入助记词 ====================== -->
<div class="page" id="import_mn">
  <div class="logo"><h1>导入助记词</h1></div>
  <div class="section">
    <textarea id="mn_input" rows="4" placeholder="请输入助记词，空格分隔"></textarea>
    <input id="mn_pwd1" type="password" placeholder="输入密码">
    <input id="mn_pwd2" type="password" placeholder="确认密码">
  </div>
  <button onclick="importMnemonicAction()">确认导入</button>
  <button class="btn-outline" onclick="showPage('welcome')">返回</button>
</div>

<!-- ====================== 导入私钥 ====================== -->
<div class="page" id="import_key">
  <div class="logo"><h1>导入私钥</h1></div>
  <div class="section">
    <input id="pk_input" placeholder="请输入私钥">
    <input id="pk_pwd1" type="password" placeholder="输入密码">
    <input id="pk_pwd2" type="password" placeholder="确认密码">
  </div>
  <button onclick="importPrivateKeyAction()">确认导入</button>
  <button class="btn-outline" onclick="showPage('welcome')">返回</button>
</div>

<!-- ====================== 钱包主页 ====================== -->
<div class="page" id="main">
  <div class="balance-box">
    <div class="balance" id="main_balance">$0.00</div>
    <div class="balance-fiat">≈ ¥0.00</div>
    <div class="chain-tag" id="main_chain" onclick="showPage('node_list_page')">ETH · 点击切换</div>
  </div>

  <div class="grid-4">
    <div class="item" onclick="showPage('receive_page')">💰收款</div>
    <div class="item" onclick="showPage('send_page')">📤转账</div>
    <div class="item" onclick="showPage('swap_page')">💱闪兑</div>
    <div class="item" onclick="showPage('bridge_page')">🌉跨链</div>
  </div>

  <div class="title">资产</div>
  <div class="token-item"><span>ETH</span> <span>0.0000</span></div>
  <div class="token-item"><span>BNB</span> <span>0.0000</span></div>
  <div class="token-item"><span>USDT</span> <span>0.0000</span></div>
  <div class="token-item"><span>任意代币</span> <span>0.0000</span></div>
</div>

<!-- ====================== 收款 ====================== -->
<div class="page" id="receive_page">
  <div class="title">收款地址</div>
  <div class="token-item" id="receive_address">0x...</div>
  <button class="btn-outline" onclick="showPage('main')">返回</button>
</div>

<!-- ====================== 转账 ====================== -->
<div class="page" id="send_page">
  <div class="title">转账</div>
  <input id="send_to" placeholder="接收地址">
  <input id="send_amount" placeholder="转账数量">
  <button onclick="sendAction()">确认转账</button>
  <button class="btn-outline" onclick="showPage('main')">返回</button>
</div>

<!-- ====================== 闪兑 ====================== -->
<div class="page" id="swap_page">
  <div class="title">闪兑兑换</div>
  <div class="swap-box">
    <select id="swap_from">
      <option>ETH</option><option>BNB</option><option>USDT</option><option>任意ERC20</option>
    </select>
    <input id="swap_from_amt" placeholder="卖出数量">

    <div class="swap-arrow" onclick="reverseSwap()">↑↓</div>

    <select id="swap_to">
      <option>USDT</option><option>BNB</option><option>ETH</option><option>任意ERC20</option>
    </select>
    <input id="swap_to_amt" placeholder="预计收入" readonly>
  </div>
  <button onclick="swapAction()">确认兑换</button>
  <button class="btn-outline" onclick="showPage('main')">返回</button>
</div>

<!-- ====================== 跨链桥 ====================== -->
<div class="page" id="bridge_page">
  <div class="title">跨链桥</div>
  <div class="bridge-box">
    <select id="bridge_from_chain">
      <option>从 ETH</option><option>从 BSC</option><option>从 Polygon</option>
    </select>
    <select id="bridge_to_chain">
      <option>到 BSC</option><option>到 ETH</option><option>到 Polygon</option>
    </select>
    <select id="bridge_token">
      <option>USDT</option><option>ETH</option><option>BNB</option><option>任意代币</option>
    </select>
    <input placeholder="跨链数量">
  </div>
  <button>确认跨链</button>
  <button class="btn-outline" onclick="showPage('main')">返回</button>
</div>

<!-- ====================== 节点列表 ====================== -->
<div class="page" id="node_list_page">
  <div class="title">节点管理</div>
  <select id="node_chain_selector">
    <option>ETH</option><option>BSC</option><option>Polygon</option><option>自定义</option>
  </select>
  <div class="token-item">官方节点</div>
  <div class="token-item">自定义节点</div>
  <button onclick="showPage('add_node_page')">添加自定义节点</button>
  <button class="btn-outline" onclick="showPage('main')">返回</button>
</div>

<!-- ====================== 添加节点 ====================== -->
<div class="page" id="add_node_page">
  <div class="title">添加自定义节点</div>
  <input placeholder="节点名称">
  <input placeholder="RPC地址">
  <input placeholder="链ID">
  <input placeholder="符号">
  <button>保存节点</button>
  <button class="btn-outline" onclick="showPage('node_list_page')">返回</button>
</div>

<!-- ====================== 观察钱包 ====================== -->
<div class="page" id="watch_wallet">
  <div class="title">观察钱包</div>
  <input placeholder="输入地址">
  <button>确认</button>
  <button class="btn-outline" onclick="showPage('welcome')">返回</button>
</div>

<!-- ====================== 底部导航 ====================== -->
<div class="tabbar">
  <div class="item" onclick="showPage('main')">钱包</div>
  <div class="item" onclick="showPage('swap_page')">闪兑</div>
  <div class="item" onclick="showPage('bridge_page')">跨链</div>
  <div class="item" onclick="showPage('welcome')">我的</div>
</div>

</div>

<script>
let currentChain = "eth";
let wallet = {
  address: "0x0000000000000000000000000000000000000000",
  mnemonic: "",
  privateKey: "",
  password: ""
};

const $ = (id) => document.getElementById(id);
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const el = $(id);
  if (el) el.classList.add('active');
}

// ==============================================
// 创建钱包（双密码验证）
// ==============================================
function createWalletAction() {
  const p1 = $('create_pwd1').value;
  const p2 = $('create_pwd2').value;
  if (!p1 || !p2 || p1 !== p2) {
    alert("两次密码不一致");
    return;
  }
  if (p1.length < 6) {
    alert("密码至少6位");
    return;
  }
  wallet.mnemonic = "wise immune audit garden ready pulse narrow cricket sleep vintage frost brief";
  wallet.privateKey = "0x" + "0123456789ABCDEF".repeat(8);
  wallet.address = "0x" + "1234567890".repeat(4);
  wallet.password = p1;
  $("receive_address").innerText = wallet.address;
  $("main_chain").innerText = currentChain.toUpperCase() + " · 已连接";
  alert("创建成功");
  showPage('main');
}

// ==============================================
// 导入助记词（双密码验证）
// ==============================================
function importMnemonicAction() {
  const mn = $('mn_input').value.trim();
  const p1 = $('mn_pwd1').value;
  const p2 = $('mn_pwd2').value;
  if (!mn) {
    alert("请输入助记词");
    return;
  }
  if (!p1 || !p2 || p1 !== p2) {
    alert("两次密码不一致");
    return;
  }
  if (p1.length < 6) {
    alert("密码至少6位");
    return;
  }
  wallet.mnemonic = mn;
  wallet.address = "0x" + "ImportedMnemonicAddress1234567890";
  $("receive_address").innerText = wallet.address;
  alert("助记词导入成功");
  showPage('main');
}

// ==============================================
// 导入私钥（双密码验证）
// ==============================================
function importPrivateKeyAction() {
  const pk = $('pk_input').value.trim();
  const p1 = $('pk_pwd1').value;
  const p2 = $('pk_pwd2').value;
  if (!pk) {
    alert("请输入私钥");
    return;
  }
  if (!p1 || !p2 || p1 !== p2) {
    alert("两次密码不一致");
    return;
  }
  if (p1.length < 6) {
    alert("密码至少6位");
    return;
  }
  wallet.privateKey = pk;
  wallet.address = "0x" + "ImportedByPrivateKey1234567890";
  $("receive_address").innerText = wallet.address;
  alert("私钥导入成功");
  showPage('main');
}

// ==============================================
// 转账
// ==============================================
function sendAction() {
  const to = $('send_to').value;
  const amt = $('send_amount').value;
  if (!to || !amt) {
    alert("请填写完整信息");
    return;
  }
  alert("转账已提交:\n" + to + "\n金额:" + amt);
  showPage('main');
}

// ==============================================
// 闪兑
// ==============================================
function reverseSwap() {
  const f = $('swap_from').value;
  const t = $('swap_to').value;
  $('swap_from').value = t;
  $('swap_to').value = f;
}
function swapAction() {
  const f = $('swap_from').value;
  const t = $('swap_to').value;
  const amt = $('swap_from_amt').value;
  if (!amt) {
    alert("请输入数量");
    return;
  }
  $('swap_to_amt').value = (Number(amt) * 1.0).toFixed(4);
  alert("兑换成功：" + f + " → " + t);
  showPage('main');
}

showPage('welcome');
</script>
</body>
</html>
