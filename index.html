<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Whale</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,"Microsoft YaHei",sans-serif}
body{background:#090b1a;color:#fff;padding:20px;max-width:500px;margin:0 auto}
.glass{background:rgba(30,35,60,0.7);border-radius:18px;padding:20px;margin-bottom:16px;border:1px solid rgba(255,255,255,0.08)}
.title{font-size:18px;font-weight:bold;margin-bottom:10px}
.sub{color:#a0a8c0;font-size:14px;margin-bottom:12px}
.btn{background:linear-gradient(90deg,#4facfe,#00f2fe);color:#000;border:none;border-radius:12px;padding:14px;width:100%;font-weight:bold;font-size:15px;margin-top:8px}
.btn:disabled{opacity:0.5}
.item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
.item:last-child{border-bottom:none}
.price{font-weight:bold;color:#4facfe}
input{width:100%;padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:15px;margin-top:10px}
</style>
</head>

<body>

<div style="text-align:center;margin-bottom:20px">
  <h1>Meta Whale</h1>
  <p style="color:#a0a8c0">双矩阵 · 分红系统</p>
</div>

<button id="connect" class="btn">连接钱包</button>
<div id="addr" style="text-align:center;margin:10px 0;color:#aaa"></div>

<!-- 邀请码注册 -->
<div class="glass">
  <div class="title">注册（必填）</div>
  <div class="sub">请输入上级10位邀请码</div>
  <input id="inviteCode" placeholder="请输入10位邀请码" maxlength="10">
  <button id="registerBtn" class="btn" disabled>确认注册</button>
</div>

<!-- 联合矩阵 9级 -->
<div class="glass">
  <div class="title">联合挖矿矩阵（9级）</div>
  <div class="sub">50 → 100 → 200 → 400 → 800 → 每级×2</div>
  <div id="unionList"></div>
</div>

<script>
// 你的项目方钱包
const PROJECT_WALLET = "0x4d9C3000Aa71FeB18C1d607703BDa912991eF8F1".toLowerCase();

let account = null;
let isProject = false;
let isRegistered = false;

// 9级价格
function getPrice(level) {
  const arr = [0,50,100,200,400,800,1600,3200,6400,12800];
  return arr[level];
}

// 渲染矩阵
function renderMatrix() {
  const box = document.getElementById("unionList");
  box.innerHTML = "";
  for(let i=1;i<=9;i++){
    const item = document.createElement("div");
    item.className = "item";
    item.innerHTML = `
      <div>Lv${i}</div>
      <div class="price">${getPrice(i)} DAI</div>
      <button onclick="act(${i})" style="padding:6px 10px;border-radius:8px;background:#4facfe;color:#000;border:none;font-weight:bold">激活</button>
    `;
    box.appendChild(item);
  }
}

// 激活
function act(level) {
  if(!account) return alert("请先连接钱包");
  if(!isProject && !isRegistered) {
    alert("请先输入10位邀请码完成注册！");
    return;
  }
  alert(`✅ 激活 Lv${level} 成功`);
}

// 输入监听
inviteCode.oninput = function(){
  if(this.value.length === 10){
    registerBtn.disabled = false;
  } else {
    registerBtn.disabled = true;
  }
}

// 注册
registerBtn.onclick = function(){
  const code = inviteCode.value.trim();
  if(code.length !== 10){
    alert("邀请码必须是10位");
    return;
  }
  isRegistered = true;
  alert("✅ 注册成功！现在可以激活");
  renderMatrix();
}

// 连接钱包
connect.onclick = async ()=>{
  if(!window.ethereum) return alert("请在钱包浏览器打开");
  const a = await window.ethereum.request({method:"eth_requestAccounts"});
  account = a[0].toLowerCase();
  isProject = account === PROJECT_WALLET;

  document.getElementById("addr").innerText = "已连接："+account.substr(0,6)+"…"+account.substr(-4);

  if(isProject){
    isRegistered = true;
    alert("✅ 项目方账号，无需注册");
  }

  renderMatrix();
}
</script>

</body>
</html>
