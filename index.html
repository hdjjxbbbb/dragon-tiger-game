<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天祥集团结算系统</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 15px;
        }
        .box {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }
        h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #1a2b48;
            font-weight: bold;
        }
        .red-notice{
            color: #ff0000;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            line-height: 1.6;
            padding:10px;
            background: #ffe9e9;
            border-radius: 8px;
            margin-bottom:15px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
        }
        .btn-blue {background: #2563eb;color: #fff;}
        .btn-red {background: #ef4444;color: #fff;}
        .btn-green {background: #10b981;color: #fff;}
        .btn-gray {background: #cccccc;color: #666;cursor: not-allowed;}
        .btn-forbid {background:#999;color:#fff;cursor:not-allowed;}
        .info-line{margin:6px 0;font-size:15px;}
        .tip {padding: 10px;border-radius: 8px;margin: 10px 0;}
        .tip-green {background: #dcfce7;color: #16a34a;}
        .tip-red {background: #fee2e2;color: #dc2626;}
    </style>
</head>
<body>

<h2>天祥集团结算系统</h2>

<div class="red-notice">
    重要温馨提示：非本集团内部已办理入职员工钱包地址，连接本DApp后所有功能全部禁止使用！
    仅经管理员录入入职信息的员工钱包，方可正常使用请假、薪资申领等全部操作，请勿随意使用空白钱包恶意提交申请！
</div>

<div class="box">
    <button class="btn btn-blue" id="connectBtn">连接币安链钱包</button>
    <p style="margin-top:10px;text-align:center;" id="walletAddr">未连接钱包</p>
    <div class="tip" id="userStatusTip">请使用集团已登记入职员工钱包登录系统</div>
</div>

<div class="box">
    <h3>员工中心</h3>
    <div class="info-line">员工姓名：<span id="name">-</span></div>
    <div class="info-line">绑定钱包：<span id="addr">-</span></div>
    <div class="info-line">入职时间：<span id="entryTime">-</span></div>
    <div class="info-line">每月薪资：<span id="salary">0</span> USDT</div>
    <div class="info-line">已请假次数：<span id="leaveCount">0</span> 次</div>
    <div class="info-line">实际出勤天数：<span id="realWorkDay">30</span> 天</div>
    <button class="btn btn-forbid" id="applyBtn" disabled>提交领取当月薪资</button>
    <button class="btn btn-forbid" id="leaveBtn" disabled>提交请假申请</button>
</div>

<div class="box">
    <h3>老板管理后台（仅管理员可见）</h3>
    <input placeholder="员工钱包地址" id="addAddr">
    <input placeholder="员工姓名" id="addName">
    <input placeholder="每月薪资(USDT)" type="number" id="addSal">
    <button class="btn btn-blue" id="addStaffBtn">新增入职员工</button>
</div>

<script>
const BOSS_ADDR = "0xcA7f542716b7F1F2463C08e3545Ac7230b0F1Ec6".toLowerCase();
const CONTRACT_ABI = [
    {"inputs":[],"stateMutability":"nonpayable","type":"constructor"},
    {"name":"checkCanGet","inputs":[{"name":"_user","type":"address"}],"outputs":[{"type":"bool"},{"type":"string"},{"type":"uint256"}],"stateMutability":"view","type":"function"},
    {"name":"getRealWorkDay","inputs":[{"name":"_user","type":"address"}],"outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},
    {"name":"addStaff","inputs":[{"name":"_u","type":"address"},{"name":"_name","type":"string"},{"name":"_sal","type":"uint256"}],"type":"function"},
    {"name":"submitSalaryApply","type":"function"},
    {"name":"submitLeaveApply","inputs":[{"name":"_leaveType","type":"uint8"},{"name":"_reason","type":"string"}],"type":"function"},
    {"name":"staffData","inputs":[{"name":"","type":"address"}],"outputs":[{"name":"userName","type":"string"},{"name":"isJob","type":"bool"},{"name":"monthSalary","type":"uint256"},{"name":"entryTime","type":"uint256"},{"name":"approvedLeaveNum","type":"uint256"}],"stateMutability":"view","type":"function"}
];
// 填入你的合约地址！
const CONTRACT_ADDR = "";

let web3 = null;
let account = null;
let contract = null;

// 连接钱包
document.getElementById('connectBtn').onclick = async function(){
    if(!window.ethereum){
        alert("请安装TP钱包或MetaMask");
        return;
    }
    try{
        web3 = new Web3(window.ethereum);
        const accounts = await window.ethereum.request({method:'eth_requestAccounts'});
        account = accounts[0].toLowerCase();
        contract = new web3.eth.Contract(CONTRACT_ABI, CONTRACT_ADDR);
        document.getElementById('walletAddr').innerText = account;

        // 读取员工信息
        const user = await contract.methods.staffData(account).call();
        if(user.isJob){
            document.getElementById('userStatusTip').innerText = "身份验证成功，可正常使用功能";
            document.getElementById('userStatusTip').className = "tip tip-green";
            document.getElementById('name').innerText = user.userName;
            document.getElementById('addr').innerText = account;
            document.getElementById('entryTime').innerText = new Date(user.entryTime * 1000).toLocaleDateString();
            document.getElementById('salary').innerText = (Number(user.monthSalary)/1e18).toFixed(2);
            document.getElementById('leaveCount').innerText = user.approvedLeaveNum;
            document.getElementById('realWorkDay').innerText = 30 - Number(user.approvedLeaveNum);
            document.getElementById('applyBtn').disabled = false;
            document.getElementById('applyBtn').className = "btn btn-blue";
            document.getElementById('leaveBtn').disabled = false;
            document.getElementById('leaveBtn').className = "btn btn-green";
        }else{
            document.getElementById('userStatusTip').innerText = "非集团员工，所有功能已禁用";
            document.getElementById('userStatusTip').className = "tip tip-red";
            alert("您的钱包未录入入职信息，无法使用任何功能！");
        }

        // 老板功能
        if(account === BOSS_ADDR){
            document.getElementById('addStaffBtn').style.display = "block";
        }else{
            document.getElementById('addStaffBtn').style.display = "none";
        }
    }catch(e){
        alert("连接失败：" + e.message);
    }
}

// 提交薪资
document.getElementById('applyBtn').onclick = async function(){
    await contract.methods.submitSalaryApply().send({from:account});
    alert("薪资申请已提交");
}

// 提交请假
document.getElementById('leaveBtn').onclick = async function(){
    const reason = prompt("请输入请假原因");
    if(!reason) return;
    await contract.methods.submitLeaveApply(0, reason).send({from:account});
    alert("请假申请已提交");
}

// 新增员工
document.getElementById('addStaffBtn').onclick = async function(){
    const addr = document.getElementById('addAddr').value.trim();
    const name = document.getElementById('addName').value.trim();
    const sal = document.getElementById('addSal').value.trim();
    if(!addr || !name || !sal) return alert("请填写完整信息");
    await contract.methods.addStaff(addr, name, sal).send({from:account});
    alert("员工入职录入成功！");
}
</script>
</body>
</html>
