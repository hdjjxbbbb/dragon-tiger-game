<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solana 一键发币</title>

<script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.95.6/lib/index.iife.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@solana/spl-token@0.4.0/lib/index.iife.min.js"></script>

<style>
body{max-width:420px;margin:0 auto;padding:20px;font-family:system-ui;background:#f9f9f9}
input,button{width:100%;padding:14px;margin:8px 0;border-radius:10px;border:1px solid #ddd}
button{background:#0071e3;color:#fff;border:none}
.log{font-size:12px;background:#fff;padding:10px;border-radius:10px;margin-top:10px}
</style>
</head>

<body>

<h2>🚀 Solana 一键发币</h2>

<button onclick="connect()">连接钱包</button>
<div id="addr"></div>

<input id="name" placeholder="Token 名称">
<input id="symbol" placeholder="符号">
<input id="decimals" value="9">
<input id="supply" value="1000000">
<input type="file" id="logo">

<label>
<input type="checkbox" id="revoke"> 创建后销毁权限（推荐）
</label>

<button onclick="createToken()">创建代币</button>

<div class="log" id="log"></div>

<script>
let provider, publicKey, connection;

const { Connection, Keypair, Transaction, SystemProgram } = solanaWeb3;
const splToken = window.splToken;

function log(t){
  document.getElementById("log").innerText = t + "\n" + document.getElementById("log").innerText;
}

// 连接钱包
async function connect(){
  const w = window.solana;
  if(!w) return alert("请用 Phantom 打开");

  const res = await w.connect();
  provider = w;
  publicKey = res.publicKey;

  connection = new Connection("https://api.mainnet-beta.solana.com");

  document.getElementById("addr").innerText = publicKey.toBase58();
}

// 上传IPFS（需要你填key）
async function uploadIPFS(file){
  const form = new FormData();
  form.append("file", file);

  const res = await fetch("https://api.nft.storage/upload",{
    method:"POST",
    headers:{
      Authorization:"Bearer 你的NFT_STORAGE_KEY"
    },
    body:form
  });

  const data = await res.json();
  return `https://ipfs.io/ipfs/${data.value.cid}`;
}

// 创建Token
async function createToken(){
try{
  const name = document.getElementById("name").value;
  const symbol = document.getElementById("symbol").value;
  const decimals = parseInt(document.getElementById("decimals").value);
  const supply = parseInt(document.getElementById("supply").value);
  const file = document.getElementById("logo").files[0];
  const revoke = document.getElementById("revoke").checked;

  log("上传Logo...");
  const imageUrl = await uploadIPFS(file);

  const metadata = {
    name,
    symbol,
    image:imageUrl
  };

  log("上传Metadata...");
  const metaBlob = new Blob([JSON.stringify(metadata)]);
  const metaFile = new File([metaBlob], "meta.json");
  const metaUrl = await uploadIPFS(metaFile);

  const mint = Keypair.generate();

  const lamports = await connection.getMinimumBalanceForRentExemption(82);

  const tx = new Transaction();

  // 创建mint
  tx.add(SystemProgram.createAccount({
    fromPubkey: publicKey,
    newAccountPubkey: mint.publicKey,
    space:82,
    lamports,
    programId:splToken.TOKEN_PROGRAM_ID
  }));

  tx.add(splToken.createInitializeMintInstruction(
    mint.publicKey,
    decimals,
    publicKey,
    publicKey
  ));

  const ata = await splToken.getAssociatedTokenAddress(
    mint.publicKey,
    publicKey
  );

  tx.add(splToken.createAssociatedTokenAccountInstruction(
    publicKey,
    ata,
    publicKey,
    mint.publicKey
  ));

  tx.add(splToken.createMintToInstruction(
    mint.publicKey,
    ata,
    publicKey,
    supply * (10 ** decimals)
  ));

  // 可选销毁权限
  if(revoke){
    tx.add(splToken.createSetAuthorityInstruction(
      mint.publicKey,
      publicKey,
      splToken.AuthorityType.MintTokens,
      null
    ));

    tx.add(splToken.createSetAuthorityInstruction(
      mint.publicKey,
      publicKey,
      splToken.AuthorityType.FreezeAccount,
      null
    ));
  }

  tx.feePayer = publicKey;
  tx.recentBlockhash = (await connection.getLatestBlockhash()).blockhash;

  tx.partialSign(mint);

  const signed = await provider.signTransaction(tx);
  const sig = await connection.sendRawTransaction(signed.serialize());

  log("发币成功！");
  log("Mint地址: " + mint.publicKey.toBase58());
  log("交易: " + sig);

  alert("发币成功！");

}catch(e){
  log("错误: " + e.message);
}
}
</script>

</body>
</html>
