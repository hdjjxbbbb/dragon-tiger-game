<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龙虎斗</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <style>
    body{background:#121212;color:#fff;padding:20px;font-family:Arial}
    .item{background:#1e1e1e;padding:15px;margin:10px 0;border-radius:12px}
    button{width:100%;padding:14px;margin:5px 0;border-radius:10px;border:none;font-weight:bold}
    .connect{background:#007bff;color:#fff}
    .approve{background:#28a745;color:#fff}
    .bet{background:#ffc107;color:#000}
    .draw{background:#dc3545;color:#fff}
    input{width:100%;padding:12px;margin:5px 0;background:#222;color:#fff;border:1px solid #444;border-radius:10px}
    .time{font-size:22px;color:#ffc107;text-align:center;margin:10px 0}
  </style>
</head>
<body>

  <h2>🐉🐯 龙虎斗</h2>

  <div class="item">
    <button class="connect" onclick="connectWallet()">连接钱包</button>
    <div id="addr">未连接</div>
  </div>

  <div class="item">
    <button class="approve" onclick="approve()">✅ 手动授权代币</button>
    <div>授权：<span id="allow">0</span></div>
  </div>

  <div class="item">
    <div>期号：<span id="round">0</span></div>
    <div class="time" id="timer">00:00</div>
    <button class="draw" onclick="draw()">开奖</button>
  </div>

  <div class="item">
    <input id="amt" type="number" value="1" placeholder="下注数量">
    <button class="bet" onclick="goBet(1)">龙</button>
    <button class="bet" onclick="goBet(2)">虎</button>
    <button class="bet" onclick="goBet(3)">和</button>
  </div>

  <script>
    const CONFIG = {
      CONTRACT: ethers.getAddress("0xace74c59d311c1ce20358cd9c8cb2A7958D3C96a"),
      TOKEN: ethers.getAddress("0x227bbbdb9d40ccda666cfe40b419328e1ed0a480"),
      CHAIN_ID: 56
    };

    const TOKEN_ABI = [
      {"inputs":[{"type":"address"},{"type":"uint256"}],"name":"approve","outputs":[{"type":"bool"}],"stateMutability":"nonpayable","type":"function"},
      {"inputs":[{"type":"address"},{"type":"address"}],"name":"allowance","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"}
    ];

    const GAME_ABI = [
      {"inputs":[],"name":"currentRound","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},
      {"inputs":[],"name":"nextDrawIn","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},
      {"inputs":[],"name":"draw","outputs":[],"stateMutability":"nonpayable","type":"function"},
      {"inputs":[{"type":"uint8"},{"type":"uint256"}],"name":"bet","outputs":[],"stateMutability":"nonpayable","type":"function"}
    ];

    let provider, signer, account, token, game;

    async function connectWallet() {
      try {
        if (!window.ethereum) {
          alert("请安装 MetaMask 或其他支持 WalletConnect 的钱包");
          return;
        }
        provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = await provider.getSigner();
        account = await signer.getAddress();
        document.getElementById("addr").innerText = account.slice(0, 10) + "...";

        game = new ethers.Contract(CONFIG.CONTRACT, GAME_ABI, signer);
        token = new ethers.Contract(CONFIG.TOKEN, TOKEN_ABI, signer);

        startTimer();
        loadAllowance();
        alert("连接成功！");
      } catch (e) {
        alert("连接失败：" + e.message);
      }
    }

    async function approve() {
      if (!account || !token) {
        alert("请先连接钱包");
        return;
      }
      try {
        const tx = await token.approve(CONFIG.CONTRACT, ethers.MaxUint256);
        await tx.wait();
        alert("授权成功！");
        loadAllowance();
      } catch (e) {
        alert("授权失败：" + e.message);
      }
    }

    async function loadAllowance() {
      if (!account || !token) return;
      try {
        const a = await token.allowance(account, CONFIG.CONTRACT);
        document.getElementById("allow").innerText = ethers.formatUnits(a, 18);
      } catch (e) {
        console.error("加载授权失败：", e);
      }
    }

    async function goBet(side) {
      if (!account || !game) {
        alert("请先连接钱包");
        return;
      }
      const amt = document.getElementById("amt").value;
      try {
        const val = ethers.parseUnits(amt, 18);
        const a = await token.allowance(account, CONFIG.CONTRACT);
        if (a < val) {
          alert("请先点【手动授权代币】");
          return;
        }
        const tx = await game.bet(side, val);
        await tx.wait();
        alert("下注成功！");
      } catch (e) {
        alert("下注失败：" + e.message);
      }
    }

    async function draw() {
      if (!account || !game) {
        alert("请先连接钱包");
        return;
      }
      try {
        const tx = await game.draw();
        await tx.wait();
        alert("开奖成功");
      } catch (e) {
        alert("开奖失败：" + e.message);
      }
    }

    function startTimer() {
      setInterval(async () => {
        if (!game) return;
        try {
          const sec = await game.nextDrawIn();
          const m = String(Math.floor(sec / 60)).padStart(2, '0');
          const s = String(sec % 60).padStart(2, '0');
          document.getElementById("timer").innerText = m + ":" + s;
          const r = await game.currentRound();
          document.getElementById("round").innerText = r.toString();
        } catch (e) {
          console.error("定时器更新失败：", e);
        }
      }, 1000);
    }
  </script>
</body>
</html>
