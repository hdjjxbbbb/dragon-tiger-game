<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOL 一键发币</title>
  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.95.6/lib/index.iife.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@solana/spl-token@0.4.8/lib/index.iife.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
    body{max-width:420px;margin:0 auto;padding:24px;background:#fff}
    .btn{width:100%;padding:16px;border-radius:16px;border:none;background:#0071e3;color:white;font-size:16px;margin:10px 0}
    .btn:disabled{background:#ccc}
    input{width:100%;padding:14px;border-radius:12px;border:1px solid #ddd;margin:8px 0}
    .card{background:#f9f9f9;padding:20px;border-radius:20px;margin-bottom:16px}
    .title{font-size:24px;font-weight:700;margin-bottom:20px}
    .address{font-size:14px;color:#333;margin:10px 0;padding:10px;background:#f1f1f1;border-radius:10px}
    #result{background:#e6f7e6;padding:14px;border-radius:12px;margin-top:16px;display:none;word-break:break-all}
  </style>
</head>
<body>

<div class="title">SOL 一键发币</div>

<button class="btn" id="connectBtn">连接 OKX / OE 钱包</button>
<div class="address" id="address" style="display:none">钱包地址：加载中...</div>

<div class="card">
  <input id="name" placeholder="代币名称" value="TestToken">
  <input id="symbol" placeholder="代币符号" value="TEST">
  <input id="decimals" value="9" placeholder="精度">
  <input id="supply" value="1000000000" placeholder="发行总量">
</div>

<button class="btn" id="createBtn" disabled>创建代币（需签名支付Gas）</button>

<div id="result"></div>

<script>
const { Connection, Keypair } = solanaWeb3;
const { createMint, getOrCreateAssociatedTokenAccount, mintTo } = splToken;

let provider;
let publicKey;
let address = "";

const connection = new Connection("https://api.mainnet-beta.solana.com", "confirmed");

// ======================================
// 连接钱包（强制弹窗！）
// ======================================
document.getElementById("connectBtn").onclick = async () => {
  try {
    const okx = window.okxwallet || window.solana;
    if (!okx) {
      alert("请在 OKX / OE 钱包内置浏览器打开！");
      return;
    }

    // 强制弹窗授权
    const res = await okx.connect({ onlyIfTrusted: false });
    provider = okx;
    publicKey = res.publicKey;
    address = publicKey.toBase58();

    // 显示地址
    document.getElementById("address").innerText = "已连接：" + address;
    document.getElementById("address").style.display = "block";
    document.getElementById("connectBtn").innerText = "已连接钱包";
    document.getElementById("createBtn").disabled = false;

  } catch (e) {
    alert("连接失败：" + e.message);
  }
};

// ======================================
// 创建代币（一定会弹签名！）
// ======================================
document.getElementById("createBtn").onclick = async () => {
  if (!address) {
    alert("请先连接钱包！");
    return;
  }

  document.getElementById("createBtn").disabled = true;
  document.getElementById("createBtn").innerText = "签名中...请在钱包确认";

  try {
    const name = document.getElementById("name").value;
    const symbol = document.getElementById("symbol").value;
    const decimals = parseInt(document.getElementById("decimals").value);
    const supply = document.getElementById("supply").value;
    const totalAmount = BigInt(supply) * (10n ** BigInt(decimals));

    // 1. 创建代币合约（弹签名）
    const mintKeypair = Keypair.generate();
    const mint = await createMint(
      connection,
      provider,
      publicKey,
      publicKey,
      decimals,
      mintKeypair
    );

    // 2. 创建账户（弹签名）
    const tokenAccount = await getOrCreateAssociatedTokenAccount(
      connection,
      provider,
      mint,
      publicKey
    );

    // 3. 发行代币（弹签名）
    const txId = await mintTo(
      connection,
      provider,
      mint,
      tokenAccount.address,
      publicKey,
      totalAmount
    );

    // 成功
    document.getElementById("result").innerHTML = `
      ✅ 发币成功<br>
      名称：${name}<br>
      符号：${symbol}<br>
      合约地址：<br>${mint.toBase58()}<br>
      交易：${txId}
    `;
    document.getElementById("result").style.display = "block";

  } catch (e) {
    alert("失败：" + e.message);
  } finally {
    document.getElementById("createBtn").disabled = false;
    document.getElementById("createBtn").innerText = "创建代币（需签名支付Gas）";
  }
};
</script>

</body>
</html>
