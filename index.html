<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>USDT商城收款二维码</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<style>
body{
background:#0B0F17;
color:white;
font-family:sans-serif;
padding:40px;
text-align:center;
}
.box{
background:#1E293B;
padding:30px;
border-radius:16px;
max-width:400px;
margin:auto;
}
input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}
button{
padding:12px;
width:100%;
background:#3B82F6;
border:none;
border-radius:8px;
color:white;
font-weight:bold;
cursor:pointer;
}
#qrcode{
margin-top:20px;
}
</style>
</head>

<body>

<div class="box">

<h2>商城USDT支付</h2>

<input id="addr" value="0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508">

<input id="amount" placeholder="支付金额 USDT">

<button onclick="genQR()">生成支付二维码</button>

<div id="qrcode"></div>

</div>

<script>

const USDT = "0x55d398326f99059fF775485246999027B3197955";

function genQR(){

const addr = document.getElementById("addr").value;

const amt = document.getElementById("amount").value;

const value = BigInt(Math.floor(amt * 1e18)).toString();

const link =
`ethereum:${USDT}/transfer?address=${addr}&uint256=${value}`;

document.getElementById("qrcode").innerHTML="";

QRCode.toCanvas(link,{width:260},function(err,canvas){

document.getElementById("qrcode").appendChild(canvas);

});

}

</script>

</body>
</html>
