<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOL 超低费发币</title>
  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.95.6/lib/index.iife.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@solana/spl-token@0.4.8/lib/index.iife.min.js"></script>
  <style>
    body { max-width: 420px; margin: 0 auto; padding: 20px; background: #fff; font-family: Arial; }
    .btn { width: 100%; padding: 16px; background: #0070f3; color: white; border: none; border-radius: 16px; margin: 10px 0; font-size: 16px; }
    input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; }
    .card { background: #f7f7f7; padding: 20px; border-radius: 20px; margin-bottom: 15px; }
    .title { font-size: 22px; font-weight: bold; margin-bottom: 20px; }
    #result { margin-top: 20px; padding: 15px; background: #e6f7e6; border-radius: 12px; font-size: 14px; display: none; word-break: break-all; }
  </style>
</head>
<body>

<div class="title">SOL 超低费发币</div>

<button class="btn" id="connect">连接 Phantom 钱包</button>

<div class="card">
  <input id="name" placeholder="代币名称">
  <input id="symbol" placeholder="代币符号">
  <input id="decimals" value="9" placeholder="精度(默认9)">
  <input id="supply" value="1000000000" placeholder="总发行量">
</div>

<button class="btn" id="create" disabled>创建代币（极低成本）</button>

<div id="result"></div>

<script>
const { Connection, Keypair, Transaction } = solanaWeb3;
const { createMint, getOrCreateAssociatedTokenAccount, mintTo } = splToken;

let wallet;
const connection = new Connection("https://api.mainnet-beta.solana.com", "processed");

// 连接钱包
document.getElementById("connect").onclick = async () => {
  try {
    const res = await window.solana.connect();
    wallet = res.publicKey;
    document.getElementById("connect").innerText = "已连接";
    document.getElementById("create").disabled = false;
  } catch (e) {
    alert("连接失败");
  }
};

// 极低成本发币
document.getElementById("create").onclick = async () => {
  if (!wallet) return alert("请先连钱包");
  document.getElementById("create").disabled = true;
  document.getElementById("create").innerText = "创建中...";

  try {
    const name = document.getElementById("name").value;
    const symbol = document.getElementById("symbol").value;
    const decimals = parseInt(document.getElementById("decimals").value);
    const supply = BigInt(document.getElementById("supply").value);

    // 1. 创建 Mint（最低成本操作）
    const mintKeypair = Keypair.generate();
    const mint = await createMint(
      connection,
      window.solana,
      wallet,
      wallet,
      decimals,
      mintKeypair
    );

    // 2. 领空账号
    const tokenAccount = await getOrCreateAssociatedTokenAccount(
      connection,
      window.solana,
      mint,
      wallet
    );

    // 3. 发行总量
    await mintTo(
      connection,
      window.solana,
      mint,
      tokenAccount.address,
      wallet,
      supply * (10n ** BigInt(decimals))
    );

    document.getElementById("result").innerHTML = `
      ✅ 发币成功<br>
      合约：${mint.toBase58()}
    `;
    document.getElementById("result").style.display = "block";

  } catch (e) {
    alert("失败：" + e.message);
  } finally {
    document.getElementById("create").disabled = false;
    document.getElementById("create").innerText = "创建代币（极低成本）";
  }
};
</script>
</body>
</html>
