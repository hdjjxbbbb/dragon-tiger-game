<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>匿名隐私池</title>
<script src="https://cdn.ethers.io/lib/ethers-6.7.0.umd.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f172a,#020617);
    color:#fff;
}

.container{
    max-width:420px;
    margin:60px auto;
}

.card{
    background:#111827;
    padding:25px;
    border-radius:16px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h2{
    margin-bottom:5px;
}

.sub{
    color:#94a3b8;
    font-size:12px;
    margin-bottom:20px;
}

.info{
    background:#020617;
    padding:10px;
    border-radius:10px;
    font-size:12px;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:none;
    background:#020617;
    color:#fff;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.btn-blue{background:#3b82f6}
.btn-green{background:#22c55e}
.btn-red{background:#ef4444}

.status{
    margin-top:10px;
    font-size:12px;
    color:#94a3b8;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>匿名隐私池</h2>
<div class="sub">DeFi Pool · ETH / BSC</div>

<button class="btn-blue" onclick="connect()">连接钱包</button>

<div class="info">
<p>地址：<span id="account">未连接</span></p>
<p>余额：<span id="balance">0</span></p>
<p>网络：<span id="network">未识别</span></p>
</div>

<input id="amount" placeholder="输入金额">

<button class="btn-green" onclick="deposit()">存入</button>
<button class="btn-red" onclick="withdraw()">提取</button>

<div class="status" id="status"></div>

</div>
</div>

<script>
let provider, signer, contract;

const CONTRACT_ADDRESS = "你的合约地址";

const ABI = [
  "function deposit() payable",
  "function withdraw(uint256 amount)",
  "function balances(address) view returns(uint256)"
];

async function connect(){
    if(!window.ethereum){
        alert("请安装钱包");
        return;
    }

    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = await provider.getSigner();

    const address = await signer.getAddress();
    document.getElementById("account").innerText = address;

    contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

    detectNetwork();
    loadBalance();
}

async function detectNetwork(){
    const net = await provider.getNetwork();

    let name = "未知链";
    if(net.chainId == 1) name = "ETH";
    if(net.chainId == 56) name = "BSC";

    document.getElementById("network").innerText = name;
}

async function loadBalance(){
    const addr = await signer.getAddress();
    const bal = await contract.balances(addr);

    document.getElementById("balance").innerText =
        ethers.formatEther(bal);
}

async function deposit(){
    const val = document.getElementById("amount").value;

    try{
        setStatus("处理中...");
        const tx = await contract.deposit({
            value: ethers.parseEther(val)
        });

        await tx.wait();
        setStatus("存入成功");
        loadBalance();
    }catch(e){
        setStatus("失败："+e.message);
    }
}

async function withdraw(){
    const val = document.getElementById("amount").value;

    try{
        setStatus("处理中...");
        const tx = await contract.withdraw(
            ethers.parseEther(val)
        );

        await tx.wait();
        setStatus("提取成功");
        loadBalance();
    }catch(e){
        setStatus("失败："+e.message);
    }
}

function setStatus(msg){
    document.getElementById("status").innerText = msg;
}
</script>

</body>
</html>
