<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龙虎斗 演示版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#111;color:#fff;padding:30px}
.container{max-width:420px;margin:0 auto}
.wallet-box{background:#1e1e2a;padding:20px;border-radius:16px;margin-bottom:20px}
.connect-btn{background:#3B82F6;color:white;border:none;padding:12px 20px;border-radius:10px;width:100%}
.info-line{margin-top:8px;font-size:14px;color:#ccc}
.bet-box{background:#1e1e2a;padding:24px;border-radius:16px;text-align:center}
#betAmt{padding:14px;width:100%;margin:10px 0;border-radius:10px;border:none;background:#2a2a3a;color:white}
.bet-btn{padding:16px 22px;margin:8px;border-radius:12px;border:none;font-weight:bold}
.btn-dragon{background:#2563eb;color:white}
.btn-tiger{background:#ef4444;color:white}
.btn-tie{background:#eab308;color:white}
.result{margin-top:20px;font-size:18px;font-weight:bold}
.admin{background:#1e1e2a;padding:20px;border-radius:16px;margin-top:30px}
</style>
</head>
<body>
<div class="container">

  <div class="wallet-box">
    <button class="connect-btn" id="connectBtn">连接钱包</button>
    <div class="info-line">地址：<span id="userAddr">未连接</span></div>
    <div class="info-line">余额：<span id="userBalance">0.0000</span> USDT</div>
  </div>

  <div class="bet-box">
    <h3>龙虎斗</h3>
    <input id="betAmt" type="number" placeholder="下注金额" value="10">
    <div>
      <button class="bet-btn btn-dragon" onclick="bet(0)">龙</button>
      <button class="bet-btn btn-tiger" onclick="bet(1)">虎</button>
      <button class="bet-btn btn-tie" onclick="bet(2)">和</button>
    </div>
    <div class="result" id="result"></div>
  </div>

  <div class="admin">
    <h4>🎛 庄家胜率控制（真实生效）</h4>
    <input type="range" min="1" max="100" value="50" id="winRate" oninput="updateRate()">
    <div>当前胜率：<span id="rateText">50%</span></div>
    <p style="font-size:12px;color:#999;margin-top:8px">
      1% = 几乎必输<br>
      99% = 几乎必赢
    </p>
  </div>

</div>

<script>
// 地址你自己填，不影响胜率
const USDT = "0x55d398326f99059fF775485246999027B3197955";
const ADMIN = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";
const POOL = "你的多签地址";

let account = null;
let approved = false;
let winRate = 50;

document.getElementById('connectBtn').onclick = async () => {
  if (!window.ethereum) return alert("请安装钱包");
  try {
    const accounts = await ethereum.request({ method: "eth_requestAccounts" });
    account = accounts[0];
    document.getElementById("userAddr").innerText = account.slice(0, 6) + "...";
    alert("已连接");
  } catch (e) {
    alert("连接失败");
  }
};

function updateRate() {
  winRate = document.getElementById("winRate").value;
  document.getElementById("rateText").innerText = winRate + "%";
}

// ==============================================
// 核心：真·可控胜率，100%按你设定来
// ==============================================
async function bet(choice) {
  if (!account) return alert("请先连接钱包");

  const betAmt = Number(document.getElementById("betAmt").value);
  if (betAmt <= 0) return alert("输入有效金额");

  // ==========================================
  // 这里是真实可控输赢逻辑
  // ==========================================
  const random = Math.random() * 100;
  let isWin;

  if (random < winRate) {
    isWin = true;   // 你让他赢
  } else {
    isWin = false;  // 你让他输
  }

  // 展示结果
  if (isWin) {
    document.getElementById("result").innerText = "✅ 你赢了！";
    document.getElementById("result").style.color = "#4ade80";
  } else {
    document.getElementById("result").innerText = "❌ 你输了！";
    document.getElementById("result").style.color = "#f87171";
  }
}
</script>
</body>
</html>
