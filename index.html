<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>压一付一薪资管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑";}
        body{background:#f5f7fa;padding:15px;}
        .box{background:#fff;border-radius:12px;padding:20px;margin-bottom:15px;}
        h3{color:#222;margin-bottom:15px;border-left:4px solid #2563eb;padding-left:10px;}
        p{margin:8px 0;color:#555;}
        .btn{padding:10px 18px;border:none;border-radius:6px;cursor:pointer;margin:5px;}
        .btn-blue{background:#2563eb;color:#fff;}
        .btn-gray{background:#ccc;color:#666;cursor:not-allowed;}
        .btn-red{background:#ef4444;color:#fff;}
        .tip{padding:10px;border-radius:6px;margin:10px 0;}
        .tip-red{background:#fee2e2;color:#dc2626;}
        .tip-green{background:#dcfce7;color:#16a34a;}
        table{width:100%;border-collapse:collapse;margin-top:10px;}
        th,td{border:1px solid #eee;padding:10px;text-align:center;}
        th{background:#f8f9fa;}
        .tab{display:none;}
        .tab.active{display:block;}
        .nav{display:flex;gap:10px;margin-bottom:15px;}
        .nav-item{padding:8px 15px;background:#eee;border-radius:6px;cursor:pointer;}
        .nav-item.active{background:#2563eb;color:#fff;}
        input{padding:6px;border:1px solid #ddd;border-radius:4px;}
    </style>
</head>
<body>

<div class="box">
    <h3>钱包连接</h3>
    <button class="btn btn-blue" onclick="connectWallet()">连接币安链钱包</button>
    <p id="walletAddr">未连接钱包</p>
</div>

<div class="nav">
    <div class="nav-item active" onclick="switchTab(0)">员工中心</div>
    <div class="nav-item" onclick="switchTab(1)">运营管理后台</div>
    <div class="nav-item" onclick="switchTab(2)">老板审核后台</div>
</div>

<!-- 员工页面 -->
<div class="tab active" id="tab0">
    <div class="box">
        <h3>个人薪资档案</h3>
        <p>员工姓名：<span id="myName">暂无信息</span></p>
        <p>入职时间：<span id="entryDate">暂无</span></p>
        <p>每月固定薪资：<span id="mySalary">0</span> USDT</p>
        <p>在岗状态：<span id="jobStatus">--</span></p>
        <div class="tip" id="stateTip"></div>
        <p>距离可领取薪资剩余：<span id="surplusDay">0</span> 天</p>
        <button class="btn btn-gray" id="getSalBtn" onclick="submitGetSalary()" disabled>提交领取月薪申请</button>
        <button class="btn btn-red" onclick="submitQuitApply()">申请离职退还扣押工资</button>
    </div>
</div>

<!-- 运营管理 -->
<div class="tab" id="tab1">
    <div class="box">
        <h3>新增入职员工</h3>
        <p>员工钱包地址：<input type="text" id="staffAddr" style="width:320px;"></p>
        <p>员工真实姓名：<input type="text" id="staffName" style="width:220px;"></p>
        <p>每月薪资(USDT)：<input type="number" id="staffSal" style="width:160px;"></p>
        <button class="btn btn-blue" onclick="addNewStaff()">确认录入入职信息</button>
    </div>
</div>

<!-- 老板专属审核后台 -->
<div class="tab" id="tab2">
    <div class="box">
        <h3>待审核薪资申请列表</h3>
        <button class="btn btn-blue" onclick="batchAllPass()">一键批量通过全部申请</button>
    </div>
</div>

<script>
const ABI = [
    {"inputs":[],"stateMutability":"nonpayable","type":"constructor"},
    {"name":"checkCanGet","inputs":[{"name":"_user","type":"address"}],"outputs":[{"type":"bool"},{"type":"string"},{"type":"uint256"}],"stateMutability":"view","type":"function"},
    {"name":"addStaff","inputs":[{"name":"_u","type":"address"},{"name":"_name","type":"string"},{"name":"_sal","type":"uint256"}],"type":"function"},
    {"name":"submitSalaryApply","type":"function"},
    {"name":"submitQuitApply","type":"function"},
    {"name":"auditPass","inputs":[{"name":"id","type":"uint256"}],"type":"function"},
    {"name":"auditRefuse","inputs":[{"name":"id","type":"uint256"}],"type":"function"},
    {"name":"auditAllPass","type":"function"},
    {"name":"bossWithdrawAll","type":"function"},
    {"name":"staffData","inputs":[{"name":"","type":"address"}],"outputs":[{"name":"userName","type":"string"},{"name":"isJob","type":"bool"},{"name":"monthSalary","type":"uint256"},{"name":"entryTime","type":"uint256"},{"name":"lastGetTime","type":"uint256"},{"name":"returnFreeze","type":"bool"}],"stateMutability":"view","type":"function"}
];
// 部署合约后，把这里替换成你的合约地址
let CONTRACT_ADDRESS = "0x你的合约地址";
let web3,contract,userAccount;

function switchTab(index){
    document.querySelectorAll('.tab').forEach(v=>v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(v=>v.classList.remove('active'));
    document.getElementById('tab'+index).classList.add('active');
    event.target.classList.add('active');
}

async function connectWallet(){
    if(!window.ethereum){
        alert("请安装TP钱包、小狐狸钱包并切换币安智能链");
        return;
    }
    await window.ethereum.request({method:"eth_requestAccounts"});
    web3 = new Web3(window.ethereum);
    contract = new web3.eth.Contract(ABI,CONTRACT_ADDRESS);
    let accounts = await web3.eth.getAccounts();
    userAccount = accounts[0];
    document.getElementById("walletAddr").innerText = userAccount;
    loadStaffInfo();
}

async function loadStaffInfo(){
    if(!userAccount)return;
    let userInfo = await contract.methods.staffData(userAccount).call();
    document.getElementById("myName").innerText = userInfo.userName || "未登记员工";
    document.getElementById("mySalary").innerText = (Number(userInfo.monthSalary)/1e18).toFixed(2);
    document.getElementById("jobStatus").innerText = userInfo.isJob ? "正常在职" : "已离职";

    let [canApply,tipText,dayNum] = await contract.methods.checkCanGet(userAccount).call();
    document.getElementById("surplusDay").innerText = dayNum;
    let tipBox = document.getElementById("stateTip");
    let submitBtn = document.getElementById("getSalBtn");
    if(canApply){
        tipBox.className = "tip tip-green";
        tipBox.innerText = tipText;
        submitBtn.className = "btn btn-blue";
        submitBtn.disabled = false;
    }else{
        tipBox.className = "tip tip-red";
        tipBox.innerText = tipText;
        submitBtn.className = "btn btn-gray";
        submitBtn.disabled = true;
    }
}

async function submitGetSalary(){
    await contract.methods.submitSalaryApply().send({from:userAccount});
    alert("薪资申请提交成功，等待老板审核放款！");
}

async function submitQuitApply(){
    await contract.methods.submitQuitApply().send({from:userAccount});
    alert("离职结算申请已提交，等待老板审核！");
}

async function addNewStaff(){
    let addr = document.getElementById("staffAddr").value;
    let name = document.getElementById("staffName").value;
    let sal = document.getElementById("staffSal").value;
    await contract.methods.addStaff(addr,name,sal).send({from:userAccount});
    alert("员工入职信息录入完成！");
}

async function batchAllPass(){
    await contract.methods.auditAllPass().send({from:userAccount});
    alert("全部待审核申请已统一通过发放！");
}
</script>
</body>
</html>
