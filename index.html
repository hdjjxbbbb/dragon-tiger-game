<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Whale</title>

<style>
body{background:#0b0f1f;color:#fff;font-family:Arial;padding:20px;max-width:500px;margin:auto}
.btn{width:100%;padding:14px;border:none;border-radius:10px;background:#4facfe;color:#000;font-weight:bold;margin-top:10px}
.item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #333}
.price{color:#4facfe}
</style>
</head>

<body>

<h2>Meta Whale (Polygon)</h2>

<button id="connect" class="btn">连接钱包</button>
<div id="addr"></div>

<div style="margin-top:20px">
<h3>经典矩阵</h3>
<div id="classic"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>

<script>
// ==========================
// 配置（必须改成你的）
// ==========================
const CONTRACT = "你的合约地址"; 
const DAI = "0x8f3Cf7ad23Cd3CaDbD9735AFf958023239c6A063"; // Polygon DAI

let web3, account, contract;

// 价格
function price(level){
  return 50 * (2 ** (level-1));
}

// 渲染
function render(){
  const box = document.getElementById("classic");
  box.innerHTML = "";
  for(let i=1;i<=5;i++){
    box.innerHTML += `
    <div class="item">
      <div>Lv${i}</div>
      <div class="price">${price(i)} DAI</div>
      <button onclick="buy(${i})">激活</button>
    </div>`;
  }
}

// 买
async function buy(level){
  if(!account) return alert("先连接钱包");

  const amount = price(level);
  const val = web3.utils.toWei(amount+"","mwei");

  const dai = new web3.eth.Contract([
    {
      "name":"approve",
      "type":"function",
      "inputs":[
        {"name":"spender","type":"address"},
        {"name":"amount","type":"uint256"}
      ]
    }
  ], DAI);

  try{

    alert("① 授权中...");
    await dai.methods.approve(CONTRACT, val).send({from:account});

    alert("② 激活中...");
    await contract.methods.activate(level).send({from:account});

    alert("✅ 成功");

  }catch(e){
    let msg = e.message;
    if(msg.includes("insufficient")) msg="余额不足";
    if(msg.includes("rejected")) msg="用户取消";
    alert("❌ "+msg);
  }
}

// 连接钱包
document.getElementById("connect").onclick = async ()=>{

  if(!window.ethereum) return alert("请用钱包打开");

  await ethereum.request({method:"eth_requestAccounts"});

  web3 = new Web3(window.ethereum);

  // 强制Polygon
  const chainId = await web3.eth.getChainId();
  if(chainId !== 137){
    alert("请切换Polygon网络");
    return;
  }

  const accs = await web3.eth.getAccounts();
  account = accs[0];

  document.getElementById("addr").innerText =
    account.slice(0,6)+"..."+account.slice(-4);

  // 合约ABI（最小可用）
  const ABI = [
    {
      "name":"activate",
      "type":"function",
      "inputs":[{"name":"level","type":"uint256"}]
    }
  ];

  contract = new web3.eth.Contract(ABI, CONTRACT);

  render();
};
</script>

</body>
</html>
