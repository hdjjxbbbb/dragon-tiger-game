<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- 强制禁止手机缩放 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>橘子一键发币</title>
<!-- 只引入稳定版SDK -->
<script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.91.8/lib/browser/solana-web3.min.js"></script>
<style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
    body{background:#f5f6fa;padding:20px;}
    .wrap{max-width:420px;margin:0 auto;background:#fff;border-radius:16px;padding:25px;}
    h2{text-align:center;margin-bottom:30px;color:#6c5ce7;}
    .status{padding:12px;background:#f0f4ff;border-radius:8px;text-align:center;margin-bottom:20px;}
    button{width:100%;padding:14px;border:none;border-radius:10px;background:#6c5ce7;color:#fff;font-size:16px;margin-top:15px;}
    /* 管理员后台默认隐藏 */
    .admin-panel{margin-top:30px;padding-top:20px;border-top:1px solid #eee;display:none;}
    .admin-panel h4{text-align:center;margin-bottom:15px;color:#e53e3e;}
</style>
</head>
<body>
<div class="wrap">
    <h2>橘子一键发币</h2>

    <div class="status" id="statusText">未连接钱包</div>

    <button id="connectBtn">连接钱包</button>

    <!-- 管理员后台 默认隐藏 -->
    <div class="admin-panel" id="adminPanel">
        <h4>🔒 管理员专属后台</h4>
        <p style="text-align:center;color:#666;">只有管理员钱包可见</p>
    </div>
</div>

<script>
    // 固定管理员钱包地址
    const ADMIN_WALLET = "FbDMLj8MTJGSBWeanFKhJWycn5qjmJ3q8WBzZb3Gbm1c";
    let currentWallet = null;
    let currentAddress = "";

    // 获取钱包对象 兼容所有Solana钱包注入
    function getWallet() {
        // 优先标准注入
        if(window.solana) return window.solana;
        if(window.phantom?.solana) return window.phantom.solana;
        return null;
    }

    // 连接钱包按钮
    document.getElementById('connectBtn').addEventListener('click', async () => {
        const statusText = document.getElementById('statusText');
        const adminPanel = document.getElementById('adminPanel');

        // 获取钱包
        currentWallet = getWallet();
        if(!currentWallet){
            statusText.innerText = "请用TP/欧易/幻影钱包DApp浏览器打开";
            return;
        }

        try {
            // 断开之前连接
            if(currentWallet.isConnected) await currentWallet.disconnect();
            // 发起连接 强制弹窗
            const res = await currentWallet.connect();
            currentAddress = res.publicKey.toString();

            // 显示钱包地址
            statusText.innerText = "已连接钱包：" + currentAddress;

            // 判断是不是管理员钱包，是就显示后台
            if(currentAddress === ADMIN_WALLET){
                adminPanel.style.display = "block";
            }else{
                adminPanel.style.display = "none";
            }

        } catch (err) {
            statusText.innerText = "用户取消连接或钱包未授权";
        }
    });
</script>
</body>
</html>
