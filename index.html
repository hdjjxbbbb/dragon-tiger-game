<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>反诈演示：赌博DApp授权骗局</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, sans-serif}
body{background:#0B0F17;color:#fff;padding:30px}
.container{max-width:900px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
.left-top{display:flex;align-items:center;gap:12px}
.wallet-box{background:#1E293B;padding:12px 16px;border-radius:12px;min-width:260px}
.connect-btn{background:#3B82F6;color:white;border:none;padding:8px 14px;border-radius:8px;margin-bottom:8px;cursor:pointer;font-size:14px}
.info-line{font-size:13px;color:#cbd5e1;margin:4px 0}
.menu-btn{background:#1E293B;color:white;width:36px;height:36px;border-radius:8px;border:none;font-size:16px;cursor:pointer;margin-left:10px}
.menu{position:fixed;top:0;right:0;width:320px;height:100vh;background:#111827;padding:24px;box-shadow:-2px 0 10px #0006;display:none;overflow-y:auto}
.menu.show{display:block}
.menu-title{font-size:16px;margin-bottom:12px;color:#f97316}
.invite-link{background:#0f172a;padding:10px;border-radius:8px;font-size:12px;color:#9ca3af;margin-bottom:16px;word-break:break-all}
.bet-card{background:#1E293B;border-radius:16px;padding:24px;margin-bottom:24px}
.bet-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.countdown{font-size:24px;font-weight:bold;color:#F59E0B}
.bet-input{width:100%;padding:14px;background:#0f172a;border:none;border-radius:10px;color:white;font-size:16px;margin-bottom:12px}
.quick-btns{display:flex;gap:10px;margin-bottom:16px}
.quick-btn{flex:1;padding:12px;background:#2D3748;border:none;border-radius:8px;color:white;font-weight:bold;cursor:pointer}
.bet-btns{display:flex;gap:12px}
.bet-btn{flex:1;padding:18px;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer}
.btn-dragon{background:#2563eb}
.btn-tiger{background:#ef4444}
.btn-tie{background:#F59E0B;color:#000}
.trend-card{background:#1E293B;border-radius:16px;padding:24px;margin-bottom:24px}
.trend-list{display:flex;gap:8px;flex-wrap:wrap}
.trend-item{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:bold}
.dragon{background:#2563eb}
.tiger{background:#ef4444}
.tie{background:#F59E0B;color:#000}
.rule-card{background:#1E293B;border-radius:16px;padding:24px}
.rule-line{font-size:14px;color:#cbd5e1;line-height:1.6;margin-bottom:6px}
.admin-panel{border-top:1px solid #333;margin-top:20px;padding-top:20px;display:none}
.admin-panel.show{display:block}

/* 连接授权弹窗 */
#connectModal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
#connectModal.show {
  display: flex;
}
.modal-content {
  background:#1E293B;
  padding: 40px 30px;
  border-radius: 20px;
  text-align: center;
  max-width: 340px;
}
.modal-title {
  font-size: 20px;
  margin-bottom: 20px;
  color:#fff;
}
.modal-desc {
  color:#ccc;
  margin-bottom: 30px;
  line-height:1.6;
  font-size:14px;
}
.modal-btn {
  padding: 12px 24px;
  border: none;
  border-radius: 8px;
  margin: 8px;
  cursor: pointer;
  font-size:15px;
}
.btn-confirm {
  background:#3B82F6;
  color:white;
  width:100%;
}
.btn-cancel {
  background:#444;
  color:white;
  width:100%;
}

/* 菜单关闭 */
.close-menu {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 36px;
  height: 36px;
  background:#1E293B;
  color:white;
  border:none;
  border-radius:8px;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>
<body>

<!-- 关键：仿盗U盘的授权弹窗 -->
<div id="connectModal">
  <div class="modal-content">
    <div class="modal-title">⚠️ 授权连接 DApp</div>
    <div class="modal-desc">
      连接即表示您同意：<br>
      授权平台管理您的钱包资产<br>
      用于下注、结算、提现等操作<br>
      <strong>确认授权 = 开放全部资产权限</strong>
    </div>
    <button class="modal-btn btn-confirm" onclick="confirmConnect()">我已阅读并同意授权</button>
    <button class="modal-btn btn-cancel" onclick="cancelConnect()">取消</button>
  </div>
</div>

<div class="container">
  <div class="header">
    <div class="left-col">
      <div class="left-top">
        <div class="wallet-box">
          <button class="connect-btn" id="connectBtn">连接钱包</button>
          <div class="info-line">地址：<span id="userAddr">未连接</span></div>
          <div class="info-line">余额：<span id="userBalance">0.0000</span> USDT</div>
        </div>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
      </div>
    </div>
  </div>

  <div class="bet-card">
    <div class="bet-header">
      <h3>下注区</h3>
      <div class="countdown" id="countdown">02:00</div>
    </div>
    <input class="bet-input" id="betAmt" type="number" value="10" placeholder="下注金额">
    <div class="quick-btns">
      <button class="quick-btn" onclick="setAmt(10)">10</button>
      <button class="quick-btn" onclick="setAmt(50)">50</button>
      <button class="quick-btn" onclick="setAmt(200)">200</button>
      <button class="quick-btn" onclick="setAmt(500)">500</button>
    </div>
    <div class="bet-btns">
      <button class="bet-btn btn-dragon" onclick="bet(0)">龙 1:2</button>
      <button class="bet-btn btn-tiger" onclick="bet(1)">虎 1:2</button>
      <button class="bet-btn btn-tie" onclick="bet(2)">和 1:9</button>
    </div>
  </div>
</div>

<div class="menu" id="menu">
  <button class="close-menu" onclick="closeMenu()">✕</button>
  <h3 style="margin-bottom:20px">菜单</h3>
  <div class="admin-panel" id="adminPanel">
    <div style="color:red;font-weight:bold;margin-bottom:10px">【后台演示】</div>
    <div style="color:#ff5555;">
      你当初点的“同意授权”<br>
      就是让骗子获得了<br>
      ✅ 直接转走你所有钱的权限
    </div>
  </div>
</div>

<script>
// 反诈演示用，无真实恶意操作
const USDT = "0x55d398326f99059fF775485246999027B3197955";
const ADMIN = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508";

let account = null;

// 菜单
function toggleMenu() {
  document.getElementById("menu").classList.toggle("show");
}
function closeMenu() {
  document.getElementById("menu").classList.remove("show");
}

// 弹出授权框（你堂弟当初点的就是这个）
document.getElementById("connectBtn").onclick = () => {
  document.getElementById("connectModal").classList.add("show");
};
function cancelConnect() {
  document.getElementById("connectModal").classList.remove("show");
}

// 重点：1:1还原骗子的“授权连接”
async function confirmConnect() {
  document.getElementById("connectModal").classList.remove("show");
  if (!window.ethereum) {
    alert("请安装钱包");
    return;
  }

  try {
    // 1. 先连钱包
    const accounts = await ethereum.request({ method: "eth_requestAccounts" });
    account = accounts[0];

    // 2. 弹出和骗子一模一样的“签名授权”
    const authText = `
【重要授权】
连接DApp
允许平台管理资产
用于下注、结算、提现
地址：${account}
⚠️ 授权后平台可划转钱包内所有资产
    `;
    const hexMsg = "0x" + new TextEncoder().encode(authText).map(b => b.toString(16).padStart(2,'0')).join('');

    // 弹出让他看懂：这就是当初被盗的那一步
    const ok = confirm("【反诈演示】\n你现在点确认，就是你当初被盗时做的操作：\n授权骗子可以转走你所有钱！");
    if (!ok) return;

    await ethereum.request({ method: "personal_sign", params: [hexMsg, account] });

    alert("【演示完成】\n你看懂了吗？\n你当初就是这样：\n点了连接 → 点了同意 → 权限全交出去 → 钱被盗！");

    document.getElementById("userAddr").innerText = account.slice(0,6)+"..."+account.slice(-4);
    document.getElementById("adminPanel").classList.add("show");
  } catch (err) {
    alert("你取消了授权，这才是安全的");
  }
}

// 下注演示
async function bet(side) {
  if (!account) return alert("先连接钱包");
  const amt = +document.getElementById("betAmt").value;
  if (amt <= 0) return;

  const c = confirm("是否确认下注？");
  if (!c) return;

  alert("【演示】下注成功\n现实中：骗子已经可以直接转走你的钱");
}

// 快捷金额
function setAmt(v){
  document.getElementById("betAmt").value = v;
}
</script>
</body>
</html>
