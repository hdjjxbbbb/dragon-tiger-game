<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙虎斗 - 5分钟一期</title>
    <!-- 引入 ethers.js 库，解决 "ethers is not defined" 报错 -->
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js" type="application/javascript"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        body {
            background-color: #1a1a2e;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
            font-weight: bold;
        }
        .section {
            background-color: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 15px;
        }
        .connect-btn {
            width: 100%;
            padding: 15px;
            background-color: #0f3460;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .connect-btn:hover {
            background-color: #1a4a7a;
        }
        .address {
            margin-top: 10px;
            color: #aaa;
            font-size: 14px;
        }
        .bet-input {
            width: 100%;
            padding: 15px;
            background-color: #0f3460;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            margin-bottom: 15px;
        }
        .bet-options {
            display: flex;
            gap: 10px;
        }
        .bet-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            color: #fff;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .bet-btn:hover {
            opacity: 0.8;
        }
        .dragon {
            background-color: #0047ab;
        }
        .tiger {
            background-color: #c8102e;
        }
        .tie {
            background-color: #b8860b;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .modal-content {
            background-color: #fff;
            color: #000;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            max-width: 80%;
        }
        .modal-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .modal-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #0047ab;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            🐯🐯 龙虎斗 · 5分钟一期 🐯🐯
        </div>

        <div class="section">
            <div class="section-title">钱包连接</div>
            <button class="connect-btn" id="connectWallet">连接钱包</button>
            <div class="address" id="walletAddress">地址: -</div>
        </div>

        <div class="section">
            <div class="section-title">下注区</div>
            <input type="number" class="bet-input" id="betAmount" value="1" min="1">
            <div class="bet-options">
                <button class="bet-btn dragon" id="betDragon">龙 1:2</button>
                <button class="bet-btn tiger" id="betTiger">虎 1:2</button>
                <button class="bet-btn tie" id="betTie">和 1:9</button>
            </div>
        </div>
    </div>

    <div class="modal hidden" id="errorModal">
        <div class="modal-content">
            <div class="modal-title">温馨提示</div>
            <div id="errorText"></div>
            <button class="modal-btn" id="confirmError">确认</button>
        </div>
    </div>

    <script>
        let provider;
        let signer;
        let userAddress;

        // 连接钱包函数
        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    // 请求授权账户
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    provider = new ethers.providers.Web3Provider(window.ethereum);
                    signer = provider.getSigner();
                    userAddress = await signer.getAddress();
                    document.getElementById('walletAddress').textContent = `地址: ${userAddress.slice(0, 6)}...${userAddress.slice(-4)}`;
                } catch (error) {
                    showError(`连接失败: ${error.message}`);
                }
            } else {
                showError('请安装 MetaMask 或其他支持 WalletConnect 的钱包');
            }
        }

        // 下注函数（示例逻辑）
        async function placeBet(side) {
            if (!userAddress) {
                showError('请先连接钱包');
                return;
            }
            const amount = document.getElementById('betAmount').value;
            if (!amount || amount <= 0) {
                showError('请输入有效的下注金额');
                return;
            }
            showError(`下注 ${amount} 到 ${side}，功能开发中...`);
        }

        // 显示错误弹窗
        function showError(text) {
            document.getElementById('errorText').textContent = text;
            document.getElementById('errorModal').classList.remove('hidden');
        }

        // 绑定事件
        document.getElementById('connectWallet').addEventListener('click', connectWallet);
        document.getElementById('betDragon').addEventListener('click', () => placeBet('龙'));
        document.getElementById('betTiger').addEventListener('click', () => placeBet('虎'));
        document.getElementById('betTie').addEventListener('click', () => placeBet('和'));
        document.getElementById('confirmError').addEventListener('click', () => {
            document.getElementById('errorModal').classList.add('hidden');
        });
    </script>
</body>
</html>
